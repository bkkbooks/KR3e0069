body:
  text: 仁端録卷十六明徐謙撰陳葵刪定正疹門疹子之名隨地各異江浙謂之痧子新安謂之麻子北地謂之疹子其症以透發避風節食解毒為主若以易出易没而忽之災𤯝立至出現三日身和色淡者為順從頭至足俱出者為齊頭面最多鼻梁一直上下俱有者為透以次收没者為吉疹斑水赤癮丹各别歌疹如麻子斑如錦水痘如珠赤色紅隠藏不現亦不没丹突如雲片塊仝原疹賦疹雖胎毒多帶時行先發于陽後發于隂毒盛于脾熱流于心臟腑之傷肺則尤甚始終之變腎則無症憎寒壯熱有似傷寒眼胞困倦而難起鼻流清涕而不乾咳𠻳噴涕少食煩渴身疼氣急嘔吐泄㵼腮紅眼赤邪目視之隠隠皮膚之下以手摸之磊磊肌肉之間其形若疥其色若丹出現三日漸没為安隨出隨没喘急須防根顆若腫兮疹而兼癮皮膚如赤兮疹以夾斑如錦鱗明兮十有九效似煤灰黒兮百無一痊毒欲發盡而勿留疹欲出透而無病或邪氣之欝遏兮留而不去或正氣之損傷兮困而未伸毒歸五臟變有四症歸脾胃兮泄㵼不止而變痢歸心肝兮煩熱不退而發驚咳𠻳久而出血兮毒歸于肺牙闗爛而疳蝕兮毒歸于腎肺受風寒忽生喘急心肺火爍口舌生瘡毒為食滯腸鳴腹痛肺胃藴熱津液長乾發不出而煩躁兮不久即死黒不變而詀妄兮必不復生氣蒸蒸兮色赤痢滴滴兮氣腥羸痩骨肉之氣脱瘛瘲智識之神昏喘急兮胸髙肩聳疳爛兮漏腮缺唇休誇當世之妙手難留一息之遊魂更有恣食醎酸咳𠻳痰涎之不已喜啖幸燥火熱熖灼之不寧甘甜過而齒齲生冷多而糞清鷄易生風魚能動火食之不節風火相生邪反滋甚兮斑疹不息毒反深入兮疫癘再經病齒終身兮癲癎時發鼻常齀􅀈兮目常赤疼溲數短澁兮乃小腸膀胱之受熱便溏垢蠱兮必脾胃倉廪之被焚哮喘炎上逆氣丹瘤熛灼赤形唇舌疳糜兮心脾殘焰未息咽喉腫痛兮管鑰餘燼猶存皮焦髮槁榮衛之液已竭為腫為熱風寒之客已深疹後多痢兮熱毒移于大腸咳𠻳喉痛兮痰氣聚于心胸若痧疹而口渴心煩法要生津養血飲食減少治宜調胃和中餘症不常臨期通變治疹賦微汗常出熱勢越而不留清便自調邪氣行而多壅腠理欝即當發散腸胃秘亟與疏通衂反解邪利反疏毒所喜者身上清凉所怕者喉中腫痛飲水頻法在生津養血飲食少方須救胃和中出之太甚發表為貴出之過密解毒為先毋伐天和勿傷嵗氣温補須防助邪寒涼宜顧傷胃應出不出兮初升麻次通聖奪命大發而有準應收不收兮初葛根次化斑涼膈大解而最靈色淡白兮為虚四物去川芎加紅花桂枝色紫黒兮為熱化斑去人參加元參燒屎奪命發斑之聖藥無價解疫癘之神方散毒防風開發轉闗之將連翹解毒制伏降虜之兵如錦爛漫兮服化斑而艶歛似火薫蒸兮飲涼膈而熱清咽痛兮甘桔牛蒡止咳𠻳更能潤肺溺赤兮導赤芍藥定驚悸又可涼心便秘兮胆導承氣便泄兮猪苓黄芩大渴兮膈焦置栝蔞于白虎苦煩兮裡熱加山梔于安神熱不除者柴葛合乎四物或調元湯而加麥冬知母若兼作搐濟以抱龍鎮驚咳不止者杏蒡仝乎阿膠或五抝湯而加茅根地黄若兼帶血耑以補肺大平注下兮異攻猪苓澤㵼虚滑者大加參苓滯下兮黄連當歸白芍休息者少與真人惟有牙疳之一症元呼走馬之名初息臭而内腐漸血出而穿齦内服地黄三黄兮制其火熖外擦文蛤溺白兮殺其䘌蟲齒牙若脱落兮崩沙之勢可畏聲音若嗄啞兮狐惑之症難明氣血已虚八物増減而可飲水穀不納二陳斟酌以堪行欲定良方藥性宜别荆芥防風發腠理之邪留升麻葛根開榮衛之藴熱人參補氣地黄涼血黄連入心而㵼火黄芩入肺而定喘元參石膏治邪火之浮游梔子連翹開毒火之欝結栝蔞潤肺止𠻳須合麥冬知母降火生津必同黄栢芍藥和其腹痛白术燥其脾泄治溺赤兮苓通醫咽痛兮甘桔辰砂可鎮神驚硝黄以通秘結牙疳文蛤配其溺白喉秘射乾助以䑕粘五味杏仁定喘氣薄荷竹葉解膚熱火燒人屎蜜炙麻黄發斑毒之出現令邪毒之抒張枳實山查消脾熱而化毒兠鈴地骨清肺熱以回瘡消腫定喘兮葶藶取效活血止痢兮忍冬最良原疹論孫一奎曰疹子係生初淫火與痘同出命門兩腎中間有命門穴臟腑之本十二經脈之根三焦之原呼吸之門此太極之理而隂陽五行係焉天之癘氣一動則所禀之毒隨之而發陽感之則出疹隂感之則出痘陽浮淺故易出易歛然而實成于隂葢疹非血濟則氣何依烏能收歛隂陽所以互為其根也昔人謂痘出于臟疹出于腑皆非也疹出于腑則涕𠻳毒從毛竅而出心肺位髙故火症見于上部為多是干于臟矣痘與疹皆出命門但分隂陽耳痘屬隂故多虚寒而可温補疹屬陽故多實熱而可清解發得毒盡則無内攻故服藥起居不可閉塞其毒亦不得盡情發洩以遺後患疹症先動陽分而後歸于隂經故標屬隂而本屬陽其熱也氣與血相搏故血多虚耗其治也先發散行氣而後滋隂補血疹以六時收者非也必出三日後體漸和疹漸收者吉若一出即收變患立至疹類不同有中府之正疹有癘氣之發疹有風寒之發疹有内傷之發疹有胎熱之發疹遍身㸃㸃如珠色紅似散不散往往成狗癬疥此胎毒似疹也不作疹治繆仲淳曰痧子者手太隂肺手陽明胃二經之火熱又感時行瘟疫之氣故發也其症咳𠻳嚏涕痰涎口渴嘔吐煩悶躁亂神昏咽痛唇焦眼中多淚治宜發散清涼為主辛散之味如荆芥西河栁葛根麻黄牛蒡石膏清涼之劑如元參竹葉花粉薄荷青黛甘寒之藥如麥冬蔗漿天冬生地甘草苦寒之藥如黄苓黄連黄栢貝母大黄痧疹不宜隨症施治惟當解肺胃二經之邪熱疹家禁忌一忌温補多用温補原缺四字如人參黄茋白术二忌辛熱多用辛熱反能塞毒如麻黄桂枝三忌悍燥熱甚煎血元氣虚耗如桂附之類四忌醎酸食醎易成哮喘食酸疹没太早聲音不清咳𠻳成癆五忌驟用寒涼雖足以解外熱然適以遏内熱六忌生冷風寒遏抑肌膚腠理成麻風痧癆七忌葷腥辛辣食雞則終身起粟如鷄皮遇出疹之時重復出疹食猪肉亦然食蝦蟹則發不透食辛熱則易驚食煎炒則易泄㵼已上禁忌須守四十九日重者百日一有犯者終身固疾疹家時令疹雖胎毒亦由疫氣故必先明嵗氣次順時令温暖時月以辛涼發之用防風解毒湯大熱時月以辛寒發之用黄連解毒湯太寒時月以辛温發之用桂枝解毒湯乍寒乍熱時月以辛平發之用升麻葛根湯疹家形色凡疹多于耳後項上腰腿先見其頂尖而不長其形小而匀净色以淡紅為輕色紅兼火化也以化斑湯為主人參白虎湯為佐色白血不足也用養榮湯紫赤乾燥晦暗不明火毒熾也宜養隂退陽滋隂涼血則熱自除用六一散大青湯元參解毒湯色黒熱極至重也勿妄施治惟燒人屎可救大便秘者亟疏通之輕疹顆粒匀净淡紅鮮潤上多下少五日而出微𠻳而出透發三日漸漸隠没重疹大熱而出紅紫暗燥咽喉腫痛頭面不出不食便秘感冒風寒以致早没喘脹㵼痢死疹黒䧟乾枯隨出隨没身熱腹脹面色青白鼻清糞黒鼻煽口張目無神光氣急喘促心頭翕翕鼻中出血不省人事通闗無嚏眉豎胸髙唇燥舌烈搖頭舞手鼻爛唇穿牙疳漏頰鼻梁發㸃皆死症也治喘𠻳之疹喘者邪壅于肺也勿用喘藥大忌麻黄用之益喘用竹葉石膏湯加西河栁元參薄荷凡喘而𠻳者易治喘而不𠻳者難治汗出大熱而喘甚者内熱甚也用杏仁石膏甘草夏月身熱頭疼喘𠻳無汗者雖屬夏令實為風寒閉塞也宜汗之用升麻湯加羌活白芷荆芥前胡知母桔梗用前方得汗疹透而身熱者用香茹飲合化斑湯夏月熱甚煩渴兼暑毒者用香茹飲合枳殻湯喘滿便秘者用前胡枳殻湯加大黄黄芩或小承氣湯防風通聖散治寒抑之疹冬月大寒抑欝不出者用白虎湯加麻黄風寒閉塞不出身熱咳𠻳嘔吐不食用麻黄葛根湯消毒飲治之治詀語之疹發熱時煩喘詀語用升麻葛根湯調辰砂六一散詀而小便不通者用導赤散詀而小便如泔者用四苓散加木通車前詀語如狂者用解毒湯調辰砂六一散有痰加貝母有熱加青皮柴胡咳𠻳加麥冬知母百合治汗多之疹毒從汗散不可止之但汗出太過恐神脱生變用當歸六黄湯加浮麥治血多之疹毒從血解不可止之若衂血太多此火迫血妄行也宜解之用茅花湯加元參草霜衂兼吐血輕者用黄芩湯加黒梔童便重者用涼膈散加生地黒梔童便治水蓄之疹口渴而恣與湯水則有此症水入于肺則為喘為渴用葶藶杏仁水入于脾則為腫腹為自利水入于胃則為嘔用四苓散水入于心則為驚悸用赤苓燈心湯水入于肝則為腸痛用芫花水入于腎與膀胱則為小便閉隂囊腫用車前木通疹前症治凡用發藥而疹即出者為順自頭至足俱出者為齊頭面最多鼻梁一直上下俱出者為透發疹之藥宜用升麻湯宣毒發表湯寒則加麻黄紫蘇羌活川芎熱則加黄芩葱白生薑元荽使腠理開發微汗潤澤庶免熱毒閉遏若不出不快不透再用升麻葛根湯小柴胡湯麻黄湯加發藥再發之發表不出用麻黄山梔黄芩黄連大黄連翹牛蒡石膏蟬退紅花或消毒飲發熱時或嘔吐或自利或滯下此毒火内迫也用竹茹石膏湯以治吐用升麻澤㵼湯以治利毒重而裡急後重滯下者用黄芩芍藥湯加黄連生地木通人參枳殻大黄或黄連清肺湯疹出稠密紅紫而痢下清水此陽毒得洩吉兆也疹透則㵼止矣用升麻葛根湯或平胃散加連翹或解毒湯合四苓散㵼而喘𠻳溺赤澁者用柴苓湯㵼而煩渴者用白虎湯加蒼术猪苓不熱不渴食少二便自利疹色淡紅此虚寒危症也方議温補或兼收澁疹已收㵼不止身壯熱此疹未必盡也仍用發藥如升麻葛根湯解毒湯之類若用訶子肉蔲之澁藥則生他變疹出而咳𠻳口渴心煩者乃毒乘心肺發未盡也宜㵼心肺用㵼白散加花粉連翹元參黄連或黄連杏仁湯人參白虎湯發熱時口渴不可恣與湯水宜生津解毒用菉豆燈心炒米湯人參白虎湯咽喉腫痛不能飲食者毒火上熏也不可妄針出血用牛蒡湯甘桔湯加連翹牛蒡或十全散玉鎖匙吹之咽喉嗆水唇燥舌胎者毒留心胃也用黄連解毒湯加牛蒡咳𠻳氣促宜清金降火用山梔茯苓桔梗石膏知母𤓰蔞麥冬杏仁牛蒡元參竹葉骨皮虚則加人參疹没太早疹出一日而忽没者風寒所遏也不亟治必舌白唇濕胃爛而死用消毒飲升麻湯或杏仁石膏連翹荆芥防風羌活枳殻甘草以發散之縱不復出大勢自安然後隨用黄芩黄連山梔石膏柴胡葛根薄荷連翹牛蒡青黛滑石知母黄栢元參人中黄之類治之若少緩非喘脹而死即犯口疳下痢煩燥等症疹没太遲疹出三日漸收為佳若連綿數日不收者必外發未盡内有寒熱也宜清利之則熱自解疹自消矣用化斑湯三味消毒飲加元參桔梗石膏四物湯加清利之藥有失血者加犀角汁孕婦出疹出疹熱毒墮胎胎多受傷而母無恙者以疹與痘不同痘宜内實故胎去而母亡疹宜内虚故胎去而母安䆒以母子兩全為妙出疹以安胎清熱為主用黄芩四苓湯加黄芩白术砂仁蘇梗腹皮胎氣上冲多服前方又用苧蔴根艾煎湯磨梹榔服熱甚墮胎此危症也先用四物湯加減後用疹家解毒藥疹後症治疹毒貴早發散遲則災禍立至後有餘邪均為凶候總以解毒消毒為主疹後元氣弱忌用人參白术宜用白芍甘草扁豆青黛山藥麥冬桂圓多服自强疹家嘔吐有發散之妙不必施治若疹後煩熱嘔吐則毒尚留連肺胃也用化斑湯解毒湯便秘者少加大黄傷食者用四君子湯加消食藥傷暑者用四苓散加黄連香茹切忌木香豆蔲丁香乾薑肉訶子疹後因火毒煎熬隂血虚耗以致午後熱甚者治宜滋隂清火用清胃解毒湯胃熱而發熱連綿者用集聖丸胃苓湯餘熱未盡日夜煩躁詀語狂亂者用辰砂六一散辰砂五苓散疹後潮熱似瘧者用小柴胡湯加清肺養血之藥疹後壯熱咳𠻳便秘煩熱者此疹邪不解也用三黄丸清膈散金花丸或知母麥冬前胡元參黄連當歸花粉之類身熱煩渴不已此虚煩也用竹葉石膏湯去半夏加乾葛花粉熱雖退而𠻳渴不止者用沙參麥冬貝母五味知母陳皮花粉桔梗甘草疹後壯熱漸至羸瘦搐掣悶瞀晝夜不寧此熱在心肺二經也用養血湯安神丸疹後壯熱煩躁驚搐悶瞀此血耗毒乘心肝也宜養血安神四物湯加麥冬棗仁燈心甘草龍胆茯神辰砂黄連石菖蒲淡竹葉痘後中氣虚乾𠻳便溏減食潮熱治宜温補用六君子湯疹後熱毒入胃久而不散致成牙齦黒爛血出而為走馬疳兩頰浮腫穿頰破腮缺唇破鼻聲啞不食為崩沙狐惑之症矣用仲淳牙疳方或用人中白蘆會史君子龍胆草黄連五靈脂蒸餅為丸服之可以清胃外用文蛤散雄黄散鴉片吹疳散狐惑用牛黄散金花丸牙疳紅腫用清胃湯合甘草桔梗湯疹毒不盡潰爛乾𠻳不已此毒乘心胃也舌白至唇濕處者胃爛不治未至胃爛者用人參清胃湯吹入人中白散疹後補益太早口疳痰𠻳身熱腹飽用清胃湯加枳殻腹皮疹後㵼痢皆由熱邪内陷也惟宜升散大忌止澁仍用升麻葛根白芍甘草扁豆黄連滑石西河栁山藥黄芩為丸服積熱移于大腸而泄痢者用四苓散加黄芩黄連芍藥苡仁滑石甘草㵼痢壯熱煩渴痢下鮮血不止用白頭翁湯痢下膿血裡急後重先用三黄丸次用黄連解毒湯加金銀花更效脾胃虚氣滯下不止食少脈緩肢冷用理中湯歸芍六君子湯而不效者口噤而死疹初㵼痢疹後變患休息痢不論赤白皆餘毒留于大腸也實者用三黄丸香連黄芩芍藥湯虚者宜補疹後喘𠻳此餘毒未盡也用清肺飲麥冬清肺湯仲淳疹後喘𠻳方以清餘熱熱消痰解勿用收歛之味𠻳喘連聲飲食嗆出或咳出血此毒乘肺也用麥冬清肺飲加連翹此症若胸髙如龜氣喘衂血揺頭扭頸面青黒暗者不治疹後壯熱咳𠻳痰血此毒留肺胃也用黄芩黄連知母梔子元參花粉人中黄喘𠻳連聲但無血不嗆飲食者此非肺毒不可純用清肺之藥用養隂湯發散大過致肺氣虚耗𠻳不連續者用小異攻散加麥冬五味貝母桔梗乾咳潮熱便溏減食此中氣弱也宜温補之用六君子湯喘𠻳而實者用葶藶丸虚者用清肺飲疹後乾𠻳久而龜背龜胸足腿俱細者蓋腎衰髓枯虚邪入内而成此痼疾也先以防風驅其邪後以八味地黄丸加當歸人參杜仲牛膝石斛鹿茸萆薢首烏兔絲苡仁外用驅風壯筋活血膏藥貼患處又艾灸肺腧膈腧二穴龜背龜胸而脾肺不足右脈緩弱者先用補藥俟脾土稍固再用前藥治之則漸壯漸平但不能如舊耳咽喉腫痛此餘毒不解也用甘桔湯加牛蒡石膏元參射乾外吹葛槿散疹後聲啞咳𠻳身熱久而不愈此餘邪未盡肺金受尅故也用清金降火湯加竹瀝薑汁或甘桔牛蒡湯加蘇子前胡桑皮杏仁知母元參麥冬𤓰蔞心腹作痛此熱毒為食積壅滯也多致下痢宜于解毒藥中兼消化順氣之藥别無他症猝然心腹絞痛汗出如水此元氣弱偶中惡也朝發夕死或用蘇合香丸疹後兩目赤腫壯熱煩渴此毒乘肝胃也若失治多致喪明用清胃解毒湯疹後生瘡此餘毒未盡也用金銀花連翹荆芥元參甘草生薑生胡麻黄連木通疹後餘毒壯熱煩渴宜先以葛根湯驅邪次以犀角地黄湯涼血肢節疼痛發􅏴名曰沙毒變黒成痧疔與治毒同法疹後餘毒二便失血用犀角地黄湯合解毒湯或四物湯加山菌山梔木通犀角利其小便使熱氣下行衂血用茅根湯疹後不食脾虚不能磨食也用四物湯加神曲砂仁治案一兒身熱喘脹以外感治之不效内傷治之亦不效視其背隠隠赤色乃疹也用麻黄湯表之頭面不出而死一兒身熱似痘遍身報㸃沈虚明黄錦雲皆以為痘黄綺雲年甫十二未習醫獨以為疹父詬之對曰兒聞父言疹為肺胃風熱今兩鼻流涕豈非疹乎已而果然後成名醫一疹出紫色喘𠻳穢㵼不食用解毒飲挑痧法而愈一疹出紫色便秘溺澁煩躁悶亂用大柴胡湯利之而愈一兒遏于風寒疹不易透用桂枝湯加葛根麻黄前胡又用厚被裹之以大劑防風湯熏床下以芫荽防風湯浴頭面手足以苧蘸芫荽湯戞之而愈一兒身熱頭疼骨痛咳𠻳喘急嘔噦不食乃傷寒而兼出疹也治若少緩雖透必變紫黒悶亂而死用百祥散十神解毒湯而愈一兒出疹而恣食停滯腹飽便秘壯熱詀語用大黄枳實𤓰蔞厚朴黄連甘草利之而尚喘𠻳脈遲肢冷又用附子理中湯歸芍六君子湯而愈一兒疹出表散後肌膚隠隠成片又為風寒所欝變渾身青紫煩躁悶亂喘脹欲出不出用麻黄桂枝湯加葛根得微汗而愈一兒疹半出壯熱煩躁喘脹悶亂乃出不透而内攻也用麻黄甘草桔梗前胡葛根荆芥牛蒡枳殻疹出二三番又用養隂湯加人參不食用陳皮山藥及麻杏膏而愈一兒疹隱頭面不出面青喘脹悶亂右寸脈微此正氣虚不能升毒也用麻桂枝湯加人參又用防風元參湯及浴法而愈一疹出盡而壯熱秘結喘脹詀語此毒壅未盡也用黄連栝蔞枳實石膏桑皮知母人中黄而愈一兒汗出疹透猶喘不止亦邪壅也用麻黄杏仁石膏而愈一疹出咳𠻳喘急用大無比散小無比散即喘定神安此熱毒從小便而出也一兒仲春出疹誤服寒藥生梨寒欝而没喘悶面青肢冷聲啞昏暈用麻黄湯加葛根柴胡甘草桔梗紫蘇乾薑覆被取汗而愈一兒疹雖出而喘反甚乃驟用麻黄燥烈之藥火盛而肺太熱也宜清潤之用桔梗前胡牛蒡杏仁元參知母黄芩花粉而愈一疹發不出喘𠻳煩渴悶亂繆仲淳用西河栁麥冬牛蒡蟬退荆芥甘草薄荷知母竹葉石膏冬米而愈一兒疹極重尚善飯仲淳以西河栁元參貝母麥冬知母石膏竹葉二劑而疹遍體皆赤連進四服疹雖出而煩躁不止也又用前藥加黄芩黄連黄栢而愈一兒寒月出疹不透喘脹悶亂煩躁用去節麻黄葛根麥冬貝母前胡知母荆芥元參甘草西河栁一服疹透而愈一新婚出疹痰𠻳不已咸謂餘毒用清解而痰愈多午後𠻳甚此隂虚火熾而潮熱也用六味地黄丸加當歸芍藥而愈一孕婦疹不出熱極悶亂喘脹用清熱安胎藥而熱甚危急此懐胎内實故也法當下其胎則熱解而母命可保用表散下胎之藥而愈一孕婦出疹觸動其胎胎墮而去血過多疹雖收而煩躁悶亂乃血脱故也當兼理氣用理中湯而甦又用人參當歸阿膠炮薑荆芥艾葉而愈一孕婦出疹熱墮而難産用魚膠三寸燒存性麝香一分共沖酒服而立產横生者亦用此法但雖產而子不活一產婦疹不易出熱甚而去血不止乃氣血不足不能逐毒出外也用麻黄葛根湯加人參當歸白芷阿膠而愈一婦疹後輕咳𠻳朝涼暮熱少神肌瘦唇赤咸以氣血不足用八珍湯不效細詢其夫知不慎房勞所致用六味地黄丸合生脈散絶慾百日而愈清金降火湯當歸芍藥陳皮貝母生地𤓰蔞元參黄芩茯苓天冬麥冬杏仁桑皮石膏黄連蘇梗甘草養隂湯川芎當歸生地芍藥五味麥冬黄芩桔梗桂枝湯麻黄桂枝赤芍荆芥防風羌活川芎甘草桔梗牛蒡人參黄連湯黄芩黄連黄栢山梔牛蒡桔梗甘草防風荆芥木通知母元參石膏防風湯荆芥防風連翹桔梗木通牛蒡薄荷石膏知母枳殻竹葉燈心甘草化斑湯連翹牛蒡元參升麻知母石膏骨皮甘草淡竹葉粘米大青湯元參大青桔梗知母升麻石膏骨皮甘草木通山梔人中黄水煎同人屎調服元參解毒湯黄芩元參生地桔梗甘草山梔葛根荆芥奪命散麻黄升麻紅花牛蒡連翹蟬退紫草人中黄宣毒發表湯升麻葛根牛蒡連翹前胡杏仁木通竹葉防風荆芥桔梗薄荷甘草三仁膏桃仁杏仁芫荽子加減麻黄散升麻麻黄牛蒡蟬退人中黄黄芩黄連黄栢山梔大黄紅花原闕散山梔麻黄黄芩黄連大黄連翹牛蒡石膏蟬退紅花解毒湯川芎當歸生地白芍黄連黄芩山梔牛蒡連翹甘草桔梗黄連杏仁湯陳皮黄連杏仁麻黄枳殻葛根㵼加厚朴甘草十全散黄連黄芩黄栢苦參延胡索硼砂乳香雄黄孩兒茶為末吹喉玉鎖匙硼砂朴硝殭蠶氷片為末吹喉安神丸當歸茯神龍胆草養血湯川芎當歸麥冬生地梔子元參杏仁麻黄竹葉疹後瘧疾方鼈甲茯苓山查貝母麥冬橘紅知母柴胡甘草渴甚加石膏仲淳治疹後牙疳方連翹荆芥元參乾葛升麻黄連甘草生地犀角金花丸黄芩黄連黄栢山梔水泛為末白湯服牛黄散黄牛糞後尖焙存性人中白煆黄栢末吹入清胃湯升麻當歸黄連丹皮生地清胃解毒湯升麻當歸黄連丹皮生地人參麥冬白頭翁湯秦皮白頭翁黄連黄栢麥冬清肺湯大黄麥冬麻黄知母羌活甘草石膏葶藶麥冬清肺飲知母貝母天冬麥冬桔梗甘草杏仁牛蒡石膏馬兠鈴粘米一方無石膏有款冬骨皮清肺飲即四君子湯加麥冬五味子貝母知母款冬仲淳治疹後咳𠻳方貝母𤓰蔞根甘草麥冬元參薄荷桔梗葛槿散牙皂紫葛白槿花硼砂明礬龜板灰共為末吹入麻杏膏麻黄杏仁升麻解毒湯葛根升麻羌活連翹柴胡前胡甘草桔梗荆芥防風赤芍竹葉大無比散滑石甘草辰砂雄黄為末小無比散石膏滑石甘草寒水石欝金為末化毒消表湯牛蒡花粉連翹黄連黄芩山梔骨皮知母葛根元參桔梗前胡甘草防風薄荷清熱導滯湯黄芩黄連白芍枳殻六一散厚朴青皮梹榔當歸甘草連翹牛蒡大黄清金化毒湯知母黄芩石膏桔梗甘草天冬麥冬兠鈴木通山梔花粉柴胡四物湯人參柴胡當歸黄芩川芎生地白芍骨皮麥冬知母竹葉麻黄散升麻麻黄牛蒡人中黄蟬退化斑解毒湯元參知母石膏人中黄升麻大清牛蒡連翹淡竹葉大黄猪苓湯澤㵼猪苓滑石赤苓甘草黄連升麻發痧疹方胡蘆子桃仁泥元荽杏仁泥文蛤散五棓子朴硝大黄南星為末醋塗人中白散黄栢人中白枯礬黄連氷片蟬退紙煆為末敷之痧癆方白灰莧根隂乾為末糖調服抱龍丸琥珀檀香天竺黄人參茯苓粉草枳實枳殻山藥辰砂胆星金箔為衣薄荷湯下驅風散荆芥防風牛膝苡仁首烏便浸晒乾苦參肥皂核仁花粉殭蠶共為末每服二錢同土茯苓雄猪油粘米菉豆水四碗仝煎至二碗分作二次温服牙疳方荆芥連翹葛根升麻黄連甘草生地元參犀角又方琥珀硃砂茯神氷片人參酸棗仁犀角汁蜜丸麥冬湯下疎風散連翹防風荆芥當歸元參前胡桔梗葛根杏仁黄芩牛蒡知母甘草仁端録巻十六
