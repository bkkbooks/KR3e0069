body:
  text: 仁端録卷三眀徐謙撰陳葵刪定眀辨痘形色者血之華形者氣之充也氣血和平隂陽調暢痘自然小大適中位置勻朗如過於大者非發藥之多即稟受之弱過於小者非毒氣之深伏必邪火之浮遊皆非痘之正形也故約言之不外氣血毒三者博求之則千態萬狀局局不同苟非閲歷之多考究之深籌策之熟鮮有不當局而迷者也痘形正變點粒者痘之形也故尖圓堅厚始出之形也飽滿充足成漿之形也斂束完固收靨之形也或平或陷者形之變也初出如蠶種薄如麩片密如針頭如熱之起痱寒之起粟者必不能起發而死若粘聚糊塗肌肉虛浮溶軟嫩薄皮膚潰爛者必不能收靨而死痘形疏密痘欲其疏疏則毒少不欲其密密則毒重如頭面欲疏元首不可犯也頸項欲疏管籥不可塞也胸背欲疏臟腑腧膜之所附也若手足則不嫌其密矣謂之疏者非但稀少也鋪排磊落大小勻淨亦可以言疏謂之密者非必盛多也攢聚粘連每多成片雖見數處亦可以言密疏而凶者初出時才見紅點兩三處大熱不解唇口燥裂大小便閉煩躁不寧或身不熱但增煩渴者此由毒盛鬱遏於中不能遽出日復漸出漸加稠密一也初出一兩點頂尖焦黑或三四粒作一堆者僅見數處他處無有喜睡不食煩渴二便祕澀加喘促妄言者此毒伏於中不待起發而死即使起發必發􅏴毒二也有出痘疏朗遂生玩忽以致不守禁忌雜施湯藥變生不測者三也密而吉者痘出雖密分珠綻突內症和平是也密而凶者平塌腳軟色無神內症不和是也雖密而凶治之得宜衛之甚嚴可以調致內症和平而亦獲全也痘形諸名粗珠痘尖光圓澤根窠紅活順也若間有內傷外感症不易生發者須辨之細珠痘與粗珠痘同勿因其細小而妄發之致漿清癢塌潰爛茱茰痘四沿皺起形如茱茰乃元氣不足榮衛兩虛中心陷落也九日當死若得根窠紅活者須內托氣足則漿滿而頂可充也內托散中去防風白芷頂中發黑點者用保元湯加川芎官桂身壯熱者加入酒炒黃芩石屑茱茰痘郛廓堅厚粿粒硬小乃氣血足表裡實順候也又有薄殼茱萸痘瓦灰茱茰痘皆宜大補元氣為主或破而乾黑腳塌如圍碁子者不治大痘髙大而飽滿者是也兒小漿空難足用保元湯倍參芪芍术漿足難收以白芍斂之然亦有過發以致濶大者起脹時粉白色頂突無陷者是也梅花痘報點五六粒成叢或七八粒成叢百餘處者是也至起脹連成一個平塌有贈痘光疏者生贈痘平塌枯滯者凶蟢窠痘初出時不拘頭面身體但中間有一大粒為主四圍附聚羣小一宗如蜘咮新出之狀是也􅀈蛷痘中無大粒但有一宗一宗小者是也已上二種乃氣血不調經絡凝滯故聚發一處各自一種布於肌肉也若見山根年夀人中咽喉氣窩心窩上中下胃腕口背脊骨手心腳底六脈寸口諸緊要處難治若出於間處者初起時即用銀針挑刀割破四聖散油胭脂調貼內服通暢飲當歸紅花山查青皮通草木香廣皮菖蒲川芎羌活防風連翹酒煎服蚊迹蚤斑痘點雖見而不起突此三隂經所發逆候也椒皮鐵葉痘紅紫如椒黑而形枯瘁慘黯者皆毒傷五臟內腐而外黑此毒之重者治之何益蛇殼痘內外皆空一連乾索漿水不灌形如蛇殼頭面遍身皆腫無有空地全無光彩平􅚥而白色多屑者是也麩皮痘片片枯瘁自落毫無滋潤者是也與蛇壳痘皆毒入脾經之重症必乾枯不能作漿至十一二日必死若間有補空之痘紅潤者可治或地白暈紅根腳起者可治急扶榮衛與蚯蚓丹可頃刻遍腫退不見其形亦不見漿竟可獲愈壘黍痘壘壘如黍米之細小或紫或白者是也蠶布痘細密如蠶子之排布見點稠密如㾦起脹糊塗無地與壘黍痘皆毒盛而無所制伏必不能成漿逆候也圍棋痘平塌腳散者是也乃正氣不足不能充頂必致漿清破損倒靨而死若能食便調庶幾可治象棋痘頂平略陷腳斂血附是也治同茱茰痘饅頭痘頂頺腳塌不尖不平乃脾胃氣虛用保元湯加白术白芷為主晃痘即嬌紅痘粗肥血附但嫩艷不能結實此係氣血虛弱得脾胃堅固自然結實成痂否則有溏泄癢塌之患保元湯調下參苓白术散蛀痘即針空痘起脹時痘頂有小孔不黑不白皆腠理不密之故大泄元氣急宜補之令其孔一密而痘自起保元湯倍黃茋再加丁桂芎歸鹿茸若中孔色黑如鬃者難過七朝若孔黑有核者疔也以疔法治之漏瘡痘初出瘡頂有孔如蛀痘後則膿水漏出堆聚乾結其色如天泡瘡或清水非膿無故自破水去而黑乾此皆癘氣所為不治蟲痘痘癢甚者不必夏月即寒月亦能生蛆此皆毒留而肌膚熱腐日久所致即腐草為螢朽木生蟲之意有形化者蠅種所生也有氣化者漿收後隂陽鬱蒸復潰而生也或如米粒或如細絲而長寸餘先哲云蛆痘不死以其毒盡泄於外也又云濕生臭氣熱生蟲大命多敗速以香油收取盡花椒湯洗之或用嫩栁枝鋪下令兒卧於栁上則蛆自出或用簮挑之或以青布蘸鹽湯拭去又以清涼散斂之內服蟬花散若蛆在頭面用桑葉薄荷葉湯洗之外摻寒水石末板黃痘又名延日痘起脹而痘肉齊平雖有黃漿根血紫滯逆候也即使痘痂齊脫亦致日漸枯涸三七五七日而卒悶痘又名閉痘若驚厥即標者心經痘也紅潤細小易漿易靨縱稠密亦不為害非閉痘也若或悸而不標者皆屬小腸惟小腸一經沉而不泛多致難標若面如橘皮毛竅森聳是標不出的係閉痘矣急與麻黃蘇桂湯熱服避風微汗而提出之後乃隨症而治每藥要加知母黃柏恐升提之後腎水上升火亦隨至決發水泡當降腎水以免泡患也如狂煩七竅流血者不治白悶痘毒盛而氣血虛故報點白頭如㾦也漸乾枯倒靨三四日而死或因風寒壅塞腠理以致伏毒不出宜辨之紫悶痘報點如丹漸乾焦紫黑五六日死或因內外傷而氣血凝滯以致伏毒不出宜辨之緊悶痘毒火燔熾煎熬臟腑壅塞氣道銷爍營衛故伏而不出若毒乘肺則喘脹衄血毒乘肝則目血毒入小腸則尿血毒入大腸則便血毒入腎則腰足折痛此極惡極速之症二三日死不治反關痘反關內剝紅變黑大便不通小便赤咬牙寒戰兼腰疼肚有小塊不飲食五日必亡皮脹痘毒為表邪實熱所閉不能發出久乃遍肌膚之間所以皮肉脹痛如牛皮橘皮之狀肉腫痘不腫顆不尖綻貼肉浮萍不治白漿痘初發瘡頭便白帶漿者此疫癘症也七日死不治天根痘諸處不起壯而天庭曉星起灌者乃精氣外生十有九活若諸處起而天庭曉星獨不起灌乃血不灌頂十無一生搭額痘初出天庭連印堂心經藴毒熱難當稀疏朗朗還為吉稠密須防七日亡眀朗痘諸處不起壯而太陽太隂獨起者吉蓋日月為眀之義反是為晦蝕痘凶海溢痘諸處不起壯而耳後方圓一寸獨起壯腎經旺星宿海溢也可治海枯痘諸處皆起發而耳後方圓一寸不起發腎經枯也不治腎為星宿海又有頭面遍身四肢兩耳俱已起灌惟左耳下外有二三粒不起灌者日後必唇裂齒乾如不亟救必內攻而死垂珠痘兩耳屬腎腎本臟毒之處宜發不宜存今毒在耳輪之上連綿如串珠此為毒氣傷腎之甚萬無一生有根痘頭面四肢密者十分危險若地閣略有數點圓亮如珠者治之可十全腎旺故耳上出地閣下出足心根窠圎渾亦名有根痘無根痘地閣伏陷乾枯或灰白不起者腎先絶也名無根痘不治四肢皆有足心獨無亦名無根痘陽虛血枯也用保元湯加肉桂白虎痘又名監門痘嘴角兩邊各有一大痘是也木乘脾土五日後必水瀉不止主餓死於八九日之間以保元湯加白芍官桂鎖口痘密密出於唇四圍連綿無空者是也若有一二粒空處可活蓋初標時失解脾經之毒也用至寶飲去川芎當歸減廣皮紅花多加蘆根汁兩許救解脾毒外鎖唇痘密密出於兩唇紅肉上不空者是也主餓死若有空處可活用至寶飲加黃連蘆根汁內鎖唇痘其唇木厚按之如鐡又名鐵嘴痘密密出於兩唇口內紅肉上不空者是也不待傳經而死白虎排牙痘密密出於唇齦上下者是也比鐵嘴痘尤酷烈魚子抱鼻痘面部俱稀而鼻梁左右密如魚子鼻上反稀者危症也此毒聚脾胃必傳經發痰而死若鼻上四圍一樣密者是胃經毒盛解毒泄火可生鎖項托頥痘偏身稀少獨項下頷頰之下稠密一片以至於頥也九日死豬頭痘頭頸窩中太多者急救之遲則毒結咽喉而死用山豆根玄參桔梗甘草生地川芎當歸山查木通荆芥牛蒡煎服逆痘上身少下身多也此無大害只因氣弱毒從濕滯難以升發故也灌漿之時極要費心若上身多下身少者是順痘也兩頭痘初標時自胸而上自臍而下俱有痘獨中間一截全無水火未濟之象也出七日後難救若在七日內亟用人參歸茋湯去肉桂加蘇葉桔梗白芷厚朴紫草防風木通冉用黃豆三十粒煎服中實痘頭面四肢全無止有中身稠密紅活綻突漿充結痂而愈未詳其理按臟腑之毒輕者只就其附近處而發頭面四肢地逺不及遍達也妙在紅綻故順鬼揑痘即同鬼痘遍身全不分點粒斑痕成片恰如打傷䀶一樣五日外不治當曲池中生毒一月見骨而死若五日內可救亟用升麻川芎白芷蘇葉前胡甘草桔梗當歸防風蘆尖生薑煎服若身上四肢稍分點者不妨無頭痘遍身稠密頭面全無乃陽氣不足不能上升逆候也此症有以補中益氣湯加芎桂與服頭面雖提見數點終不能起脹而卒藥患痘初標紅潤誤投寒藥至四五日忽變陷伏不起將至成裡虛症也急扶表裏為主用保元湯加肉桂水患痘水泡綿密㵼痢不止是也皆因氣虛不能運化濕氣故耳用人參茯苓白术木通通草加防風白芷九焦痘當頭地閣顴骨胸腹身背手足皆有一二粒黑陷者是也再加狂言煩躁受毒太深矣不治伏隂痘痘不灌膿反㵼膿血或如清水者是也亟宜溫裏可生用保元湯加茯苓官桂川芎當歸空倉痘外若虛脹內實乾枯全無水漿此乃氣載毒行血不附氣氣至而血不至也血既不至則毒猶伏於血中而不出是倒靨之症逆候也十三日必癢塌而死若欲救之用四物湯合紫草飲或小柴胡湯加蟬蛻如已成水但形色灰白膿水清淡不能作膿者此氣血兩虛也所有之水乃初時一點氣血解而為水非自內潮起之水也若不癢塌必發􅏴毒險症也用十全大補湯若痘中略有清水根窠起脹血色紅活猶有生意亟用內托散加人參黃茋川芎當歸和人乳酒服若痘皮軟弱膿水清淡滲漏淫濕易於破損凶兆也若痘久熟時日已過當靨不靨則膿復化水皮亦易破勿依此論向陽痘向陽痘子遍身紅飲水狂煩却似凶亟用芩連犀角汁解除熱毒有神功石臼痘四沿髙中間陷明亮好看內實板漿不化以手摸之其硬如石不治又有四圍灰白陷頂中間黑色此氣弱血枯難以拘血化毒九日死草尾珠痘遍身皆陷惟有尻尾骨一團飽滿如珠此尚可治補托灌膿即愈復出痘先標一二點於面部或口唇上下如常起灌收靨及以火照之見有紅點隱隱然藏於皮膚之內急報痘一名望痘一名痘母時行發痘多有此症其症不同開列於左一見痘出二三點於左右目胞至五朝復煩躁發熱睡卧不寧其痘頂平濶大根紅有神乃感受時行癘氣先發於外也若是正痘果少必尖突而無煩躁等症矣用葛根升麻湯二劑痘果復出勻朗紅綻前症悉平一兒未熱先見一點於唇上又一兒未熱先各見一點於左右頰額頂平濶大俱至第五日身熱而復出痘勻朗而順漿足收痂但報痘潰而不斂延綿四七日而愈一女孟夏先見一點於承漿頂平濶大第四日發熱痘復出稀朗紅潤而綻順也但眉心屬命門相火毒先於此相火受傷諸處雖順恐為獨隂不化也漿行倒靨肢冷喘脹搐搦九日死一兒未熱先標點於心窩又一兒未熱先標於頭頂一兒未熱先標於喉中一兒未熱先標於腰間俱第五日而復出痘勻朗紅綻惟母痘平塌灰白無神痘漿雖滿倒靨喘脹而卒一兒初標見於山根粗肥咸謂稀疏可必至三朝壯熱狂亂母痘坍陷頥頰隱隱豫曰山根屬脾雖痘粗肥而形似饅頭乃毒乘脾胃以人牙散及羌活散鬱湯治之痘齊出稠密陷痘復起用補中益氣湯漿足結痂痕色乾紅少潤唇口裂血腹飽便閉溺澀用滋養清解之劑便通安枕又口齦發疳用清胃解毒湯加連翹而愈試痘身無大熱見點甚疏不灌膿不結痂三五日痕迹不見者是也再過三五日忽發大熱其痘一齊擁出矣當審治之用人參黃茋甘草節以養氣荆芥木通防風青皮牛蒡子連翹金銀花酒炒黃芩山梔桔梗以解毒一日一服調理至十二三日後若潰爛遍身當改用十全大補湯去肉桂加白芷防風外敷敗草散冒痘發熱至五六日痘應出不出以燈照之只皮膚中隱隱有紅點若其人色脈平和精神爽健雖煩不躁雖渴不消雖腹痛而不甚苦雖便實而不堅硬忽然眩冒大汗出者此冒痘也毒從汗解再無壅遏之患乃吉兆也木痘因其人原有痰故痘色白而不作膿也用二陳湯合四物湯一消一補仍將小麥麵調與食之立時紅活灌膿矣但不可妄投人參粘米以助胃中痰火恐防口疳賊痘比好痘預先起壯初出便如菉豆過一日便如黃豆再一日如圓果比諸痘獨大獨速者是也標點雖稀其痘根窠與頂全白而無血色形雖起脹按之如皮嫩虛軟若其色掀赤者過三日後變成水泡甚至紫泡黑泡乃毒盛而氣血大虛大熱危症也若未成紫黑更得好痘相間者可治急宜清利心經藴熱而紅紫自退不然至四五日上下出血而死少進保元湯大加紫草蟬蛻或用燈心木通湯調下辰砂六一散如已成白泡水泡灰白色用保元湯內加四苓以利之不然遍身抓破黑爛而死有二三日尚未盡出其中間或有膿泡此未至而至謂之太過亦名賊痘經曰賊痘若形諸痘不能灌汁有痘起脹而其中有先起虛大顔色如黃金者名曰賊痘宜掐破以天水散敷之內服涼血解毒藥加入人中黃如獨大而黑中有核者名疔若疔少可治疔多根血不活腰背胸前多者不治亟用銀針挑斷疔根口含清水吮去惡血點入四聖膏服解毒湯救焚散有唇上鼻凹耳邊天庭有痘皮薄先灌黃漿者名賊痘毒氣內攻脾臟也當於活血內托藥中加紫草連翹等藥覆釡痘毒入髓海故頭項之前後左右俱滿雖紅活不治補空痘即贈痘也或有順痘若失之於初不解降火毒至於起脹灌漿期內忽然焦枯或塌壞或慘色不正便不可治矣若頭面手足胸背空處得新標細痘或十餘粒或數十粒此乃元氣未盡可於此處收功亟用護心散一服然後治其新補之痘庶可回生六日痘不起脹毒將入內反補空痘用乳香一錢川山甲五錢土炒焦塞在蔥管內官桂二錢蜈蚣一條焙乾共為末每服三分至五分酒調下臭痘惟脾胃二經有之非臭痘皆無害也須辨其生死之機若臭痘或靨或破囊不盡脫紅活見血身熱氣蒸不癢不燥皆生之徵也若皮肉臭爛深擴不收傳人毒痛頭額脫皮指爛入筋陽毬穿爛口內惡臭兩腋汗不乾皆死之徵也有瘡乾臭者其漿稠濃其痂紅紫而厚如肥皂色者吉有瘡腥臭者其漿清其痂或白或黃或油緑色而薄間有如雞屎色者逆也有養漿時痘即覺臭者此毒火熏蒸之氣邪自內出也吉收靨時有臭氣帶腥者佳全無氣息者尚有餘毒未徹也若臭如爛肉不可近者雖似結痂未可為真亟用清熱活血遲則不及如或搔癢抓破及潰爛灌膿之時其臭焦者心火盛也危其臭臊者肝火盛也死其臭腥者肺火盛也危其臭腐者腎火旺也死其臭香者脾也水榖之府無所不受吉古云臭痘不死以其得陽明之毒也頭面痘形諸名彤雲繞頂遍身痘好但頭頂一片紅赤者膀胱毒盛須清利之紫雲灌頂遍身痘好但頭頂乾紫陷伏不起者不治梨花滿頂用保元湯加天雄可救烏紗覆頂氣脫血衰元神敗也必咽喉啞塞鼻氣粗大不治雲掩天庭遍身磊落光澤惟山根至髮際三陽之位一片血泡如雲者心經客熱盛也色潤痘浮而分珠者猶可救急磨犀角加玳瑁救之蓋額為清揚之分比他部不同今毒血上侵必疏通經絡使氣血和暢當用降火解毒通暢飲色凝滯而頂沈陷者不治紫萍鋪額熱甚咽痛悶亂發狂用小無比散加元參升麻犀角灰撲印堂心經血少也兼腹痛咽乾用保元湯加白芍芎桂紅花涼血解毒湯楊花撲面用內托散加天雄落花滿地痘多在下半面部稠密而灰白色上半面部勻朗紅潤者用補中益氣湯轉色灌膿可愈毒擁命關遍身勻朗綻潤但眉心密簇如錢面色灰滯平塌無根八九日漿行俱滿惟眉心空殼無水而癢塌倒靨二七日喘脹而死蓋眉心屬三焦相火為性命之關痘毒每藏於至隂之下非相火攻擊不能起發雖不可少亦不可熾也今眉心灰陷相火亢極真隂爍盡矣何能收拾縱他處漿足結痂獨眉心癢塌不痂亦難免於二八之期矣唇口痘形諸名赤珠繞唇脾經熱極也用小無比散加雄黃烏飯沿唇必聲啞神昏目睛不轉四肢厥冷喉鳴似鋸不治胸腹痘形諸名胸腹者臟腑之郭也故痘輕者胸前無胸腹密者必重也其中於各臟有期日凡病深喘急胸前搧動者肺焦脹也左乳下動脈突出者宗筋絶也皆不可治痘疹腹痛者毒未盡也霞錦穿胸火毒淫盛不治紫雲布胸血枯氣滯毒攻於胸也必咬牙戰掉唇口焦裂不治黑碁排胸不治之症三朝必死栁絮飛胸血枯氣弱用保元湯加川芎當歸附子主之兩乳中間膻中之位為氣之海縱他處勻朗綻突紅潤獨胸前攢聚如盞許大灰色者乃氣海受傷不能分布隂陽名鎖胸痘經曰隂陽分決精氣乃絶後雖漿滿而不蒼老胸前癢塌潰爛諸痘皆倒靨二六日喘脹而卒赤鱗穿腹胃家熱甚症必大便閉小便淋用甘露飲五苓散和解之黑綴纒腹腹脹聲啞二日死白梨墮腹血衰氣敗半月之間發驚而死背腰臀痘形諸名桃花映背清火解毒可生紫萍鋪背不治之症黑雲落背不治之症雪鋪魚背血已枯盡不治灰綿纒腰諸處勻朗紅潤而腰轉稠密灰滯腰痛坐立不能名纒腰痘乃毒乘腎經不能成漿九日死諸處勻朗紅潤而腰間攢簇如盞許大灰滯八九朝癢破成坑十一十二朝死發熱腰痛不能發出三日死腰痛稠密纒腰毒無出路間有空處後一日死葡萄落地臀間紅紫成片是也二日死爛粟堆臀遍身痘好惟臀上成片如粟殼臭爛者補托下元可生手足痘形諸名榴花散野四肢紅赤唇口崩裂心脾肺經熱也涼血清火解毒黑珠遍體四肢枯黑如火燒過柴頭涎出氣冷朝夕即死楊花墮枝手足獨灰白氣凝血滯也用八珍湯加附子身左身右側痘形左半身稠密紅澤右半身只數點蓋左屬陽順也用補中益氣湯右半身稠密灰滯左半身有數點蓋右屬隂逆也漿雖行不能收斂必死諸毒痘耳毒眼毒唇毒後影毒側影毒連珠毒皆死候也辨眀痘色形屬氣色屬血色者五臟之精華也正則光眀衰則慘暗五臟榮枯於此見矣紅者痘始出也白者毒未解也黃者毒將解也乾黃者毒盡解也灰白者血衰而氣滯也黑者毒滯而血乾也焦褐者氣血枯也紅變白白變黃者生紅變紫紫變黑者死故順症血榮氣順其形尖細其色紅活三四日陸續出齊綻澤隨標隨長至五六日即轉白色光澤聳峻如油潤珍珠之狀外有紅盤暈鮮如雞冠又如明珠一顆放在胭脂也此症狀其根紅頭白七八日轉黃色此乃氣旺拘血化毒成漿至於化盡結痂之後必初先結靨靨乾成痂痂後有托靨二三層瘢痕紅色此最上之痘色也下此者血熱有餘則色深紅血熱之極則變紅為紫為黑矣氣虛不足則色淡白氣虛之極則變白為粉白為灰白為虛浮矣此大槩也究而言之紅者不盡實熱也更有嬌紅痘之妖嫩艷焰而為氣虛者焉白者不盡虛寒也更有鷺羽白之綻突有神而為氣實者焉總之紅白之中各有寒熱虛實之不同惟以人之強弱靜躁痘之乾濕老嫩辨之則看痘之法盡矣故痘之色喜鮮明而惡晦暗喜潤澤而惡乾枯喜蒼蠟而惡嬌嫩喜綻突有神而惡平塌凹陷紅不欲焰焰則易破白不欲灰灰則難靨善觀痘色則虛實可知虛則補之實則解之寒則溫之熱則平之紅活者心也惡其嬌艷漿白者肺也惡其灰褐蒼蠟者肝也惡其青乾深黃者脾也惡其肉爛中黑者腎也惡其黑陷裡外微紅者輕也外黑裏赤者微重也外紫裏白外白裏紫者大重也瘡端裏黑點如針孔者熱極也青乾紫陷昏睡汗出煩躁熱渴腹脹啼喘二便不通者困也邵子説邵子皇極經世云東赤南白西黃北黑此正色也驗之於曉午暮夜之時見之矣故東赤者乃一陽發生之氣如木之始萌也遞變而南白者乃長養之氣如火之大明也遞變而西黃者乃收斂之氣如金之從革也遞變而北黑者乃閉藏之氣如水之潛伏也若痘瘡初出一點血東赤也血化為水南白也水化為膿西黃也膿乾為疕北黑也亦一陽之氣也色遞變皆正色也故痘至成膿將靨之時猶帶紅色反為逆痘也故以灰白蒼蠟為秋冬正氣痘色諸名桃花紅比之正色更覺又紅此六經火盛當審其何經有火邪而解之則正色見矣海棠紅比之桃花又紅色雖過紅尚帶濕潤者無害宜退火毒此痘多有虛紅須細辨之嬌紅一名虛紅一名透頂紅一名愰痘此虛火甚而為紅也服退火藥一二劑而見嘔又見煩躁不寧者便是虛紅也當用寧心散以補之則虛火退而色自正矣寧心散方山查前胡茯神逺志當歸陳皮木通生薑石菖蒲附嬌紅痘案於後一兒患痘五朝勻朗綻突但嬌紅嫩陷乃脾胃氣弱也主漿滿而不蒼老猶防泄㵼癢塌之患治以黃土澄水煎保元湯送下參苓白术散得脾土堅固可免下陷奈俗醫因期在發漿之始恐參苓滲濕但以保元湯調理至八朝溏泄四五次漿滿而縮倒靨煩躁二六日而死嘗驗此痘多至十二日十四日而死者一兒痘色類前以前法治之九朝漿潰而結靨如麩幸能食便調發瘡毒而愈一兒患痘五朝嬌紅嫩艷或謂愰痘不能蒼老結痂視之見其肌膚白嫩經曰肌白嫩則皮薄嬌紅可保無虞以保元湯加官桂白术調理而愈一女周歲患痘嬌紅初時嘔吐溏泄人靜諸處勻朗夭艷惟唇外四面稠密一片附録朝數治法於左一朝用桔梗殭蠶陳皮川芎甘草木通山查羌活前胡二朝用前方去羌活陳皮加防風紅花連翹乾葛三朝用桔梗川芎殭蠶當歸陳皮甘草山查前胡紅花丹皮連翹生地四朝用山藥茯苓歸身川芎甘草白芷蜂房殭蠶桔梗陳皮人參四分五朝用前方加人參六分六朝用黃茋當歸茯苓白术白芷川芎蜂房殭蠶桔梗陳皮甘草人參六分夜服桑蟲酒漿七朝用黃茋白芷當歸川芎甘草山甲人參一錢官桂二分至夜作㵼眼開嗆嘔先吐白沫喘脹交作隨用前方加人參一錢肉果五分砂仁三粒附子三分白术一錢黃茋一錢服後昏沉痰鋸顛作二三個時辰良久大汗周身聲音始出即與乳喫痘轉明亮頓起行漿八朝用人參黃茋白芷白术紅花殭蠶當歸白芍陳皮甘草官桂肉果附子二分漿足㵼止九朝用白术山藥黃茋白芷官桂殭蠶白芍甘草肉果人參一錢二分附子二分頭面胸腹漿滿惟小腿半漿血靨十朝用人參茯苓黃茋术歸芍藥陳皮甘草五味子苡仁山藥以後用平補之劑加金銀花連翹調理而愈諸痘名色胭脂紅紅而帶紫乃六經火盛之極失於降火解毒故也當審何經火最盛兼解餘經宜細辨之須佐以犀角地黃銀柴胡一二劑如兼裏症實熱口渴便閉此雖元陽亢極亦宜降火解毒為主切不可用熱藥血泡痘血挾熱毒而自漿也刺破而血猶紅者尚可治血黑者不治亟與犀角地黃湯加白芍以制血解毒身熱者用小柴胡湯加生地黃血漿不能收靨者用紫草湯調下飛龍腦膏血靨痘痘出稀少四五日胖如豌豆六七日血靨痂乾赤似硃砂九日而痂落此氣血充足毒少故隨出隨靨不及釀漿也此痘極佳百無一二赤萍痘痘已齊或未齊如赤色浮萍微微髙起若爬出有血亟以解毒升發藥救之如或爛痘却無妨紫萍痘痘已出齊紫色不起不灌如浮萍貼於肉上者不治白萍痘同前二症但痘色白耳焦紫痘乃六經火盛表熱血凝之極此痘若在標點起脹期內見之速用活血降火解毒之藥如無舌胎口渴便閉等證但是表熱也當與發汗痘色自正矣如見舌胎口渴便閉等症此兼有裏熱當與下藥大黃之類否則火盛血燥而難治矣若久不治至灌漿時變焦黑色雖神手無益也故痘三四日而焦紫者猶可施治六七日而焦紫者難以挽回痘譬則火也活則紅焰為火死則變黑為炭枯則化而成灰若痘發於心肝二經而真隂不能滋灌則熱毒焰灼遂有焦紫之色矣紫雲痘紫紅成片如雲血熱也必詀狂煩渴十日死用犀角地黃湯加紅花紫草紫疔痘黑陷中有黑疔相火挾君火之權心經藴毒必口流清血七日死灰煤色物魄化而為灰其色白精華散也屬肝金火精結而成煤其色黑梟炎爍也屬腎水五六日間若額與面有灰色必元氣不足漿不充滿俱為重症若手足灰色猶可以補真元調胃氣而獲全也痘至煤色則變黑歸腎自無可生之機矣若在三四日內見之急與疏肌竅解炎毒猶可望生也用防風通草湯浴之內服犀角地黃湯鴉翎黑痘有黑色而圓綻光潤如烏鴉翎羽之色乃大富貴之痘身上有一二點即富貴之兆況遍體乎治法與常法同不可誤認為變黑歸腎而妄斷其凶也此從標形起脹俱黑至行漿充滿漸黃赤有光彩此乃天元足壬癸實腎經獨發之痘名為鯨罩雲衢至貴之徵也附黑痘貴徵案於後房玄齡痘俱黑色如龍眼大老僧見之曰萬丈龍含珠今得見矣丘瓊山七歲出痘遍身黑色父母憂哭漁父燭之躍然曰紫垣中輔弼星落此田舍翁家取筆書弼星二字於背上而去一兒痘日中視之則黑以燈照之真紅映肉遇一僧治之不服藥以洗元湯浴之即轉色紅活後至台輔一兒痘黑圓朗光澤至漿時色如紫葡萄根圓血暈微黃色名為紫袍金帶黑痘多屬血熱本為惡症然亦有順逆險之不同形狀多端須辨而治之不可槩棄但血不活色不澤者則難救矣故黑如烏羽光澤者生以熱雖熾而血尚活涼血解毒可愈若遍體稠密粘聫不整不頂而黑者乃火涸真元名為鬼履玄壇逆候也玉髓云黑痘內服生地龍飲外浴楓子湯內外解之色如焦煤者死兩太陽痘黑是血不榮氣氣不衛血治在肺肝兩顴臉痘黑其治在心肚腹痘黑其治在脾手足痘黑其治在陽明初出紫黑是腎經痘青黑是肝經痘用紫草湯生地陳皮甘草紫草當歸痘徵五條一痘紫黑黑點隱於皮膚用無比散或人牙散豬尾血三五滴酒調下兒小者三分大者五分一痘初出便是黑點急用紫草茸三錢醇酒半盞煎至三分服一痘如黑牽牛而色淤敗又黑䀶并黑靨者並用蟬脫十五個紫草茸一錢水煎服一痘黑如煤炭血不紅活用紫草煎酒調下活血散一痘黑而皮膚皆黑成片者用化毒湯加蟬脫地骨皮黃芩化毒湯陳皮一兩升麻二錢甘草二錢紫草一兩蔥白水煎便赤加木通治驗十六條一痘黑大而軟者氣弱毒盛土虛水侵也用保元湯加紫草或四君子湯加黃連紅花一痘焦黑潮熱煩躁用小無比散調犀角汁一錢一痘腰腹大痛身大熱止小腹腰眼各有黑點餘處俱閉悶不出視其舌中有一黑點三日死一痘出兩腰間紫黑痛苦名為折腰痘五朝七日死一痘出於正位偶然變動先紅後紫後黑者有之此乃毒攻於腎其症必煩渴嘔悶可用麝香人牙散一痘當標點起發有乾黑不起者須急治之一痘乾枯變黑者乃毒火太熾真水已涸內外蒸爍毒氣入裏症必心煩狂躁氣喘妄言二便閉口渴腹脹此為倒陷歸腎不治輕者宜利小便解毒用連翹湯通關散又燈心木通湯調下六一散譫語加三製辰砂末一痘變黑未至乾塌此疫癘之氣所謂火發而薰昧者也速進涼血解毒疏表補元之藥十餘劑俟痘轉紅活乃能成漿結痂用歸尾生地紅花赤芍以涼血用人參黃茋甘草以補元瀉火用黃芩酒炒黃連牛蒡連翹升麻以解毒用荆芥防風以疏表每劑入燒人糞一錢連進十餘劑一痘因久不大便熱盛於內以至痘黑而乾宜急解之用蜜酒炒黑麻黃紅花子紫草人中黃連翹酒蒸大黃燒人糞外用膽導取下燥糞痘轉紅活後以四物湯去川芎加紫草木通枳殼生甘草調理自愈一因外感風寒肌竅閉塞血凝不行必身痛肢厥斑點不長或變黑色或變青紫隱疹此為倒伏也宜溫肌發表用桂枝葛根湯加麻黃蟬脫或以紫草飲吞奪命丹外用胡荽酒噴水楊湯浴一因內虛陽氣不能以副榮衛出而復沒斑點白色或黑色必不能乳食大便自利或嘔或厥此胃虛而不出謂之陷伏也宜用溫中之劑令其胃暖榮衛復行則自出矣宜用調元湯加丁香官桂理中湯加黃茋官桂甚則陳氏木香散外用胡荽酒噴之一痘大便利口渴而不發者內虛熱也用四物湯加肉豆􅛌一痘大便利不渴者內虛寒也用理中湯或用陳氏木香散一因氣血虛弱偶為房室雜穢惡氣所觸而黑陷者宜薰解之內服紫草飲或服十宣散外用胡荽酒噴之茵陳薰之外用乳香沈香胡荽紅棗薰之一痘六日勻朗綻突但色黯黑滯且人事安寧二便清調此非血熱之症原是兒體肌膚粗黑之故投以涼血活血解毒之劑則謬用保元湯調理可愈一有因向患膿疥瘡愈後乘舊疤而見痘焦枯如疤濶大起而歪斜形似痘疔焦黑之狀須看面中顆粒分明起發形色切不可因舊疤之黑而棄之宜用疏表涼血解毒至七八九日之後根顆紅黑焦枯不活亦宜涼血解毒如十一二日日子過多根窠淡紅獨用生血補劑白痘諸名鷺羽白色白而稀肺與大腸經痘也如痘顆周圍有一紅線者屬肺經初出色白宜清肺活血使痘根紅血自蔭也用黃金散山甲當歸生地熟地木香甘草白术如肌肉痘顆一樣白者屬大腸經痘自發熱時即作㵼㵼下焦黃色物然雖作㵼起脹如常不必怪之治如常法發補一例但首尾須用訶子以羅元氣水白痘頂白無紅盤或淡紅盤尖綻有神乃肺經獨發順候也與平塌灰白無紅盤者不同以補中益氣湯調養始終無紅盤而愈水晶痘肝紅所發氷灌皮膚外看光澤明潤內清水汪汪胖期略宜疏散解表切不可攻擊但略用解毒補脾利水之劑歌云痘形象水晶看來莫作輕一片無膿地汪汪水內停十一二日防癢塌十四五日命必傾如發泡盛加青皮豬苓如至膿期輕用保元湯加乳香白芷蓮肉苡仁白术赤苓澤㵼山藥如虛寒用木香散甚者用異攻散如至靨期用參苓白术散或用四苓散蘆花白比灰略白些此是氣血虛損亟宜補氣血若兼二便清滑者乃是寒症宜用溫補若見點色白不甚起發唇舌淡白或吐或㵼或腹脹或自汗肢冷神氣怯弱表裡俱虛也灰白比蘆花略黑三分此表裏相兼故也初發多起自額標脹時見之用至寶飲加甘菊蘭花根葉皆可用漿痂時見之用無上飲內去陳皮加柴胡黃芩觸痘諸名觸冒白或欲氣或經血氣或飲食毒物蔥蒜觸之而發癢變灰黑色者用陳壁土為末炒乾以袋盛之懸兩腿中間即免觸矣或因煙煤香氣狐臭體氣尿屎穢惡氣觸之而變粉白色者色雖不同治法則一標時觸用通聖散漿痂時用正氣飲未破者觸用荆芥煙熏之已破者觸服內托散外以辟穢散薰之敗草散敷之慎勿泄其元氣白漿痘初起瘡頭便帶白漿者此疫癘痘也七日死不治見點白如水珠者重若稀朗兒素色黃而痘起發是氣至而血不至也當與散火倘神不內寧痘日漸增多頭尖如㾦子毒火甚也非藥可治見點色白不紅不可便作虛治白而無神唇舌淡白或吐或瀉者虛症也白而起㿠色唇舌赤紅非虛也伏火痘也三日後必漸紅紫矣若以虛治誤人非淺附白色痘案於後一兒初標痘於右太陽乍涼乍熱白色腳塌瑣碎細密初時發表即用桂枝白芍以斂其根腳平塌不起用震蟄丹酒漿桑蟲以發之五朝吐尚不止用藿香薑炒黃連以安其嘔六朝嘔吐雖止猶然乾枯少潤用白芷黃茋山甲以酵其漿七朝漿尚未行仍用前藥加人參八分另與酒漿荸薺汁飲之連用二日而漿始灌正面胸背四肢猶多生痘咳嗽聲啞至八朝而勢亟矣幸其飲食肯進大便不㵼用人參黃茋麥冬陳皮甘草川芎當歸紅花白芍前胡桔梗煎好兼調燒人屎催蟄丹三四分顛作良久而漿行遍身矣先時頭靣俱已平乾至此重復根生紅暈旁發贈痘塌者聳而枯者潤矣後因痰嗽特甚聲啞未開改用山豆根知母貝母麥冬黃茋連翹牛蒡陳皮當歸芍藥甘草煎服三四劑嗽止聲出而愈內紫外白痘頂紫色外白色兼大小便閉身熱口渴乃六經火盛血離當從熱治非氣虛白痘比也氣血兩敗痘近看猶如紅蓼花逺望胭脂色可夸臨漿清水膿不見豈有神仙治得麼根窠膿色凡色以紅活為貴而有圈紅噀紅鋪紅之别圈紅者一線淡紅緊附於根下而無散走之勢也吉也噀紅者血雖似附而根腳血色隱隱出部也險也鋪紅者痘色與肉不分平鋪散漫也凶也以此察之生死可決矣蓋根窠者血之暈膿漿者血之腐故六日以前專看根窠若無根窠必不灌膿六日以後專看膿色若無膿色必難收靨故形有起發而或致變者由色不明潤根不紅活耳若痘色光澤根窠紅活痘雖平塌亦為可治也血逰痘小兒無他病則臟腑之毒盡發於表緊附根窠然後能化血為水水化為漿其毒方盡如或元氣虛弱或火毒攻逼以致血遊肌膚無痘處反散漫而紅此血離痘窠矣毒血既不附痘將何化水成漿乎標脹時見血遊肌膚以致不起不漿是火盛也用鎮隂丹蘆根黃芩山梔連翹元參生地荆芥當歸山查屋遊加炒黑生薑灌漿時若見血遊肌膚以致不膿不靨是為虛極用返元丹人參黃茋當歸黑薑生地屋遊陳皮收靨時見血遊肌膚乃熱毒未解尤宜解毒疫癘痘熱症者十之六寒症者十之一二寒熱相兼者十之二三蓋人身之氣與天地相流通故痘之發亦感天地之氣而然耳枯燥喘促者金鬱勝也宜潤之鬱而不出者木鬱勝也宜發之彼此凝伏者水鬱勝也宜溫之乾涸不潤者火鬱勝也宜清之吐㵼肉腫者土鬱勝也冝平之伏火痘初點即白精神恍惚嘔吐無時人事怠倦有似氣虛但身背中間又有枯紅紫黑之色此毒在內壅遏不發血被火囚毒禁其血不能流通於脈絡運化於肌表故不能正其色也若誤投補氣之藥愈助其毒而喘脹作矣痘被毒氣再發者亦然痘形圖
