body:
  text: 仁端録卷一明徐謙撰陳葵刪定痘疹遡原痘疹之症有謂在母腹中時食穢血而生者有謂在交媾時欲火所鍾者蓋皆胎毒也有謂天時疫癘與傷寒同則是外感了與胎毒無干不知傷寒之症人有不患者而痘則人人不得而免傷寒或一病再病而痘則一出而止如此則所謂胎毒者似矣然食穢之與欲火自有生以來皆然何痘不見於漢以前而獨見於東晉元帝建武之後蓋建武時胡虜極西北之人來南方溫熱之地腠理開通偶感時行疫癘之氣觸動其胎中溫熱之氣發為此瘡蓋人在氣交之中故痘疹由外感而激成者類能傳染惟莫開其端則痘亦不發要未可執一而論也惟內染外感相搏而成故未發之前將見紅點之際以微汗散之未有不易愈者微汗是論其常夾邪者不可失此不汗至將出未出之時大勢已成然後汗之則虛者不能成漿實者必成斑爛可不審哉原痘論自建武擊虜遂染其毒流播中國謂之虜瘡或名聖瘡言其變化不測也或名天瘡言由天行時疫也或名百嵗瘡言人雖百嵗止發一次也或名豌豆肖其形也人之患此者如蛇脫殼龍脫骨生死存亡係乎呼吸究其從何而來有云精毒者即交媾時之淫泆與精俱種者也有云乳毒者食息起居稍有不慎則毒氣與血氣交變為乳毒也有云胎毒者兒在胞中氣團於內血護於外內外堅固風氣不通惟臍帶中隨母呼吸水榖之氣沁入兒腹長養兒體即胞漿是也子之臍通於母之諸經百絡母不慎口腹調其七情則氣從臍帶而入與孩骨俱長者也有云穢血毒者兒降生時以胞蒂脫於右腎母氣始離而授於子氣即從丹田而湧出兒之口鼻鬱悶不禁頭重於體故從下而出也其時少有阻滯則母之惡血穢汁兒含在口隨咽入腹是也究而論之惟父母之精毒為先天之毒隨稟而來釀為痘毒也何也交感之際膠黏如脂膩者醇精也真元之所聚也故出痘少而順不膠如清水者淫火之泆也即痘之所種也故出痘多而逆自臟腑皮毛筋骨之形既就而淫火即種矣其伏於命門者天一生水故也是猶果核萌芽已聚於中待時生發也命門以膀胱為府故痘初起於太陽也若由太陽傳於陽明乃順候也若傳於太隂脾經則有腹痛若傳於少隂腎經則有腰疼若傳於厥隂肝經則有腿足小腹痛乃逆候也然淫火必俟天行之氣觸而發之者何也蓋男女媾精無欲不行無火不動精血包裹陽施隂受何莫非淫火之所為人身之淫火與天地之嵗火相擊而動故然後出痘也火未至也寂然無聲火既至也赫焉震發故值嵗火之氣冬溫之令必有天行之氣相觸而發之也所以每值嵗火冬溫之時須服藥預解之藥雖未必能解先天之淫毒庶以減外感之時毒而痘亦輕耳若死生吉凶皆由所感天行之輕重合于精毒之多寡及元氣之厚薄而分也至於胎毒乳毒穢血毒皆成形以後一切胎症而已人有一生不出痘者非果不出也蓋鶴不發頂不能聞聲蠶不三眠不能成絲蟹不脫殼不能大其匡虎不轉爪不能振其威人不出痘不能泄其毒但有原來無毒或值痘疹盛行之時報痘稀少偶出於凡瘡之中而不覺者或歲火外行其人年命不犯則毒火不動於內兩不相值延至暮年始發者有之豈真不出哉原痘賦痘本先天之胎毒觸癘氣而發其伏藏散布四體自內出而根五臟初起太陽壬水尅乎心火後歸陽明血水化為膿漿肝主液而為水泡肺主涕而作膿囊心則斑而紅紫脾則疹而赤黃腎乃封藏之本變則黑陷可防先分部位次察災祥陽明從目絡鼻太陽形於頭上心火炎熱則鼻乾面赤肺經鬱結則胸膈先傷手足司乎脾胃腰背統乎膀胱頭項三陽交會肝膽主脅肋之傍陽不足兮不能振作而起發隂不足兮不能收斂而閉藏初時吉凶先看眉心喉額眼沿耳根唇內唇外及齦舌布點之疏密後來變起必察夫痘頂凹凸根血聚散舌心紅白并漿痂形色之神光應生發而反收斂兮謂之陷伏應收斂而反發生兮謂之爛洋病似順而反逆兮認之要慣病似逆而反順兮察之貴詳初出現而涵水乍起發而帶漿膿未成而乾黑囊未滿而萎黃似順而逆如夾斑疹斑疹消而足喜若頂平陷平陷起而有救似逆而順形尖圓而光壯兮氣之充拓色鮮明而潤澤兮血之涵養灰白平陷兮氣血虛而補之以溫紅艷掀腫兮氣血熱而瀉之以涼氣至而血不足兮雖起發而根窠不紅血至而氣不至兮雖明潤而郛廓不長熱則氣血淖濁而不斂寒則氣血凝滯而不張或受於熱兮為煩燥為赤為痛或受於寒兮為振悸為白為癢病遇虛寒兮溫補有效症屬實熱兮辛香莫嘗須怕紫紅更嫌灰白最宜淡紅滋潤切忌黑陷干紅色要明潤兮猶恐薄嫩之易破痘貴干結兮又怕癢塌之難當面頰稀而磊落清安可保胸膈密而連串凶吉難量頂要尖圓不宜平陷漿須飽滿切忌空囊皮喜老而愁嫩膚愛糙而怕光結實髙聳始終無慮丹浮皮肉必主刑傷唇面預腫兮八九日如何可過腰疼胃爛兮一七日定受災傷瘡堆口舌毒纒頸項咽喉嗆腫飲食難嘗瀉利膿血毒盛無漿人力雖盡天命匪常戒汗下于首尾兮惡攻之説補脾土以制水兮喜補之常脾為水穀之原固不可以不補不補則水潰溢而泄㵼腎為津液之府尤不可以不補不補則火爍金而漿虛水雖制火之亢火毒熾而腎水亦涸土雖防水之溢榮氣敗而脾土亦傷故補脾不若救腎而養隂所以濟陽欲知透與不透兮于手足而細察欲知足與不足兮于輔頰而端詳設四末之未透取脾胃而服藥如一方之未足視經絡以求方出或未盡兮無空痘須防猝暴發或未透兮無潰膿必發疽瘍不及期兮早收火毒陷而可怕或過期兮不靨邪氣留而周張晝夜抓搔兮將榮氣之外脫飲食斷絶兮必胃氣之中傷腫忽消而毒歸于內色變黑而疔起于瘡食穀則噦兮在天之大數飲食則噴兮較人之短長毋虛虛毋實實毋熱熱毋涼涼正氣為先戒開門而延寇解毒為急休視虎以如羊須順時令之寒暄切忌人畜之來往勿動溷厠之垢勿燒檀麝之香小便清兮大便其結實淡味食兮厚味不可嘗父母切須保護醫藥尤貴精詳腎經無痘辨諸書皆言四臟有痘獨腎臟無痘故發熱之初止顯四臟之症驗耳之冷因知其無痘也豈知兒受淫火之毒伏於命門觸於癘氣而發何可謂之無痘夫以耳之冷熱驗輕重則可若以耳之冷熱而遂謂無痘則不可腎既無痘何又有變黑歸腎之説必其有出始有歸耳觀古人制四牙散便可見矣蓋牙者骨之餘腎之標是以腎補腎之意惟腎之元氣足則其痘始能盡出且又制伏其火而使血氣相依此化膿結痂而愈也腎虛則不能化漿結痂而變黑馴至焦枯而死矣故腎而曰歸者由出于腎而歸于腎也痘出四臟皆熱耳凥屬腎獨無熱者以腎屬寒水所以獨冷也又謂腎經不宜有痘者以托根之處先已受傷不能生發收斂故耳按腎雖水臟而實有相火寓於其中象水中龍火因動而發夫男女媾精先結河車天一生水腎最先成先天淫火同類相求故毒必伏乎腎痘既發動象龍火自然躍出於淵而耳凥之不熱固其常也若變黑者火極似水之象非水之本色也故腰痛于痘為最逆蓋以毒火發動自應傳於别臟乃仍復歸併於腎而不能發散譬如龍戰于淵其害可勝言哉至人牙散方則又求其屬以衰腎中之毒火則腎中作強之性已從火化而衰矣火毒得之有不升發而出腎乎治痘者特患火毒之不能盡發非患水之不足也以火盛則水涸散火所以收水故痘出於腎則是以腎補腎則非春夏為順秋冬為逆辨胡大卿曰春夏陽氣在上人氣亦在上秋冬陽氣在下人氣亦在下痘疹之發自裏達表當春夏之時血氣隨陽氣上運而行早秋冬則血氣隨陽氣下運而行遲是以春夏為順秋冬為逆此順逆不以吉凶言又當以小兒稟氣為主稟氣充實者雖發於秋冬亦不為害稟氣怯弱者雖發於春夏亦必有傷稟氣看形氣便見傳經次序傷寒自肺傳內痘症自腎傳外傳肝木傳心火傳脾士傳肺金此自內出外之意非謂痘毒獨藏於腎而後傳於各經也蓋毒隨遇而伏各臟俱有一二日胎毒自腎發骨髓之分自髓達筋而腎經毒解二三日傳肝經之分自筋達血脈而肝經毒解三四日傳心血脈之分自血脈達肌肉而心經毒解四五日傳脾胃肌肉之分自肌肉達皮毛脾經毒解五六日傳肺皮毛之分自皮毛達瘡窠而肺經毒解若已傳肝筋而少滯於腎則渾身壯熱口渴悶亂已傳心血脈而少滯於肝則搐搦牽掣紫黑潮熱已傳脾胃肌肉而少滯於心則焦紫疔斑癰發四肢已傳肺皮毛而少滯於脾則痘不圓肥出瘡窠而少滯於肺則痂遲落而多斑麻此傳經之次序也血載毒行氣分而出所以生熱經絡者血氣之道路也故痘六日以前氣血自外傳腑而生發自內出外之漸也六日以後血氣向內傳臟而歸結從外入內之漸也所以順痘氣旺血盛毒自托于外而不退歸也逆痘氣衰血敗毒反入於內而不外充也內者不出曰毒伏出而復入曰陷伏不成漿癢塌曰倒陷膿成復化水不能結痂曰倒靨皆自外反入于骨髓謂之歸腎為逆也經絡傳注時候手之三隂從臟走至手手之三陽從手走至頭足之三陽從足上走入腹中足之三隂從頭下走至足上共合十二經絡十五時為一傳七日五傳司天以十二支為一候金木水火土內應五臟三隂三陽應六腑人身氣血晝行陽夜行隂故自平旦寅時從中焦注手太隂肺經卯時注手陽明大腸經辰時注足陽明胃經巳時注足太隂脾經午時注手少隂心經未時注手太陽小腸經申時注足太陽膀胱經酉時注足少隂腎經戌時注手厥隂心包絡亥時注手少隂三焦經子時注足少陽膽經丑時注足厥隂肝經子午卯酉日隂交於陽氣交不足痘多內攻寅申巳亥日陽交於隂血交不足痘多外剝辰日陽氣行下血流不進痘宜補血戌日隂氣行上氣留不足痘宜補氣丑未日氣血均行其痘多吉氣血循行不可太過不可不及候時爽時災眚立見周身所屬正額太陽脈之所會唇頰陽明脈之所經耳後兩傍少陽脈之所過痘為陽毒故隨陽而先見於面身後屬太陽經身前屬陽明經四肢屬足陽明經身側屬足少陽經額主心面主胃腹與四肢主脾脅主肝兩腋主肺下部主腎肩背主膀胱痘發於三陽者可治發於三隂者難治先出頭面而後及下體者順先出下體而後及頭面者逆若陽明多者胃與大腸積陳受汚氣血俱多故於口鼻兩傍人中上下腮頥年夀之間先出現者吉若太陽則水火交戰之地少陽則水火交併之沖多氣少血故於此二經先見先漿先靨者凶褁束於外者脾也脾虛則易破充拓於裡者氣也肺虛則氣不振發榮華於外者血也肝虛則血不紅活痘中之水腎也腎虛則干格黑陷痛癢者心也心主火火實則痛火虛則癢他處有言氣虛則癢血虛則痛此言火虛則癢者毒非漿不解漿非痛不作痛非熱不成熱非火不發火虛則不作痛以成漿而反癢者蓋熱則生風風火相搧變故生新若火虛風亦虛遂變致邪而成惡候五臟症候凡病止發於一臟惟痘症五臟皆現須察何臟之症為甚而施治之心為赤帝門心者生之本神之變也主驚惡熱其色赤屬火其味苦其臭焦其華在面其充威血脈其液為汗其聲為笑其變為噫開竅于舌實則呌哭發狂飲水而搐虛則困卧悸動而不安熱則合面而睡口中氣溫上竄咬牙諸痛癢瘡皆屬心火天庭直下至睂與左右兩顴上唇沿心之經兩顴心之樞兩臉心之部心堂乳阜心之關舌心之苗正額灰色舌上見胎兩臉俱焦心火舌上有芒刺焦黑等胎此心病也心胃不開食不進而痘重經云肝病心不病自然得安寧心病肝不病還氣復血未定十二日還氣十四日復血必有大變不可不愼心氣通於舌故口不知五味狂言亂語見鬼必發疔心經發熱紅潤細下出天庭印堂方廣顴舌胸膛乳阜之處舌熱則沸騰寒則凝滯如驚悸心病也甚則詀狂見鬼心症毒必焦紅伏而不起煩哭咬牙舌有芒刺焦黑等胎心經吉痘少隂心經花吐兩顴粒粒椒紅根窠明潤纍珠同知是孩兒福重心經凶痘齊擁干紅焦紫海棠沈醉東風斑疔丹錦毒梟攻非藥所能濟用心氣通於血脈故發熱之初倐忽驚悸不寧者心病也須按心脈治之肝為青陽門肝者罷極之本魂之舍也主風惡風其色青屬木其味酸其臭臊其華在爪其充在筋其液為淚其聲為呼在變動為握開竅於目實則目直大呌呵欠頓悶虛則咬牙多欠熱則手尋衣領亂捻物件諸風掉眩俱屬肝木左太陽上截及兩眶肝之經左太陽眼眶肝之殺門兩眼眶肝之樞左肋左太陽眼胞兩臀阜肝之軸眼為肝之竅眼閉則肝病眼開則無病肝宜病不病則痘難定而痘必重肝氣通于目故目不知黑白或頭疼竄眼目睛紅腫疼痛肝經發點顆大頂沈色滯出左陽左臉左肋眼胞之處毒盛則焦紫肝實則驚厥如發熱之初呵欠頓悶肝痘也甚則發搐肝症毒必發疔及水泡血泡頭疼竄眼目珠紅腫疼痛而成目疾肝木生風發癢肝經吉痘肝部左陽魚尾眼眶絲竹商丘雙林叢木自悠悠嗔怒不生不嗽肝經凶痘坐􅀈卷鸇猿泣搖鈴係珮投戈牡丹罩錦海棠多嘔吐頭疼如破肝氣通於筋故發熱之初呵欠頓悶者肝症也須按肝脈治之脾為中央門脾者倉陳之本榮之居也主困惡濕其色黃屬土其味甘其臭香其華在唇四靣其充在內其液為涎其聲為歌開竅於口在變動為噦實則困倦飲水虛則吐㵼生風諸濕腫皆屬脾土兩腮頰倉庫頤阜脾之經兩腮兩頤脾之樞臍封脾之關中庭中腕腮頰口角皮腹手足脾之軸腮底焦枯囊心焦紫唇上黃色破裂舞唇或如魚嘴咂脾火脾開竅于口故口不知穀味腸鳴水走腹中陳痛吐㵼飲食少進丹疹發於脾脾經發點細密連片不分珠出年夀人中腮頤口角臍封肚腹手足之處太過則易泄不及則飽脹若唇裂出血點隱皮膚之間者百不救一多咬牙七八日十三日必死不可用藥如乍涼乍熱手足稍冷多睡脾病也甚則目腫腹脹唇口燥裂作渴便祕脾症毒多必成灰白癢塌吐利脾經吉痘脾土口沿腮井盤珠彩鈿根窠稀踈紅暈不嫌多更喜桃花朵朵痘初出淡紅潤澤根窠圓渾鮮明脾經凶痘灑頰疊錢垂釣頤池梅片投戈蛇皮蠶布蟢蛛窠吐嘔脾難安妥凡淫毒內熾胃氣相敵必有腹痛溏泄之患脾氣通於肌肉故發熱之初乍涼乍熱手足寒冷多睡者脾症也須切脾脈治之附胃經痘印堂山根年根年夀凖頭人中胃之部胃經發點細密分珠色白諸陽升提不免頭痛毒盛迫逐嘔吐則逆血自榮也胃經吉痘鼻係陽明胃土嬰兒司命人中奇花美麗狀元紅年夀凖頭宜空胃經凶痘鼻直干將流裔灰煤紫泡相攻蛇盤紋線水形同都是從鼻發縱肺為肅白門肺者氣之本魄之處也主嗽惡寒其色白屬金其味辛其臭腥其華在毛其充在皮其液為涕其聲為哭開竅於鼻在變動為咳實則悶亂喘促虛則硬氣長出熱則手揑睂目鼻諸氣憤鬱皆屬肺金右太陽上截兩睂間肺之經喉突氣樞肺之樞右太陽氣窩肺之殺門鼻肺之竅右脅右太陽頸項氣突肺之樞睂心以上肺之郡兩太陽灰黑鼻管乾枯右顴右眼白俱紅色頂額焦枯肺火肺氣通於鼻故聞香臭鼻塞聲重呵欠噴嚏喋肺發膿泡也發熱後須鼻涕常流若鼻管焦黑炬煤而聲啞者急宜解肺毒清肺火又單聲啞者乃少隂心經之血不能上榮於舌本名之曰啞非啞也須細察之經曰肺病脾不病須防痰火症脾病肺不病傳送北汀定肺經發點白大稀疏出右太陽右肋兩眉喉突氣窩鼻管之處虛則金鳴喘嗽實則憤鬱頓悶熱則嫌而惡寒大腸發點色白分珠綻突有神根無紅暈雖有亦微如面燥腮赤噴嚏肺病也甚則喘咳鼻乾肺症毒多必增喘嗽須渴手搯眉目鼻面肺發膿泡肺經吉痘正額右陽肺部人君位在天庭慿虛廣濶痘無形尤喜雙霞明映肺經凶痘喉突氣樞盤鎖干將蜂蠆叢林雲遮揚幟赴幽冥此是花蘭不幸肺氣通於皮毛故發熱之初面燥腮赤咳嗽嚏噴者肺症也須切肺脈治之腎為玄武門腎者封藏之本精之處也主虛惡燥其色黑屬水其味醎其臭腐其華在髮其充在骨其液為唾其聲為呻開竅於耳在變動為慓虛則目無精光畏明骨重腎怯則猝失音諸寒收引皆屬腎水承將地閣谷道髙骨頰側腎之經兩耳垂腎之樞交骨腎之部地閣後頸耳谷背俞腰脊陽毬腎之軸耳為腎之竅若不聞人言而反聞鐘鼓音樂者腎病也腎不宜病病則渾身生黑疔或發紫泡急解腎毒遲則無救腎經發痘先從口角唇及承漿手足指頭或腳背出後痘發於腎者多患沈匿而色黑若黑潤如烏羽者最貴若黑滯則險變黑陷則逆升則痰喘降則漏泄如痘初骫骫音委皮屈曲也冷耳冷火不能涸水是腎之平症也若耳骫俱熱腰疼黑陷者則邪干於腎也蓋腎通竅於耳天一生水故受氣之初先生兩腎如豆種離泥兩邉分開之瓣也痘發耳骫俱冷者火不能涸水也熱則邪干於腎毒不能發越則反有歸腎之變矣骫耳俱冷者先抑而後揚先合而後開交到肝心脾肺隨現一經透發收成在餘經不在腎經也腎經吉痘地閣兜含腎部花開朵朵殷紅鮮明朗潤趂芳叢水藏滋生稱聖腎經凶痘盤珠固為竒朵瓜子未是名花真元一種莫教差黑陷命歸泉下腎氣通於骨髓痘發時骫涼耳涼者腎症也須按腎脈治之明辨面部看痘關竅面部為先蓋人之一身諸陽皆聚於面霛霄天庭方廣印堂兩顴人中上下唇胸堂孔阜心之經也山根鼻直鳳凖懸旌挂弓陽莖胞珠兩手掌陽明之經也兩臉食祿兩倉兩頥鈎承漿臍腹脾之經也左太陽上截兩眼眶鳳尾絲竹姦門淚堂及左手足肝之經也右太陽上截日月角繁霞綵霞旁至丘陵兩眉峰氣樞喉突氣窩以及右手足肺之經也地閣兜含兩耳頰車交骨伏枕天柱龍含腎之經也觀面部而知症百會山根鐵葉焦呵欠脾家必倦勞人中氣窩滯焦陷喉中鋸響痰涎上胸口隂交若黑黴眼碧昏昏飲食虧龜頭尾脊紫霞浮毒疔須從脅下搜三里膝盆如惡癢胃氣已潰難調養公孫太白倘焦色煩躁詀語水火隔湧泉照海海棠紅渴欲飲水熱匆匆左眼淚堂哭聲攢男怕相犯女無干右眼淚堂斬七厄女要無侵男要易鼻尖頭帶黑椒皮心中蛇蟲實難醫上唇先有痘漿黃脾氣已入鴟梟房下唇痘若白洋洋洞賔下手也多傷兩顴燥裂黑椒皮淫火焚燒解毒宜睂尾兩邉若破焦嗆嗽聲啞死不饒年夀印堂倘不起氣血全虧急開補痘破膿膠臭氣薰不添焦色活分明若還臉皮橫裂破雖然力救自應驚朱惠民説諸家皆以天庭司空太陽印堂方廣之處先發者為逆口鼻腮耳年夀之間先發者為順余細驗之每見從正額兩顴頰先見者多順人中口鼻先見者多險太陽頤頰兩耳先見者多凶雖論部位則然尤必觀其疏密形色以判吉凶不可執一也觀面知身頭為諸陽之首額為諸髓之海故觀頭面可以知身體之吉凶印堂之下應心胸觀印堂之稠密即知心胸有痘兩顴應兩臂觀左右顴焦紫即知左右臂有黑疔頂門應兩脅觀頂門焦紫如椒即知兩脅有疔喉吻應四肢觀喉吻有焦片即知四肢癱直不動鼻下應背部左太陽應右半身觀左太陽癢塌即知右半身之無漿右太陽應左半身觀右太陽灰紫即知左半身之無漿金鏡痘標訣正額屬心火乃君主之地若稀朗紅綻顴頰來補者雖危可治若髮際印堂正額直下至山根橫開兩日月角先標先漿先靨痘密無根窠者為毒重於心謂之蒙頭主危則十二官皆危他處雖佳終成惡候睂心名曉心命門所屬三焦相火所會若報點稀朗明潤縱各部稠密終保無恙倘報點攢聚灰滯空殼無漿及先標先漿先斂者謂之鎖睂乃相火攻擊消爍元氣已虛縱各部稀朗決難成功口鼻人中屬脾乃元氣根源之處口唇四圍先出先起先漿先收者吉蓋朗明之脈環口挾唇氣血俱多只宜調理脾胃而已若攢聚糢糊者謂之鎖口或口唇目胞預浮腫者是脾胃受毒四藏相隨而敗綿延日久而死若痘先出於下唇當中者痘收時必然作㵼當預防之左顴屬肝木主血右顴屬肺金主氣于此先見則氣行血就自能成功若先見而相聚作塊其肉腫硬者生意既絶魂魄將離為不治之症兩頤兩頰五臟精華之府若多至成片或如塗朱謂之托腮肝盛尅脾矣八九日當作滑㵼色青不食而為險候頤頦兩耳屬腎部見標於此則毒存於腎矣况心聞於耳心腎皆少隂又少隂之脈行耳前後凡在耳先見紅點者尤凶以君相之火燔熾難滅也倘未成漿而耳輪先靨則漸成歸腎矣咽接胃脘為水穀之道路喉通肺脘為呼吸之往來若頭項多者謂之鎖項內不出而外不入矣胸腹者諸般受氣之地若腹上多者謂之纒腹毒據臟腑之所居失其運化傳送之常若胸前多者謂之幔胸毒乘心肺之宫城陽不清而神失守矣已上蒙頭托腮鎖睂鎖項鎖口纒腹幔胸最是要緊關頭必要疏朗紅活方能有救辨明經穴囟會督脈所會發毒於此大凶百會不宜生毒方廣肺部痘少吉青色青紋為毒參陽位神庭肺部又督膀胱胃三脈所會痘不宜多天庭肺部痘形劈劍者凶穹窿五嶽髙處也痘先於此為陽吉印堂肺部痘如雲遮者大凶山根驚痘雖有青色紅紋紫紋亦無妨痘後發驚者凶天倉肺部豐溢則五經無變綵霞肺部明朗則吉繁霞同上玄武腎部在耳齊處山林不宜結毒髮際結毒於此凶睛明肝部手太陽陽明之會紫紋名虹霓出谷防目生痘陽池不宜生毒淚堂肝之殺門痘如椒實盤尺大凶青斑紋名沙裡出烏金牙根必爛黑氣名黑霧迷天紅紋名紅霞映日皆凶魚尾肝部痘如懸鈴凶紫赤名桃照清潭防目生翳交骨腎部痘如遊蠶凶聽會腎部三焦膽脈所屬發毒凶耳孔腎之樞生疔名豢虎凶玄璧脾部痘如金錢吉即瑞璧井谷七竅處痘先見於此為隂凶五星額火星鼻土星右耳金星左耳木星口水星丹田蓄毒於此腸結便難肛門墜石顴阜心之軸痘如綵鈿者吉如紫萍遊蠶者凶鼻凖胃部不宜生毒顴石心部上灌下囂可治年夀胃部七朝起紫泡大凶鼻柱胃部痘色灰煤大凶如奇花吉迎香胃大腸脈會不宜生毒人中脾部司命之堂不宜有毒痘如車輪凶兩腮脾部與足漏谷相應不宜生痘毒痘毒如倒佩凶有毒則尾閭泄㵼凶頤池脾部痘如梅花魚鈎則脾傷㵼逆凶現青色斑元氣虛毒氣滯也地閣腎部痘不宜先發承漿胃脈所會生毒凶氣樞肺之樞痘多則凶喉突肺之樞隂維任脈所會主生殺之機出於此凶氣窩肺之殺門痘出於此大凶項鎖肺之軸痘如盤蛇則毒盛難治乳盤心之樞痘如交壘則煩躁不安膻中心之樞任脈所發有痘則躁凶中脘脾之關轄三焦小腸脈所主任脈所會痘如蜂蠆凶臍封脾之關痘多㵼逆臍麓脾之關痘若盤旋生㵼逆肩腧痘結癰於此可治背座下灌上囂難治血盆結鯉埂於此雖漿不灌可生臀阜肝之軸痘癰結此可治陽毬腎之關有毒則凶湧泉毒生於此則透足難治風府不宜生疔玄門屬腎水若生疔大凶豐丘五經髙處痘少則安傷門五關也痘多則煩躁曲池結癰于此速防筆罄潰筋之患三里同上絲竹空肝之樞膀胱脈之所發與商丘穴相應不宜瑣碎叢簇左太陽肝之殺門如係珮凶右太陽肺之殺門痘如蜂蠆揚幟凶五臟腧膀胱脈所發毒於此若多名懸鏡凶兩太沖肝穴可決人之生死明辨身部遍身部位通於面部所謂觀面知身也形色論痘者因其形之似痘而名之也肖其形則生不肖其形則死若尖圓而突周淨而聳形之有神也如麩如痱如疹如疥如蠶種如蛇皮如蚊迹如蚤斑如湯泡如火刺形之無神也至若色如春花之在露不可如秋草之經霜紅白分明光潤榮活色之有采者也如膩粉如枯骨如紅米飯如豬肝色色之無采者也身熱和緩達於外者必輕煩燥悶亂彰於外者必重根窠收緊痘分隂陽見點活動更忌浮腫出要參差血宜歸附耳後頸項心胞少于他處為佳睂稜兩顴額前光潤不滯為妙痘光潤者氣血旺也慘黑者氣血衰也氣旺而血得其令氣衰而血被其囚血非氣則毒不收氣非血則毒不化信乎痘毒必藉氣血而後可以始終其功按好痘須要根紅頭白交會分明又曰好痘如一顆明珠放胭脂上最形容得好正所謂有神彩也氣充血榮自然有寶光耳後紋形紅紋紫棘形頦上先出紫紋痘必枯陷斑紋柏葉形睂頭出吉青紋險症黑紋大凶大紋紫黑小紋紅必發焦疔痘毒凶挂弓紋心經好痘碎籬紋睂上印堂先出必然稀朗披髮紋紋勻無異色四日出稀朗梅枝紋有紫黑色必發疔毒人字紋黑紫熱一日即出稠密凶十字紋青黑兩鬢先出雖少亦凶針砂紋黑色七日發疔死動靜論凡痘以安靜為貴內有不和則動蓋靜屬隂動屬陽痘之為症隂陽俱病但息欲其勻語欲其少寐欲其安觸其瘡則吟拂其欲則鳴飲食二便如平時此為平候靜而吉也如一向安靜忽然擾動者病也須細察之痘變而無他候者戾氣觸之痘色不變而有他症此必有因但俟其定而審治之如不觸其瘡而伸吟者自有若也自語者神不清也喘粗者內熱也腸鳴者欲泄也坐卧不寧者心煩也啼呌不止者痛也指欲搔者癢也咽物難者咽痛也咬牙者心肝熱也搖頭者風也言風不過指其動搖之象而不知毒重難出冇振蕩之勢也若悶亂躁擾詀妄昏眩如見鬼狀搖頭扭頸揚手擲足目睛上視寒戰咬牙語音不出目瞑息微四肢僵直口禁痘壞昏睡不醒者此真氣將脫魂魄欲離將死之兆不可作靜論一云汗宜收斂不宜流眼宜封合不宜開預防變症如發熱之初大熱煩渴便祕悶亂腹痛腰疼鼻乾唇燥驚怖詀妄有一于此毒氣鬱遏于內當防其伏而不出也如吐利不止即防其中氣虛弱不能助漿成就或至倒靨也如初出點而便含水將起發而更帶漿膿未成而遽收靨囊滿而遽萎黃此未至而先至謂之太過必防其陷伏發表托裡解毒切不可緩也如應出不出應起不起應灌不灌應收不收此應至而不至謂之不及必氣血衰微之故也故勻氣活血解毒切不可緩也如初出色嫩者皮必嫩而痘易破當防其癢塌也如相聚作塊者不可謂之疏此必有伏毒也如多水泡者自利也如頭面預種者防其易消而倒靨如頻更衣者防其倒靨也如漿破不結痂者防其倒靨也如咽痛者防其嗆喉失聲也急解之如目中流淚者防生目翳如口臭唇乾清涎流出者防生牙疳謹始痘之發也原于胎毒觸于嵗氣乘于感兆三合而成當謹之于始一防外感風寒感冒發熱惡寒鼻塞頭痛脊強腰痛惡風減食傷風有汗傷寒無汗因而發痘者有之一防內傷飲食所傷發熱頭疼胸脴腹痛惡食嘔吐頭汗齊頸此食邪有餘之症也有傷飢缺乳者亦名不足之內傷總之中氣虛也若食邪有餘不為中氣不足不能尅化故為飲食所傷耳一宜顧復或因髙低失足跌傷血肉人畜呌呼驚悸心神因而發痘者有之一治宿疾宿有食積疳蟲則傷脾宿有哮喘咳嗽則傷肺宿有癲癎驚悸則傷心宿有雀目疝氣則傷肝宿有便膿滯頤則傷腎有者當預治之免致元氣耗泄痘發難治也一備物料如胡荽楓毬麻油蠟燭艾蒿茵陳桑蟲水根等物一預服藥如三豆湯稀痘丹龍鳳膏絲瓜散代天宣化丸等藥一忌異器一兒未痘前好弄銅麒麟後痘愈而手指竟屈曲而不能伸遂成痼疾一忌食物雞肉生風豬肉生痰魚腥助火牛脯黑痂蹄子生麻蔥蒜泄氣多食辛甘則發汗多食酸苦則吐㵼多食醎味則咳嗽荔枝與酒皆發癢棗柿糖蜜味甜能引痘入目雞鵝鴨蛋能患眼醋主收斂反致喉癢搔破痘時宜調其飢飽無過不及如喜食之物但宜少與以順其意不可縱性致生他變開列于前務宜詳愼一忌觸犯條目甚多開載于後一毋犯逺行汗氣一毋犯酒蒜熬油氣一毋犯燈煤硫黃麝香柴煙毒瘡等氣一毋犯僧道尼巫六畜氣一毋犯香氣香氣竄則動火一毋犯穢腐陳垢溝泥爛草等氣以致敗元一毋犯淫欲月經之氣一毋犯風霾雷雨乖戾之氣一毋犯狐腋之氣一毋犯五辛之氣一毋犯死尸疫癘傳染之氣一毋犯太寒寒則血凝而氣滯一毋太熱熱則血淖而氣淫一毋使犬豕得入一毋使喪服得近一毋使男女往來一毋使動糞掃地一毋使幽暗之氣太勝而神明不清一房室要明亮一夏月宜置水缸一不可對出痘者梳頭搔癢謊言説鬼呌呼罵詈歌笑內解諸觸開列于後漿期為獸驚觸心失其血氣不充拓而痘陷色變以烏龍散用蟬脫二兩同逺志一兩菖蒲一兩酒漿多煎去逺志菖蒲不用獨用蟬脫焙乾為末沙糖酒下再服雞鳴散月經觸變月季花不拘根枝煎酒服死尸癘氣所觸辰砂生薑酒煎頻服麝香所觸用人參黃茋當歸芍藥橘紅甘草蟬脫紅花生地客忤觸變露中摘取絲瓜花開者蒸熟焙為末蜜酒調下房事所觸用人參觸變焦紫而喘用絲瓜皮汁調蜜將甘草生地湯下之若詀語煩躁磨犀角汁加入觸變灰白癢塌多服附子黃茋若根盤有紅暈者可治觸痘變色用玉樞丹正氣丹邪穢所觸用十宣散平和湯四聖散外解諸觸開列于左房欲生産所觸用大棗元荽燒煙解之狐臭犬豕所觸用楓毬或青箬燒煙解之風雨雷霾所觸用楓毬蒼术茵陳燒煙解之熱甚者禁用死尸疫氣所觸用大黃蒼术皂角芫荽大棗艾為筒燒煙解之月經所觸用大棗芫荽燒煙解之又用浴法麝香所觸用升麻蒼耳子煎湯浴觸痘變色用袪邪湯雞毛一團升麻荆芥木通防風蘇葉荔枝殼楊枝煎湯浴之五辛所觸用生薑燒煙解之芫荽煎酒噀之油煙所觸用連翹糞穢所觸用歸尾紅花諸氣所觸皆可用乳香燒煙解之芫荽煎酒噀之邪穢所觸用楓毬紅棗芫荽燒煙解之木得桂則枯雄黃得胡粉則黑柑得脯則壞物性相畏未可枚舉痘為天行正氣其畏觸犯亦猶是也故痘疹初發即宜預備芫荽乳香大棗焚之榮衛得香則行可使痘瘡易起更宜灑掃房室修飾人事逺穢邪愼風寒調護保養以待成功若不謹愼則災禍立至附觸痘案一女痘漿俱滿為尸氣所觸倒靨焦黑四肢腫痛因能食便是正不容邪然必發癰毒治以內托解毒痘起成膿而愈若不能食而泄㵼者不治慮終痘後百日之內關係匪輕茍不謹愼必貽後悔故當慮之于終痘後脾胃怯弱氣血未復飲食不能尅化易于發火生痰今人多因痘後愛惜太過多與飲食致生他變遂成終身之疾仁端録卷一
