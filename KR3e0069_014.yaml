body:
  text: 仁端録卷十四明徐謙撰陳葵刪定倒伏倒陷倒靨乾枯門凡痘內者不出曰伏毒出而復入曰倒伏膿未成而塌陷曰倒陷膿已成而化水曰倒靨皆為惡候大抵倒伏倒陷屬內虛倒靨屬外感而陷則有五紫陷黑陷則熱邪凝滯為有餘之候灰陷白陷血陷則血氣虛虧為不足之症有餘者多可救不足者多難治倒伏凡痘見標熱不少減煩渴躁悶此皆伏毒未盡將欲成漿而依舊平塌乾枯空虛此膿根在內毒伏不出曰倒伏雖是熱毒壅遏或風寒外蔽或飲食內凝或元氣不振須審之用雙解散倒陷痘出齊而失治則五陷俱作玉髓云痘為火活則焰揚正赤死則消光絶焰變黑成灰皆火之化也凡痘密毒盛初色深紅而頂陷者必先紫陷後變黑陷而至於乾枯皆毒熱熾盛蔽其氣凝其血而陷也須涼血退熱為主觀勢之輕重或利二便或散解行血則氣自行頂雖平陷未可便以虛論若誤用參茋白术補氣之藥則熱愈熾而血愈沸也紫陷急用消毒活血湯一二劑立起轉色若至於黑則毒深而難救頂雖不陷然囊空漿清不光澤不充灌皆難收靨宜催足其漿用參歸鹿茸湯托膿食少厥冷加木香丁香肉桂寒戰咬牙加肉桂附子泄瀉去當歸加白术酒芍茯苓丁香肉桂痘密火盛氣血虛弱津液枯竭虛火煩渴咽痛臭衄弱人多有此症最難施治若用清涼之藥則氣血愈虧火毒愈熾須用參麥清補湯以上二症皆倒陷之漸也灌期之初未盡成膿而鼻凖眉心唇上耳上兩頰上一二處先乾黃焦黑平塌者皆為倒陷未可認為正收欲解毒恐傷中氣欲補中氣恐動火邪最難醫治惟服萬密齋方服後乾者復灌或補贈痘則吉發􅏴者次之連進三服不轉灌者死倒陷而二便祕澀熱渴譫狂腹脹乃實邪壅遏侵蝕正氣也用四順清涼飲合奪命丹吐利倦嘔胃氣內虛四肢微厥不能運行榮衛而陷者用十全大補湯合奪命丹回陽化毒湯外用胡荽酒水楊湯浴法吐瀉不止渴而引飲腹脹手足冷寒戰咬牙者乃正氣虛不能勝邪而反陷也用快斑散勻氣散服後瀉止復灌者生反加煩悶者死漿已成而倒陷人事清爽飲食如常壯熱煩渴二便祕澀者宜下之用承氣化斑湯吐利頻數六脈微弱者宜溫之用回陽化毒湯胡氏論黑陷發寒者重不發寒者輕其症有四一感冒風寒宜溫散二毒氣太重宜解毒利小便三內虛無陽宜溫理四穢氣觸犯宜薰解發寒之症是脾土弱反為腎氣所凌錢氏用百祥丸以瀉膀胱之毒令陽氣復還脾土溫暖所謂膀胱邪去而水自勝也必痘至黑陷二便祕澀寒戰咬牙身黃腫紫者方可下之先下黑糞次下褐黃方用四君子湯補之良久得黃糞則自起灌轉色矣下後身溫欲飲水者可治耳冷汗出水穀不消耳尻反熱者死下後脾不虛亦不須補虛者用四君子湯加木香厚朴痘不黑便不祕慎不可下莫如先保脾土救胃氣以制水庶無黑陷發寒之症肝熱發蒸或暴寒所折毒壅肌膚痘黑如痣通身或青或紫肌厚肉密者用透肌散或紫背荷葉殭蠶牛蒡等分為末芫荽酒下瘡乾不熱黑陷便祕此熱在內也宜下之用大黃湯調下宣風散身熱而表症未罷慎不可下痘密內陷而色黑舌有黑色者宜清心火不黑者倍用黃連生地紫草犀角汁氣虛毒不盡出而黑陷者用人參黃芩紫草裏虛煩熱以致黑陷者宜大補之用八物湯去地黃之滯血去白芍之伐胃加木香以和胃氣毒滯而變黑陷二便不通煩渴喘滿譫語用三乙承氣湯合涼膈散或山梔湯宣毒膏豬尾膏將起發痘亦有水有色黑黯用十全大補湯調無價散或快斑湯合奪命散四圍有水但中心黑陷用胭脂塗法起發有水頂平而黑宜涼血解毒外用胭脂塗法乾黑根腳堅硬用四苓散銀針挑破胭脂調塗渾身起發中有幾個黑陷者照常治法易愈稠密不起發遍身黑陷者危症難治皮肉不活腳根堅硬者死症不治乾而不陷此初發時腠理閉密津液阻隔肌膚乾燥宜用輕揚之劑發之如升麻葛根連翹防風荆芥牛蒡麻黃元參之類將成就之時氣血弱而毒盛津液少而乾燥者宜清之如升麻荆芥連翹麥冬黃芩生地犀角丹皮之屬痘雖稠密色原淡白根無紅暈而頂平者白陷也必變灰慘至平塌倒入而為灰陷也此雖氣虛而血亦不能華色血亦虛也氣血虛不能運化毒氣以成漿其症必兼嗽嘔泄瀉不食身涼虛而且寒矣故補氣又宜補血血活則氣行溫之則胃和暖榮衛流暢痘自起發變白為紅若單補氣氣有餘便是火而血益燥竭必至發癢破損為不治之症用參歸鹿茸湯千金內托散補中益氣湯合四物湯若有內熱加解藥或利小便白陷抓破皮薄乾燥極癢者宜先補血用四物湯八珍湯因瀉久而灰陷黑陷者用木香快斑散理中湯黑陷泄瀉下膿血痂皮分其吉凶如能食脾強能制水者順也若乳食不消水穀不化脾虛不能制者逆也痘有粒頭通紅止成血泡而不成漿者此氣虛不能統血而血妄居氣位也即名嬌紅痘此症最險五日前多加防風白芷以救皮薄多用人參黃茋茯苓白术早為固脾以防作瀉如六日而尚紅不能紅白分光到底不能成漿八九日癢塌而成血陷矣血陷與紫陷大異紫陷屬熱氣粗身熱而色深紅而變紫血陷屬氣虛怯身涼初色淡紅而變陷也始終宜大補氣氣充則能領血自不妄溢而根紅頭白矣若認做血熱用涼血行血之藥則氣愈虧而愈陷宜用參茋湯合白术散初時早加防風白芷川芎痘本圓綻而忽陷此行漿之後氣陷而毒亦陷也如根顆猶有血色附而成暈者可救用保元湯加白术茯苓豆蔲口渴用參苓白术散黑陷項強腹脹直視發搐喘急一切惡症當選用周天散無比散獨聖散山梔湯宣毒膏倍金散硃砂散人牙豬血散絲瓜化毒湯麻黃解毒湯紫草湯化下小靈丹燈心湯化下大靈丹南金散豬尾膏等方倒靨痘已結痂熱毒能出或觸汚穢之氣或被風寒閉塞肌膚竅道血脈不行身體作毒或四肢微厥斑點不起或變青紫黑色又有初標點小四五日漸大才見頂陷六七日腳漸濶愈陷其色全白如豆殼者均名倒靨亦宜審别內虛無陽必喜熱飲肢冷不食自利者虛寒也宜辛熱以補之用木香散異攻散色如豆殼用人參歸茋湯去肉桂加連翹香附白芷原無泄瀉大便久祕喜冷飲食腹脹喘渴手足熱乃陽旺實熱毒盛薄蝕元氣復入於裏也宜亟下之用排膿散三黃丸四順清涼飲失治益加喘滿躁悶而死矣毒盛入裏有宜解毒利小便者此毒猶不甚所謂小熱當解毒大熱當利小便也泄瀉水穀者腎強脾弱陽脫為逆也用木香豆蔲丸外感風寒宜溫肌發散用參蘇飲小柴胡湯加紫草蟬脫人牙紫背荷葉殭蠶或人參羌活散獨味麻黃散白花蛇散空殼無漿初宜涼血解毒使無乾漿之患六七日若見皮膚枯燥用犀角地黃湯若初標失解妄用攻擊補劑膿期必虛抬空殼陷伏攻補劫劑用藥論陷家為有餘症之劫劑者百祥丸牛李膏之類為不足症之劫劑者木香散異攻散之類皆峻烈之劑攻補殊途寒熱異用施之中病其效固神若誤投之戕生亦速須審别焉錢氏曰青乾紫陷昏睡汗出不止煩躁熱渴腹脹喘促二便不通者裏實也百祥丸為痘歸腎之劫劑然必黑陷青乾便祕腹脹身黃者以此下之不黑切勿妄下百祥丸所以瀉膀胱之腑腑瀉則毒自不入臟也何以不瀉腎腎主虛不受瀉也二服不效反作寒戰咬牙則毒入腎腎變動為標真臟見症故也可見膀胱受邪而黑陷者裏虛也不可用百祥丸下之復惡寒不已身冷汗出耳尻反熱者死因腎水太旺脾虛不能制也若下後氣溫身熱者火氣去也欲飲冷水者餘邪未盡也若下後去盡黑糞身熱氣溫耳尻變冷者生之機也宜補脾胃服後漸下黃糞痘自轉色十二味異攻散治痘不起發不光澤不結痂或瀉或渴腹脹氣促表裏虛寒手足指冷煩渴咬牙飲熱不知陽虛脫陷之症急用此方十一味木香散治痘不紅活不光澤不起發泄瀉腹脹喘促口渴驚悸汗出氣急足冷寒戰咬牙飲水愈渴欲痂不痂欲落不落津液枯少內虛外熱之症急用此方以救胃氣朱丹溪曰陳氏木香異攻二散可謂苦求病情者其意歸重足太隂脾經手太隂肺經肺主皮毛惡寒而易於感冒脾主肌肉惡濕而無物不受觀其用丁香官桂所以治肺之寒半夏附子所以治脾之濕也使肺與脾果有寒濕重而用之中病即已何傷之有今但見出遲者身熱者泄瀉者驚悸者氣急者不問寒熱虛實猝投二方中者效而不中者死然瀉用溫藥癢塌用補陳氏獨得之祕愚以木香異攻二散皆虛寒之要劑但多用肉桂丁香附子木香恐虛而不寒者誤事故須審症口渴引飲下利稠粘者為實熱渴飲熱湯手足不熱者為虛熱不渴手足厥冷下利清白赤者為虛寒黑陷癢塌錢主大戟之寒以下之陳主丁桂之熱以補之若有異矣不知錢之所下乃邪氣在裏裏實之症煩躁大小便祕是也陳之所補乃邪氣在表裏虛之症泄瀉手足冷是也虛則補之即錢氏有溫涼藥治之説實則瀉之即陳氏三味消毒散利以微而即住之法錢在解毒陳在補虛未嘗不合痘陷有五魏桂岩皆責以氣虛若唇燥舌胎壯熱撩人其色焦紫凹陷不起果為虛乎此治外實則當解之治內實則當清之也如果唇舌淡潤身無壯熱惟色變而陷乃可責其氣虛方用溫補之藥若內外無雜症又當平劑以調之故曰藥隨舌轉病由舌痊信哉治案一血熱痘初失涼解至六七日方服黃芩黃連當歸生地連翹紅花方起脹灌漿又不服藥九朝變黑仍用前藥加金汁及人牙散其勢稍緩又用黃連紅麴木香燈心犀角連翹黑色俱散唇眼俱清而愈參歸鹿茸湯人參當歸鹿茸酒塗去毛黃茋桂圓生薑煎入好酒半盞服參麥清補湯歸身地黃紅花桔梗生黃茋花粉人參麥冬山查牛蒡前胡萬密齋方人參黃茋甘草節當歸地黃赤芍牛蒡連翹金銀花紅花子水煎四順清涼飲歸尾白芍川芎大黃奪命丹蟬脫紫草麻黃人中黃升麻山豆根紅花子牛蒡連翹無比散治內熱之極不能外散辰砂膩粉氷片射香牛黃新汲水調滴豬尾血二三點服後安睡取下惡物粘滯一方有蟾酥獨全散山甲取其嘴上前足上者酒浸一宿炒黑為末每服一錢加射香半分酒煎紫草湯或保元湯下山梔湯山梔黃芩石膏知母杏仁大青柴胡豆䜴赤芍升麻甘草絲瓜化毒湯絲瓜近蒂者五寸升麻酒芍生甘草黑豆赤小豆犀角汁沖服麻黃解毒湯麻黃升麻防風元參酒芩酒柏人參連翹甘草木通牛蒡石膏小靈丹大蟾心肝瓦焙乳香沒藥硃砂雄黃麝香豬心雞冠血為丸如皂子大每服一丸酒下熱甚者紫草湯下大靈丹滑石雄黃犀角硃砂氷片麝香右為末另研又用升麻防風牛蒡薄荷紫草紅花黃連甘草煎成膏去滓入蜜四兩煎至滴水成珠和前藥為丸金箔為衣每服一丸燈心湯下三乙承氣湯大黃芒硝厚朴枳實甘草涼膈散連翹薄荷黃芩山梔甘草大黃朴硝千金內托散當歸黃茋人參酒芍川芎山查甘草官桂木香防風白芷厚朴桂圓生薑人參歸茋湯黃茋人參當歸川芎白术甘草山查紅花官桂木香豆蔲丸赤石脂枯礬訶子肉蔲木香砂仁麵糊為丸如黍米大每嵗一丸獨味麻黃散麻黃去節蜜炒水煎熱服避風白花蛇散白花蛇炙乾一兩大丁香三十粒共為末熱酒送下丁胡三建湯治虛陷母丁香胡椒人參川芎鹿茸川烏官桂煨薑炙甘草雄參湯人參天雄薑汁煮去皮煨薑清毒活血湯紫草當歸前胡牛蒡木通生地白芍連翹桔梗酒芩酒連山查人參黃茋煩渴去參茋加麥冬花粉回生丹防風白芷黃茋為末每服一錢柴胡湯人參蘇葉桔梗前胡陳皮茯苓枳殼生薑木香半夏牛黃丹治膿期便祕大黃寒水石牛黃粉霜硃砂蜜丸如黍米大每服十丸人參薄荷湯下倒靨方人牙蜈蚣山甲共為末紫草煎湯調下排毒散大黃白芷沈香山甲歸尾黑陷方硃砂雄黃氷片蟾酥豬尾血為丸如麻子大每服一丸薄荷湯下大元丹小兒初生胎糞為末服二陳散治灰陷白陷丁香乾薑羅浮方治灰陷白陷烏梢蛇殭蠶山甲全蠍官桂黃茋海上方壁蟢窠珠每嵗加雄黃一分同研燒酒下一匕金穿山甲燒紅麴川烏共為末蔥頭煎湯調下紫金散紫草蟬脫牛蒡威靈仙氷片酒調服化毒湯紫草升麻甘草粘米煎服牛李膏治黑便祕裏實牛李子汁瓦器中煎成膏丸如皂子大又煎杏膠湯下原方入麝香少許桃膠湯下其子青時染緑色十二味異攻散人參木香陳皮半夏丁香肉蔲白术茯苓官桂熟附厚朴生薑十一味木香散木香腹皮桂心人參赤苓青皮丁香半夏訶子前胡甘草朱恆田方即前方去木香官桂茯苓加陳皮一去木香青皮前胡加當歸水痘赤痘門初出紅點有類於痘亦身熱三日而出或咳嗽面赤眼矇噴嚏垂涕不出三日而灌清漿漿滿即破皮乾而結痂亦有淡紅根盤但歪邪不正與正痘不同先出先漿斷續不齊此由風熱入於氣分外邪毒輕不能作汗而發也初起時宜升發水泡時宜解散膿成時宜斂之忌用燥濕發之藥恐潰膿成瘡失於解散風寒不作膿而結疤乾粘身熱煩躁者用荆防敗毒散加葛根連翹牛蒡木通蟬脫枳殼不易生長煩熱口渴者宜微汗之用百解散失於解散致毒乘陽明上唇生疔潰齒穿鼻者用清胃湯合解毒湯夏月稠密毒盛間有黑陷壯熱煩渴便祕者用三黃丸香薷飲合黃連解毒湯失於解散膿瘡不斂者宜收斂解毒外敷綿繭散兼疹者用荆防敗毒散赤痘與水痘無異但膿漿赤色耳此風熱入血分也亦以正痘為主用涼血藥治案一痘紅盤粗肥間有細密隱隱者此水痘夾疹也內症安寧但表邪宜散用葛根湯加荆芥防風連翹白芷而愈一水痘不膿而乾枯身熱煩躁此同乾倒靨也用葛根湯加荆芥防風連翹牛蒡木通蟬脫而愈一兒遍身發紅點此餘毒未散也用荆防解毒湯而愈夾斑門斑者血之餘也以清解為主不可表汗汗則開泄發生恐成斑爛惡痘發斑勢所必至無論顔色皆為犯剝必須觀部位察形色驗唇舌以為凖的部位斑現方廣年壽毒峻而害深也斑現兩臉顴阜毒存於心也斑現喉突心窩毒形於肺也斑現眼胞臂垂毒乘於肝也斑現腮夾肚腹毒移於脾也斑現手足及背則不現者腎絶而真元散也此皆凶症形色一如雲錦成片隱於肉而與俱平者陽明胃主之因熱毒鬱遏熬煎隂血致榮衛失護血任三焦之火散漫於肌膚間耳一如蚊咬灑灑晰晰有色點而無頭緒顆粒少隂心主之心主血脈其色正赤心火大盛移傷於脾不能運血逆滯肌膚現於遍身非紅則紫斑色紅者脾熱也易治斑色赤者胃熱也難治斑色青黑者胃爛也不治之症因毒不能泄亟用四順清涼飲以利之日期吉凶痘一日而發斑火剋金也二日而發斑毒蒸陽明也俱逆候也三日而發斑則隂陽相拂真元已漓滋水解毒解熱猶或可救斑分生死熱閉血而發斑因元氣內虛正不勝邪血為熱毒壅閉不能發痘乃於肚腹毛竅之間滲出血點如蚊迹蚤痕斑必盛痘必衰毒入於心也三日紫紋如指頭大將變黑色毒攻歸腎也失解胃火內已作腐口氣大臭站立不起腰疼腹痛眼白紅色眼胞舌胎脅下有斑乃胃爛也斑如箸頭大色潤紅活兩脅有痘雜症陽斑宜清毒化斑隂斑宜調中溫胃隂陽二斑皆從火化急則治標緩則治本陽毒發斑壯熱煩渴兩目如火脈洪有力色赤黑紫熱毒入胃內外挾熱而發斑也宜清熱化斑用元參升麻湯合白虎湯或化斑湯隂毒發斑身無大熱手足指甲俱青脈沉細而急色微紅而暗此無根之火聚胃薰肺而發斑也宜調中溫胃則火自降斑自退矣用升麻鱉甲湯此症若要妄投涼劑則生變矣痘初發斑宜表散其火邪活血解毒用荆防敗毒散元參升麻湯加石膏黃芩荆芥芍藥川芎當歸或升麻湯加紫草蟬脫犀角汁化下烏金丸灌膿發斑宜解利痘後發斑不紅不腫者用人參白虎湯加元參大青生地痂後發斑乃餘毒也其斑必爛宜解利之用解毒湯加川芎當歸黃芩石膏甚則大連翹飲外敷生肌散血熱發斑乃六經火盛逼血成斑也用解毒化斑湯甚者用蘇木使血附痘成漿則斑自退矣逆血發斑乃兒受跌蹼責打故發熱之極臍下發稜角斑也用破逆化斑湯合解毒化斑湯內傷發斑者赤色便祕腹脹是也用調元承氣湯胎毒發斑宜砭去其血用犀角解毒湯兼痘同發宜砭去其血用犀角大黃湯此症亦有內攻喘脹而死者暑毒發斑用化斑湯合香薷飲瘟毒發斑用五運丹黃連陳皮湯風熱發斑者身熱頭疼咳嗽是也用參蘇飲葛根湯冬溫至春表症未罷痘毒未散而發斑者用黑膏湯冬溫至春為寒所抑至夏發斑煩悶嘔水者用葛根橘皮湯放標漸多隨現紅斑皮肉通紅痘乾不起摸不礙手身熱氣粗者乃陽明毒流於肌肉也用木通柴胡桔梗芍藥犀角燈心湯化下烏金膏或人參白虎湯合消毒散或升麻葛根湯加石膏人參元參大青竹葉初出紅斑如雲頭突起者用元參升麻湯加紅花紫草黃芩斑色紅活者用紅花紫草黃芩黃連生地芍藥丹皮牛蒡青蒿犀角青黛地龍發斑而咽痛者用前藥加連翹防風元參夏月咽痛用前藥加升麻桔梗發斑而狂煩面赤咽痛者用梔子仁湯嘔利目赤口瘡者用黃連橘皮湯斑赤煩躁二便祕澀用黑奴丸發斑身熱口燥用化斑湯加柴胡黃連痘既出齊而斑不內解者用升麻湯加當歸斑太多者用前方加葛根板藍元參木通斑爛者亟宜挑破敷四聖散內服犀角地黃湯化斑湯加黃芩黃連蘇葉紅花便祕用芒硝大黃斑既退用四君子湯加黃茋生薑大棗瀉不止用前方加肉豆蔲須預煎好俟斑退血附痘即與服之庶免內陷妄用溫補身熱便祕者宜解利化斑用四順清涼飲下後身冷脈沉肢厥用附子理中湯六君子湯凡發斑等症用元參升麻湯犀角地黃湯而不退者六七日後必死治案一兒發斑口燥舌乾用化斑湯及小柴胡湯加黃連而愈一兒發斑嘔吐利下目赤口瘡用黃連橘皮湯而愈一兒發斑狂煩面赤咽痛用梔子仁湯而愈一痘後發斑色紫過於溫補身熱便祕用四順清涼飲及解毒化斑湯而愈一夏月發斑咽痛用升麻元參桔梗牛蒡甘草而愈一斑由胎毒砭去其血用犀角大青湯犀角解毒湯而愈一發斑紫色煩躁便祕溺赤此毒盛也用黑奴丸而愈一發斑赤色腹脹便祕此內傷也用調胃承氣湯下之反脈沉肢厥用附子理中湯六君子湯而愈一夏月暑毒發斑用化斑湯合香薷飲而愈一斑疹並出壯熱煩躁舌胎便祕用調胃承氣湯合葛根湯而愈元參白虎湯升麻犀角射干黃芩元參知母石膏甘草元參升麻湯升麻元參甘草石膏升麻鱉甲湯當歸川椒升麻鱉甲雄黃甘草解毒化斑湯前胡桔梗山查木通丹參荷鼻連翹金銀花紫草破逆化斑湯山查丹參荷鼻蘇木紫草犀角解毒湯犀角地黃丹皮赤芍白芷連翹防風荆芥木通五龍化斑湯紫草紅花木通白芍生地茯苓蟬脫金銀花甘草燈心浴斑湯荆芥紫蘇木通蟬脫荔枝枳殼當歸楊樹枝煎湯浴退斑散石膏青黛紫草湯下五運丹甘草甲己年黃芩乙庚年黃柏丙辛年黃連戊癸年山梔丁壬年香附紫蘇硃砂雄黃金箔為衣依年一味為君餘等分蜜丸犀角大青湯元參大青桔梗知母石膏山梔木通人中黃犀角沖入燒人屎化斑散石膏紅花紫草湯下夾疹夾痧門麻疹者正疹也形若芥子色若丹斑磊磊皮膚之下隱隱肌肉之間瑣碎稠密其症憎寒壯熱有似傷寒眼胞困睡而難起鼻流清涕而不乾咳嗽噴嚏少食煩渴身疼氣急嘔吐泄瀉腮紅臉赤大便不瀉即祕是也此心火熏灼肺金故現於肌膚之間痘既現形稀疏而夾疹者易治若痘密而與疹並出則毒相并形相混難治亟用辛涼解發以元參升麻湯加桔梗黃芩令麻疹先退痘毒起發吉症痂後出疹此餘毒解散之兆不必治凶症咽喉腫痛聲啞水嗆不能飲食李少陽曰痘先疹後痘毒從疹而益解疹先痘後元癸因金熱而益虧信知疹之恃乎肺氣也故疹出未幾而出痘清肺調胃為主用內托至竒湯加人參白术麥冬天冬桔梗甘草當歸黃芩川芎苡仁木香之類則乘氣生發痘自充灌矣疹先出而夾痘亟宜解毒散疹用荆防敗毒散或升麻葛根湯加麥冬黃連木香或黃連解毒湯合消毒飲服後疹不退者凶兆也用犀角地黃湯疹先出而皮上發出如蚊咬之迹用升麻解毒湯加荆芥防風熱渴用人參白虎湯感六淫之邪痘後出疹用升麻葛根湯加麻黃荆芥防風桔梗前胡杏仁桑皮黃連生地疹時失解毒滯肺經致痘出而痰嗽喘急者宜疏邪解毒清肺用甘桔湯加前胡牛蒡連翹蟬脫蘇子橘紅疹時過表致肺氣虛耗毒不易出乾咳連聲不續者用保元湯加五味子麥冬貝母桔梗橘紅痘時過於實表以致痘後發疹者治宜解散用荆芥防風連翹牛蒡陳皮枳殼甘草白芷黃連痘時過於溫補以致毒乘肺胃發疹而壯熱痰喘譫煩者先用三黃丸次用竹葉石膏湯加黃連人中黃發疹而失音泄瀉名漏底甕疹雖散而痘必空殼矣痘後餘毒未盡風火相搏身熱咳嗽用發疹藥不現不沒者用芎蘇湯或防風葛根湯外敷天水散蜆殼中水夾斑疹皆由邪毒蒸肺故斑疹與痘一齊湧出宜解毒涼血先消斑疹始可收功若邪正夾雜不起發者凶夾膚疹痘初出時膚如湯沸泡點鮮紅成片現沒無定者是心腑熱毒所發只以正痘為主則毒散隨沒矣用敗毒散解毒防風湯夾癮斑隱隱在皮膚間不胖不灌不痂成疙瘩多則發癢者是也其治在脾若麻木者兼痰兼風也色紅者兼火也用解毒防風湯因內傷外感而發者用調中湯夾痧如細粟尖圓而破內含清水熱毒所發也用四苓散色白者名曰白痧治宜養血用養血化毒湯治案一疹後報痘不易長大乾咳連聲不斷此過於發散所致也用保元湯加貝母五味子桔梗橘紅甘草而愈一痘後出疹失於解散咽喉腫痛聲啞水嗆飲食不進倒靨而死一疹後出痘失於解散痰嗽喘急用甘草桔梗牛蒡連翹蟬脫蘇子疏邪解毒之藥而愈一痘出數顆而夾疹遍身圓朗紅活兩日盡沒有識者曰痘沒必悶亂煩躁此却安靜且正痘宛在乃疹沒非痘伏也以平劑而愈一兒身熱咳嗽痘出隱隱以藥發之而不見不沒此風寒鬱而不散乃隱疹也非正疹也用芎蘇散而愈敗毒散蟬脫牛蒡荆芥桔梗葛根升麻紫蘇川芎羌活薄荷前胡枳殼山查青皮甘草解毒防風湯黃茋防風荆芥牛蒡枳殼白芍地骨皮調中湯陳皮白术半夏藿香砂仁人參茯苓甘草養血化斑湯歸身生地紅花蟬脫枳殼人參清和湯紫草生地貝母麥冬陳皮茯苓牛蒡紅花當歸甘草夾丹門紅腫疼痛逰走上下如紅蛇盤繞如錢如帶如索如葉赤色成片手不可近蓋毒鬱於心經故發此丹也初時宜輕劑散其火邪兼活血解毒痘後宜用解利大約與治疹參用有煩躁腫脹者切忌寒涼及寒藥塗敷往往有治丹而痘反陷者不可不慎故治丹只宜托痘痘出則丹自淡外用生地防風湯或化斑湯浴之內服元參升麻湯六味化毒丹或芍藥生地甘草木通荆芥防風升麻元參痘前丹瘤心肝熱也用乳磨犀角丹皮芍藥生地燈心痘後丹瘤此惡候也頭面起者過心則死足下起者過心腎而死內服元參化毒湯小柴胡湯合生地黃湯一云宜去當歸黃茋人參芍藥外用砭法以泄其熱或用蜞針法發丹部位眼眶發丹腫似胡桃者宜清肝以防傷目腮臉發丹腫似塗硃者宜清心以防捲簾頸項頭面發丹痰嗽咽痛者宜清肺以防聲啞又用黃連紫草山梔車前胸膛發丹壯熱嘔逆者宜和胃肚腹發丹腸鳴絞痛者宜和脾背脊發丹虛驚多汗者宜鎮心手足發丹陽明毒重不能灌漿者宜理脾胃治案一痘感暑毒痂後頭發珠子火丹用香薷飲合犀角地黃湯加荆芥防風連翹薄荷而愈夾癭門癭為痰毒風熱血熱凝結而成結於頭項耳後兩脅如桃如􅀈如瓜如棗破潰泄氣其勢甚危當審日期先後氣血厚薄然後施治痘漸起發癭漸退者吉癭自起突而痘反退伏者凶痘與癭一齊起發者成膿亦無害癭已紅腫而痘即標點恐癭膿一潰元氣耗散不能成功起發治宜表托毒盛則消其毒元虛則補其元用荆芥防風桔梗木通蟬脫芍藥生地痘出而隨發癭宜補托消痰解毒忌用寒涼燥耗之味痘三四日而癭作毒隨痘泄膿隨痘灌挽回獲全用三消散七日灌膿黃蠟而癭作宜保護元氣而兼消毒用沖和飲痘子初標癭潰流膿泄氣致元氣虛弱宜用黃茋衛生湯加人參當歸芍藥川芎紅花防風桔梗治案一痘勻朗紅潤腮腫青紫熱甚煩躁此痘先塊後名鬼捏惡候亟與紫金救焚散而愈此症若緩治則毒氣攻心驚攛而死一痘三日耳前紅腫如桃用葛根湯加荆芥防風桔梗牛蒡而愈三消湯花粉蟬脫半夏川芎當歸茯苓甘草木通紅花生地芍藥牛蒡沖和飲人參黃芪麥冬柴胡防風荆芥桔梗連翹當歸花粉發癭方木通生地黃茋桔梗當歸芍藥牛蒡蟬脫甘草茯苓殭蠶上加升麻麥冬下加牛膝山茨菰夾疫癘門痘原於胎毒必感不正之氣而出如冬溫陽氣暴泄來嵗必感痘疹小雪後為氣之終太陽寒水主之冬溫則水德不彰木火反乘之痘毒藏至隂之下發於太陽之經當其時而動真氣毒乃為邪疫傳染不正之氣所發矣治者勿犯嵗氣發之泄之解之平之以解毒為主用代天宣化丸升麻葛根湯遍體蒸蒸發熱穢氣沖人大小傳染口不言眼不睜食不思沉沉昏睡手足牽掣者蝦蟆瘟也痘症值此易於變動朝榮夕萎宜慎審治用蒼术硃砂黃連藿香茯苓桔梗木通生地陳皮口吐白沫煩躁譫語用前方加麥冬紫草石膏見邪見鬼不治之症治案一兒季春出痘疫氣亢極便祕用十神解毒湯及升發之藥而愈一季春出痘七朝順朗亢極便祕狂煩芒刺黑胎空處隱有黑點此感疫氣也用大承氣湯利之及理氣血之藥而愈夾風寒傷寒門風寒壅塞腠理痘毒無從出路宜審日期施治未發痘之初宜疏解微汗用升麻湯和解湯參蘇飲既發痘之後宜涼血滋隂疏表用保元湯加生薑肉桂灌漿之時風寒未解不可峻用解散發泄之劑用保元湯加生薑肉桂次用水楊浴法以散其表蓋內外相攻風寒易出痘亦易漿也一云須少用柴胡而兼舉法滋隂八九日痘瘡本虛又感風寒切不可因外邪而失調元氣用保元湯加柴胡痘初出夾傷寒傷寒之邪自表而入裏痘家之毒自裏而達表當治痘而兼治傷寒用柴胡葛根麥冬茯苓山查木通蟬脫有食加廣皮傷寒後元氣虛弱而痘隨出乃危症也用滋隂三寶飲傷寒四五日而出痘煩躁譫語者用小柴胡湯竹葉石膏湯加犀角紫草兼疫癘者加青蒿桃核代天宣化丸兼停食喘脹者略用小承氣湯微下之隂症加人參附子夾內傷門痘夾內傷須看顔色初標時宜疏表化食解毒升發痘齊時根顆淡白軟弱宜滋水疏發少用補藥灌期時痘色紅紫宜涼血解毒補養舉發內托將痂時根顆淡紅灰白軟弱法宜重補用保元湯加當歸鹿茸痂後日多寒熱併作不宜重補用四製白术散治案原闕四製白术散白术一斤分四處一用砂仁同炒一用麩皮同炒一用東壁土同炒一用缺二字同炒為末人乳沖酒服夾癆門素患癆怯而出痘咳嗽壯熱羸瘦一切大寒大熱之味俱不可用用天陽丹若嗽極難睡加欵冬花梨汁天陽丹紫河車炙乾人參生地麥冬茯苓當歸人乳蜜煎膏子仁端録卷十四
