body:
  text: 仁端録卷十二明徐謙撰陳葵刪定大小便閉及心沙紅門痘家小便欲其清而長大便欲其潤而實則邪氣不伏正氣不病經曰小便數大便必鞭雖一二日不更衣無苦也若大小便俱不通則邪氣內實三焦俱絶必目閉聲啞肌肉黧黑而死故便祕者不救氣血流行則大便無滯苟因內熱欎結或因汗多或利小便太過以致津液枯涸不得滑潤亦有血熱血燥血虗不能傳送於大腸而成祕結然宜分三部上焦熱結則宜降氣清涼用枳殼枳實赤芍黃芩黃連牛蒡葶藶中焦熱結則宜行氣活血用赤芍紅花黃芩黃連連翹山查下焦熱結則宜通導用大黃當歸白芍甘草黃芩黃連或行導法或因過汗過利小便而大便祕結者此表裡泄液枯竭故大腸乾燥未可妄行攻逐只宜滋潤或蜜導等法大便祕而小便亦不利覺肚門有裡急後重之勢者此津液還入胃中大便將自行也略祕結者宜涼血以潤之用當歸芍藥紅花生地黃岑黃連麥冬枳實丹皮麻仁熱祕者煩渴五心熱腋下有汗腹脹用承氣湯涼膈散大柴胡湯下之若痘乾黑陷煩燥用牛李膏或百祥丸虗祕者不食嘔青水靣青腹不脹裡急用潤腸湯豬脂湯或蜜導膽導法不可妄攻以致內陷風祕者能食結塊屎如栗下之甚澀用潤腸湯豬脂湯加羌活氣祕者腹脹腸鳴腰脅疼痛用前方加枳殼便祕而身熱者用大柴胡湯便祕而身不熱者多服通齒散四順飲紫草飲初發熱大便欲潤若二三日不行急利之恐腸胃不通榮衛不行痘出轉密也起發後大便冝堅實如能食而大便常行者無害若四五日不行則熱盛反蒸而濕其瘡難靨亦宜微利之一云此血氣成漿之後候因熱而祕冝清毒活血便自通矣六七日大便不通而煩悶作痛者毒盛也用消毒活血湯去人參黃茋加牛膝紫草當歸煎成入生蜜服如仍不行方可加熟大黃及膽導法八九日漿期內大便忽祕常欲去而不能急用歸尾枳殼芝麻紫草生地黃芩煎服即通翁仲仁三仁膏尤妙成膿之前三四日大便不行者用膽導法痘後便祕由毒氣并入大腸血液乾枯而閉脹也用潤腸湯三黃丸四順飲三乙承氣湯小便祕澀心熱移於小腸小腸熱於膀胱膀胱為津液之府氣化則能出故小便之行必得肺氣下降而輸化肺雖居上焦而實水之源痘瘡火毒既熾則肺金受尅而氣為壯火之所食肺失其下降之令則水源塞而傳化之精液竭是以小便塞數故痘期小便數者病進矣亦有流毒入肺致生積痰而塞氣道者不必利小便但清金降氣用涼藥以泄解其毒則小便自利微熱者用導赤散四苓散熱甚者用八正散辰砂六一散有血者八正散加瞿麥生地丹皮有因血氣弱不能傳化須補中分其清濁則小便自利用補中益氣湯痘未出而小便祕澀者熱甚乘肺也急解利之防其發驚熱則生風也痘已出而小便赤澀者下焦血熱故也用四物湯加知母黃柏牛膝甘草痘後熱搐膀胱則小便赤澀用導赤散毒入小腸則小便不通用五苓散導赤散二便俱不通者熱愈甚也用八正散通關散心失其血則血隨毒激心通小腸滲於膀胱而溺血也或如黑豆汁蘇木水屋漏水名心沙紅若陽毬腫脹者冝清心理脾腎頸腫脹者冝解毒祛火不痛者難治痛者易治用生地車前散痛加滑石山梔便祕加川芎苡仁吐衄血加炒黃連總要兼行氣為主如八正散地骨汁鼠粘湯黃連解毒湯之類惟生地車前散之效最速治案一人十九歲標點便結至十二朝不行口乾煩躁左尺脈浮大此隂腎不足而津液竭也用人參黃茋當歸生地知母枸杞枳殼兔絲子而愈一痘後食粽便結痛甚手足搦搐用大柴胡湯加神麴而愈一痘後身熱便祕此餘毒結大腸也用解毒湯利之而愈一痘後身熱便燥此辛熱耗津液用潤燥湯而愈一十五嵗血熱毒重大小便祕此燥屎結於糞門也故前後俱閉進湯藥則小便愈急而不出用膽導法而通一痘正出而小便祕此氣為火食也用導赤散加疏解藥而愈一痘後溺赤虗火炎爍肺金也用六味地黃丸加五味麥冬而愈一泄㵼溺赤此隂陽不分也用五苓散加車前木通而愈一兒隂陽分而小便少此脾肺虗也用補中益氣湯加麥冬五味而愈一痘後小便赤澀熱在膀胱也用導赤散加竹葉山梔茯苓車前燈心而愈一痘後小便不通有用五苓散而愈不利隂囊漸腫此隂虗而滲利之復損真隂也用六味地黃丸加肉桂車前又補中益氣湯調理而愈一脫痂後小腹脹小便不通有謂毒餘小腸用分水解毒藥愈脹此脾虗下陷也痘後無實症土堅則水清用人參大棗生薑而愈大柴胡湯柴胡黃芩白芍枳殼大黃四順飲大黃當歸白芍甘草紫草飲紫草二兩滚湯泡悶一時服潤腸湯甘草歸尾生地麻仁桃仁效方甘遂甘草銀硃食鹽紙包煨紅研末蜜搗如棗大入肚門即通八正散赤苓貝母木通滑石扁蓄車前山梔甘草效方女人新梳頭髮燒存性每用三釐吹入馬口生地車前散犀角木通升麻白芍黃茋紫草地榆生地車前甘草寒熱門火動則熱火鬱則寒寒極則熱熱極則寒此陽極生隂之理皆痘毒欲出不出故為寒熱耳痘未出一日間發寒熱者氣血與毒相攻氣血旺而不受邪觸也為實痘未出前冝大熱以逐其毒非熱何能達表却乃頭溫足冷防不能盡發必致內攻此熱不熱也出後寒熱毒盛則為邪勝毒輕則為虗極痘既出後冝表裡和平長養氣血以托毒成漿却乃往來不寧則氣血煎熬不能拘收其毒一無出路甚有氣泄血失之患此不當熱而反熱也冝辨之實者用升麻湯和解湯虗者用保元湯加肉桂助氣血以逐其毒結痂後而發熱則為餘毒或用毒藥太過以致元氣虗損而發寒熱者則為大逆凡遇或寒或熱或寒熱交并者不可驟補反用大寒大熱之劑雖應發散亦不可太過實症始終宜用升麻湯和解湯或柴胡湯加知母石膏若大便祕結用大柴胡湯下之虗症宜補真元若寒熱作於七八日之間恐有坐陷之患須多服內托散或保元湯加肉桂獨熱七日前後獨熱者為蒸痘氣血與毒俱盛故也十四日後而獨熱者亦為餘毒俱易治獨寒七日前後獨寒者為氣血損毒火內鬱故也難治用保元湯加川芎肉桂生薑或內助丹厥逆厥逆者四肢逆而不溫也厥者冷也又甚於逆四肢為諸陽之夲常冝和暖指頭微寒者陽氣衰也陽氣起於十指之端足心冷者隂氣勝也隂脈襲於足下而趨於足心也皆為惡候蓋熱毒之氣鬱遏於內元氣不得行以致表上無陽而厥冷也四肢為脾胃之主今宜溫而反冷者脾胃虗弱也用保元湯加桂枝生薑川芎當歸或理中湯參苓白术散補中益氣湯去柴胡加官桂甚者加熟附子服後手足暖者吉仍冷者凶痘初出手足即冷必其先有吐利脾胃氣弱不得至於經故四肢不得稟氣於胃而冷也用理中湯加肉桂養漿焦黑不起煩渴悶亂腹脹喘促大小便祕煩躁狂妄脈沉滑數手足厥冷此火極似水伏陷症也痘黑者用百祥丸牛李膏便祕者用三一承氣湯此名陽厥瘡灰白泄利不止脈沉細微弱或浮大而虗此元氣虗􅉵隂陽不接陽氣欲脫而手足厥冷也為隂厥之症冝溫之用陳氏木香散異攻散或理中丸加熟附子服後手足暖者生冷者死若但十指頭寒痛者用四君子湯理中湯加官桂痂已落氣血久虗脾胃大困必六脈沉細冝有此厥逆也用調元生脈散加當歸熟附頭乃諸陽之會因毒氣上蒸故頭溫足六經水寒故足冷脾胃土寒則滯肝膽木寒則枯陽氣絶也故曰足冷過膝者不治然亦有火鬱而足冷者清其上則火降而足自溫不可泥於不治之説治案一痘四日溏泄無度四肢厥逆痘點隱隱先以附子理中湯止㵼溫肢又以補中益氣湯加肉果官桂調理而愈一痘九日灰白溏瀉厥逆氣􅉵隂陽不相順接而四肢為之厥逆也用陳氏異攻散而愈一過期不斂便溏安靜四肢少溫但脾氣不足用人參附子茯苓陳皮山藥木香肉果白芍甘草成痂而愈一痘七朝肢冷減食乃血熱而過服冷劑以致氷伏也用保元湯加丁香肉桂炮薑而愈一痘六朝綻突焦紫煩躁悶亂喘促厥逆乃陽毒陷伏厥深熱亦深也以四順飲行二次諸症悉平又清解之而愈一痘四五日毒已出盡形色無神二便自利四肢厥逆腹脹發噦裡氣虗弱也稍遲則胃氣絶矣急以理中湯連進二服內氣一暖痘即紅活四肢溫暖又以補中益氣湯加丁香治其噦而愈一痂後自言手足冷及按之反熱夜卧不寧經曰外熱而內冷脾弱也內熱外冷胃弱也夜卧不寧脾隂不足也用歸脾湯而愈譫妄鄭聲狂越門心熱則多言胃熱則妄語毒邪入胃則耳目妄有見聞失志故也陽脫者見鬼日間詀語以陽治之易愈夜間詀語以隂治之益甚午前詀語未後必痊子前詀語午後難革三四日之詀語熱除自止六七日之詀語毒攻益難痘將形而詀語驚痘也痘既腐而詀語鬼痘也凡詀語而聲烈如雷連連吐涎眼眶流淚唇紅靣赤并好食易飢近人愛眠臉黃舌正痰不緊并者皆活兆也凡詀語而身熱直視厥冷拈衣揑縫惡見日光燈火噓氣炊炪鼻青黑色嚙指餂舌天柱俯垂昏不知人言語無倫狀如怕鬼此皆心腎二經神志俱喪必死症也初熱詀語痘將形而詀語者或驚痘也痘未出而發熱昏睡煩躁詀語心毒熱甚神明浮越也宜㵼火鎮神升發清熱用葛根湯導赤散加木通山查蟬脫兼服牛黃清心丸服後神氣爽者吉胃有燥屎三五日未更衣下之用四順清涼飲三黃丸養漿詀語昏睡不醒喃喃妄言此痘密而心血外耗心舍空虗無以養神冝養血安神用寧神化毒湯安神丸加麥冬人參昏迷之甚者先用龍腦膏後用安神丸鄭聲醒而邪言為詀語似睡非睡喃喃自言只一二語而再四舉者為鄭聲鄭重其聲也此火盛痰迷心神虗也用梔子湯宣風散加減狂越火動於中發越於外心神不守腎志不寧故手足擾亂言語乖張狂而不自知也初熱發狂是熱毒攻擊觀其表涼則疏發之引毒達外自安若眼紅甚先以絹浥冷水透其五心熱氣若腹脹眼合大渴舌乾唇燥身反不火熱者此毒熱伏根於內也將變失血之症矣口唇之痘必密成疔或隱有斑點於肌膚之間欲出不出亟用紫草透肌湯遲一日則難治矣初熱時失於表散煩躁大渴詀語發狂如見鬼狀不寧者此外邪與裡毒相摶也急用葛根湯調大無比散六一散甚則大靈丹或導赤散加黃芩連翹犀角黃連木通牛黃丸抱龍丸辰砂益元散皆可選用使其小便清利痘亦漸出方可收功若便調狂亂者是痘為熱閉不得出也冝發表用升麻葛根湯加麻黃或五苓散加辰砂若風寒閉塞致紅斑隱隱不起者用敗毒散煎下紫草膏見點紅紫小便如血赤者用二寶散服後若不省人事詀語不休者死報點起脹時顚呆妄言哭笑此心血虗神不守舍而毒乘之也用升麻葛根湯或犀角地黃湯紅紫煩躁狂言便祕者下之用三黃丸承氣湯或四順清涼飲四五日毒留而發狂者用犀角地黃湯加黃芩黃連蟬退防風七八九日毒未解而泄㵼毒反攻臟腑而見狂越用保元湯加犀角或犀角地黃湯加減膿成收靨時忽發狂詀一身痘盡迸破者用安神丸若喜笑不休此又神之有餘也用人中黃牛黃冷水下或用金汁下治案一痘起脹焦枯詀語此火亢極也用退火回生丹無比散而愈一痘密漿期白色昏睡詀語此血虗也用保元湯加當歸生地麥冬茯神棗仁一午後發熱面赤詀語此火從虗發也用保元湯加當歸芍藥川連寧神化毒湯人參當歸生地麥冬木通山梔赤茯石菖蒲加燈心安神丸黃連歸身麥冬茯苓甘草硃砂氷片豬心血搗丸黍米大燈心下一丸一方無麥冬茯苓氷片有逺志棗仁石菖蒲二寶散生玳瑁生犀角為末犀角地黃湯芍藥生地丹皮煎成沖入犀角汁白垢散屎坑垢年久者洗煆為末燈心湯下驚搐風癎門夫駭然而厥曰驚眼睛直視牙關緊閉唇口􆀇邪四肢震動曰搐驚發於心搐發於脾痘之始發雖無臟不動而心實主之心火熱甚肺金受剋不能制伏肝木熱則生風風火相摶神氣不安故發為驚搐諸痛癢瘡皆屬心火諸風掉眩皆屬肝木痘未出而發驚厥者是熱透心絡而然熱毒隨搐而散於四肢痘一出驚即止其痘必稀心氣足故也所以多吉常不藥而自愈痘屬隂驚屬陽隂被陽沖則壅遏之毒易散也故得頭額手足胸背間漸漸自汗出者此腠理疏通毒已發泄不須服藥又要看面色唇口紅活目黑多白少微弄舌漸漸加增痘點雖多順候也凡驚厥即標者心經痘也紅潤細小易漿易靨即稠密亦不為害非閉痘也或悸而不標者皆屬小腸惟此經沉而不泛多致難標如發驚搐久而不復止痘應出不出每見痘之前發搐八九次者痘多密而難成功也痘既出一二日而復發驚搐此熱毒太盛而心主不能發脫也勢多伏而難起急宜升解又有氣血素弱復感風寒熱毒反滯又不敢易為發散清利故多凶若㺯舌不止面色青黃唇口燥裂驚搐或作或止者亦有驚死者必中惡也訣曰未驚先痘出齊逆驚風火相摶作搐多凶平居無病忽爾發驚目上視頭仰向後身反張者肝木生風此名痘候宜發散疏風平肝利小便為第一縱未即效亦不敗事候其熱氣得泄則心神自安用惺惺散加蟬退全蝎升麻紅綿散加味導赤散加硃砂兼羌活湯㵼青丸或云痘前發搐須以桂枝木香煮過用之痘初一二日發驚搐者毒伏於心冝升提解毒用羌活升麻湯消毒飲合柴苓湯或導赤散驚痘易治以毒由心經出也用導赤散加羌活升麻兼㵼者用茯苓湯加甘草發熱一二日發驚一二次痘出必稠治之而搐不止痘多而難治也急服黃連紫草飲點後戰栗驚不止者九日必死痘未出而驚搐不可遽投涼心之藥如硃砂金屑珠粉氷片麝香輕粉巴豆等藥使心寒而毒不能發以致伏陷每見誤服寒藥臨危之際隱隱斑出已無及矣冝快氣利小便風熱退則痘隨出而驚搐自愈用升麻湯合消毒飲或蟾酥丸若風火相摶面赤引飲痰鳴上視喜居冷處者用柴苓湯或抱龍丸小便利者可治不利者難治用導赤散兼牛黃丸或四物湯加硃砂茯神逺志防風木通前胡黃連初熱目上視頭向後角弓反張而汗出如珠者死但四肢強直不能舉動者用四君子湯加川芎當歸羌活天麻蟬退木香兼悶亂㺯舌是毒不得伸也用犀角地黃湯清解散因風寒所激發驚宜疏風清痰用八寶丹地龍丸鎮心丸初點日久不退力壯而角弓反張風痰壅塞藥石不通者用瓜蒂散或牛蒡殭蠶皂角煎灌及探吐法三四日後冝伐肝則青皮白芍保脾則陳皮山查解利則木香黃連疏驚消痰則八寶丹痰盛詀語昏迷驚搐聲重鼻塞流涕脈浮數者外感風寒內藴心熱也用蘇解散人參羌活散驚搐不止者用紅綿散調辰砂六一散氣血弱不能送毒外出而驚搐狂躁瘡淡淡在皮下面白唇青脈遲緩者用溫中益氣湯但心煩啼哭者用麥冬導赤散大抵實則消痰降火虗則保脾而兼升發痘色紅紫面赤唇裂毒盛而驚搐者用清解散痘已現形驚風不定昏睡不省痰壅氣喘目閉詀妄下後不減毒邪壅塞清道不行至惡候也所謂驚輕毒亦輕驚重毒亦重一則火毒攻心心熱生風風火相摶痰鳴直視面赤引飲喜冷者用清神散火湯或導赤散㵼青丸抱龍丸或升麻湯加防風茯苓去升麻一則病後多食胃弱不勝榖食發搐必面黃潮熱大便酸臭吐利腹痛先用偹急丸紫霜丸或丁香脾積丸後用木香大安丸異攻散只用抱龍丸大便祕者用四物㵼青丸或小承氣湯將靨痂忽然發驚泄㵼者乃蘊毒復入於心十無一生更兼寒戰咬牙腹急汗出如珠與先吐㵼而發搐一發連綿不休者不治此與雜症慢驚同論脾土既弱風木自勝冝溫補厚土猶不勝也况又驚氣入心土絶生化之源者乎即輕者亦火而成癎貽終身之害用寧神湯抱龍丸風癎似驚痘前熱則生風項強牽引直視口渴舌強如中風狀用參蘇飲消風散有痰便祕加元明粉見點後勿服驅風峻藥起脹後見之則危用參蘇飲消風散痘後見之手足麻木無汗者用參附湯手足難舉動常出汗者用茋附湯治案一兒驚搐卒仆蘇而復作此風寒壅毒也以紅綿散治之而愈一兒驚搐誤以驚藥涼其心痘不得出而死一兒初熱發搐以升麻葛根湯加天麻勾藤蟬脫木通枳殼痘出而愈一兒見點時驚搐此心血虗而客邪入之也用四物湯加茯神逺志石菖蒲棗仁蟬殼而愈一初點驚搐不止此心脾虗而血少失治十六朝卒一兒痘出二三日驚搐此毒不透心經有邪也用導赤散加蟬蛻黃連紅花天麻勾藤石菖蒲而愈一痘出未盡驚搐且溏泄肢冷用異攻散數帖而愈一漿期驚搐不止用安神養血丸而愈一痘後驚搐吐㵼肢厥目直痰鳴此中氣不足也用補中益氣湯兼醒脾散附子理中湯下至聖保命丹而愈一痘後驚搐氣喘痰喘口閉目直二便祕澀有似急驚乃風邪有餘之症冝清解散㵼氣用天麻抱龍丸㵼青丸而愈一痘後過食白果驚搐痰壅目直腹脹喘急此氣滯生痰也漸與甘草生薑湯得吐㵼而愈不可以風治也加味導赤散人參黃茋白茯苓木通生地細辛甘草羌活湯羌活川芎防風山梔膽草當歸甘草薄荷淡竹葉消毒飲荆芥牛蒡甘草柴苓湯柴胡茯苓豬苓澤㵼黃苓半夏甘草人參白术導赤散木通甘草生地防風薄荷赤芍燈心加山梔麥冬蟾酥丸人牙一個硃砂五分雄黃牛黃各三分蟾酥一分加全蝎殭蠶人乳為丸如黍米大每服七丸人參湯下抱龍丸膽星天竺黃硃砂雄黃麝香甘草膏為丸皂子大每服一丸燈心湯下琥珀抱龍丸粉草人參茯苓天竺黃白檀香枳殼枳實膽星硃砂山藥丸如皂子大薄荷湯下一丸牛黃清心丸黃連黃苓山梔鬱金硃砂牛黃臘雪調麵糊為丸如黍米大每服七八丸燈心湯下八寶丹天竺黃龍齒膽星硃砂白附子全蝎珍珠琥珀牛黃麝香氷片金箔為衣薄荷湯化下一方加雄黃殭蠶蟬脫天麻人參羌活散人參羌活柴胡前胡防風荆芥黃苓甘草枳殼山梔桔梗川芎茯苓紫草牛蒡天麻骨皮蟬退一方無天麻有澤㵼紅綿散全蝎天麻麻黃蟬退薄荷甘草紫草荆芥蔥白溫中益氣湯人參黃茋當歸白术茯苓甘草川芎白芷木香防風官桂山查麥冬導赤散木通麥冬甘草梔子燈心清解散防風荆芥蟬退桔梗川芎前胡葛根升麻黃連黃苓紫草木通牛蒡連翹山查甘草生薑紫霜丸杏仁五十粒巴豆二十五粒去油赤石脂代赭石醋炙各一兩蒸餅為丸如黍米大每服三丸或十丸乳汁下四順飲大黃當歸白芍甘草寧神湯人參當歸生地麥冬山梔甘草黃連石菖蒲硃砂參蘇飲陳皮茯苓甘草半夏桔梗紫蘇乾葛前胡人參消風飲羌活獨活殭蠶藿香枳殼防風天麻地骨皮蟬退前胡柴胡黃苓花粉桔梗茯苓荆芥紫草甘草牛蒡人參參附湯人參附子羌活麻黃防風茋附湯黃茋附子當歸全蝎防風諸汗門汗乃心液痘屬心火熱氣內蒸腠理間泄故液隨氣而也無因而出者自汗也寐中出醒即止者盜汗也出來浥浥者熱汗也流珠者力汗也氷冷者虗汗也頭汗至頸不過胸者六陽虗也上至於頸下至於臍者胃虗自汗也手足汗多用人參白虎湯加黃連石膏知母人參甘草占米身冷惡寒而反汗用異攻散救之出汗惡寒汗出昏沉流汗煩渴汗綴如珠汗出如油髮潤如洗兼喘不休是為六死症凡自汗盜汗皆能虗人丹溪謂其無妨者蓋指形色順者而言也若汗多而形色日變者死故治痘不可專以汗為虛也須辨舌用藥凡痘未漿多汗恐不能灌既灌多汗恐不能靨既靨多汗恐血脫陽虗變生他症最冝細心審治初熱時自汗此濕熱重蒸毒重汗泄無壅遏矣但不可多多則陽氣暴衛氣反弱痘乃起發用調元湯甚則倍加黃茋升麻汗不止熱反劇此邪并於陽而陽虗冝斂汗固表清熱解毒使無癢塌之患壯熱者用當歸大黃湯微熱者用保元湯加桂枝白芍浮麥表素虗因發散太過而汗者冝實表用補中益氣湯調敗毒散膿期身涼汗不止用歸茋湯痂䀶淡白汗不止此隂陽兩虗也冝補陽救隂使無泄氣用十全大補湯調敗蒲散外用溫粉撲法痘後自汗盜汗榮衛皆虗心有餘熱也自汗用調元湯黃茋湯盜汗用當歸六黃湯並調敗蒲散便祕用四順清涼飲治案一痘漿足盜汗此隂虗也用保元湯加浮麥而愈一痘後盜汗肌膚煩躁此陽虗也用補中益氣湯加麥冬而愈調元湯人參黃茋白术白芍甘草麥冬黃苓汗不止加地骨皮麻黃敗蒲扇燒灰每服三錢歸茋湯歸身黃茋棗仁十全大補湯人參黃茋茯苓白术當歸生地川芎白芍桂心甘草溫撲法粳米粉黃連牡蠣粉貝母為末敷之黃茋湯炙黃茋人參甘草黃連桔梗當歸湯當歸黃茋生地麥冬甘草黃連白芍浮麥雄豬心芍藥甘草湯白芍甘草止汗效方白术牡蠣黃芪葵藿將白术分三處各炒為末失血門失血與汗症同為熱論但熱在胃則汗出熱在榮則血出血能化毒而為熱火所迫遂致妄行陽絡傷則血從上焦出衄咯嘔吐是也隂絡傷則血從下焦出小便大便是也隂陽俱傷則上下俱出諸失血俱為惡候惟鼻衄可治然不止亦凶因血載毒行傳注腎脈斬關而出不犯其內故可治與傷寒太陽經症鼻衄為欲解同論也心脾火旺唇口燥裂舌胎黑白火上沖肺衄血不止初發時不可峻用寒涼以氷其毒冝用元參解毒湯元參地黃湯清肺飲犀角地黃湯髮灰散痘後衄血餘毒入脾不能統血也冝參用前諸方加人參茯苓山梔黃連痘即衄血用涼血地黃湯加黃芩鬱金便製香附茅根汁吐血者血出於胃也用涼血地黃湯加山梔茶花炒黑蒲黃黃芩黃連前胡一云加知母石膏便製香附溺血用前方加木通滑石便血用前方加秦艽槐子荆芥血不止加蒲黃藕節側柏葉風寒摶激脾血不運用四物湯加黑薑若痘根窠黯淡肌青不起發者乃脾氣脫盡也便血而血少於大腸昏睡不省此毒重而神迷也用犀角地黃湯抱龍丸小柴胡湯加生地桃仁涼血地黃湯加秦艽小便浸槐子炒黑荆芥便祕用四順清涼散靨後便血先見過於攻發也用犀角地黃湯合四苓散便血去多冝領歸經用犀角地黃湯加官桂黑薑小便出血血出於小腸也用八正散涼血地黃湯加木通滑石尿血亦腎火太旺也初標時用山梔黃芩黃連木通蓋心移熱於小腸滲於膀胱溺血如屋漏水豆汁蘇木汁痛者可治不痛者難治用生地車前散此方如吐血衄血加炒黃連便血加川芎苡仁痛加滑石山梔腎經腫脹而紅者用八正散黃連解毒湯加地骨皮鼠粘湯然惟生地車前散之效最速小便迸實溺不出而痛及㵼下膿血如死肝者死胃爛故也必欲治之用黃連當歸白芍枳殼山查甘草牛蒡連翹大黃血從痘中流迸而出名陽瘡出血血分空虗毒無定位有犯於內七竅流血皆猝死之症冝於諸失血方中加炒黑蒲黃側柏葉藕節治案一痘發熱時衄血冝發之用升麻葛根湯加荆芥防風而愈一痘四朝吐血痘陷淡白煩躁詀妄肢冷身涼此夲血熱毒壅未盡而用涼藥氷伏之故令血脫毒解而虗矣冝先益氣用保元湯加生薑附子川芎當歸芍藥蟬退粘米而愈一痘正起發而便血倦怠少食作渴肢冷皆脾症也用四君子湯加升麻橘紅炮薑而愈一痘八日根窠赤腫煩渴飲冷便下黑血此熱毒內藴也用犀角地黃湯而愈一收痂便下紫血此脾弱而熱傷隂絡也用歸芍六君子湯加炒黑荆芥又獨參湯而愈一收痂身熱咳嗽血痰聲啞鼻衄此火刑肺金用黃連解毒湯加麥冬知母牛蒡而愈一痂後咳血不已此毒鬱於肺經用清金解毒而愈一痂後便下紫血此毒鬱滯下用鬱金牛蒡燈心而愈一痘後溏泄糞後下血此脾弱也用小異攻散加升麻地榆黃連小柴胡湯而愈一痘後血淋乃熱結下焦也用山梔黃柏木通生地小薊藕莭當歸滑石淡竹葉甘梢一女六嵗標點吐紫黑血甚多然而唇口滋潤形色俱順神寧氣壯竟無恙因女之父素有血症遺稟非毒故不解毒不補脾而收功前症雖險而痘與神自順未可以見點吐紫血而遂為死症也元參解毒湯元參黃芩山梔生地甘草桔梗乾葛荆芥茅根汁元參地黃湯元參地黃丹皮山梔甘草升麻白芍蒲黃清肺飲花粉麥冬天冬甘草桔梗當歸白芩黃芩丹皮知母調髮灰服犀角地黃湯犀角白芍生地丹皮髮灰散頭髮煆研童便酒下涼血地黃湯黃連歸尾生地山梔元參甘草生地車前散木通犀角升麻白芍黃茋紫草地榆生地車前甘草倒靨血不止方胭脂衃血竭各燒存性點上即止抓破出血方荆芥防風黃茋白芷白芍煎服手足門四肢者諸陽之夲如應出不出應發不發應收不收此脾胃氣虗不能旁達也手足痛初起者凶八九日者不妨手心痛用一芍散手足搖者不治痘勢太重手足冷者不治痘未成膿手足脫皮者不治發熱期內手尋衣領亂搯物者肝熱也手摸眉目口鼻者肺熱也手足搦搐者心肝風火相摶也各隨其症而㵼之足冷者常候也腎主足受毒邪故也四肢為脾胃之夲冝溫而反冷者蓋四肢稟氣於胃不得至經必至於脾乃得稟也脾弱不能為胃行其津液故冷耳冝溫之起脹期內手足多水泡者木剋土也冝亟治防作㵼變癢塌見點後腳跟氷冷者不妨此氣未下行也遍身痘發手足未透而空殼者脾胃衰弱榮衛凝滯故毒鬱而不發也能食必發􅏴疽不能食者死灌膿期內手屬心肺足屬肝脾腎氣血弱膿不足須用羌活以引之亦不冝多服股內側有血海穴屬腎經獨此無膿者乃歸腎死症也用八物湯以補氣血收痂期內足為純隂無陽相濟所以收遲痘始成漿他處未收手足心先靨者其後必生怪疾先出先收起遲收遲手足雖不嫌多但要如期起發若頭面未見標而手足先出他處未起而手足先起他處未收而手足先收者宜早解毒兼抑陽扶隂之劑此因陽火太旺故也用四物湯合黃連解毒湯他處俱起俱收而手足獨起遲收遲者此脾胃弱血氣不能達也冝補之用十全大補湯桂枝芍藥湯手足現而復隱起而復塌者惡候也攣踡痘初發時手足忽拘攣者毒火薰灼也任其舞蹈不可緊抱使其不得屈伸轉運也用升麻湯加味解毒湯五六朝忽然手足牽緊縮做一團者非驚也乃陽明毒熾筋無血養耳用羚羊散痘後手足忽然拘攣者痘多血少不能養筋或感冒風寒暑濕之氣冝補血用當歸生血散若已成病手足不能舉動者用桑寄生湯筆罄毒發不盡乃於手曲池足三里或肩阜凥膝關節之處􅏴腫毒發醲成痛疾直而不能屈狀如筆者其病在骨曲而不能伸如罄之折者其病在筋非針灸藥石所能愈惟陳氏五花湯足以軟筋為妙故痘後手足關莭腫痛必發􅏴也冝預防之治案一痘後溏泄腿痛此足三隂虗也用四君子湯加陳皮當歸白芍枸杞澤㵼石斛牛膝再以八味丸而愈一痘後脛膝結核成鶴膝風此足三隂虗邪襲之也用驅風散兼八味丸加苡仁牛膝絲子當歸而愈一痘足底出起從上至頭面回至心窠內攻而死此症當俟其頭面出齊重用保元湯加川芎升提之藥及先護心黃連解毒湯一帖使其起灌收痂自上而下則無危矣羚羊角散羚羊角木通紫草地黃白芍殭蠶全蝎桔梗荆芥橘紅甘草仁端録卷十二
