body:
  text: 仁端録卷九明徐謙撰陳葵刪定痘疹雜症論痘蓄毒而雜症俱發是痘症為本而雜症為標然雜症無常期而痘症有定候痘之本症向縁失治而作不可徒治雜症故心鑑曰治雜症一寸則痘症落後一丈但雜症不去則痘亦反為所害六日以前毒發未盡有雜症者常也六日以後毒當盡出雜症當除而不除者為逆湏急治之故痘症重而雜症輕者則襍症之藥加入痘症藥内是緩則治其本也痘症輕而襍症重者則先逐襍症後調痘症是急則治其標也能精察痘中自現之症治痘易易矣面色門痘以心血為主心熱煩躁驚悸面赤皆心經症見也故面赤為順若見青色是肝木尅制脾土也色不與病相應所以為逆壯實者必至生風虚弱者必至下痢厥逆面色青黄唇口淡白乃脾疳也慎勿因痘枯焦用寒涼太過以致泄㵼葢痘以脾胃為主脾胃一傷則毒氣下陷虚火上熾必至發喘發渇面赤如塗朱者凶此邪氣拂鬱於陽明也陽明經上循於面熱盛故赤也冝清解而稍兼利面垢而慘黯者凶此邪熱拂鬱於少陽也冝表裡俱解之葢少陽從中治也熱甚便閉飲冷面赤者用犀角解毒湯灌漿時發熱煩躁作渇面赤者用當歸補血湯痘毒鬱遏風寒内摶凝滯肌膚遍身青色者用透肌散鼻封眼合門心肝脾肺腎應耳目口舌鼻鼻乃肺竅肺主氣痘頼氣以拓充鼻封則氣外束而不泄眼乃肝竅肝藏血痘頼血以滋養眼合則血内榮而不滯如是則毒為制化矣若痘順而稀則隂陽相輔鼻不封而氣自充眼不合而血自榮若痘逆而宻則隂陽不和鼻不封則氣不充眼不合則血不榮故犯於血分者必有焦皮鐡葉之色犯於氣分者必有􅀈蛈蓬房之形三日而封合者易充易靨六日而封合者難足難痂封而不合則隂不滋陽合而不封則陽欠衛隂封者十之三四合者十之七八十三日是眼開之期若過期而不開必熱毒未盡解也當防其壞目若封而有涕合而有淚者生全之兆若鼻封而竅外乾黒眼合而眶上如煤者必死頭痛門痘中雜症只有頭疼為輕發熱時風邪入於諸陽之㑹故令頭疼用清徹湯有因氣血俱虚而痛者用補中益氣湯發熱惡寒咳𠻳而疼者用參蘇飲熱氣上攻痰壅頭疼者用二陳湯加山梔荆芥黄芩薄荷石膏目疾門眼闗五臟痘發時五臟之火皆動故兩目䑃朧神倦不開者痘也目中汪汪若水者疹也諸瘡皆屬心火故其候見於目目赤者心熱甚也目連剳者肝有風也目直視者肝有熱也因而揺動者肝風與心火相摶也痘疹發搐此其常候但㵼心肝二火搐止者吉不止者凶未出之初即與清肝必無目疾痘前目疾此時眼中無痘常淚出多眵者肝熱盛也早服㵼肝火之藥以解之發熱時果係痘症即防痘瘡入眼用䕶眼法用蟬脱散或洗肝明目散加蟬脱痘瘡入眼用鱔血或象牙磨水抹之或生地附子搗爛貼足心即愈風腫翳膜餘熱攻目用蟬脫散痘中目症發熱及見㸃時風熱上攻兩目紅腫用芎蘇散加荆芥防風蟬脫痘已盡出而目淚不止痘不起脹者肝熱也宜補脾滋腎以培其根令肝木自旺不然則木絶而火無生氣不能起脹而死矣朝服補中益氣湯暮服六味地黄丸以滋腎痘已出齊因血熱毒盛而上攻於目以致兩目赤腫痘色乾紅二便閉塞睡卧不寧用犀角地黄湯加連翹牛蒡荆芥眼胞腫者必傷於飲食脾經熱毒食積發熱而然也露白七日前露睛者毒尚未解痘少者可勿藥若痘宻而露睛者宜重温補得目閉者生不閉者母氣離子氣敗必不能灌漿而死起脹灌漿時兩眼不合而光爍者死兩目閉而露睛或如魚眼猫眼者不治目無魂失意智不省人事者不治露神眼乃神光神者心之主毒氣入心亦傷神故神為毒廹而離本位現為眼光異於常時者名曰露神一時精彩倍常身體神氣卓然有餘此燈欲滅而復明之象也須臾即死落日棲霞雙目倒停不轉動或轉掣如電光閃爍或忽紅忽白經云落日棲霞人不識等閒停閃難推測忽紅忽白如電光驟然死去誰留得此症多於將靨及痂時見之葢初時失解火毒復入内傷五臟至落痂時二十四朝忽然而死痘後目症目病多屬風熱血少痘藴熱毒自裡達外苟氣血弱而不能逐毒則火内藴而熱極生風血脉遂行斯入眼矣故痘瘡入眼不在於初多在於收靨不齊之時或還元之後其時滿面痘瘡破爛重復腫灌者膿血膠固毒蒸入眼或同痘瘡倒陷復起多致入目以其歸毒于肝腎也或痘出多成就遲醫用辛藥發之令痘入目或靨期喜啖辛熱謂之乾漿内外火煽亦令入目或失于清解或逼於火氣或衣被過煖或客冐風寒或恣食鵝鴨雞蛋皆能令氣滯血凝毒存生障為眼之患葢其翳膜遮睛有似痘瘡而實非也此毒氣留於氣血之分耳有靨時翳起眼白捱至黒珠漸至瞳神者有痘後三五日而紅腫疼痛者在白睛者久當自去惟黒珠上或掩瞳神者當調治收功于數十劑之後勿驟用寒凉藥峻攻其裡而疎利其下又勿輕用㸃洗令鬱火不收後復腫作瞳神或突凹或損破則難治大抵痛者易治不痛者難治早用竹葉湯調㵼青丸加砂糖連進二服微利即愈又用洗肝散宻䝉花散通聖散兔糞丸外用吹耳丹灸大杼穴一壯或水磨象牙汁㸃眼或水磨新橄欖核汁或水磨雌雄二檳榔汁以津潤開眼縫鴨羽拖㸃眼痘後眼閉雖暗中亦不開者防目中有瘡用望月砂散痘後目胞髙腫而不流淚乃脾經濕熱非翳也用蒼术浸潤炒乾黄連加防風升麻生甘艸為末蜜水調服痘後頭忽腫兩目不開乃風熱非痘毒也用袪風湯加竹葉若肝經風熱先用柴胡麥冬湯次用四物湯加山梔或犀角地黄湯加柴胡或消毒化斑湯風毒腫痛生翳用蟬脱散腫痛眼流眵淚昬暗羞明用秦皮散痘後眼胞紅腫不開靨後復灌難收乃血熱毒壅不解也用犀角解毒湯腫脹不開外突如桃用雞蛋清調黄連末塗兩太陽穴及兩足心外用䕶眼膏痘後目赤腫痛疤痒紫色身體煩躁毒鬱心肝二經火盛尅金金不能平木木勝則火亦炎上而冲于目矣用犀角地黄湯加連翹牛蒡草决明龍胆草痘後心熱盛而生肝風上攻眼痛紅絲繞睛大便堅閉用凉肝丸或洗肝散加黄芩黄連芒硝下之或柴胡梔子散㵼黄散後用柴胡麥冬散秦皮散昬暗用柴胡梔子散加石决明石膏羌活谷精草菉豆皮甘菊金銀花翳膜用本方倍加石决明谷精艸白蒺藜蟬退為末羊肝湯調服或𤓰蔞散威靈仙散青翳用谷精草散蟬脱散赤翳用地黄散倍加谷精草赤脉侵睛用羚羊角散木火相摶用四物湯加山梔丹皮繼用加味逍遥散虚翳用滋隂地黄九益氣湯痛極用浮萍散肝腎熱毒治冝活血解毒活血不至太熱解毒不至太冷五臟平和則目翳自去用蟬脱散四物湯加柴胡痘後目閉羞明淚出暗處能開此肝虚帶火邪也冝涼肝養血用洗肝明目散加宻蒙蟬蜕黄芩或涼肝明目散㵼青丸猪蟬散肝虚熱用羊肝丸只羞明不紅赤者腎水不足血少神勞也冝壯水主以鎮陽用益隂地黄丸肝腎俱虚用羚虎丸脾虚右闗脉弱者朝用益氣湯夕用五味異攻散痘後眼胞紅腫不開口舌生瘡咽喉疼痛曽服過辛熱藥者須用清解黄連解毒湯犀角地黄湯因食毒物致目睛突出者湏宜解利用二仙方患半年一年餘者用蟬脫散曽服過通利藥者量脾補胃若向有疳積肝腎因而患目者用九味蘆薈丸六味地黄丸翳漸退用柴胡麥冬散凡兒乳食者當令母服清解藥用柴胡梔子散加味逍遥散痘後未滿二十一日而餘毒患眼者用消毒化斑湯二十一日後而患眼者用柿乾通聖散羚羊角散痘後血熱病目脾胃壯實者用原闕痘後毒太盛眼熱或服攻藥太過眼珠突出者亟用上好西牛黄半分清水調塗眼珠上外貼薄竹紙又以甘草甘遂煎水用毫筆緩緩塗竹紙上即得平愈痘後目痛生白翳而不見物色者用繆仲淳方痘瘡攻目壞眼用蛇殻一條洗净焙燥加蟬脫蛤粉花粉等分為末入羊肝内每用藥二錢加谷精同煮食痘眼葡萄花第一服用蟬脱黄連甘菊連翹各一錢宻䝉八分草决明七分荆芥胆草白蒺藜谷精草各六分蔓荆子木賊川芎甘草各三分燈心葱白煎服第二服用蟬脱黄連川芎生白芍木賊荆芥甘菊生甘草車前子宻䝉花白蒺藜防風胆草燈心煎服治案一兒痘後黒睛初起細白㸃大便順而日晡潮熱有用雞肝花粉威靈仙煮食其瞳神即髙腫突出白睛紅腫余用㵼青丸及羽皇散五六劑而愈一兒白睛生翳漸掩黒睛連用袪風去翳涼血清熱等藥不効即用㵼青丸及羽皇散間服而愈蟬脫𣪚治原闕蟬脫宻蒙花兔糞黒豆殻等分為末毎用四錢以羊肝割開入藥肝内泔水煮肝熟同藥食洗肝明目散方治原闕川芎當歸羌活防風山梔柴胡木賊龍胆草宻䝉花等分為末每用一錢荆芥湯下䕶眼方胭脂取汁蒸熟㸃入眼中候痘出齊乃止又方蜜調濟寧油胭脂塗眼眶三四次永不傷目又方菉豆粉一兩紅花甘草各二兩胭脂二兩水五碗煎至二碗去渣再煎成膏子塗眼眶四圍又方蜜調牛蒡子末塗䪿門又方白芥子末敷貼足心引熱歸下又蟬脫散治風腫翳膜餘熱攻目蟬脫丹皮黄連白术蒼术甘草甘菊絲𤓰子各一兩龍胆草五錢共為末毎服一錢用荆芥湯調下㵼青丸方治原闕防風羌活川芎當歸山梔大黄龍胆草蜜丸薄荷湯送下保赤洗肝散治腫痛紅絲繞睛川芎當歸羌活防風山查薄荷痛加石膏谷精草菉豆皮翳膜加蟬脫白蒺藜熱痛便閉加黄芩黄連大黄秘要洗肝散白芍川芎當歸石膏蟬退龍胆草金銀花石决明谷精草茯苓木賊甘菊菉豆皮金鏡洗肝散治痘後羞明翳淚赤腫羚羊角黄茋黄芩大黄升麻防風朴硝草决明車前子洗肝明目散治原闕川芎當歸羌活防風山梔柴胡又加木賊胆草宻䝉花等分毎服一錢荆芥湯送下宻䝉花散宻蒙花二兩五錢青葙子决明車前各五錢共為末毎服四錢用羊肝一兩批開摻藥肝内濕紙包褁煨熟食之乾柿通聖散白菊花菉豆皮谷精草一兩為末乾柿不拘幾隻用粟泔水同煮至乾將柿再烘燥為末與藥和匀每服一錢用金銀花湯調下一方用宻䝉花旋覆花神翳蛤粉散蛤粉谷精草等分為末六七錢雄猪肝片以前藥二錢摻入肝内米泔水一盞煮肝熟細嚼吃之即用原汁送下或磨石燕末檳榔末同服尤妙疳眼加夜明砂兔糞丸兔糞四兩石决明草决明木賊白芍防風谷精各一兩當歸五錢蜜丸用荆芥湯送下又方兔屎四兩甘菊二兩白蒺藜甘草蟬退各一兩蜜丸羊肝丸羊肝一具當歸川芎夏枯草各一兩甘菊柏子仁各七錢蜜九吹耳丹輕粉黄丹一錢加麝香冰片雄黄各三分為末左吹右右吹左内服石燕檳榔望月砂散䝉花谷精蟬蛻各五錢望月砂一兩猪肝一個每服一錢摻肝内扎好米泔水煮食原闕方治痘後頭腫目閉風熱之症羌活防風升麻柴胡川芎當歸藁本蔓荆子細辛甘菊黄芩消毒化斑湯升麻柴胡桔梗甘草牛蒡連翹防風胆草羌活蟬脫宻蒙花淡竹葉又方治痘未滿二十一日而患目羌活升麻麻黄防風藁本黄芩生地蒼术川芎柴胡各五分細辛白术陳皮甘草蘓木葛根各二分黄連黄柏當歸連翹各五分吳茱茰紅花各一分秦皮散治眼流眵淚昏暗羞明秦皮滑石黄連等分煎服原闕方治痘後眼胞紅腫復灌難收血熱之症當歸赤芍連翹防風牛蒡荆芥甘草黄連花粉生地涼肝丸防風二兩人參赤茯苓黄芩元参大黄知母益母草各一兩蜜丸菉豆湯下柴胡梔子散當歸生地丹皮各一兩山梔黄連各七錢柴胡黄芩各五錢川芎六錢升麻三錢共為末毎服三錢𤓰蔞散决明赤芍甘草各一兩花粉五錢為末蜜調服威靈仙散赤芍赤茯苓青葙子黄芩大青大黄仙靈脾威靈仙等分入羊肝内米泔水煮熟食之谷精草散谷精草蟬退各一錢兔屎蛤粉各