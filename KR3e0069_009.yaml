body:
  text: 仁端録卷九明徐謙撰陳葵刪定痘疹雜症論痘蓄毒而雜症俱發是痘症為本而雜症為標然雜症無常期而痘症有定候痘之本症向緣失治而作不可徒治雜症故心鑑曰治雜症一寸則痘症落後一丈但雜症不去則痘亦反為所害六日以前毒發未盡有雜症者常也六日以後毒當盡出雜症當除而不除者為逆須急治之故痘症重而雜症輕者則雜症之藥加入痘症藥內是緩則治其本也痘症輕而雜症重者則先逐雜症後調痘症是急則治其標也能精察痘中自現之症治痘易易矣面色門痘以心血為主心熱煩躁驚悸面赤皆心經症見也故面赤為順若見青色是肝木尅制脾土也色不與病相應所以為逆壯實者必至生風虛弱者必至下痢厥逆面色青黃唇口淡白乃脾疳也慎勿因痘枯焦用寒涼太過以致泄㵼蓋痘以脾胃為主脾胃一傷則毒氣下陷虛火上熾必至發喘發渴面赤如塗朱者凶此邪氣拂鬱於陽明也陽明經上循於面熱盛故赤也冝清解而稍兼利面垢而慘黯者凶此邪熱拂鬱於少陽也冝表裡俱解之蓋少陽從中治也熱甚便閉飲冷面赤者用犀角解毒湯灌漿時發熱煩躁作渴面赤者用當歸補血湯痘毒鬱遏風寒內摶凝滯肌膚遍身青色者用透肌散鼻封眼合門心肝脾肺腎應耳目口舌鼻鼻乃肺竅肺主氣痘賴氣以拓充鼻封則氣外束而不泄眼乃肝竅肝藏血痘賴血以滋養眼合則血內榮而不滯如是則毒為制化矣若痘順而稀則隂陽相輔鼻不封而氣自充眼不合而血自榮若痘逆而密則隂陽不和鼻不封則氣不充眼不合則血不榮故犯於血分者必有焦皮鐡葉之色犯於氣分者必有􅀈蛈蓬房之形三日而封合者易充易靨六日而封合者難足難痂封而不合則隂不滋陽合而不封則陽欠衛隂封者十之三四合者十之七八十三日是眼開之期若過期而不開必熱毒未盡解也當防其壞目若封而有涕合而有淚者生全之兆若鼻封而竅外乾黑眼合而眶上如煤者必死頭痛門痘中雜症只有頭疼為輕發熱時風邪入於諸陽之會故令頭疼用清徹湯有因氣血俱虛而痛者用補中益氣湯發熱惡寒咳嗽而疼者用參蘇飲熱氣上攻痰壅頭疼者用二陳湯加山梔荆芥黃芩薄荷石膏目疾門眼關五臟痘發時五臟之火皆動故兩目朦朧神倦不開者痘也目中汪汪若水者疹也諸瘡皆屬心火故其候見於目目赤者心熱甚也目連札者肝有風也目直視者肝有熱也因而搖動者肝風與心火相摶也痘疹發搐此其常候但㵼心肝二火搐止者吉不止者凶未出之初即與清肝必無目疾痘前目疾此時眼中無痘常淚出多眵者肝熱盛也早服㵼肝火之藥以解之發熱時果係痘症即防痘瘡入眼用護眼法用蟬脫散或洗肝明目散加蟬脫痘瘡入眼用鱔血或象牙磨水抹之或生地附子搗爛貼足心即愈風腫翳膜餘熱攻目用蟬脫散痘中目症發熱及見點時風熱上攻兩目紅腫用芎蘇散加荆芥防風蟬脫痘已盡出而目淚不止痘不起脹者肝熱也宜補脾滋腎以培其根令肝木自旺不然則木絶而火無生氣不能起脹而死矣朝服補中益氣湯暮服六味地黃丸以滋腎痘已出齊因血熱毒盛而上攻於目以致兩目赤腫痘色乾紅二便閉塞睡卧不寧用犀角地黃湯加連翹牛蒡荆芥眼胞腫者必傷於飲食脾經熱毒食積發熱而然也露白七日前露睛者毒尚未解痘少者可勿藥若痘密而露睛者宜重溫補得目閉者生不閉者母氣離子氣敗必不能灌漿而死起脹灌漿時兩眼不合而光爍者死兩目閉而露睛或如魚眼貓眼者不治目無魂失意智不省人事者不治露神眼乃神光神者心之主毒氣入心亦傷神故神為毒迫而離本位現為眼光異於常時者名曰露神一時精彩倍常身體神氣卓然有餘此燈欲滅而復明之象也須臾即死落日棲霞雙目倒停不轉動或轉掣如電光閃爍或忽紅忽白經云落日棲霞人不識等間停閃難推測忽紅忽白如電光驟然死去誰留得此症多於將靨及痂時見之蓋初時失解火毒復入內傷五臟至落痂時二十四朝忽然而死痘後目症目病多屬風熱血少痘藴熱毒自裡達外苟氣血弱而不能逐毒則火內藴而熱極生風血脈遂行斯入眼矣故痘瘡入眼不在於初多在於收靨不齊之時或還元之後其時滿面痘瘡破爛重復腫灌者膿血膠固毒蒸入眼或同痘瘡倒陷復起多致入目以其歸毒于肝腎也或痘出多成就遲醫用辛藥發之令痘入目或靨期喜啖辛熱謂之乾漿內外火煽亦令入目或失于清解或逼於火氣或衣被過暖或客冒風寒或恣食鵝鴨雞蛋皆能令氣滯血凝毒存生障為眼之患蓋其翳膜遮睛有似痘瘡而實非也此毒氣留於氣血之分耳有靨時翳起眼白捱至黑珠漸至瞳神者有痘後三五日而紅腫疼痛者在白睛者久當自去惟黑珠上或掩瞳神者當調治收功于數十劑之後勿驟用寒涼藥峻攻其裡而疏利其下又勿輕用點洗令鬱火不收後復腫作瞳神或突凹或損破則難治大抵痛者易治不痛者難治早用竹葉湯調㵼青丸加砂糖連進二服微利即愈又用洗肝散密蒙花散通聖散兔糞丸外用吹耳丹灸大杼穴一壯或水磨象牙汁點眼或水磨新橄欖核汁或水磨雌雄二檳榔汁以津潤開眼縫鴨羽拖點眼痘後眼閉雖暗中亦不開者防目中有瘡用望月砂散痘後目胞髙腫而不流淚乃脾經濕熱非翳也用蒼术浸潤炒乾黃連加防風升麻生甘草為末蜜水調服痘後頭忽腫兩目不開乃風熱非痘毒也用袪風湯加竹葉若肝經風熱先用柴胡麥冬湯次用四物湯加山梔或犀角地黃湯加柴胡或消毒化斑湯風毒腫痛生翳用蟬脫散腫痛眼流眵淚昏暗羞明用秦皮散痘後眼胞紅腫不開靨後復灌難收乃血熱毒壅不解也用犀角解毒湯腫脹不開外突如桃用雞蛋清調黃連末塗兩太陽穴及兩足心外用護眼膏痘後目赤腫痛疤癢紫色身體煩躁毒鬱心肝二經火盛尅金金不能平木木勝則火亦炎上而沖于目矣用犀角地黃湯加連翹牛蒡草決明龍膽草痘後心熱盛而生肝風上攻眼痛紅絲繞睛大便堅閉用涼肝丸或洗肝散加黃芩黃連芒硝下之或柴胡梔子散㵼黃散後用柴胡麥冬散秦皮散昏暗用柴胡梔子散加石決明石膏羌活谷精草菉豆皮甘菊金銀花翳膜用本方倍加石決明谷精草白蒺藜蟬退為末羊肝湯調服或瓜蔞散威靈仙散青翳用谷精草散蟬脫散赤翳用地黃散倍加谷精草赤脈侵睛用羚羊角散木火相摶用四物湯加山梔丹皮繼用加味逍遙散虛翳用滋隂地黃九益氣湯痛極用浮萍散肝腎熱毒治冝活血解毒活血不至太熱解毒不至太冷五臟平和則目翳自去用蟬脫散四物湯加柴胡痘後目閉羞明淚出暗處能開此肝虛帶火邪也冝涼肝養血用洗肝明目散加密蒙蟬蛻黃芩或涼肝明目散㵼青丸豬蟬散肝虛熱用羊肝丸只羞明不紅赤者腎水不足血少神勞也冝壯水主以鎮陽用益隂地黃丸肝腎俱虛用羚虎丸脾虛右關脈弱者朝用益氣湯夕用五味異攻散痘後眼胞紅腫不開口舌生瘡咽喉疼痛曽服過辛熱藥者須用清解黃連解毒湯犀角地黃湯因食毒物致目睛突出者須宜解利用二仙方患半年一年餘者用蟬脫散曽服過通利藥者量脾補胃若向有疳積肝腎因而患目者用九味蘆薈丸六味地黃丸翳漸退用柴胡麥冬散凡兒乳食者當令母服清解藥用柴胡梔子散加味逍遙散痘後未滿二十一日而餘毒患眼者用消毒化斑湯二十一日後而患眼者用柿乾通聖散羚羊角散痘後血熱病目脾胃壯實者用原闕痘後毒太盛眼熱或服攻藥太過眼珠突出者亟用上好西牛黃半分清水調塗眼珠上外貼薄竹紙又以甘草甘遂煎水用毫筆緩緩塗竹紙上即得平愈痘後目痛生白翳而不見物色者用繆仲淳方痘瘡攻目壞眼用蛇殼一條洗淨焙燥加蟬脫蛤粉花粉等分為末入羊肝內每用藥二錢加谷精同煮食痘眼葡萄花第一服用蟬脫黃連甘菊連翹各一錢密蒙八分草決明七分荆芥膽草白蒺藜谷精草各六分蔓荆子木賊川芎甘草各三分燈心蔥白煎服第二服用蟬脫黃連川芎生白芍木賊荆芥甘菊生甘草車前子密蒙花白蒺藜防風膽草燈心煎服治案一兒痘後黑睛初起細白點大便順而日晡潮熱有用雞肝花粉威靈仙煮食其瞳神即髙腫突出白睛紅腫余用㵼青丸及羽皇散五六劑而愈一兒白睛生翳漸掩黑睛連用袪風去翳涼血清熱等藥不效即用㵼青丸及羽皇散間服而愈蟬脫𣪚治原闕蟬脫密蒙花兔糞黑豆殼等分為末每用四錢以羊肝割開入藥肝內泔水煮肝熟同藥食洗肝明目散方治原闕川芎當歸羌活防風山梔柴胡木賊龍膽草密蒙花等分為末每用一錢荆芥湯下護眼方胭脂取汁蒸熟點入眼中候痘出齊乃止又方蜜調濟寧油胭脂塗眼眶三四次永不傷目又方菉豆粉一兩紅花甘草各二兩胭脂二兩水五碗煎至二碗去渣再煎成膏子塗眼眶四圍又方蜜調牛蒡子末塗囟門又方白芥子末敷貼足心引熱歸下又蟬脫散治風腫翳膜餘熱攻目蟬脫丹皮黃連白术蒼术甘草甘菊絲瓜子各一兩龍膽草五錢共為末每服一錢用荆芥湯調下㵼青丸方治原闕防風羌活川芎當歸山梔大黃龍膽草蜜丸薄荷湯送下保赤洗肝散治腫痛紅絲繞睛川芎當歸羌活防風山查薄荷痛加石膏谷精草菉豆皮翳膜加蟬脫白蒺藜熱痛便閉加黃芩黃連大黃祕要洗肝散白芍川芎當歸石膏蟬退龍膽草金銀花石決明谷精草茯苓木賊甘菊菉豆皮金鏡洗肝散治痘後羞明翳淚赤腫羚羊角黃茋黃芩大黃升麻防風朴硝草決明車前子洗肝明目散治原闕川芎當歸羌活防風山梔柴胡又加木賊膽草密蒙花等分每服一錢荆芥湯送下密蒙花散密蒙花二兩五錢青葙子決明車前各五錢共為末每服四錢用羊肝一兩批開摻藥肝內濕紙包褁煨熟食之乾柿通聖散白菊花菉豆皮谷精草一兩為末乾柿不拘幾隻用粟泔水同煮至乾將柿再烘燥為末與藥和勻每服一錢用金銀花湯調下一方用密蒙花旋覆花神翳蛤粉散蛤粉谷精草等分為末六七錢雄豬肝片以前藥二錢摻入肝內米泔水一盞煮肝熟細嚼吃之即用原汁送下或磨石燕末檳榔末同服尤妙疳眼加夜明砂兔糞丸兔糞四兩石決明草決明木賊白芍防風谷精各一兩當歸五錢蜜丸用荆芥湯送下又方兔屎四兩甘菊二兩白蒺藜甘草蟬退各一兩蜜丸羊肝丸羊肝一具當歸川芎夏枯草各一兩甘菊柏子仁各七錢蜜九吹耳丹輕粉黃丹一錢加麝香冰片雄黃各三分為末左吹右右吹左內服石燕檳榔望月砂散蒙花谷精蟬蛻各五錢望月砂一兩豬肝一個每服一錢摻肝內扎好米泔水煮食原闕方治痘後頭腫目閉風熱之症羌活防風升麻柴胡川芎當歸藁本蔓荆子細辛甘菊黃芩消毒化斑湯升麻柴胡桔梗甘草牛蒡連翹防風膽草羌活蟬脫密蒙花淡竹葉又方治痘未滿二十一日而患目羌活升麻麻黃防風藁本黃芩生地蒼术川芎柴胡各五分細辛白术陳皮甘草蘇木葛根各二分黃連黃柏當歸連翹各五分吳茱茰紅花各一分秦皮散治眼流眵淚昏暗羞明秦皮滑石黃連等分煎服原闕方治痘後眼胞紅腫復灌難收血熱之症當歸赤芍連翹防風牛蒡荆芥甘草黃連花粉生地涼肝丸防風二兩人參赤茯苓黃芩元參大黃知母益母草各一兩蜜丸菉豆湯下柴胡梔子散當歸生地丹皮各一兩山梔黃連各七錢柴胡黃芩各五錢川芎六錢升麻三錢共為末每服三錢瓜蔞散決明赤芍甘草各一兩花粉五錢為末蜜調服威靈仙散赤芍赤茯苓青葙子黃芩大青大黃仙靈脾威靈仙等分入羊肝內米泔水煮熟食之谷精草散谷精草蟬退各一錢兔屎蛤粉各