痰而咳𠻳者以参蘓湯主之口疳危症痘痂時唇乾齒燥或唇不葢齒熱甚不解即防口疳不早治必變走馬牙疳而死用大連翹飲或敗毒涼血散加元參唇腫面虚昬睡不食穿齦潰齒牙脫失聲鼻崩喉傷皆死症也口舌生瘡宜辨痘色若紅紫湧盛者熱毒也用清上飲淡白者虚火也用參麥清補湯並塗赴筵散口疳治法先要清散次要涼解後要收歛用涼藥不効當以辛熱反治牙齦生瘡出血曰牙宣呼吸氣息惡臭曰息露口臭肉爛牙落曰走馬疳以倐忽潰爛速如走馬凡幼兒落牙與老人腎虚落牙易治中年走馬牙疳難治以心腎胃三經毒盛不解也一云熱在少陽陽明痘前用白虎湯加黄芩黄連犀角元參内實者加大黄痘後内服甘露飲或四物湯加黄芩黄連犀角石膏或黄連解毒湯加雄黄丸竹葉湯下之外用敷藥如綿繭散加人中白滑石珍珠冰片或蟬退散加胆礬二分火煆棗肉二枚火煅五棓子人中白蟬退各一錢俱用火煅外用茶葉老韮淨過敷之灌期十朝外體倦煩悶身熱口臭此胃中藴熱也不早治則成口疳諸不治之症故初起即冝用牛蒡白木黄連茯苓桔梗連翹薄荷煎濃徐徐服之痘後口舌上下牙齦潰爛者皆餘毒不解乗胃薫廹上焦而然也急用清胃化毒湯或解毒犀角丸外敷人中白散或吹口丹赴筵散桑條枝抹之毒攻牙根潰爛者殺人甚速先用韮根茶葉煎濃汁以鵝翎刷去腐肉洗出鮮血敷搽牙散牙疳方一日三次凡爛至喉者用蘆管吹之色如乾醬其肉臭爛一日爛一分兩日爛一寸口鼻流涎面浮唇腫鼻梁發紅㸃者不治若有黄白膿水者或可救内服防風荆芥散以解其五臟之毒外敷鴉片馬疳散口疳皆胃熱也輕者滿口白糜紅㸃用金不換吹之重者牙齦黒爛内服甘露飲外吹棗靈丹舌胎白者為白口瘡熱在心肺也用川椒山梔黄柏牛蒡生地木通黄芩便秘加大黄或洗心散外敷硃礬散舌胎赤者為赤口瘡熱在心脾也用犀角黄連山梔連翹蒼术甘草木通主治或洗心散外敷隂陽散痘後口中糜爛生瘡膀胱移熱于小腸隔腸不使上為糜也用大承氣湯利之或柴胡地骨皮煎服痘後滿口生瘡唇口破裂面赤如粧用涼解之藥其病反劇六脉浮數者乃隂虚火盛水極似火外有假熱内實真寒是太陽表本之症因中氣不足虚火泛炎無制也用反治之法理中湯木香散加附子冷服外敷棗靈丹近義散唇口生瘡在上唇者蟲食其臟曰狐在下唇者蟲食其肝曰惑此熱毒藴内蟲無所食故食肝臟而症見于唇也好睡聲啞黙黙不食上下不定失治必致唇燥齒崩失音而死用黄連除蟲丸或化蟲丸外敷牛黄散大便閉者用桃仁承氣湯加槐子利之痘後口疳朝夕用黄連細茶薄荷煎湯頻潄後用吹藥唇口治案一痘稠宻未起發而唇先黄熟目先虚閉咽喉腫痛不能飲食遍身痘俱平塌幸正額匀朗眼眶口唇雖腫而痘色紅活以甘桔湯加牛蒡連翹山查荆芥陳皮人中黄清利咽喉而解脾毒一痘四朝稠宻未起脹而口唇先黄熟乃内潰之惡候必為唇剥幸餘痘光澤脚軟脾雖受毒根本猶固以補中益氣湯去白术加牛蒡連翹山查繼以保元理中湯而愈一痘稠如綴粟平塌嬌紅血散不附唇口腫硬剥落一層又一層皮薄空漿破如血汁溏㵼煩渇皆為逆候但能食安靜有胃氣也用人參白术黄連各二錢甘草一錢日進三服十四朝厥脉沈靜如死狀痘俱到靨心胸尚温收日漸甦而愈口疳治案一兒血熱痘後身發熱口臭或疳潰脫上齦門牙左腮盤牙唇紅乾裂左顴亦紅腫如發毒狀潮州沈三春用抑揚方在痘毒門加葱汁酒漿調敷腫處若面腫帶青紫色為實熱必成走馬疳今雖腫而紅始知其另發􅏴也内服犀角羚羊黄連黄芩生地桔梗牛蒡甘草白芍花粉木通紫花地丁牛黄或煎金銀花一兩入廣膠一錢間搗甘菊花根葉汁沖入相間服面腫漸平身熱漸退外吹牛黄一分珍珠三分青黛四分硼砂猪胆袋黄柏人中白各四分不易歛加烏梅灰血竭各二分龍骨一分因體虚又加人參象皮灰三黄製蘆干石各四分又常以釅醋調雄黄末軟筆㸃入潰竅中始能收歛加味犀角地黄湯治壯熱口疳犀角牛蒡荆芥甘草防風升麻桔梗麥冬生地黄連解毒湯黄芩黄連黄柏山梔涼膈散連翹薄荷黄柏山梔甘草大黄朴硝咳𠻳加淡竹葉桔梗玉鎻匙硼砂一錢朴硝五分殭蠶一條冰片一分清上飲薄荷防風甘草葛根牛蒡連翹桔梗黄連黄芩麥冬花粉清補湯白芍川芎當歸人參麥冬花粉生茋牛蒡連翹桔梗甘草紅花生地山查加酒芍炙甘草赴筵散薄荷黄栢青黛等分為末甘露飲治牙齦腫腐口臭出血喉舌生瘡天冬麥冬生地熟地黄芩元參枳殻石斛茵陳枇杷葉化毒湯天麻當歸黄連丹皮生地赤芍連翹花粉解毒丸犀角赤石丹皮生地甘草防風歸尾連翹黄連人中白散黄連枯礬各二錢冰片人中白各一錢黄栢七錢蠶退紙灰一錢五分五棓子灰七錢火煆紅棗一枚胆礬四錢搽牙散銅緑雄黄五棓子枯礬白褐布灰烏梅灰細辛胡黄連牙疳方人中白枯礬各二錢銅緑五穀蟲各五分麝香二分鹽梅五個火煆白褐布灰一錢茶葉韮根湯洗過敷之鴉片馬疳散鴉片梅花冰片牛黄各一錢熊胆二分血竭乳香孩兒茶沒藥雄黄輕粉各五分棗靈丹小青蝦蟇百枚生礬三錢南棗五枚銅緑三分射香少許共搗匀鹽泥封固火煅存性研碎敷之近義散河南棗二枚每棗入白砒一釐火煅烟盡存性鉛三分水銀五分共炒成粉枯礬黄柏末各五分研細為末洗心散木通當歸大黄黄連麻黄甘草生地薄荷桔梗連翹牛蒡燈心煎服一方有白术白芍荆芥硃礬散硃砂三錢白礬一錢隂陽散黄連乾薑末各二錢先用蠐螬蟲搗水洗浄敷之除蟲丸黄連蘆薈乾蟾火煆各一錢史君子二錢五分川蓮肉七個夜明砂二分烏梅肉共搗為丸飯湯送下化蟲丸黄連一錢川椒末二錢苦楝根白皮烏梅肉七個共搗為丸艾湯下牛黄散牛黄一分雄黄輕粉枯礬川椒乳香沒藥冰片龍骨貝母五棓子白芷白芨苦參赤石脂各一錢共為末苦參浸油調搽犀角黄連湯犀角黄連各一錢烏梅一枚木香二分吹藥方人中白三錢薄荷二分冰片一分紅白丹敷藥不効爛成深潭者用砒末少許以雞子清調之刷在猪血紅紙上晒乾燒灰加雄黄硃砂各一錢為末吹入口中隨吐出涎水不令吐下馬牙疳乆不收歛方升麻葛根連翹牛蒡苦參丹皮蜂房荆芥黄芩金銀花木通敷藥方絲𤓰灰青黛人中白各一分兒茶硼砂蟬脫灰各五分胆礬三分輕粉八分又方五棓子灰乾姜灰紅毡片灰青黛硼砂訶子兒茶射干冰片黄柏末又方三黄製蘆干石珍珠各一錢人中白二錢又方醋煅蘆付石青黛各一錢冰片少許又方人中白五谷蟲各一錢赤石脂海螵蛸各七分乳香兒茶沒藥硃砂枯礬珍珠各五分五棓子血竭各三分牛黄冰片麝香各二分珍珠散珍珠冰片硼砂人中白元明粉槐皮灰等分為末吹入貼足心方兒燈檠草根加射香少許搗匀加雞子清男左女右貼湧泉穴油紙葢扎好一週時換内潰門内潰者胃爛也因風寒阻遏腠理隂陽不和其毒内攻潰而成膿口舌皆白是其兆也極為慘傷識者當于未出之前見有風寒阻遏氣粗熱甚身必戰動肚腹急痛𦂳防此症逐散寒邪閉洩腠理縱毒使出自無内潰用敗毒散或升麻葛根湯仁端錄卷九
