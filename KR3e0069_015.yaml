body:
  text: 仁端録卷十五明徐謙撰陳葵刪定疥癬門痘痂雖落失于調理毒滯不散風邪不清拂鬱既久漸生疥癩須分虛實施治先陽明而後太隂以㵼火涼血袪風拔毒為主用連翹散升麻葛根湯解毒防風湯苦參丸外用摩風膏敷之先有疥瘡痘後虛處而發則氣血為瘡所發至六七朝瘡盤先黑不能起灌連服內托散庶免坐陷之患若手足項頸胸背要害之處不黑或瘡顆發白水泡者肺氣雖散猶或可救痘發諸毒瘡新愈之處者陽毒重也若痘不乾紅雖重不死用三朝期內氣虛血癢自作者用蘇葉荆芥湯浴之內服芍藥地黃黃茋白术防風牛蒡蟬蛻殭蠶梅瘡破爛倍用牛黃土茯苓若痛極略加乳香平常藥味一毫勿用撏搯成瘡者用百花膏塗之絲瓜葉為末摻之痘疤紫突身熱煩渴便祕者餘邪盛也用四順清涼飲犀角解毒湯疤白凹陷瘡潰不收潮熱便溏者脾虛也用四君子湯加黃茋防風川芎苡仁黃連外敷綿繭散二便清調者餘毒在裡也治宜解托用黃茋防風當歸芍藥連翹金銀花瘡久羸瘦潮熱煩渴者氣血虛津液枯也用十全大補湯補中益氣湯風寒在表者宜解散之衣被過暖炙􅏼發瘡者宜清解之過用清涼毒為寒抑隱現者宜發其汗使瘡再發然後調理用百解散遍身膿水淋漓者用加味解毒飲外敷茅屋末益元散當歸膏治案一痘遍身膿瘡久而肌瘦潮熱此毒已外泄宜固正氣為主用補中益氣湯加苡仁芍藥茯苓防風金銀花石斛外用水銀膏一女十七嵗痘後膿疥逢時即發用苦參當歸芍藥川芎防風荆芥白芷枸杞連翹蔓荆薄荷蒺藜瓜蔞丹參胡麻首烏黃米為丸服之而愈一順痘十二朝成膿疥身熱煩躁此毒壅失解也用當歸金銀花芍藥連翹防風牛蒡白芷苡仁而愈若失于解散多有損其肢目者一痘正面勻朗綻哭少神四肢平塌色黯漿雖滿而難收功因手足膿疥腫痛泄氣故也用保元湯加黃茋芍藥當歸牛蒡白术陳皮防風肉桂而愈此症若單補而不保脾決不收功一痘出膿疥後疤痕黑大有似痘疔而頭面分明初即疏解涼血七八日後根窠紅黑不清又用涼解十一二日根顆淡紅用生血溫補之味一痘後手掐搔癢遂發風血瘡用苦參山梔連翹防風獨活苡仁黃芩蠟丸服并灸三里風池二穴各五七壯而愈一痘勻朗不易胖大淡白少神煩躁不寧因頭上素患肥瘡太盛耗泄元氣故也先用白芨膏紙封頭瘡後用保元湯而愈一痘後遍身生肥瘡忽自愈而喘脹搐搦此同倒靨論先用升發瘡再作後用犀角解毒湯加人參而愈此症亦有用百解散發為丹腫者連翹散防風荆芥連翹當歸生地羌活牛蒡薄荷蔓荆子苦參丸黃連苦參黃芩大黃甘菊梔子防風枳實元參獨活蜜丸摩風膏無荑苦參川椒硫黃輕粉巴豆松香黃占麻油煎成調塗擦之金花散黃柏東丹黃連黃芩大黃輕粉麝香腌豬油調塗蓮花散蓮花白芷川芎當歸荆芥牛蒡紫草木通甘草生地水煎治痘風瘡方楊樹頭二十四個搗入雞子青桐油調塗百草膏羊糞煆清油調搽頭項發核門三陽之脈自頭而上三隂之脈自頸而還項者隂陽之道路咽喉之管束也痘發頸項須疏若密則名鎖項其道路上不降下不升內不出外不入經曰出入廢則神機化滅升降止則氣立孤危玉髓云患痘時有核發于頭項不拘定處或發于末痘之先或與痘並發名曰訶核蓋痘毒也因風寒閉塞腠理內虛不能送毒而出火炎上而為陽毒慎勿先治其毒治毒之藥寒涼能氷毒使住外毒雖平內痘不出三四日死矣故陽谷用木香散加氣血藥并解其毒痘大發綻而毒亦自退次用人參黃茋當歸芍藥川芎麥冬白术連翹半夏腹皮桔梗木香生薑生地大棗連進四劑痘色紅活蒼蠟重出贈痘毒散喉不痛癢而全愈雖當夏月亦以非丁香不能攻裡驅血非大補氣血如四物湯加黃芪白术白芷桔梗之類不能托發痘瘡非清涼如減去官桂半夏訶子前胡腹皮加入連翹黃芩射乾之類不能治咽喉痛也治案一痘十朝外左邊上齦潰爛外頰紅腫外用抑揚散同蔥汁酒漿搗敷每日一換不用紙封內服紫花地丁連翹牛蒡山茨菰花粉白芍生地丹皮甘草元參桔梗貝母黃連黃芩川芎當歸先以金銀花一兩煎汁服頰腫口疳漸平月餘忽發夜熱左腮下生一核大如李色白按之而疼外用硼砂一錢五分膽礬五分麝香半分燒酒薄薄調勻新筆蘸塗上內服黃芩元參羌活前胡連翹牛蒡貝母龍草甘草白芍山梔先以夏枯草一兩煎汁服連進四五劑而愈一耳後赤腫結核寒熱頭疼體痛此感冒不正之氣所結乃時毒也用十神解毒湯治之而愈發泡門發泡肺熱也肺主氣合于皮毛熱毒在肺傳至皮毛故津液沸起而為泡白而空者氣虛也白而清水者氣實也紅紫血泡者血熱也氣之過盛也必噎氣之振作如風之撓物無所不入七日及于膈則呵欠噎嚏其氣漸泄痘即不能起發圓暈七日後若入于腹則如雷鳴便氣不泄尤難成漿此由氣盛而血不足故發為水泡乃若氣虛空泡因脾胃虛弱不能制水亦能發泡土虛水漬之義也當補脾順虛利水而泡自實用補中益氣湯加川芎芍藥茯苓車前木通或保元湯加白芍白泡有水者乃氣實也用清肺飲或升麻湯加生地黃芩氣實血熱發紅紫泡者乃毒在肝經火熾若釜中之沸湯發泡也用清肺飲加當歸生地熱甚加黃芩黃連氣虛略有水者用四君子湯合清肺飲有血多而不能化漿成泡者宜峻補其血用參歸鹿茸湯膿窠與水泡相半者蓋肺主氣為囊胞主血為膿小兒痘多氣血有限故如是不足為異十分之中一二分有膿者猶有生意渾身皆泡此危症也但胃氣好而能食者亦可醫治然毒氣未散防發􅏴毒若光明磊落形如銀杏殼者內雖潰而可斂紫黑血泡前後連絡此毒盛外溢肺氣絶也不治灌膿將收時有大泡無分紅白有痘多而相并此似是而非不必慮有向來生瘡或破傷未痊新結痕迹一旦發痘四圍叢集作泡宜細辨之此症又易作癢勿令抓破變為蝕瘡多致不治宜先以針刺破其泡吮去惡血後用胭脂塗法合百花膏敷之癢則用茵陳熏法初起于手足見一二粒比衆痘更覺顆大色白按之甚軟刺破乃一包清水是泡母也若失治則水泡泛溢難制初起治之無不見效用至寶飲加萆薢減去川芎桔梗腎火盛而成水泡因曽用過升提之藥提起腎火故成水泡也用知母黃柏痘功將半而發水泡用救破爛法治之加桂皮腹皮泡至腦背者不治若標時失于解毒降火至此又不可用桂皮腹皮矣所以痘初以解毒降火為大關要也泡破掀殼宜重用補劑泡殼之下必膿厚痂厚者方吉初起細密糊塗後成大泡清水虛漿此衛氣不斂之逆痘不久皮脫肉乾而死灌膿時發白泡如彈子大者宜刺破以滑石末敷之仍服利皮膚間水之藥用保元湯加白术茯苓榴皮前後發水泡是毒盛溢于皮膚之上不治七朝不灌膿而起水泡乃肝虛為肺所凌也當峻補其血用三化湯或參歸鹿茸湯至寶飲桔梗前胡山查當歸連翹川芎木香茯神紅花青皮手足水泡方荆芥防風牛蒡甘草白芍銀花升麻羌活首烏山茨菰在身上加川芎痘疔門氣弱血滯毒聚不化而成疔有之則諸毒沮而為痘害疔有黑白二種黑疔者黑陷焦枯如螺螄靨陷下四圍起水如新炙瘡內有一粒硬核指按不動不疼或黑髙如痣有根者即俗名鵝眼疔也若黑大而軟無根盤者是血熱焦紫之黑痘白疔者色白腳硬是也色白而無根者是泡母不可誤治以致傷泄元氣疔宜速治遲則毒透內膜須用銀針挑斷其根吮去惡血血紅易治血黑難治疔結四肢不近臟腑者雖穿筋骨可治疔結腹背者恐穿臟腑難治疔結關轄難治疔結顯處易治疔結方廣其毒峻宜解下之疔在各部其毒緩但須解毒自初點至收痂皆有疔患宜分虛實位次以治之虛痘發疔若漿清結疤能食便調四肢發疔脾胃尚強者可治用內托解毒散服之使潰出疔根外敷生肌散有漿清結疤食減便溏發疔脾胃既虛毒反勝正十四五日乾陷而死熱毒發疔漿足靨厚壯熱煩渴能食便祕為有餘之毒不盡用四順清涼飲或神功散加雄黃大黃黃芩黃連煎服外以拔毒膏點之立見紅活痘破出黑血諸痘不起此症難治用月仙方活命飲外用隔蒜灸法初點起脹時痘疔黑陷閉塞毒出之路而煩躁喘渴者以針挑破吮出惡血用胭脂納入四聖膏或四聖快斑散或涼血解毒湯加紅花木通茜根仍以保元湯調理若二便祕結用宣風快斑湯解之收靨後有數塊水出按指不動不痛或陷下有水或疔潰成坑內見筋骨者此餘毒在心心經失解故也用人參敗毒散加連翹銀花上加升麻白芷手加桂枝腰加杜仲足加牛膝木瓜外用珍珠膏四聖膏趙氏敷藥方臭加阿魏為末摻之力壯用硼砂一二釐入四聖膏腐去其根用象皮散敷萬應膏貼可收功內治法內治須服調氣養血之藥用無比散加豬尾血三五滴調下服後下惡血如爛魚腸葡萄穗者吉如紫黑惡血者凶外治法將藥填疔孔中以滿為度其毒自散痘仍灌漿用四聖膏或二聖散或飛過雄黃同蟾酥拌勻為丸挑疔點入力壯者用巴豆一粒硃砂一分研爛點入一時突出隨以生肌散敷之長肉膏貼之收功肺疔先灰後黑多見于腮頰中庭嘴角手足腰腹腎疔色黑多見于地閣後頸耳窖腎俞腰脊陽物豢虎疔生于耳竅以吸其髓必煩躁詀語腦痛垂頭叫掣亟以鵝管石女貞子薄荷研末吹入再以馬蘭根寸斷塞耳門亡汲疔生于眼沿以爍其血必睛赤腫脹臉赤詀煩瞋啼號怒治如鼻疔法外挑破處用瓦松搗爛罨之捲簾疔腫于舌根以耗其元必煩渴詀狂怒啼手足掣舞臉赤舌捲喉鎖難食用銀鈎挑破出惡血苦茶潄淨敷龍宫丹燕窩疔匿于腋下以耗其氣必手垂刺痛腋下腫脹眼碧渴飲吐沫詀煩挑去其根出盡惡血用珍珠油胭脂塗之又服消毒飲伏磯疔駐于陽物馬口以熬其血痛極叫呼小便腫閉不通煩躁眼直豎倐時焦黑則危亟用銀硃氷片蟾酥牛黃麝香為末將黃連濃煎候冷調藥蘸納竅中外以油菜子搓捋其皮內服木通敗毒散虺毒疔結于尾閭以殘督脈必大便祕腹脹嘔吐惡渴胸如墜石火珠疔填于鼻孔以錮其梟必熱渴眼冷煩燥眼赤痰并氣難出入痘紫鈎破用黃連膏氷片調點眼角服㵼金散蝦毒疔盤于膝間灣處以爍其隂必眼赤筋束痘色焦紫宜亟用匣石疔生于手縫指陽明受毒治宜拔毒延至傳脾難救注命疔生于足心以戕其腎必腮黑瞳神碧色手掣筋抽直透過足膝盤處鈎去其根盡毒血用田螺吐水調氷片點之次以慎火紫菉豆浸爛去其皮搗罨患處內服化毒丹透腸疔簇于肛門以傷其胃必極痛腹脹腸鳴大便祕結煩躁不思飲食宜挑破之用金銀花防風煎湯次以輕粉氷片珍珠白斂蘸塗蜂螫疔纒于足指縫此五氣已離也必抽筋骨硬疼痛難行兩太陽臉痘如椒皮惡渴煩躁治案一痘漿清四肢發疔數處能食便調因脾胃實強以內托解毒散治之潰出疔根又用生肌散而愈一痘漿清便㵼減食發疔二十餘處因脾胃虛弱正不勝邪毒反內攻解不致十四日死一痘漿足發疔數處壯熱煩渴便祕能食此餘毒未盡也以四順清涼飲治之而愈內托解毒散人參黃茋當歸甘草白芍白芷連翹金銀花川芎牛蒡上部倍川芎下部加牛膝木瓜苡仁獨活足加防風未潰加穿山甲生肌散象皮白占龍骨煆血蝎白石脂乳香沒藥末藥氷片地鱉蟲赤石脂輕粉為末滲之神功散益母草花紫草茸蜂房過山龍白芍青黛滑石甘草水煎調下治胎膏末二三分立見紅活灸法大蒜一片小艾炷灸五壯換蒜再灸炙後挑破出血四聖膏治唇口咽喉疔毒口牙疳珍珠七粒頭髮二分氷片半分豌豆灰四十九粒共為末一方有血竭硃砂雄黃涼血解毒湯歸尾生地地丁花紫草蟬退畨白草人參敗毒散人參赤茯苓羌活獨治前胡柴胡薄荷枳殼川芎桔梗甘草牛蒡加荆芥防風即荆防敗毒散趙氏敷藥方赤石脂官粉黃柏血竭伏龍肝飛丹髮灰蜜陀僧乳香沒藥氷片無比散膩粉硃砂氷片麝香牛黃一方有蟾酥長肉膏防風荆芥白芷生地當歸香油一斤煎加黃占白占松香煎成入沒藥赤石脂蜜陀僧血竭龍宫丹氷片硼砂青黛薄荷荆芥殭蠶黃連為末吹入牛蒡甘草木通茯苓生地紅花荆芥連翹燈心水煎解毒湯歸尾生地紫花地丁番白丁蟬脫救焚散地蜈蚣草晒乾楝樹根扁蓄益母草大血結草尖刀草一名地青紫草茸紫花地丁乾水煎服奇功散紫草茸製胎骨服同神功散法􅏴疽諸毒門凡痘初失解發中失補托終失消散或過于溫補致餘毒藴留陽明肌肉間骨節內幸正氣不虧內不容邪故得發出肌表輕則􅏴瘡重則痘毒總是餘毒血熱所致須分隂陽虛實痘期前後部位經絡治之不治之毒有十二處百會印堂咽喉耳後手心足心背脊心窩兩肋六脈隂臟按膿用針法輕按便痛者膿淺也針不可深重按方痛者膿深也針不可淺按之不起者膿未成也針不可早按之隨指即起者膿已成也針不可遲後以紙撚條蘸香油納入針口外貼膏藥使膿流盡初起治法治宜發散用和解升麻湯未成膿治法用犀角地黃湯毒多治法要用罨法留一二處出膿弗貼膏藥服參茋內托散移毒法毒發關節致命處將罨毒藥作膏敷上移下敷左移右徐氏治法初起活剝蝦蟇皮加氷片麝香少許貼毒上即時拔出毒氣七日前發􅏴宜任之七日後發疔不可峻攻用牛蒡荆芥當歸助氣逐毒當自解也紅腫掀痛色赤熱渴脈數有力此毒盛而正氣足乃陽毒也用活命飲清涼解毒湯能食便祕者下之用四順清涼飲外敷抑揚散發熱者用犀角消毒飲便祕而發熱者用清熱消毒飲發渴用麥冬散堅硬微痛或不痛肉色如故痘根白色不潰不斂食少便溏此脾胃氣虛乃發毒也散其寒氣則陽自斂矣用托裡回陽散外敷玉龍膏若其勢欲潰者用鐵篐散圍方欲元氣虛寒不能消散潰爛或潰而腫不消口不斂者必須溫補隂毒膿雖已成但皮肉腫厚不甚紅色如牛皮橘皮不即潰者須量淺深破去其膿貼膏藥引出膿血則無內攻膿腐傷筋之患用反陽湯貼闢隂膏隂毒用寒涼則氣血滯而毒益深好肉反死如內脹涼藥敗毒之劑胃寒不能運行淤血寒不能消散死肉寒不能潰腐新肉寒不能生化矣未發痘未發熱之先而發毒此名元陽毒宜活血解肌發表令其自散俟痘脹而毒自消如用敷貼之藥則痘發必重反致傷命用人參芎歸湯當歸活血湯和解升麻湯痘起發灌漿而發毒者宜活血解毒托裡大發其痘使其自愈用參茋托毒飲亦不用敷藥兒若痘多力不勝毒涼血溫補俱不可用多致不治若痘色紅潤不犯火症者須乘六七朝時六經傳遍周而復始之候亟用托毒法托出毒一二處即保全矣連進醍醐飲二三貼方效若見標太重者用當歸桔梗白术川芎熟地桂枝水酒同煎但不宜多用若非六七朝之期并犯火症者托亦不效用身毒發初時熱甚須內外夾攻急消散之若成膿則不堪矣內服大連翹飲外塗三豆漿毒遊走不定亟內托之遲則攻心必死經云自隂成陽必生成陽復隂必死氣血凝滯于關節則毒必發于曲池委中而不散用十三味敗毒散手足腕腿掀赤強不能舉動用活命飲外用黃豆末調敷腿膝流注腫痛者脾虛也先用活命飲後用補中益氣湯六味地黃丸腿膝腫痛膿水不止內熱晡熱體倦肌瘦此元氣復傷也用補隂八珍湯六味地黃丸久服自愈掀腫而軟者發于肌肉也肉色不變者發于骨也根赤而作癢者血虛也用四物湯加丹皮根赤而作痛者血熱也用四物湯加金銀花連翹色白而作癢者氣虛也用四君子湯加芍藥當歸色白而作痛者氣熱也用四君子湯加金銀花連翹黃芩色白而不掀痛者氣血俱虛也用托裡散毒頭紅腫者宜涼血卵色白者宜溫補痘多紅活發毒則生根顆灰白毒多難治未成膿而腫痛者用荆芥敗毒飲或仙方活命飲活血解毒湯解毒內托散敗毒散排毒散氣虛食少者用十宣散流氣飲毒淺小者用小柴胡湯加生地黃湯又加神功散不成膿不作腐者用八珍湯已成膿者用消毒飲加黃芩連翹當歸芍藥上引用升麻下引用牛膝或托裡會膿散加人參連翹川芎當歸已潰而膿厚不痛者用十全大補湯加金銀花連翹膿清反痛熱渴倦怠者此氣血虛甚也用十全大補湯膿盡而不斂者脾氣虛也用六君子湯膿不乾而煩悶者用黃茋六一湯痘後􅏴疽手足相發內服五香歸茋散外用尉洗法肝虛則毒入目肺虛則毒成疥腎虛則毒發骨節脾虛則毒壅肌膚毒流入脾則發于足腕膕用消毒飲解毒內托散必勝膏毒流入肺則發于手腕臑必氣粗喘急胸突或發口唇用如聖散五福化毒丹解毒內托散雄黃解毒丸十奇湯毒流大腸則便垢膿血用駐車丸阿膠丸毒流三陽經則為瘰癧結核必腮頰疼痛頭痛用宣風散荆防敗毒散外用抑揚散同蔥頭酒漿搗敷落痂時預覘發毒繞唇靨起上下兩分然後遍靨盡者無餘毒如靨有間斷或花靨或痘顆邊有一線紅暈者此毒未盡也雖輕頭上亦必發小毒用參茋內托散痘毒流注痘後元氣不足不能逐毒歸并一處故致流散漫腫結塊多是餘毒血熱所成當别類而治煩渴壯熱左尺脈浮而無力此火熾血燥也用六味地黃丸眼合不開身腫不消壯熱不清此毒在諸經也盜汗發熱口渴此毒在心也睡中驚悸多怒此毒在肝也耳尻尚熱此毒在腎也毒不赤腫不痛成膿不潰皆元氣虛也當先補而後針之不使毒氣內攻氣血脫陷用人參托裡散不赤腫而清水奔流用十全大補湯腫硬未成膿者浸生豆搗塗膏汁或雞子清調塗膿厚而元氣不脫者用元參赤芍人參官桂連翹花粉甘草節角刺山甲膿出而內熱晡熱者血氣虧也用八珍湯加金銀花凡諸毒只宜留一二處出膿以泄其毒餘當圍退用玉龍膏毒法凡藥以固元氣涼血解毒為主用十宣托裡散分上下用藥一日不可緩上引用赤芍甘草節連翹桔梗升麻下引用葛根檳榔牛膝助以貝母白芷金銀花瓜蔞根發寒熱用知母黃芩黃柏便祕用大黃治案一痘漿足為尸穢氣觸倒靨焦黑四肢腫痛幸其能食便調正不容邪發一􅏴疽用內托解毒之味而愈一兒七朝順痘有行漿之勢兩臂腫大如瓜幸能食便調此少陽經虛毒滯而不散也補其陽則腫自愈用人參茯苓肉桂當歸芍藥白芷羌活防風人中黃治之漿足腫消而愈一痘症同前漿雖滿痂腫處成膿竟損一目一痘症同前兩臂腫痛用解藥而不充毒不退反寒戰危篤此治其標而失于補托也以保元湯加丁香肉桂白术橘紅治之漿足而痂厚解托成膿而愈一痘漿雖滿而四肢清水痂薄如麩二十日而肩臂腫痛有謂餘毒而用飬血解血毒毒不退而反倦怠此隂虛而毒滯不化也大補氣血解毒使氣血調暢毒一處出膿則化矣用四君子湯加陳皮芍藥當歸白芷羌活連翹金銀花調理而愈此症若專用解毒則傷脾胃若嘔㵼厥逆耗散元氣者用附子理中湯加肉果木香肢熱腫痛者用四君子湯加金銀花黃茋白芷若專解毒不固元氣只以圍藥塗敷腫雖退而毒內藴非損手足則腸脹喘急而死一痘密而內強過補而生􅏴煩燥口渴先以三黃丸利之再用清解之味腫消而愈一兒發􅏴于小腿下年餘尚潰腐不能收口此至隂之下無陽氣充托膿血氣寒虛弱也宜補助元氣用千金內托散加牛膝檳榔首烏土茯苓潰出嫩骨收口而愈蓋毒久不散凝結成骨與地四生金之義同斷一痘毒流注四五個于臂肩之上痂薄少神粘著不脫此氣虛不足也用十宣托裡散外用針刺破用吸筒吸膿以玉龍膏圍之而愈一痘毒出清水六脈微弱衛氣虛寒用保元湯加肉桂附子白术而愈一痘大腿腫痛此蓄毒鬱于肉分丹腫也用當歸地黃丹皮連翹白芷木瓜大黃清涼解毒湯當歸生地丹皮連翹木通桔梗牛蒡四順清涼飲赤芍獨活白芷菖蒲紫荆皮清熱消毒飲黃連梔子連翹歸尾川芎白芍生地金銀花甘草托裡回陽散陳皮升麻柴胡白术人參附子黃茋甘草當歸肉桂玉龍膏草烏南星良薑白芷赤芍肉桂蔥酒調塗鐵篐散圍方廣膠大黃南星半夏白斂黃丹乳香沒藥好醋半碗化膠為丸臨用醋化圍之又方鳯凰退燒灰調塗又方白芨白斂貝母菉豆粉黃柏芙蓉葉好醋調塗圍反陽湯紫花地丁晒乾八兩酒三斤煮至斤半隨量與服酒醉為度闢隂膏鐵鏽輕粉麝香白松香麻油煎膏和解升麻湯羌活防風人參芍藥甘草川芎當歸活血湯當歸赤芍紫草川芎紅花木香血竭參芪托毒散人參黃茋白术罨毒方橘葉搗自然汁白酒藥等分搗成膏罨毒上醍醐飲退术生地桂枝防風殭蠶白芍落花生熟地消毒飲荆芥牛蒡生薑一方有金銀花雄黃解毒內托散荆芥防風當歸黃茋赤芍木通連翹甘草節金銀花必勝膏又名拔毒膏馬齒莧汁豬油蜜共煎膏一方有菉豆赤小豆又方蔥白搗如泥加蜜貼之誤食之則殺人又方貝母赤石脂白石脂白芨白斂龍骨豬脊髓共搗為膏雄黃解毒丸雄黃鬱金巴豆十奇方人參黃茋川芎當歸防風白芷厚朴桔梗甘草官桂駐車丸當歸川連阿膠乾薑阿膠丸阿膠茯苓川連托裡散人參陳皮川芎白芍熟地茯苓黃茋當歸甘草荆芥敗毒飲升麻乾葛前胡紫蘇川芎羌活防風荆芥薄荷桔梗枳殼牛蒡蟬退山查甘草地骨皮排毒散大黃歸尾白芷沉香木香炒黑穿山甲共為末流氣飲人參黃茋當歸桔梗厚朴白芷甘草防風川芎桂心小柴胡湯人參柴胡黃芩生地半夏甘草方乾絲瓜連皮子燒灰研末糖調服敷毒方蜒蛔搗敷又方磁器末松香脂油調塗又方嫩松香同蜜搗敷又方南星五棓子大黃硝醋調敷托裡會膿散川芎芍藥紅花桃仁防風白芷乳香沒藥大黃祕葉散水龍骨白斂蚯蚓泥白芨芙蓉葉皂角山茨菰蔥頭生薑萆麻乳香沒藥黃豆末黑豆末菉豆末共搗溫湯燉熱塗圍中留一孔五香歸茋散沉香木香丁香藝香藿香桂枝蟬退當歸黃茋炙甘草連翹防風升麻白芍甜瓜蒂水煎􅀈洗法乾荷葉甜瓜蒂芫荽子濃煎洗之十宣托裡散人參黃茋當歸白芍茯苓白术白芷連翹甘草角刺金銀花元海痘毒膏蜈蚣三條蛇殼一條川山甲五片銅青飛丹各一兩元參丹皮各五錢煉白松香六兩菜油半斤煎膏一方加磁器王臨川方陳年藝香紙捲蘸油燒滴下如漆者加磁碗砂少許調塗許玉華方廣膠一兩頓化煉松香豬板油煎膏褚少泉方五棓子入銀硃在內封煆龜板尖煆面粉升松香醋莧汁製黃占白占麻油一斤煎膏太乙膏元參白芷當歸肉桂赤芍大黃生地紫草女髮灰荆芥防風桑枝槐枝桃枝栁枝麻油黃丹松香乳香沒藥鉛粉黃占白占煎膏破棺丸大黃二兩半生半熟朴硝甘草各一兩六錢蜜丸沖酒服提毒散桑寄生生薑人參玄參白术續斷鳯凰散治不收口暈死鵝煆鳯凰花氷片黃丹輕粉枯礬為末摻之平肺散桑皮杏仁半夏蘇梗荆芥廣皮茯苓青皮人參地骨皮知母五味子甘草生薑煎服參茋湯人參白术蒼术陳皮當歸神曲甘草炙五味子黃茋炙黃柏升麻加味解毒散金銀花黃連連翹漏蘆梔子白芷當歸防風甘草倪心宇內清痘毒方黑黃牛屎尖煆血餘灰大黃黑糖為丸每服一丸白湯化下獨活湯羌活獨活荆芥防風牛膝紫草煎服一提金乳香沒藥牙皂人涎麝香琥珀硃砂雄黃蟬蛻殭蠶蜈蚣炙每服半分至二分酒下施季泉餘毒方人參犀角茯苓金銀花甘草羚羊角珍珠蜜丸日進二服托裡挑肌散黃茋當歸白芷槐角防已角刺牛蒡花粉甘草節蟬退苡仁羌活獨活連翹生地元參殭蠶木瓜金銀花加菉豆二百粒生薑一片水煎傅心生肌散象皮白占龍骨血竭地鱉蟲白石脂煆乳香沒藥氷片輕粉赤石脂共為末摻之陳敬山收口摻藥方鉛粉每鉛一兩鎔水銀五錢冷研成粉松香陳醋煮乾三錢白龍骨煆五分白螺螄煆五分輕粉一錢研製氷片二分滑石一錢研勻摻之又方蘆甘石便煅焠研末摻之蠲毒散人參黃茋當歸白术白芍羌活連翹元參麻仁金銀花花粉手加桂枝足加牛膝煎服內潰痘毒方楊樹菌不大不小者用蜜乳酒共浸焙乾為末或酒或湯送下可消可潰可收圍藥方黃柏大黃紫花地丁白芙蓉葉共為末醋調又方烏欍樹根皮白芨白斂芙蓉葉赤小豆金線重樓草五棓子野葡萄根醋調文蛤散南星大黃朴硝五棓子醋調烏龍膏芙蓉葉五棓子皮硝陳小粉炒黑乳香沒藥射香雞子青調圍朱少泉方初起用蟾酥氷片射香酒調塗頂上已成者用醋製松香馬齒莧龜板尖灰雞子青調又方白豆菉豆白芨白斂膽星鬱金牡蠣灰馬屁勃煆共為末蔥汁蜜水調圍板黃門黃者脾土之正色若氣得以衛血得以榮自然飽滿黃活倘隂陽既離梟毒猖熾根窠薄劣房囊痿痍則漿板膩灰滯乾蠟而不明以手抵之凝結板定此臟腑痿而隂陽絶也須分部位先用歸身黃茋煎酒次入蟬蛻殭蠶為末調服或澄泉散自然融活方廣天庭板黃若餘部皆潤活則腦發􅏴腮臉板黃若餘部潤美則肩阜發􅏴肚腹板黃若餘部潤活則曲池發􅏴背脊三里板黃若餘部潤美則兩軸發􅏴板黃死症尻骨遍身兩肋陽毬眼眶唇舌頸項前後附痘疸方艾葉薰之桑葉薄荷湯浴之自去血遊門元氣虛弱毒火逼血散漫于肌膚而為血遊非丹非斑不能附痘成漿矣標點血遊乃火盛也痘必不起不漿用鎮隂丹漿期血遊乃虛極也痘必不膿不靨用返陽丹靨期血遊乃毒血散漫也治宜解毒鎮隂丹蘆根黃芩山梔連翹元參生地荆芥歸身乾薑山查返陽丹人參黃茋當歸生地陳皮屋遊仁端録卷十五
