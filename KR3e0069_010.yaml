body:
  text: 仁端録卷十明徐謙撰陳葵刪定咽喉門咽者胃之管主納而不出司飲食喉者肺之管主出而不納司呼吸心包絡三焦之脈並絡於喉此為君相二火專主痘疹其火上蒸咽喉最為先受故初標必察咽喉之痛否以發散解利之令毒出不留於咽喉要地苟不清解其毒必致腫塞飲食阻而呼吸礙喉中氣汩汩如水聲喪無日矣首尾俱用解毒湯外吹玉鎖匙胃火薰蒸侵喉而痛但看唇瘡上下密而腫者其喉必腫痛蓋脾胃相表裡故也用射干鼠粘子湯肺火津竭不能滋其化源尖上作痛者用四物湯加麥冬五味子人參連翹元參黃芩木通咽喉有瘡痛燥破傷流涎者急用退火以防靨期嗆水吐食失聲之變用甘桔湯加麥冬牛蒡元參杏仁荆芥或調小無比散解之或如聖散加薄荷枳殼腫大者點玉鎖匙一聖散咽乾便閉用四順飲身不熱而喉痛者毒氣鬱故也用甘桔湯大成散以開之喉症須審能食而臟腑有熱者方可用前方解利如上焦雖熱却見小便清大便溏飲食不進者當以清上溫下藥調之只用甘桔湯牛蒡亦量用發熱咽痛發熱初標咽喉微痛者冝清解用甘桔湯加牛蒡發熱不退晝夜煩躁口舌生瘡唇裂咽痛者此熱毒內薰其勢急也用甘桔湯合黃連解毒湯同服報點起脹咽痛初起心胃有熱毒上沖咽喉乾澀而痛者冝預解之若失解發而為瘡腫脹潰爛無及矣宜清咽膈解肺毒甘桔湯合黃連解毒湯加牛蒡水漿不入者用射干鼠粘湯加桔梗荆芥山豆根消毒飲抱龍丸牛黃八寶丹龍硼散紫雪方最妙養漿咽痛七八日痘皮堅厚明潤而喉痛者不妨色淡無力者宜清解而兼助發毒用保元湯加元參山豆根成漿而猶喉痛者毒火上蒸也用甘桔湯加童便製人參煎成調下小無比散身不熱而喉痛者毒氣鬱結也用甘結湯痘後咽痛九日後當參以四苓散靨後咽痛不食者凶用甘桔湯加防風元參牛蒡升麻射干黃芩治案一兒患血熱痘先用寒涼藥起發灌漿頭面胸背皆濃但兩腿凹面陷不起用黃芩黃茋托之反熱渴煩躁大便溏泄咽喉腫痛改用清咽利膈方而愈解毒湯山豆根麥冬各一錢元參桔梗牛蒡各七錢防風甘草各五分生薑一片水煎分三四次服射干鼠粘湯生地白芍元參牛蒡射干山豆根龍硼散硼砂青黛山豆根冰片各五分紫雪方先以水五碗黃金器煮三碗去金入寒水石犀角石膏羚羊角元參丁香甘草升麻再煎至一碗去渣入好芒硝同煮用栁枝攪不住手候凝入磁盒內又以硃砂麝香亟攪和勻貯磁瓶勿走氣每服一錢溫水化下參定清咽散殭蠶火硝元明粉人中黃薄荷瓜蔞皮青黛山豆根橄欖磨汁紙上晒乾各五分氷片一分肺虛久不聲加訶子末五分痘未收去訶子痘收後加訶子雄黃辰砂各三分火邪未清勿輕用訶子五味子反令作喘傳心録涼膈散豬荷草旱蓮草水萍雪裡青山豆根各取汁同服又方粉草車前羌活人中白每服三錢至六錢滚湯送下稀涎散治胃熱咽閉山豆根熊膽細茶薄荷為末先用薄荷潄口然後吹之膽礬散兼治喉癬喉風雄鵝膽三個青魚膽五個枯礬收乾刺毛窠一兩火煅黃柏末百草霜各五分共研末吹之清咽利膈方山豆根麥冬貝母桔梗元參防風殭蠶穿山甲當歸白芍山查紅花生地陳皮蚯蚓牛蒡黃連黃芩甘草嗆逆門喉中氣食二管氣管即喉嚨又名會掩細容一線在喉之前食管即咽嗌也甚寬在喉之後飲食入喉先以會掩其氣管水穀方從食管入胃今喉舌有痘則必脹硬飲食致入氣管而嗆逆也然飲水多嗆者因水柔弱易誤入氣管也穀食不嗆者因有渣滓自直下賁門即胃上脘不能傷侵氣道也水嗆須治其痘則嗆自止故開口就嗆連嗆一聲而遂止先進飲食而後嗆氣悠言清者皆無害也兼嗽兼喘兼吐七日以前音啞水嗆者並為逆候七日以後痘潤無妨故要看痘色如紅紫而嗆者熱重壅塞而上沖也灰白不起而嗆者氣血虛弱肺胃受傷也見痘之初即冝清肺補腎調脾益肝先哲用桔梗湯解毒湯並加荆芥防風牛蒡麥冬杏仁元參山豆根之類服於將發未發之前所以清氣道不使毒犯咽喉預防之法也未行漿而嗆此毒氣壅盛其喉必痛用利咽解喉湯痘色乾滯而嗆宜再為補發用保元湯加麥冬桔梗不因飲食而嗆此為乾嗆初痘時為肺受火毒冝升解之用至寶飲加沙參笋兜少與柴胡黃芩清之膿痂時乾嗆用無上飲加淡竹葉沙參竹瀝薑汁成漿時痘多者咽痘必早熱肉虛皮薄易破觸之即痛痰涎粘褁飲食難進強咽則痛或雜膿血痂皮痰涎而出此亦肺受火毒津液不足而痰生也聲音清亮者可治用甘桔湯加牛蒡花粉利咽化痰多服自愈食入嗆吐者此咽喉受傷門戶隘塞亦惡候也舌上有瘡破如蜂房舌痛強硬不能下咽水嗆食吐待舌瘡愈自然平安將靨時嗆吐痘色根窠淡紅者用嗆效方加川芎當歸至寶飲起脹前用桔梗前胡山查川芎當歸連翹木香茯神紅花青皮牛蒡木通灌漿後用人參黃茋桔梗貝母川芎當歸山藥養胃化毒湯白术陳皮砂仁黃連茯苓嗆效方杏仁泥沈香汁蜜人乳隔湯頓溫服又方人參桔梗各一錢枇杷葉三片煎成加乳磨沈香汁頓服聲啞門痘已出而聲變者形病也痘未出而聲變者氣病也瘡出而聲不出者形氣俱病也痘家以清利咽喉為第一肺屬金而生氣金空則鳴金實則無聲心火上炎肺熱則脹孔竅閉塞毒無從出舌根陷坑咽門腐壞呼吸俱廢為難治矣須早為清解鄒憑虛曰挫聲者必熱渴鴉聲者必驚悸連綿者多肢體之逼迫哀細者多胸臆之鬱悶斷絶者多熱毒之攻沖浮漂者多汗浥而頭痛沉實者多脾虛而鶩㵼如咬齒者督脈絶如破鑼者肺脈絶如放弦者肝脈絶如墜石者脾脈絶如雨滴者心脈絶啼哭無聲但見淚出口動者腎敗也聲啞如破如鯁者喉爛也初點隱隱又無感冒而舌燥唇裂聲啞及四五日黑陷而聲啞者皆不治初熱聲遂變此重症也用清肺飲甘桔湯加牛蒡荆芥元參養漿收靨失聲此最危之症若能言而聲濁不清者用甘桔清金散或用㵼白化毒湯甚則用𨗳赤散甘桔湯加牛蒡花粉麥冬杏仁元參石膏訶子或清肺湯仍用噙化藥㵼白散加花粉石膏桔梗黃芩茯苓陳皮山梔麥冬聲音低小難出此心血虛耗心氣消乏雖有聲而不發揚也用導赤散加人參麥冬葛根杏仁訶子喉內無瘡因食熱藥而聲啞用甘桔化毒湯或射干化毒湯加連翹黃芩當歸犀角元參感冒風寒而聲不清用參蘇飲加桑皮杏仁石膏咳嗽欲啞用防風甘桔湯咽痛不能言用花粉散心熱腎虛不能言用四物湯加麥冬茯苓能言而聲不清用㵼白散加桔梗石膏茯苓麥冬知母花粉有痰用花粉貝母絲瓜子痘色灰白虛陷失音此危症也宜用參麥清補湯兼千金內托散清肺飲麥冬三錢麻黃一錢五分知母花粉荆芥各一錢訶子石菖蒲各八分桔梗二錢甘桔清金散桔梗一兩牛蒡七錢甘草連翹訶皮各五錢共為末每服一錢薄荷湯送下去訶皮加射干即甘桔化毒湯㵼白化毒湯桔梗甘草花粉石膏青皮清肺湯阿膠一錢五分牛蒡二分杏仁三粒馬兜鈴黃茋各五分粘米一撮炒黃煎服導赤通氣散治心虛聲啞木通生地甘草人參麥冬歸身石菖蒲射干牛蒡湯射干山豆根各一錢二分牛蒡紫草紫苑各一錢桔梗木通石膏各八分升麻蟬蛻各九分甘草五分人參補聲飲人參阿膠牛蒡杏仁麥冬石菖蒲淡竹葉粘米花粉散花粉桔梗茯苓訶子石菖蒲甘草等分淡竹葉七片黃荆一寸聲啞方絲瓜仁木通逺志肉石菖蒲麥冬燈心風邪加柏仁防風杏仁參麥清補湯人參桔梗查肉麥冬黃茋花粉前胡牛蒡甘草芍藥當歸紅花川芎生地千金內托散人參歸身黃茋川芎芍藥官桂甘草查肉木香防風白芷厚朴又千金方治口渴吐痰聲啞荆芥防風麥冬牛蒡茯苓白芍桔梗花粉元參百合山豆根柴胡瓜蔞舌症門舌乃心苗紅潤則吉燥黑芒刺則凶以內熱甚也痘出三日心經主之見黑白黃胎者亟冝疏引痘出四五日肝經主之當退不退根窠紅黑者用犀角黃連木通和之灌漿時用審簧法舌也舌有黃白胎難退者雖成漿必重易退者雖重必輕氣虛毒重津不能上行華池乾涸而舌乾口燥者宜用補益隂虛火熾而舌乾燥者冝壯水主之毒重而乾燥者冝解利舒舌斂舌者脾之熱弄舌者心之熱時時舒舌者脾經微熱也勿用涼藥下藥飲水者脾胃虛津液少耳祕要云脾火盛則舞唇心火盛則弄舌冝急解火毒用至寶飲去川芎當歸陳皮紅花加山梔黃連木通笋根汁蓮心痘初起一二日驚搐悶亂弄舌者毒不得伸也用犀角地黃湯發熱後不拘日數舌忽伸出不收者死十二三日痘將愈時忽寒戰咬牙舌卷縮此風邪領毒入心也用人參當歸黃茋乾薑熟地熟附茯神白芍木香連翹舌上痘稠密如堆粟破如蜂窠者危更加水入則嗆食入則噦聲啞者死痘多而弄舌者凶用藥之法以舌為樞杻故可清可下視舌之焦黑黃白盡之矣可溫可補視舌之紅淡潤滑盡之矣痰涎門祕要云痰之難治難於發痰之初發藥難用必須預防使終不發可也蓋毒氣閉塞不能流通遏而成痰正氣阻隔于中焦為喘為嗽而痰聲如拽鋸若失於隄防至貫漿須補却見痰發用補則痰盛不補則難漿束手待斃矣治痰須審虛實表裡如痘綻實紅活實熱也軟弱淡紅虛寒也鼻塞涕泄宜發散外邪用惺惺散參蘇飲寒則加半夏風則加南星白附皂莢僵蠶凡肺胃實熱氣鬱痰滯涕唾稠粘鼻乾身熱二便祕澀煩渴飲冷宜內外疏散使邪不壅滯用人參清膈散熱則加花粉毒蓄臟腑痰實壯熱胸中煩悶大便祕結冝疏導裡邪調和榮衛使邪自散用前胡枳殼散身溫脈微便利者勿服三日之痰心經有之則逆五日之痰肝經有之亦凶若素有痰者别論痘前治痰冝用青皮桔梗前胡黃芩瓜蔞枳實標時若左右兩顴稠密不分珠而紅者至灌漿時必然發痰兩顴屬肝肺二經金木相剋經云金木無分肺火盛矣故知發痰宜先清臟腑服清肺飲一二劑六日預服牛黃豁痰散則痰必不發七八日臟腑不清必用白芍痘正出時風邪所襲眼目直視牙關緊急者勿用峻藥以薑附湯為主起脹灌膿時有痰不可用二陳湯恐燥陽明之氣血孤陽無隂不能施化也只用白水磨白附子服六朝有痰冝清痰降火用紅爐紫雪方收靨有痰用二陳湯不妨一云用栁牙貝母旋覆花前胡枳殼散前胡枳殼茯苓大黃甘草各五錢清肺飲升麻葛根桔梗前胡青皮山查紅花白芷連翹木通山梔羌活防風金銀花地膚子蓮子青心薑附湯白附子老薑各二錢濃煎服取微汗牛黃豁痰散天竺黃三分川山甲胎骨灰牛黃各一分蟾酥三釐甘草菉豆四十九粒共為末紅爐紫雪方硼砂六分礞石煅滑石水飛硃砂水飛各五分柿霜五錢牛黃冰片各一分共為丸薑湯下開痰神應丹治咽瘡痰湧芫花三錢炒黑為末每服三四釐白湯下八寶丹珠子虎珀牛黃麝香各二分冰片一分硃砂天竹黃龍齒膽星白附薑汁炒全蝎各五分蜜丸金箔為衣薄荷湯磨服發渴門渴者裡熱也蓋三焦乃水穀之道路津液乃水穀之精華流行三焦以制火者也火非虛不發發而不解則津液不能行上以制火火性炎上薰灼心肺水性下行不能上達是以華池為之枯涸故燥渴也亦有痘多津液外注化為膿漿不能內滋臟腑故渴當分虛實治之不可恣與湯飲瓜果致傷胃氣痘初發渴初熱小渴常候也若大渴咽乾唇口焦燥此心火上炎腎水不升毒火妄行血枯液耗也用葛根解毒湯加黃芩黃連以㵼心火加知母黃柏以滋腎水倍加紅花牛蒡得舌潤則生舌有芒刺則死切勿食生冷鬱遏毒火致不得升散也一云心火上炎宜用導赤散或辰砂六一散發熱自利而渴者津液不足也用黃芩湯加麥冬燈心發熱五六日不住痘形隱隱煩渴者用升麻拔毒散發熱起即大渴者熱內盛也宜清金利水用紫苓湯加荆芥葛根紅花牛蒡花粉見標發渴丹溪云初起煩燥狂渴引飲者宜涼以解其標用六一散錢氏云身熱煩渴腹脹而喘大小便澀悶亂大吐者當利小便用導赤散辰砂六一散初時紅黑不潤宜涼血解毒三日外乾紅枯燥宜滋腎水痘已標點熱毒內外蒸發以致脾胃虛燥血枯喜甘味以自救若好飲酒者以無灰酒浸當歸頻與之酒漿亦可惟忌白酒恐發癢也後以托裡散加四物湯痘發諸經火起銷爍肺金以致渴宜抑肺涼血使肺金生水用保元湯加麥冬草連花粉或用六味地黃丸養漿發渴八九日灌漿時身熱發渴此痘多毒盛表裡氣血俱虛也用人參黃茋川芎當歸芍藥甘草麥冬花粉川連痘太多血氣弱津液少咽乾膈焦冝養氣血益津潤燥若食生冷損胃氣而津液不生變將作矣用葛根解毒湯渴而兼㵼用人參麥冬散若不㵼去白术加生地知母大劑作湯代茶虛渴用陳冬米人參煎湯代茶漿足紅活而渴用人參茯苓五味麥冬烏梅痘後發渴痘後不宜渴忽然渴者心胃有邪熱也其人必能食便閉舌乾咽燥用人參白虎湯加黃連食少便調舌咽不燥此虛渴也用人參白术散人參麥冬散加天花粉結痂時而渴津液竭也用保嬰百補湯加生脈散渴甚而㵼亦甚者難治凡渴切勿利小便利之則益其渴渴兼雜症暑月煩渴冝清之用白虎湯胃熱而渴津液耗也始終宜用白虎湯加花粉乾葛有汗加人參小便不利用四苓散並用辰砂六一散毒氣聚胃時多發熱熱淫于內而外不得宣故發渴宜紫草葛根白芍甘草牛蒡紅花生地前胡渴猶不止用紅花子濃煎服此藥最能散胃中淤血故也心火上炎而渴宜導之用辰砂五苓散肺熱而渴治在上焦用人參白虎湯加黃連熱邪入肺氣急咬牙而渴宜調肺氣用四君子湯加麥冬訶子熱壅吐㵼而渴冝升提發散血熱毒盛而渴必狂亂便閉壯熱痘色乾紅焦紫用涼血地黃湯黃連解毒湯便閉用四順清涼飲火痘必大渴引飲當發熱標痘時不妨以火濟火若故禁之即致渴死火毒稍解急進退火之劑如知母黃柏花粉之類漿痂時渴用人參麥冬蘆根知母必大劑濃煎待冷恣與食之則止否亦致渴死須驗外症治之隂虛火動而渴是血虛也隂無驟補故難治用六味地黃丸加五味肉桂虛渴血虛而兼氣弱者用人參當歸麥冬血少不養心驚悸而渴者用四君子湯加當歸紅花麥冬生地逺志身溫而渴津液耗也用四君子湯加木香葛根微熱而渴宜利水用五苓散加人參麥冬白术甘草氣虛而渴冝補氣用保元湯加麥冬五味渴不止而兼㵼用參苓白术散加五味麥冬渴多而液竭用四君子湯加訶子肉果足指皆冷不得至經脾胃陽虛津液不能上升而渴用四君子湯加當歸黃茋官桂腹脹而渴脾胃虛不能運化精微也用四君子湯加腹皮厚朴青皮風邪所觸而渴脾胃虛不能通調水道而潤燥也用四君子湯加葛根麥冬五味不能食而渴脾素弱不為胃行其津液也用參苓白术散氣血俱虛而渴必身熱面㿠當大補之用四君子湯加當歸黃茋芍藥紅花五味或六珍湯自利而渴者毒邪傳腎開閣不司津液下竭不能上潤自救也宜溫之用陳氏異攻散發熱而渴火銷津液也用升麻葛根湯或紅花牛蒡湯燈心炒米湯飲水多而渴愈甚液竭而獨陽盛也用四君子湯加當歸黃茋麥冬五味藿香扁豆花粉渴而寒戰者內外俱虛也風邪所集也治宜實表用四君子湯加防風肉桂當歸黃茋春夏減當歸渴而咬牙者血熱不能榮骨而齒稿也冝補氣㵼腎用四君子湯加川芎當歸芍藥麥冬五味或八味丸倍加地黃赤茯苓虛寒而渴寒戰咬牙泄㵼者用木香散異攻散脾胃虛津液不足而渴有九症腹滿足指冷驚悸身溫身熱面白寒戰咬牙多飲不已宜用木香散如不愈加丁香肉桂然亦有脹悸寒戰咬牙之渴屬熱者宜審之閻忠孝曰小兒驚風泄㵼瘡疹之渴皆津液內耗也不問隂陽並用人參茯苓白术麥冬藿香葛根五味木香治案一痘漿將半足漸蒼老冝靜養之有謂脾主結痂用異攻散加山藥芍藥喘渴身熱此實症而用補劑內外皆熱也治以寬中湯又口齦發疳以清胃解毒湯而愈一痘八朝漿滿身熱而渴咳有痰火盛而津液涸也用白虎湯而愈一痘起脹煩渴不已寒之不寒是無水也宜壯水之主以制陽光用六味地黃丸加麥冬五味多服而愈一人十九歲六朝勻朗綻突淡白少神渴甚不已此虛弱而津液竭也用人參枸杞麥冬煎又以補中益氣湯加枸杞保元湯加麥冬芍藥當歸枸杞九朝漿足渴止服人參一斤而愈一痘起脹乾紅焦紫根窠結實便結煩渴用黃連解毒湯而愈一痘六日起脹不食引飲此胃弱也用調脾內托散治之而愈亦有毒壅不食引飲者不可不辨一痘六日未起脹便結煩渴服保元湯煩渴益甚此毒未盡解而用溫補則毒蘊蓄而不能托漿先用清解而起脹渴止用保元湯收功一痘八日漿半足熱甚引飲者有用保元湯而煩渴益甚豫謂當倍加人參麥冬以止渴一痘九日空殼無漿根血乾紅壯熱口渴用保元湯而渴更甚此腎水枯涸不能勝火宜壯水之主一新婚後躁熱引飲亦宜壯水制火用八味地黃丸加人參麥冬五味又用補中益氣湯渴止熱減一新婚後躁熱而渴飲冷即睡醒復索飲不已時天令大寒此腎水涸不能制火乃孤陽絶隂行漿二七日而卒無隂則陽無以化也一痘七朝潮熱口渴利下臭穢陳積此腸胃熱蒸而下也雖虛而無寒用保元固中之劑而愈若用木香散辛熱之味禍立至矣一漿期壯熱煩渴或疑津液不足以保元湯加麥冬熱渴益甚痘色焦紫此痘本熱而衣被太暖用補反助其熱以黃連解毒湯加牛蒡子清解而愈一痘後熱渴能食便閉咽乾口燥此心胃二經受邪也用白虎湯而愈一痘後口渴食少小便數此食傷胃氣精液不足故也用補中益氣湯加麥冬五味而愈一冬月出痘頂陷紫黑惟用當歸浸酒飲之而痘起一痘黑陷黃色不食性好酒恣與之酒而痘紅綻一痘火毒閉而形若死移棄外庭遇暴雨而蘇此涼水制火也一險痘熱壅索飲不已速與井水數碗渴止痘起人參麥冬散葛粉麥冬白术人參甘草升麻粘米竹葉煎服嘔吐噦噯􅰝逆門火逆而物獨出者為吐聲獨出而短者為乾嘔聲物齊出者總名嘔吐皆火逆上沖也亦有因受寒冒寒而嘔者若夫噦者乃土敗而衝任之火自臍下直犯清道上出於賁門胃口上也微則乾嘔重則聲嘶啞嗄言語不振或咽瘡潰爛最為惡候太素曰弦絶者其聲嘶木陳者其葉落病深者其聲噦短針無取毒藥無攻謂不治也若􅰝逆者乃胃寒冷氣上升也必因風寒生冷所致亦十中之一二耳初熱標點起脹之時熱嘔為多宜疏毒發表降火為主切不可用燥藥加丁香砂仁之類以致血不能潤痘也用至寶飲加薑製黃連輕者不治自愈重則紅黑乾枯宜用山梔竹茹伏龍肝清解之如吐清水黃水膿痰者俱不妨吐臭痰肚疼者凶外感噦吐用二陳湯加藿香柴胡紫蘇白芷枳殼生薑內傷嘔吐用二陳湯加藿香紫蘇砂仁枳實神麯白芷毒沖嘔吐以茱連散主之或辰砂六一散加石膏蘆笋根汁內傷外感兼咳嗽嘔吐者用蘇發散加生薑口渴乾嘔用藿香正氣散加薑製黃連吐而酸苦有聲吐訖反快者火沖也痘必紅紫用梔連二陳湯胃弱嘔吐無聲有物不酸若不食食下即吐困倦面青唇白吐多順快用六君子湯參砂和胃散傷生冷受寒氣而嘔者用二陳理中湯失于早解咽中作痛有瘡吞吐不利飲食哽寒而嘔逆者用加味鼠粘湯養漿時因傷食腹痛而嘔者用平胃散加砂仁藿香煨薑吐而有物用養胃化毒湯傷生冷而嘔痘變灰白者用異攻散加砂仁丁香肉桂七八日因脾胃虛寒而嘔者用賽金散虛嘔用無上飲加人參白术蘆根汁嘔止尤當溫補痘後嘔吐餘熱在胃者多煩渴求乳飲多吐乳如射面赤五心熱喜冷用橘皮竹茹湯加黃連或竹茹五苓散或竹葉石膏湯臉汗引飲者用四苓散加木通麥冬膈有熱痰煩渴便閉者用二陳湯加山梔貝母竹茹花粉薑製黃連生薑傷食而嘔聞氣即吐者用木香大安丸養脾丸保和丸妙應九加麥冬山查薑製黃連枳實神麯惡心乾噦者宜利小便用竹葉石膏湯燈心竹葉湯加瞿麥薑製黃連天花粉之類夏月用五苓散加石膏或竹葉燈心湯面青白手足冷二便自利無痰心腹作痛或渴喜熱飲者用益黃散平胃散加砂仁藿香小茴香胃凝寒痰吐清水者用豬舌湯四君子湯二陳湯調之引飲過多吐清水者名水逆用五苓散虛而乾噦者用和中湯四君子湯加橘紅半夏竹茹兼心腹痛者用丁香理中湯益黃散或四君子湯加藿香木香凡吐症服藥不可于乳食飲湯之後強與之恐其一併吐出須緩緩漸進待藥下行既服盡以指搯兒兩內關穴片時即不吐矣膿期噯氣氣粗煩躁用豬尾膏手足冷口氣寒而虛噯者用木香散異攻散由熱鬱胃中欲出不得出者用半夏生薑湯加陳皮黃芩或四苓散加陳皮竹茹以利之胃寒發􅰝而嘔用炒鹽吳茱茰各一錢丁香五分水煎服治案一兒年十五血熱毒重而無粿粒正額略見分珠而又稠密唇焦口腫舌有黑刺大熱大渴先用羌活湯調催蟄退火丹雖起發而嘔噦特甚用黃芩黃連荆芥防風連翹牛蒡山查蟬退犀角紫草石膏大黃二劑痘乃少潤又加川芎當歸門冬知母桔梗生地紅花元參痘漸滋長嘔噦漸止八九朝復嘔背漸平塌仍用川芎當歸黃芩黃連僵蠶連翹牛蒡羌活陳皮藿香石膏黃土澄水煎服隨以桑蟲漿雞腦各二個入催蟄丹震蟄丹各五分至夜狂躁作渴以陳冬米麥冬煎湯頻飲至天明熟睡而痘起灌矣但大便溏加黃茋白术山查橘紅炮薑人參而愈一痘成漿倒陷而噦不止亟用攻發藥以起其痘于安胃藥中加人參黃茋黑薑陳米白术黃泥澄水煎治之而愈一兒標點噦吐面色枯口唇焦胃氣已脫毒伏不出三日而死一痘六朝勻朗光澤外症順而胃氣損聞食則噦漿雖滿不能收拾而死吐蛔者更重一痘後喘嘔以長水揚百遍煎清上之藥服之而愈一痘後吐蛔因氣血弱無穀氣養蛔故也用二陳湯加生薑芍藥黃連連翹大黃治之而愈一痘後煩渴乳多則吐身熱喜涼此餘毒在胃也以竹葉石膏湯治之而愈一痘後噯腐有用香砂丸尅伐太過變泄㵼而死至寶飲桔梗前胡山查當歸連翹川芎木香茯神紅花青皮茱連散黃連五錢茱萸二錢同炒為末竹茹一團生薑同煎湯調服蘇發散蘇葉陳皮半夏蒼术厚朴甘草茯苓羌活枳殼神麯藿香正氣散藿香紫蘇陳皮腹皮桔梗甘草茯苓半夏厚朴白芷梔連二陳湯山梔黃連俱薑炒各五分茯苓一分半夏四分橘紅炙甘草各三分生薑一片水煎漸漸唧下參砂和胃散人參砂仁白术茯苓半夏藿香陳皮炙甘草煨薑二陳理中湯人參白术陳皮甘草茯苓煨薑二陳一連湯陳皮茯苓生薑半夏黃連竹茹加味鼠粘湯荆芥防風陳皮甘草牛蒡桔梗射干山豆根一方有乾葛連翹無牛蒡甘草控涎散孩兒茶柏末硼砂各五分辰砂雄黃各三分共為末吹入咽中不預治漸變失音嗆水而難救加味平胃散陳皮蒼术厚朴甘草藿香砂仁小茴香煨薑賽金散黃連用生薑汁拌入瓶中悶一晝夜令其發熱過取出即同薑渣炒乾去薑渣以黃連為末服無上飲人參黃茋陳皮桔梗貝母川芎當歸山藥竹葉石膏湯石膏知母麥冬甘草竹葉二陳湯陳皮茯苓甘草半夏頭面腫脹門諸陽之會在頭心之華在面痘為陽故必主之故痘瘡頭面稠密者重頭面預腫者逆頭面痘瘡破爛腫臭者凶有應腫者痘漸起發頭面應期浮腫此毒氣發越聚于三陽之分欲作膿漿此應腫者也至漿足收斂毒化腫消目開者為吉若痘未熟而腫消目開者為凶有不應腫者痘稀毒輕熱微雖作漿而根不占據此不應腫者也有元氣衰弱痘頂凹陷不脹不灌面不腫目不閉者是毒不能發越於陽分也雖勉強灌膿于一時亦難保十二三朝之變用保元湯托裡快斑湯為主四五朝肉腫而痘不起者毒存于脾也十亡八九若腫而痘形髙起飲食如常者可治若痘不見如蛇皮者必凶用木通腹皮湯八九朝正當養漿灌膿時忽腫消皮脫目開乃元氣不足毒內陷而氣外泄也用參茋內托散目早開用木香散復腫閉者吉不腫閉者凶痘未齊而頭面預腫脹者風熱甚也經曰熱勝則腫治宜消解用葛根解毒湯加荆芥防風蟬退白芷或消毒化斑湯外用神應膏護目有兼疫毒致痘未發而面目先浮腫光亮者即大頭瘟也宜急解溫氣消則吉不消則凶七日後變癢塌嗆水錯喉聲啞痰喘者不治或用羌活救苦湯救之有隂虛陽盛虛陽上浮毒氣妄行肉分三四朝痘未起壯面目忽然青腫光亮一有此症則毒不盡發七日後氣退毒陷矣有風寒閉皮膚毒流肌肉痘不易出目胞浮腫光亮壯熱煩躁者經曰毒乘于心則熱熾于外也急用升麻湯加荆芥連翹蟬脫踈解之痘透毒解目自開矣有因氣血虛弱不能拘攝毒氣成漿毒散肉分面腫痘不壯者此危症也宜大補氣血則痘自灌腫自消也用參歸大補湯有頭頂俱腫痘反平塌者難治用麻黃湯加山甲發汗後隨症施治起脹時頭面腫大須細看形色何如若顆粒分明紅活綻突者吉若粘連通串糢糊成片又兼灰白青黃乾燥皮膚黑黯者凶紅活潤澤者用快斑湯合消毒飲或消毒快斑湯以解毒更用甘桔湯加牛蒡以利咽喉寬胸膈外用神應膏護目凡痘瘡腫脹正面忽然破癢則邪氣內傷正氣外泄崩沙之勢漸不可為矣服藥後得破者復灌消者復腫飲食如常二便調和變凶為吉也用十全大補湯合苦參丸治之若灌漿後應消不消者是毒未化盡也猶防餘毒損目解毒為亟不可緩也凡痘與皮肉一般腫而有根窠及半邉面腫形色順者俱無害凡痘灰白面如錫餅能食便調無化症者亦無害木通腹皮湯治四五朝毒伏于裡肉腫而痘不起殭蠶當歸茯苓木通甘草苡仁蟬退腹皮白芍路路通一個虛者加人參消毒化斑湯升麻柴胡桔梗甘草牛蒡連翹防風羌活蟬脫龍膽草密蒙花淡竹葉仁端録卷十
