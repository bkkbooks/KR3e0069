body:
  text: 仁端録卷十一明徐謙撰陳葵刪定腹痛門臓腑有熱毒而適外感風寒内傷生冷痘因而發以致隂陽相拒而為腹痛或作塊作脹與和平勻氣兼發散之藥又當察外症不得妄下傷氣使蘊其毒而不得宣化也訣曰發熱腹中痛斑瘡腹内攻發多防不透發少便防􅏴惡候也故心胸大痛者不治痘疹腹痛者毒蘊於三隂也臍以上屬太隂脾經當臍屬少隂腎經小腹為厥隂肝經須細别初熱腹痛内毒與外邪相摶欲出不出而腹痛飲食如常而腹痛者用化毒湯原熱腹痛熱二三日後便秘而痛者燥糞與毒相併也用三黄丸七物升麻湯或桂枝大黄湯詀妄狂亂而腹痛者用三一承氣湯或食生冷而腹痛者用理中湯加桂心食過多而痛者痛必亟疾啼呌甚痛在臍以上飽悶噫氣而青白唇淡手足冷量輕重消之用升消平胃散一服即止或原物湯及神曲山查砂仁枳實廣皮紫蘓腹脹硬痛便閉者下之用偹急丸發熱自利腹痛者痛必緩有作有止痛在臍以下或連腰痛面紅唇紫手足不冷用黄芩湯加木香青皮或化毒湯泄㵼腹痛者用托裡建中湯痘未出身熱煩躁腹痛莫忍而不休者亟用活血散服後不止必出紫黑有紅斑瘡乃極重之候或獨蝉湯立見紅活如腹痛大便實者用桂枝大黄湯調獨蝉湯活血散嘔吐蜖蟲而痛用平胃散加烏梅吐利腹痛乃太陽寒水乘脾土也用益黄散寒甚用附子木香痛止瘡亦發若焦躁小便數唇焦發泡而腹痛用犀角地黄湯合化斑湯兼活血透肌散腹痛痘不出而發厥者用芍藥甘草湯加蝉脱煎服使毒氣泄而四肢溫而痛止痘乍出乍隐腹痛者用七物升麻湯初發熱及標痘時腹痛乃毒猶在内出不盡也用至寳飲倍山查青皮木香少加柴胡煎服㧞毒出外其痛自止痘初出腹痛若暑月用黄芩黄連大黄牛蒡少磨木香汁寒月瘡黑者寒邪也用木香丁香痘出三日尚未齊或見㸃紅赤過度腹痛難忍脾毒不能發越氣血凝滯或風之閉故也用獨蝉湯手中有痘始為出齊痘出盡而猶腹痛者大發之用紫草飲總宜平胃散如升發解利并利小便之藥則毒氣上下分消而痛自止痘不出痛不止者不治發熱標㸃心腹絞痛煩悶呌呼此痘陷伏燔灼臓腑也或自小腹上冲心腹脹痛此入厥隂大痛也不治或口臭舌胎發斑而腹痛甚此胃爛也不治凡發熱時腹中攻攪覺痛上下不定或煩躁作渇詀妄即當通大便其痛自定熱亦止而瘡隨發矣若下之稍遲則變症蜂起身發紫泡而死切勿拘首尾汗下之戒起脹腹痛五六日皮堅起脾紅潤調勻而腹痛者只宜疎解但見兩臉痘起小便利則自安如兩臉不起速發之小便不利則利之脹期多内傷也損其榖則愈不可妄下若見内傷之症又不可因循失下傷生冷腹痛者用丁香脾積丸原物湯下有㵼者用異攻散加丁香訶子傷肥甘油膩糕餅熱物者用急偹丸原物湯下凡傷熱冷物得利後並用四君子湯加陳皮木香或錢氏異攻散調之飲食過飽腹中稍覺不快者用木香大安丸内傷飲食腹脹痛中氣欝而痘不起發者用寛中快斑湯養漿腹痛灌漿至結靨時腹痛當察其痘色尚紅便秘之類乃毒未盡也即與解之錯過日期十救三四用保元湯加内托毒已盡又無陷伏久不大便而腹痛者必有燥屎也宜通之用當歸丸胆導法便清腹痛者必食生冷或受寒也宜溫之用理中丸溫中化毒湯黄茋建中湯加木香風寒所逼毒發不盡忽腹脹痛而煩躁喘促痘變灰黑必傷食也先以丁香脾積丸原物湯下去其宿食後以人參白术散去葛根加青皮廣皮與養脾丸相間服若傷食輕痘仍寳滿色潤者用錢氏異攻散加青皮山查漿未充而腹痛泄㵼用保元湯加白术肉菓陳皮木香芍藥厚朴裡急後重者停滯為積也用陳皮厚朴甘草山查神麯麥芽枳殻砂仁俟便利痛止再加補托收靨腹痛收靨時忽腹痛著中脘者熱毒凝滯淤血作痛也用消毒散血湯囬漿後脾虗飲食失莭而痛者用芍藥甘草湯加厚朴山查酒炒山梔若虗而肺金欝於大腸刮積而痛者用參桔湯痘後腹痛忽然腹痛手不可按者傷食也便秘急疎利之否則漸加喘急難治用雄黄解毒湯痛在上脘者宜清導用脾積丸便利者用木香大安凡痛在中焦者喜手按之食少便潤虗寒也用黄茋建中湯痛在小腹不可近者燥屎也用偹急丸胆導法不因内傷煩躁不寜而痛者毒氣入裡也用解毒行氣定痛之藥膓鳴自利腹痛虗寒也用黄茋建中湯芍藥甘草湯加乾姜澤㵼虗痛不止者用桂枝芍藥湯痘後腹痛口噤僵直者用鈎藤湯腹滿痛便秘者熱毒盛而氣不得伸也用芍藥甘草湯去肉桂白术加酒炒大黄燥渇狂妄腹痛用三乙承氣湯有燥屎者用三黄湯熱毒在胃時欲嘔吐者用黄連湯有淤血者用桃仁承氣湯治案一痘未盡出腹痛噯腐吞酸大便酸臭乃飲食停滯也用二服保和丸而愈一痘起脹時不易行漿肢冷腹痛乃血熱痘而過用凉劑理中湯加肉桂木香炮薑一服而愈一痘後傷食腹痛中氣不足宜補㵼兼施用香砂保和丸補中益氣湯調理而愈一痘能食易化腹痛此胃熱易飢脾弱不能消磨欝積而痛也用補中益氣湯加芍藥木香黄連而愈益黄散荆芥乾薑廣皮甘草茯苓厚朴人參黄茋丁香官桂腹皮木通澤㵼加棗肉煎服雄黄解毒湯雄黄一錢巴霜二錢米飯和丸如黍米大腹脹門毒聚腸胃不能發出或毒少發於外而又入於内皆致腹脹甚則氣粗發厥痘無血色或變紫黑多致不救當升發利上下分消則脹自愈所謂痛隨利减毒以利消也未發毒盡不可驟補向不脹因峻補而脹者宜消之行之滿而疼痛者實熱在内也脾熱腹脹者不能食大便秘用枳殻散未可驟用芒硝大黄胃熱腹脹者小便赤秘用四聖散乳食停滯作脹者升發解利藥中加消食之味又當審所傷之食或寒或熱以治之滿而不舒者脾胃弱不能運行也宜行氣健脾伏熱在胃有所阻隔上則心氣不降而小便赤澁下則隂氣不升而腹中脹滿宜發邪毒則胃熱自散用四聖散初起腹脹屬心火或有風寒交激聚毒於内不能發出以致咳𠻳氣急唇口開裂痘焦口臭此危症也當升提解利使毒上下分消若表邪重者宜㣲汗之毒欲出不出或風邪凉冷以致冷熱相搏隂陽不和脹而喘急甚則厥逆者宜溫中利小便用木香散脉㣲發厥飲食不進下氣虗嗚二便自利痘無血色者亦宜溫之用益黄散去甘草加姜製厚朴或理中湯加訶子山藥氣喘發厥致毒氣倒入内者用木香散異攻散若毒陷入裡必有他症相雜或煩躁大渇小便澁大便秘啼哭不止但用溫平解毒快氣紫草飲目開神昏口氣大臭則神氣已離難治痘已出齊毒已發透而腹脹者痘隱隱不明腹中陣痛喘嘔滿悶者難治痘五六日形色少神腹脹喘急腸鳴腹冷非内傷症與陷伏也内傷者按之必痛陷伏者必煩悶今便利安寜而虗嗚此隂陽不和中氣不足而傷冷也宜溫之用理中湯加肉桂橘紅木香補中益氣湯調理治案一痘漿足不易靨腹脹發熱面赤午後益甚按之腹不痛乃脾虗血少也用歸芍六君子湯加陳皮生薑大棗數貼而愈腰痛門痘疹雜症腰痛為最凶痘毒伏於腎而兩腎係於腰氣血流通則平氣凝血滯則痛腎寔則強壯腎虗則難屈伸故痘發於四臓而腎無留邪者吉若毒不達諸陽經而傳太隂脾經者則為腹痛傳少隂腎經者則為腰痛多於初標時見之凡成婚破陽後腰痛猶可治童真腰痛乃先天之水不足也不治者多初熱腰痛痘毒起於右腎下循足太陽膀胱散於諸經乃邪之自裡達外也順也若初熱腰即痛者此毒邪由膀胱直入於腎而不達表故闗莭不利而腰痛經曰太陽所至為腰痛宜亟解毒以㵼少隂之邪發表以通太陽之經使邪氣不得深入痘雖宻猶或可愈先服人參敗毒散次服五苓散服後痛止者吉已後用藥宜多加枸杞子痛不止者凶若治之少緩則太陽之邪由表以傳於陽少隂之毒由裡以傳於隂表裡受病隂陽受傷榮衛之脉不行臓腑之氣皆絶或黒陷或痒塌而不救腰痛兼口臭脇下有斑者不治即胃爛發斑也胸髙足冷者不治此腎敗毒深之症也若兼上身痛者亦可汗之用羌活當歸或如神解毒湯初熱時腰痛不絶及見㸃青黑乾陷是毒在腎不得出也錢氏雖製百祥丸欲令脾弱腎弱㵼膀胱之邪若下後身溫欲飲冷水陽氣復者為順若水榖不消寒戰者為逆下後宜溫脾用人參茯苓為君甘草厚朴為臣丹溪恐百祥丸太峻以宣風散代之更不若牡丹湯為穩他若敗毒湯加獨活細辛或加大黄或至寳飲加木香升麻提之外治用生薑自頭至尻尾擦之汗出痛止又用熟麻油揉按痛處可以止痛腎虗而痛者用保元湯加杜仲枸杞五味知母黄柏龜板腰脇並痛此毒在肝腎惡候也然有因怒氣而痛難轉側者本經藥内加柴胡香附骨皮酒芍有因挫閃而痛用活血藥乳香木香杜仲有因風寒而痛用羌活防風白芷肉桂溫以散之腰腹並痛上連頭者寒熱吐㵼咳𠻳兼作用敗毒散加犀角汁煩渇詀妄小腹如火者毒甚而不清也用敗毒散調益元散或辰砂導赤散初時失表忽然腰痛腹痛膨脹努力乾藿亂者毒與胃氣相摶欲出而不得出也宜利之用千金一笑散或四順飲大柴胡湯承氣湯外則揉氣胆導或商陸根葱汁敷臍頭痛身熱腰腹背痛者汗之用蘇解散送下稀痘丹熱不退用蘓葉麻黄葱頭姜汁煎湯下小無比散兼煩悶者用敗毒和中散凡腰痛者痘必乾枯非紅紫則必變黑火極似水也見㸃時急用清凉解毒庶可挽回治案一人十八歳初熱腰痛㸃發額角紅綻光澤心經順痘非腎逆候亦宜滋腎用六味地黄丸加枸杞杜仲與升發之藥間服痛止痘出至八朝煩渇詀妄唇燥舌黑卧睡不寜此仍腎水不足以制火也用保元湯加當歸芍藥枸杞棗仁桂圓間服八味地黄丸加人參麥冬枸杞而愈有一症同補陽而不滋隂竟枯涸疤不脱而死一兒初熱腰痛如折此折腰痘也強以荆芥防風敗毒散飲之發出㸃如蚤斑口臭出血而死一初熱腰痛連背脊不能轉側㸃見左耳側及腰左一㸃如箸頭大平而紫又舌中心聳而黑此腎毒逆候也強以四牙散發出紫黑㸃五日而死一兒孟夏發熱腰痛見㸃稠宻紫黑幸有神而胃氣強元氣實症雖逆而尚有生理四朝以四牙散一服又化毒湯送地黄丸二服次日痘起以黄連解毒湯加紫草防風當歸芍藥地黄而愈一女年十四痘正漿足忽腰痛不能轉側此經血去多之故用六味地黄丸加當歸芍藥續斷杜仲而愈一兒年二十痘後腰痛左尺脉弱房勞所致也以八味地黄丸補中益氣湯間服而愈一人年十八痘後四十日外忽腰痛極而手撇撒目閉無光汗出遺尿喉聲如鋸六脉浮大此恣慾房勞而隂陽離决也以艾灸氣海穴四肢活動又以獨聖湯八味地黄丸而愈一兒年十四痘後腰脊痛不能俯仰午後潮熱骨髓乾枯水不勝火腎氣熱也灸崑崙穴中脉穴各三壯又以六味地黄丸加獨活及補中益氣湯而愈一痘不起而腰痛繆仲淳用人參蘆水煎服一吐而痘起痛止毒在下吐以升之吐有發散之義也一好痘綻朗而色淡紅兩腿痛甚腿亦屬腎此隂虗而毒乘之也用活命飲二帖痛稍止又用十全大補湯六味地黄丸間服而愈若不早治至四肢厥冷變紫黑而死與腰痛之症相似不可輕忽一痘後足脛痛甚不紅腫氣血虗不能榮飬筋骨也用當歸芍藥四君子湯加牛膝獨活苡仁肉桂數服而愈牡丹湯丹皮三錢紫草生地各二錢麻黄八分木香三分咳𠻳門無痰有聲為咳肺氣傷而不清也無聲有痰為𠻳脾氣動而痰侵也肺主皮毛主諸氣之分布其變動為噯咳痘疹全賴氣血或因熱毒壅遏而不得發散或因氣血虗弱而外感風寒或因痰塞肺竅不得流通皆肺氣不清之病故痘疹之𠻳皆從肺治若𠻳逆失聲最為大忌而於標痘之始即當清理咽喉大要在審别色形如圓綻紅活而嫩者必鼻塞聲重氣粗此外感風寒也痘碎小隱隱起發白而嫩者必聲輕氣短而神怯此肺傷熱毒也治𠻳必先治痰消痰必先理氣故南星半夏治痰之主也枳殻橘皮理氣之要也至於清肺金解熱毒治痘之先著也初熱便𠻳毒火灼肺而氣逆也痘未出先升發為主用參蘓飲升麻湯兼外感風寒頭痛悶亂者用惺惺散木香散痘既出而咳更増咽喉不利滛滛如痒習習如哽者此喉中有瘡也用甘桔湯加牛蒡或甘桔防風湯起脹灌膿而咳𠻳痰壅者此毒在肺胃生痰也宜發散解毒非南星半夏可治用三抝湯加桑皮杏仁𤓰蔞前胡桔梗麥冬石膏痰多三抝湯加元明粉痰厥用五味子湯有汗用葛根黄芩湯痘壯收壓身熱渇𠻳用人參清膈散收壓後形寒飲冷風寒外襲而𠻳者並用人參清膈散五味異攻散風寒重者用麻黄湯參蘓飲加瓜蔞杏仁桔梗有痰加枳殻半夏石膏身熱而𠻳無他症者用生地黄散痘初咳𠻳痘後未愈者餘邪未盡也用甘桔湯合㵼白散加牛蒡兠鈴兼脇痛者餘邪在氣道阻其升降也用小柴胡湯加枳殻桔梗茯苓五味子肺焦喘急者用清金寜肺湯聲啞者用防風桔梗湯誤服辛熱𠻳出血者用甘桔湯加石膏牛蒡茅根身熱便秘而𠻳者肺熱也用黄芩㵼肺湯大便溏小便清不熱不渇而𠻳者肺虗也用人參清肺散大便調者用甘桔湯合人參白虎湯久𠻳不止胸髙如龜背喘急膿血口臭湯飲一滴不能入喉者俱不治誤服參茋而喘促用枳殻陳皮桔梗山梔治案一痘五朝勻澤紅朗頂陷痰𠻳此傷風失表邪客肺經但漿期難於補托用甘桔前胡茯苓桑皮杏仁橘皮𤓰蔞而愈一八朝順痘但頂平淡𠻳治宜清補兼行因不信藥十二朝聲啞喘脹倒靨而死由前失於清解故也一痘收靨厚而乾黑身熱咳𠻳風寒客肺也用麻黄湯而愈一痘收疤咳𠻳咽痛用升麻連翹牛蒡陳皮射干元參而愈一痘後傷風咳𠻳發熱用表藥反加汗喘用二陳湯加桑皮杏仁桔梗反加搦搐此脾胃虗也用補中益氣湯加五味子麥芽鈎藤而愈一兒痰𠻳諸藥不效用黑散子而愈一痘後咳𠻳連聲不續痰鳴欲絶𠻳罷吐白沫而唇白飲食少不得卧此虗火攻肺下痰通劑也用小異攻散加藿香半夏生薑厚朴大棗又用人參清肺飲而愈此救子益母之法一痘後咳𠻳吐膿腥臭胸中隱隱作痛右脉數滑乃餘毒在胸作内􅏴也用橘紅貝母茯苓連翹牛蒡知母𤓰蔞防己并蒸百合而愈一痘後風寒痰𠻳和食俱吐用清金散而愈一痘後咳𠻳吐蛔此脾傳胃也用六君子湯而愈一痘後久𠻳不已腰背俱痛此腎咳也用六味地黄丸加人參五味子而愈一十二朝咳𠻳不已服發表化痰藥反吐膿血此脾肺虗傷真氣成肺􅏴也用桔梗湯愈參蘇飲陳皮茯苓半夏甘草桔梗紫蘓人參麻黄前胡葛根甘桔湯甘草桔梗三抝湯麻黄二錢去莭杏仁一錢去皮尖甘草五分生用五味湯人參麥冬五味子甘草人參清膈散知母人參柴胡當歸白芍桑皮白术紫苑黄茋甘草桔梗黄芩石膏滑石地骨皮生地黄散生地一錢麥冬杏仁陳皮欵冬花各八分甘草四分清肺飲麥冬桔梗各三錢知母荆芥花粉各一分石菖蒲訶子各二分又方知母桔梗牛蒡兠鈴杏仁石膏骨皮甘草甚則加桑皮川貝母喘則加葶藶欵冬膏杏仁欵冬𤓰蔞麥冬各五錢搗梨汁入前藥同煎再入蜂蜜人乳收成每服數匙稀涎散山豆根熊胆薄荷細茶共為末先用薄荷湯𠻳口吹入喉防風桔梗湯桔梗防風甘草人參腹皮蘇子杏仁麥冬訶子肺虗加五味子共為末薑汁調下二白散半夏柿霜枳殻赤茯苓散淡竹葉淡豆䜴甘草赤茯苓大青升麻桔梗山查喘急門心火上炎肺葉焦舉肺為火廹故氣急而不得舒也或因風寒傷肺或因痰涎并𦂳或因毒火上升或因傷食悶脹或因肺氣自絶皆能發喘而痘家之喘獨屬火者為多若内毒不出或出而復陷以致煩躁悶亂腹脹喘急頭溫足冷身凉脉㣲大渇大㵼虗喘無痰者必死盖痘全頼氣以逐毒此邪氣不清大忌一二日初熱便喘毒攻心也便調者用黄芩湯加五味子人參有汗者用麻黄葛根湯便秘者用前胡枳殻湯身溫脉㣲㵼者勿服不止用葶藶丸加桑皮杏仁枇杷葉三四日痘正盛而喘毒燔肝分口渇焦紫惡候也五六日而喘毒逆脾家房囊空涸隂無以化陽也七八日而喘元氣自脱痰涎升湧無隂以和其毒也又當詳其所因因傷食熱蒸脾胃而肺喘者利之食去喘自止因風寒而喘者用麻黄湯因泄㵼内虗腹脹而喘者用陳氏木香散利止喘定者生増劇者死熱毒内藴而喘者用紫草枳殻湯内外壅滯而喘者用人參清膈散脾虗弱而致喘者用白术散虗寒而喘者用木香散治案一痘稀嫩少神起脹時泄㵼而喘此氣虗也用補中益氣湯加肉菓一痘漿足痰喘便實此肺熱補太過也用枳殻湯加連翹牛蒡腹皮𤓰蔞而愈一痘收靨厚疤喘急腹脹因能食非倒靨也用保和湯而愈一痘收痂喘急用荆芥防風桔梗枳殻杏仁麥冬貝母橘紅竹葉一痘後喘𠻳用白花地丁一服而愈一痘後喘久不止用蜜炒麻黄半夏桑皮欵冬各一錢白肉菓五個煎服而愈此案一云有黄芩蘓子杏仁覺更妥一痘後喘急聲重客寒侵肺也用蜜炒麻黄桂枝杏仁甘草葶藶一痘後喘嘔不已用長流水揚百遍煎清上藥而愈一痘後泄㵼喘急此脾肺虗也用人參五味子而愈一痘後痰𠻳喘嘔用阿膠粘米各一両牛蒡兠鈴各三錢杏仁三粒甘草五分丸服一痘後痰喘不已火侵肺也用黄芩黄連枳殻杏仁甘桔花粉柴胡而愈一八朝充灌因暑月汗多解衣為風所抑忽咬牙喘㵼一晝夜額上有倒靨意急用紫蘓防風山查枳殻青皮黄茋白术葶藶貝母前胡殭蠶得㣲汗喘緩次用震蟄丹三分隨以大青丸小青丸小靈丹服三服而愈前胡枳殻湯前胡枳殻茯苓大黄甘草等分麻黄葛根湯葛根黄芩各三錢黄連石膏白芍各一錢五味子七粒甘草五分麻黄湯麻黄杏仁石膏細茶桑皮一方無石膏煩躁門痘宜安靜最忌煩躁煩者不寜火入於肺為熱猶輕躁者擾亂火入於腎為熱為重然皆心之火也凡小兒熱渇嗜冷睡卧不安好抱行走啼哭不止撮手足而暴怒投器物而大呼皆煩躁也有因毒重而初發不透或因感冐而表裡不清無非五臓之毒内外鬰蒸治之者須察其表裡虗實隨症疎泄使其心火有所引導榮衛得以疏通則自然安靜矣苟不詳審一見啼哭不安誤認腹痛妄投藥石冷熱偏勝毒藴於中而致躁亂也必審兼症乃知病源兼嘔吐不食者熱在胃兼胸膈脹滿者熱在上焦兼咳𠻳多痰者熱在肺兼口中流血者熱在心兼腹脹絞痛者熱在脾兼牽掣抽急者熱在肝呻吟者痛也搔爬者痒也倐散倐止者生肌也起輕漸重者死兆也揚手擲足欲去衣被者熱甚於表也用羌活湯神識昏迷反覆顚倒者熱甚於裡也用導赤散合牛黄清心丸龍腦膏吐利不食者正氣虗也用木香散大便秘腹滿脹者内有燥糞也用三黄承氣湯煩渇而出不快者或有暑也用保元湯加麥冬五味或麥冬湯辰砂五苓散晝煩夜靜陽陥於隂隂陽交争也用四物湯加山梔乍隱乍現此有伏也痘痒搔爬此欲陷也如兼吐利厥逆腹脹喘急詀妄狂擾目閉者謂之悶亂神䘮不治之症初熱便不寜煩而不躁者内熱也用人參白虎湯加山梔見㸃後猶煩者毒未盡出也用消毒飲合奪命丹痘盡起發而猶煩者表裡有熱也用導赤散牛黄清心丸加山梔麥冬或抱龍丸加犀角汁或黑豆湯代茶可以解毒復隂氣因脹而痛呻吟似煩漿充發熱而煩乾漿熱也用導赤散痘多膿足而煩心血虗也用四物湯去川芎加麥冬山梔或棗仁湯痂後發熱煩渇此症似輕而易重煩久不愈心脾皆為熱毒所傷煩則必渇渇則必㵼㵼則必寒戰咬牙而痒塌之患立至腎熱而煩躁者必増自利輕用木香散重用異攻散發熱時煩躁宜凉血解毒大小便秘宜清利之厥逆煩躁用茱茰湯漿期膿清未足煩躁不眠用龍腦膏膿成後腹脹氣喘痘變煩渇此必傷食也輕者消導之甚則用不二丸原物湯痘後煩躁氣血虗弱餘熱内藴冝大補氣血而自定治案一痘未齊赤色壯熱煩躁清解之益甚此反氷其毒也冝升解之用升麻葛根湯加桂枝牛蒡紫草而愈一四朝順痘煩躁不食毒未盡也用升麻葛根湯補中益氣湯而愈一順痘日夜啼哭不止此木勝火熾刑金也用㵼青散導赤散加黄連而愈一痘少淡白不易肥而煩躁此毒壅也過用保元湯而反悶亂焦紫乃以枳殻湯先解參茋之滯又以犀角地黄湯加蝉脱牛蒡紫草清其壅滯之熱後以保元湯調理而愈一痘後身熱午前煩躁解毒清熱而愈一痘後夜卧不寜此胃不和而衛氣不得入於隂也用四物湯加逺志棗仁桂圓及歸脾湯而愈羌活湯羌活防風龍胆草山梔當歸川芎甘草牛黄清心丸黄連鬰金辰砂牛黄臘雪為丸龍腦膏氷腦一錢猪心血丸如芡實大小兒半丸三黃湯黄連黄芩大黄蜜丸消毒飲牛蒡連翹甘草升麻紫草山豆根奪命丹麻黄升麻紅花子山豆根牛蒡連翹紫草人中黄棗仁湯棗仁甘草生地山梔人參麥冬歸身不食倍食脾疳門痘以脾胃為主脾胃素強則飲食消化津液自生氣血充實易發易收所以能食者為輕不食者為虗法當溫飬中滿煩渇便秘傷食者為實未可認虗為實概用巴豆大黄峻利之藥以致内陷胡氏云與其救瘡痘於黑陷之後孰若保脾胃於未陷之前脾主血胃肌膚起脹灌膿全賴榖氣也亦有虗人毒重送毒不透起發亦遲必有延滯於中宫心氣不通胃口不開咽喉作痛不能進食似乎不食者故遇虗症當大補而兼升發遇實症當清解而兼升發不究其因槩用開胃徤脾之藥無益也若疹家不食必口中不和不思食耳豈真不欲食哉論脾胃者皆云喜溫惡寒喜燥惡濕故局方治痘家脾虗多用溫燥之藥而有效有不效何也盖胃為腑陽也主氣主受納脾為臓隂也主血主運化總之上也土兼五行無成性寒熱溫凉各隨其症而治之如濕潤則為滿㵼痘色滑潤用黄芩黄連知母黄栢丹皮生地石膏犀角等藥而後土得其平五臓皆禀中和之氣而痘可保也食可進也丹溪云熱以刦虗此為胃氣虗寒者設也非所以言養脾隂也若槩用燥熱之劑則胃陽愈壯脾隂愈虧矣况痘後脾家隂血悉化漿虗寒者固有虗熱者尤多乃偏於助火消隂則中州祥和之氣變為消爍燥勁咽喉乾痛便秘躁擾而死譬之隂凝潦土固不能生物而太旱爍槁百昌須凉雨之澤此又補中之大法也宻痘言嫩舌硬不進食者脾虗也用人乳加姜汁平時能食忽然食少當看痘色如起灌灰白泄㵼而不食者虗也用四君子湯七珍湯人參養胃湯赤腫便秘而不食者毒盛血熱也用四物湯加解毒藥甚則薑炒黄連便秘者下之若色不紅活頂不綻突即能食者難於收功有不能食而生者乃臓腑實大便調平時榖氣已可養瘡收成後自消榖而思食也有能食而死者乃熱邪殺榖多食易飢必口乾引飲不久而變症作痘初不食者毒冲胃口邪正相摶也宜清解而兼升發起脹不食者胃口停痰也用導痰飲毒未盡不食用紫草山查紅花子色淡白虗弱而不食用保元湯加山杳神麯扁豆嘔吐不食用保元湯加藿香他若同症選方則平胃散大安丸飬脾丸抱龍丸痘後倍食者胃中蘊熱而易消也必面赤喘滿便難口渇口臭口疳甚則生􅏴毒用三黄湯利之面色青黄唇口淡白乃素有脾疳之症故亦少食愼勿因其痘色焦枯誤用寒凉太過以致喘渇須保扶脾胃為主脾胃一傷變症立作用人參養胃湯保元湯橘皮湯治傷湯陳皮青皮枳殻木香山查甘草砂仁厚朴桔梗枳實導痰飲人參茯苓甘草半夏白术白芍當歸厚朴陳皮山查冲薑汁服身背痛痒門痛為實痒為虗痛者骨節疼痛痒者皮膚發痒發熱時骨莭皮膚痛痒者此肌表六經之邪也用羌活湯有皮膚腠理太宻痘毒攻發不透亦能作痛只以勻氣解肌發散透肌之劑即足矣不必他求有氣血凝滯作痛者用羌活當歸湯或桃仁承氣湯有感冐作痛者用升麻葛根湯加羌活山查蝉退有乾滯而痛者用水楊湯浴之收靨時痛甚治之不止者㐫故曰六日以前多用發散六日以後多用活血痘初起便搔痒不寜者此火毒留於肌膚之間應出不出游散往來故作痒也與傷寒太隂症身痒汗出者同論不可作陽明症肌肉虗痒論也用桂枝葛根湯加大力或桂枝麻黄各半湯去肉桂杏仁加升麻葛根大力若㵼心火肝邪用消風化毒湯痘遍出而半身作痛乃熱毒壅滯也用活命飲加蝉退漿足而痛不已者此痛為實也用白芷陳皮甘草大力連翹山查嗜卧不卧門痘家始終以安寢為吉血氣強盛榮衛流行邪出於表而不存裡是以安寢神靜神氣本弱為熱所蔽而精神不能舒暢未可專以虗治冝清熱助氣用保元湯加橘紅山梔黄芩門冬芍藥茯苓初熱昏睡此其常候心受氣於脾故也合面卧及起卧不時此内有熱也必多陷伏之患僵卧如尸呼之不應飲食不知此有毒伏在内神氣皆脱非嗜卧乃死症也起脹嗜卧聲啞其喉舌必有疳蝕須急審之既靨好睡昏迷此心血熱也用桔梗前胡當歸生地門冬山梔花粉人參黄茋白术逺志棗仁收靨遲痂皮不脱而昏睡此邪退而正未復也乃脾倦也用調元清神湯或調元湯加麥冬合安神丸或一味棗仁湯内有蘊熱煩悶躁擾而不得眠又胃中不和則卧不安衛氣不得入於隂則夜不眠胃實者用㵼黄散胃虗者用四君子湯加逺志棗仁桂圓或歸脾湯便秘者用承氣湯治案一痘後煩熱喘脹溺赤便溏嗜卧此暑傷氣分用清暑益氣湯而愈一痘後便溏食少嗜卧此脾胃虗也用六君子湯加木香棗仁而愈調元清神湯人參黄茋麥冬歸身白术陳皮棗仁甘草黄栢大棗安神丸牛黄五分黄連梔子一錢五分歸身二錢猪心血為丸硃砂為衣導赤散治心有熱邪昏睡自語醒時如醉錯語人參山梔木通生地麥冬甘草茯神菖蒲燈心仁端録卷十一
