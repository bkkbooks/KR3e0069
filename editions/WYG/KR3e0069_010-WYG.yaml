body:
  text: 仁端錄卷十明徐謙撰陳葵刪定咽喉門咽者胃之管主納而不出司飲食喉者肺之管主出而不納司呼吸心包絡三焦之脉並絡於喉此為君相二火耑主痘疹其火上蒸咽喉最為先受故初標必察咽喉之痛否以發散解利之令毒出不留於咽喉要地苟不清解其毒必致腫塞飲食阻而呼吸碍喉中氣汩汩如水聲䘮無日矣首尾俱用解毒湯外吹玉鎻匙胃火薰蒸侵喉而痛但㸔唇瘡上下宻而腫者其喉必腫痛葢脾胃相表裡故也用射干䑕粘子湯肺火津竭不能滋其化源尖上作痛者用四物湯加麥冬五味子人參連翹元參黄芩木通咽喉有瘡痛燥破傷流涎者急用退火以防靨期嗆水吐食失聲之變用甘桔湯加麥冬牛蒡元參杏仁荆芥或調小無比散解之或如聖散加薄荷枳殻腫大者㸃玉鎻匙一聖散咽乾便閉用四順飲身不熱而喉痛者毒氣鬱故也用甘桔湯大成散以開之喉症湏審能食而臟腑有熱者方可用前方解利如上焦雖熱却見小便清大便溏飲食不進者當以清上温下藥調之只用甘桔湯牛蒡亦量用發熱咽痛發熱初標咽喉㣲痛者冝清解用甘桔湯加牛蒡發熱不退晝夜煩躁口舌生瘡唇裂咽痛者此熱毒内薫其勢急也用甘桔湯合黄連解毒湯同服報㸃起脹咽痛初起心胃有熱毒上冲咽喉乾澁而痛者冝預解之若失解發而為瘡腫脹潰爛無及矣宜清咽膈解肺毒甘桔湯合黄連解毒湯加牛蒡水漿不入者用射干鼠粘湯加桔梗荆芥山豆根消毒飲抱龍丸牛黄八寳丹龍硼散紫雪方最妙養漿咽痛七八日痘皮堅厚明潤而喉痛者不妨色淡無力者宜清解而兼助發毒用保元湯加元參山豆根成漿而猶喉痛者毒火上蒸也用甘桔湯加童便製人參煎成調下小無比散身不熱而喉痛者毒氣鬱結也用甘結湯痘後咽痛九日後當叅以四苓散靨後咽痛不食者凶用甘桔湯加防風元參牛蒡升麻射干黄芩治案一兒患血熱痘先用寒涼藥起發灌漿頭面胸背皆濃但兩腿凹面陷不起用黄芩黄茋托之反熱渇煩躁大便溏泄咽喉腫痛改用清咽利膈方而愈解毒湯山豆根麥冬各一錢元參桔梗牛蒡各七錢防風甘草各五分生薑一片水煎分三四次服射干鼠粘湯生地白芍元參牛蒡射干山豆根龍硼散硼砂青黛山豆根冰片各五分紫雪方先以水五碗黄金器煮三碗去金入寒水石犀角石膏羚羊角元參丁香甘草升麻再煎至一碗去渣入好芒硝同煮用栁枝攪不住手候凝入磁盒内又以硃砂麝香亟攪和匀貯磁瓶勿走氣每服一錢温水化下叅定清咽散殭蠶火硝元明粉人中黄薄荷𤓰蔞皮青黛山豆根橄欖磨汁紙上晒乾各五分氷片一分肺虚乆不聲加訶子末五分痘未收去訶子痘收後加訶子雄黄辰砂各三分火邪未清勿輕用訶子五味子反令作喘傳心録涼膈散猪荷草旱蓮草水萍雪裡青山豆根各取汁同服又方粉草車前羌活人中白每服三錢至六錢滚湯送下稀涎散治胃熱咽閉山豆根熊胆細茶薄荷為末先用薄荷潄口然後吹之胆礬散兼治喉癬喉風雄鵝胆三個青魚胆五個枯礬收乾刺毛窠一兩火煅黄栢末百草霜各五分共研末吹之清咽利膈方山豆根麥冬貝母桔梗元參防風殭蠶穿山甲當歸白芍山查紅花生地陳皮蚯蚓牛蒡黄連黄芩甘草嗆逆門喉中氣食二管氣管即喉嚨又名㑹掩細容一線在喉之前食管即嚥嗌也甚寛在喉之後飲食入喉先以㑹掩其氣管水穀方從食管入胃今喉舌有痘則必脹硬飲食致入氣管而嗆逆也然飲水多嗆者因水柔弱易誤入氣管也穀食不嗆者因有渣滓自直下賁門即胃上脘不能傷侵氣道也水嗆湏治其痘則嗆自止故開口就嗆連嗆一聲而遂止先進飲食而後嗆氣悠言清者皆無害也兼𠻳兼喘兼吐七日以前音啞水嗆者並為逆候七日以後痘潤無妨故要㸔痘色如紅紫而嗆者熱重壅塞而上冲也灰白不起而嗆者氣血虚弱肺胃受傷也見痘之初即冝清肺補腎調脾益肝先哲用桔梗湯解毒湯並加荆芥防風牛蒡麥冬杏仁元參山豆根之類服於將發未發之前所以清氣道不使毒犯咽喉預防之法也未行漿而嗆此毒氣壅盛其喉必痛用利咽解喉湯痘色乾滯而嗆宜再為補發用保元湯加麥冬桔梗不因飲食而嗆此為乾嗆初痘時為肺受火毒冝升解之用至寳飲加沙參笋兠少與柴胡黄芩清之膿痂時乾嗆用無上飲加淡竹葉沙參竹瀝姜汁成漿時痘多者咽痘必早熱肉虚皮薄易破觸之即痛痰涎粘褁飲食難進强咽則痛或雜膿血痂皮痰涎而出此亦肺受火毒津液不足而痰生也聲音清亮者可治用甘桔湯加牛蒡花粉利咽化痰多服自愈食入嗆吐者此咽喉受傷門戸隘塞亦惡候也舌上有瘡破如蜂房舌痛强硬不能下咽水嗆食吐待舌瘡愈自然平安將靨時嗆吐痘色根窠淡紅者用嗆効方加川芎當歸至寳飲起脹前用桔梗前胡山查川芎當歸連翹木香茯神紅花青皮牛蒡木通灌漿後用人參黄茋桔梗貝母川芎當歸山藥養胃化毒湯白术陳皮砂仁黄連茯苓嗆効方杏仁泥沈香汁蜜人乳隔湯頓温服又方人參桔梗各一錢枇杷葉三片煎成加乳磨沈香汁頓服聲啞門痘已出而聲變者形病也痘未出而聲變者氣病也瘡出而聲不出者形氣俱病也痘家以清利咽喉為第一肺屬金而生氣金空則鳴金實則無聲心火上炎肺熱則脹孔竅閉塞毒無從出舌根陷坑咽門腐壞呼吸俱廢為難治矣湏早為清解鄒凭虚曰挫聲者必熱渇鴉聲者必驚悸連綿者多肢體之逼廹哀細者多胸臆之鬱悶斷絶者多熱毒之攻冲浮漂者多汗浥而頭痛沉實者多脾虚而鶩㵼如咬齒者督脉絶如破鑼者肺脉絶如放弦者肝脉絶如墜石者脾脉絶如雨滴者心脉絶啼哭無聲但見淚出口動者腎敗也聲啞如破如鯁者喉爛也初㸃隠隠又無感冐而舌燥唇裂聲啞及四五日黒陷而聲啞者皆不治初熱聲遂變此重症也用清肺飲甘桔湯加牛蒡荆芥元參養漿收靨失聲此㝡危之症若能言而聲濁不清者用甘桔清金散或用㵼白化毒湯甚則用𨗳赤散甘桔湯加牛蒡花粉麥冬杏仁元參石膏訶子或清肺湯仍用噙化藥㵼白散加花粉石膏桔梗黄芩茯苓陳皮山梔麥冬聲音低小難出此心血虚耗心氣消乏雖有聲而不發揚也用導赤散加人參麥冬葛根杏仁訶子喉内無瘡因食熱藥而聲啞用甘桔化毒湯或射干化毒湯加連翹黄芩當歸犀角元参感冐風寒而聲不清用參蘇飲加桑皮杏仁石膏咳𠻳欲啞用防風甘桔湯咽痛不能言用花粉散心熱腎虚不能言用四物湯加麥冬茯苓能言而聲不清用㵼白散加桔梗石膏茯苓麥冬知母花粉有痰用花粉貝母絲𤓰子痘色灰白虚陷失音此危症也宜用參麥清補湯兼千金内托散清肺飲麥冬三錢麻黄一錢五分知母花粉荆芥各一錢訶子石菖蒲各八分桔梗二錢甘桔清金散桔梗一兩牛蒡七錢甘草連翹訶皮各五錢共為末每服一錢薄荷湯送下去訶皮加射干即甘桔化毒湯㵼白化毒湯桔梗甘草花粉石膏青皮清肺湯阿膠一錢五分牛蒡二分杏仁三粒馬兠鈴黄茋各五分粘米一撮炒黄煎服導赤通氣散治心虚聲啞木通生地甘草人參麥冬歸身石菖蒲射干牛蒡湯射干山豆根各一錢二分牛蒡紫草紫苑各一錢桔梗木通石膏各八分升麻蟬蜕各九分甘草五分人參補聲飲人參阿膠牛蒡杏仁麥冬石菖蒲淡竹葉粘米花粉散花粉桔梗茯苓訶子石菖蒲甘草等分淡竹葉七片黄荆一寸聲啞方絲𤓰仁木通逺志肉石菖蒲麥冬燈心風邪加柏仁防風杏仁參麥清補湯人參桔梗查肉麥冬黄茋花粉前胡牛蒡甘草芍藥當歸紅花川芎生地千金内托散人參歸身黄茋川芎芍藥官桂甘草查肉木香防風白芷厚朴又千金方治口渇吐痰聲啞荆芥防風麥冬牛蒡茯苓白芍桔梗花粉元參百合山豆根柴胡𤓰蔞舌症門舌乃心苗紅潤則吉燥黒芒刺則凶以内熱甚也痘出三日心經主之見黒白黄胎者亟冝疏引痘出四五日肝經主之當退不退根窠紅黒者用犀角黄連木通和之灌漿時用審簧法舌也舌有黄白胎難退者雖成漿必重易退者雖重必輕氣虚毒重津不能上行華池乾涸而舌乾口燥者宜用補益隂虚火熾而舌乾燥者冝壯水主之毒重而乾燥者冝解利舒舌歛舌者脾之熱弄舌者心之熱時時舒舌者脾經㣲熱也勿用涼藥下藥飲水者脾胃虚津液少耳秘要云脾火盛則舞唇心火盛則弄舌冝急解火毒用至寳飲去川芎當歸陳皮紅花加山梔黄連木通笋根汁蓮心痘初起一二日驚搐悶亂弄舌者毒不得伸也用犀角地黄湯發熱後不拘日數舌忽伸出不收者死十二三日痘將愈時忽寒戰咬牙舌卷縮此風邪領毒入心也用人參當歸黄茋乾姜熟地熟附茯神白芍木香連翹舌上痘稠宻如堆粟破如蜂窠者危更加水入則嗆食入則噦聲啞者死痘多而弄舌者凶用藥之法以舌為樞杻故可清可下視舌之焦黒黄白盡之矣可温可補視舌之紅淡潤滑盡之矣痰涎門秘要云痰之難治難於發痰之初發藥難用必湏預防使終不發可也葢毒氣閉塞不能流通遏而成痰正氣阻隔于中焦為喘為𠻳而痰聲如拽鋸若失於隄防至貫漿湏補却見痰發用補則痰盛不補則難漿束手待斃矣治痰湏審虚實表裡如痘綻實紅活實熱也軟弱淡紅虚寒也鼻塞涕洩宜發散外邪用惺惺散參蘓飲寒則加半夏風則加南星白附皂莢僵蚕凡肺胃實熱氣鬱痰滯涕唾稠粘鼻乾身熱二便秘澁煩渇飲冷宜内外疏散使邪不壅滯用人參清膈散熱則加花粉毒蓄臟腑痰實壯熱胸中煩悶大便秘結冝疏導裡邪調和榮衛使邪自散用前胡枳殻散身温脉微便利者勿服三日之痰心經有之則逆五日之痰肝經有之亦凶若素有痰者别論痘前治痰冝用青皮桔梗前胡黄芩𤓰蔞枳實標時若左右兩顴稠宻不分珠而紅者至灌漿時必然發痰兩顴屬肝肺二經金木相剋經云金木無分肺火盛矣故知發痰宜先清臟腑服清肺飲一二劑六日預服牛黄豁痰散則痰必不發七八日臟腑不清必用白芍痘正出時風邪所襲眼目直視牙闗𦂳急者勿用峻藥以薑附湯為主起脹灌膿時有痰不可用二陳湯恐燥陽明之氣血孤陽無隂不能施化也只用白水磨白附子服六朝有痰冝清痰降火用紅爐紫雪方收靨有痰用二陳湯不妨一云用栁牙貝母旋覆花前胡枳殻散前胡枳殻茯苓大黄甘草各五錢清肺飲升麻葛根桔梗前胡青皮山查紅花白芷連翹木通山梔羌活防風金銀花地膚子蓮子青心薑附湯白附子老薑各二錢濃煎服取㣲汗牛黄豁痰散天竺黄三分川山甲胎骨灰牛黄各一分蟾酥三釐甘草菉豆四十九粒共為末紅爐紫雪方硼砂六分礞石煅滑石水飛硃砂水飛各五分柿霜五錢牛黄冰片各一分共為丸薑湯下開痰神應丹治咽瘡痰湧芫花三錢炒黒為末每服三四釐白湯下八寳丹珠子虎珀牛黄麝香各二分冰片一分硃砂天竹黄龍齒胆星白附薑汁炒全蝎各五分蜜丸金箔為衣薄荷湯磨服發渇門渇者裡熱也葢三焦乃水穀之道路津液乃水穀之精華流行三焦以制火者也火非虚不發發而不解則津液不能行上以制火火性炎上薫灼心肺水性下行不能上達是以華池為之枯涸故燥渇也亦有痘多津液外注化為膿漿不能内滋臟腑故渇當分虚實治之不可恣與湯飲𤓰果致傷胃氣痘初發渇初熱小渇常候也若大渇咽乾唇口焦燥此心火上炎腎水不升毒火妄行血枯液耗也用葛根解毒湯加黄芩黄連以㵼心火加知母黄柏以滋腎水倍加紅花牛蒡得舌潤則生舌有芒刺則死切勿食生冷鬱遏毒火致不得升散也一云心火上炎宜用導赤散或辰砂六一散發熱自利而渇者津液不足也用黄芩湯加麥冬燈心發熱五六日不住痘形隠隠煩渇者用升麻㧞毒散發熱起即大渇者熱内盛也宜清金利水用紫苓湯加荆芥葛根紅花牛蒡花粉見標發渇丹溪云初起煩燥狂渇引飲者宜涼以解其標用六一散錢氏云身熱煩渇腹脹而喘大小便澁悶亂大吐者當利小便用導赤散辰砂六一散初時紅黒不潤宜涼血解毒三日外乾紅枯燥宜滋腎水痘已標㸃熱毒内外蒸發以致脾胃虚燥血枯喜甘味以自救若好飲酒者以無灰酒浸當歸頻與之酒漿亦可惟忌白酒恐發痒也後以托裡散加四物湯痘發諸經火起銷爍肺金以致渇宜抑肺涼血使肺金生水用保元湯加麥冬草連花粉或用六味地黄丸養漿發渇八九日灌漿時身熱發渇此痘多毒盛表裡氣血俱虚也用人參黄茋川芎當歸芍藥甘草麥冬花粉川連痘太多血氣弱津液少咽乾膈焦冝養氣血益津潤燥若食生冷損胃氣而津液不生變將作矣用葛根解毒湯渇而兼㵼用人參麥冬散若不㵼去白术加生地知母大劑作湯代茶虚渇用陳冬米人參煎湯代茶漿足紅活而渇用人參茯苓五味麥冬烏梅痘後發渇痘後不宜渇忽然渇者心胃有邪熱也其人必能食便閉舌乾咽燥用人參白虎湯加黄連食少便調舌咽不燥此虚渇也用人參白术散人參麥冬散加天花粉結痂時而渇津液竭也用保嬰百補湯加生脉散渇甚而㵼亦甚者難治凡渇切勿利小便利之則益其渇渇兼雜症暑月煩渇冝清之用白虎湯胃熱而渇津液耗也始終宜用白虎湯加花粉乾葛有汗加人參小便不利用四苓散並用辰砂六一散毒氣聚胃時多發熱熱淫于内而外不得宣故發渇宜紫草葛根白芍甘草牛蒡紅花生地前胡渇猶不止用紅花子濃煎服此藥最能散胃中淤血故也心火上炎而渇宜導之用辰砂五苓散肺熱而渇治在上焦用人參白虎湯加黄連熱邪入肺氣急咬牙而渇宜調肺氣用四君子湯加麥冬訶子熱壅吐㵼而渇冝升提發散血熱毒盛而渇必狂亂便閉壯熱痘色乾紅焦紫用涼血地黄湯黄連解毒湯便閉用四順清涼飲火痘必大渇引飲當發熱標痘時不妨以火濟火若故禁之即致渇死火毒稍解急進退火之劑如知母黄栢花粉之類漿痂時渇用人參麥冬蘆根知母必大劑濃煎待冷恣與食之則止否亦致渇死湏騐外症治之隂虚火動而渇是血虚也隂無驟補故難治用六味地黄丸加五味肉桂虚渇血虚而兼氣弱者用人參當歸麥冬血少不養心驚悸而渇者用四君子湯加當歸紅花麥冬生地逺志身温而渇津液耗也用四君子湯加木香葛根㣲熱而渇宜利水用五苓散加人參麥冬白术甘草氣虚而渇冝補氣用保元湯加麥冬五味渇不止而兼㵼用參苓白术散加五味麥冬渇多而液竭用四君子湯加訶子肉果足指皆冷不得至經脾胃陽虚津液不能上升而渇用四君子湯加當歸黄茋官桂腹脹而渇脾胃虚不能運化精㣲也用四君子湯加腹皮厚朴青皮風邪所觸而渇脾胃虚不能通調水道而潤燥也用四君子湯加葛根麥冬五味不能食而渇脾素弱不為胃行其津液也用參苓白术散氣血俱虚而渇必身熱面㿠當大補之用四君子湯加當歸黄茋芍藥紅花五味或六珍湯自利而渇者毒邪傳腎開閤不司津液下竭不能上潤自救也宜温之用陳氏異攻散發熱而渇火銷津液也用升麻葛根湯或紅花牛蒡湯燈心炒米湯飲水多而渇愈甚液竭而獨陽盛也用四君子湯加當歸黄茋麥冬五味藿香扁豆花粉渇而寒戰者内外俱虚也風邪所集也治宜實表用四君子湯加防風肉桂當歸黄茋春夏减當歸渇而咬牙者血熱不能榮骨而齒槁也冝補氣㵼腎用四君子湯加川芎當歸芍藥麥冬五味或八味丸倍加地黄赤茯苓虚寒而渇寒戰咬牙泄㵼者用木香散異攻散脾胃虚津液不足而渇有九症腹滿足指冷驚悸身温身熱面白寒戰咬牙多飲不已宜用木香散如不愈加丁香肉桂然亦有脹悸寒戰咬牙之渇屬熱者宜審之閻忠孝曰小兒驚風泄㵼瘡疹之渇皆津液内耗也不問隂陽並用人參茯苓白术麥冬藿香葛根五味木香治案一痘漿將半足漸蒼老冝靜養之有謂脾主結痂用異攻散加山藥芍藥喘渇身熱此實症而用補劑内外皆熱也治以寛中湯又口齦發疳以清胃解毒湯而愈一痘八朝漿滿身熱而渇咳有痰火盛而津液涸也用白虎湯而愈一痘起脹煩渇不已寒之不寒是無水也宜壯水之主以制陽光用六味地黄丸加麥冬五味多服而愈一人十九歳六朝匀朗綻突淡白少神渇甚不已此虚弱而津液竭也用人參枸杞麥冬煎又以補中益氣湯加枸杞保元湯加麥冬芍藥當歸枸杞九朝漿足渇止服人參一觔而愈一痘起脹乾紅焦紫根窠結實便結煩渇用黄連解毒湯而愈一痘六日起脹不食引飲此胃弱也用調脾内托散治之而愈亦有毒壅不食引飲者不可不辨一痘六日未起脹便結煩渇服保元湯煩渇益甚此毒未盡解而用温補則毒蘊蓄而不能托漿先用清解而起脹渴止用保元湯收功一痘八日漿半足熱甚引飲者有用保元湯而煩渴益甚予謂當倍加人參麥冬以止渴一痘九日空殻無漿根血乾紅壮熱口渴用保元湯而渴更甚此腎水枯涸不能勝火宜壮水之主一新婚後躁熱引飲亦宜壯水制火用八味地黄丸加人參麥冬五味又用補中益氣湯渴止熱減一新婚後躁熱而渴飲冷即睡醒復索飲不已時天令大寒此腎水涸不能制火乃孤陽絶隂行漿二七日而卒無隂則陽無以化也一痘七朝潮熱口渴利下臭穢陳積此腸胃熱蒸而下也雖虚而無寒用保元固中之劑而愈若用木香散辛熱之味祸立至矣一漿期壯熱煩渴或疑津液不足以保元湯加麥冬熱渴益甚痘色焦紫此痘本熱而衣被太暖用補反助其熱以黄連觧毒湯加牛蒡子清解而愈一痘後熱渇能食便閉咽乾口燥此心胃二經受邪也用白虎湯而愈一痘後口渇食少小便數此食傷胃氣精液不足故也用補中益氣湯加麥冬五味而愈一冬月出痘頂陷紫黑惟用當歸浸酒飲之而痘起一痘黒陷黄色不食性好酒恣與之酒而痘紅綻一痘火毒閉而形若死移棄外庭遇暴雨而甦此涼水制火也一險痘熱壅索飲不已速與井水數碗渇止痘起人參麥冬散葛粉麥冬白术人參甘草升麻粘米竹葉煎服嘔吐噦噯􅰝逆門火逆而物獨出者為吐聲獨出而短者為乾嘔聲物齊出者總名嘔吐皆火逆上冲也亦有因受寒冐寒而嘔者若夫噦者乃土敗而衝任之火自臍下直犯清道上出於賁門胃口上也㣲則乾嘔重則聲嘶啞嗄言語不振或咽瘡潰爛㝡為惡候太素曰弦絶者其聲嘶木陳者其葉落病深者其聲噦短針無取毒藥無攻謂不治也若􅰝逆者乃胃寒冷氣上升也必因風寒生冷所致亦十中之一二耳初熱標㸃起脹之時熱嘔為多宜疎毒發表降火為主切不可用燥藥加丁香砂仁之類以致血不能潤痘也用至寳飲加薑製黄連輕者不治自愈重則紅黒乾枯宜用山梔竹茹伏龍肝清解之如吐清水黄水膿痰者俱不妨吐臭痰肚疼者凶外感噦吐用二陳湯加藿香柴胡紫蘓白芷枳殻生薑内傷嘔吐用二陳湯加藿香紫蘓砂仁枳實神麯白芷毒冲嘔吐以茱連散主之或辰砂六一散加石膏蘆笋根汁内傷外感兼咳𠻳嘔吐者用蘇發散加生薑口渇乾嘔用藿香正氣散加薑製黄連吐而酸苦有聲吐訖反快者火冲也痘必紅紫用梔連二陳湯胃弱嘔吐無聲有物不酸若不食食下即吐困倦面青唇白吐多順快用六君子湯參砂和胃散傷生冷受寒氣而嘔者用二陳理中湯失于早解咽中作痛有瘡吞吐不利飲食哽寒而嘔逆者用加味鼠粘湯養漿時因傷食腹痛而嘔者用平胃散加砂仁藿香煨薑吐而有物用養胃化毒湯傷生冷而嘔痘變灰白者用異攻散加砂仁丁香肉桂七八日因脾胃虚寒而嘔者用賽金散虚嘔用無上飲加人參白术蘆根汁嘔止尤當温補痘後嘔吐餘熱在胃者多煩渇求乳飲多吐乳如射面赤五心熱喜冷用橘皮竹茹湯加黄連或竹茹五苓散或竹葉石膏湯臉汗引飲者用四苓散加木通麥冬膈有熱痰煩渇便閉者用二陳湯加山梔貝母竹茹花粉薑製黄連生薑傷食而嘔聞氣即吐者用木香大安丸養脾丸保和丸妙應九加麥冬山查薑製黄連枳實神麯惡心乾噦者宜利小便用竹葉石膏湯燈心竹葉湯加瞿麥薑製黄連天花粉之類夏月用五苓散加石膏或竹葉燈心湯面青白手足冷二便自利無痰心腹作痛或渇喜熱飲者用益黄散平胃散加砂仁藿香小茴香胃凝寒痰吐清水者用猪舌湯四君子湯二陳湯調之引飲過多吐清水者名水逆用五苓散虚而乾噦者用和中湯四君子湯加橘紅半夏竹茹兼心腹痛者用丁香理中湯益黄散或四君子湯加藿香木香凡吐症服藥不可于乳食飲湯之後强與之恐其一併吐出湏緩緩漸進待藥下行既服盡以指搯兒兩内闗穴片時即不吐矣膿期噯氣氣粗煩躁用猪尾膏手足冷口氣寒而虚噯者用木香散異攻散由熱鬱胃中欲出不得出者用半夏生薑湯加陳皮黄芩或四苓散加陳皮竹茹以利之胃寒發􅰝而嘔用炒鹽吳茱茰各一錢丁香五分水煎服治案一兒年十五血熱毒重而無粿粒正額略見分珠而又稠宻唇焦口腫舌有黒刺大熱大渇先用羌活湯調催蟄退火丹雖起發而嘔噦特甚用黄芩黄連荆芥防風連翹牛蒡山查蟬退犀角紫草石膏大黄二劑痘乃少潤又加川芎當歸門冬知母桔梗生地紅花元參痘漸滋長嘔噦漸止八九朝復嘔背漸平塌仍用川芎當歸黄芩黄連僵蚕連翹牛蒡羌活陳皮藿香石膏黄土澄水煎服隨以桑蟲漿雞腦各二個入催蟄丹震蟄丹各五分至夜狂躁作渇以陳冬米麥冬煎湯頻飲至天明熟睡而痘起灌矣但大便溏加黄茋白术山查橘紅炮薑人參而愈一痘成漿倒陷而噦不止亟用攻發藥以起其痘于安胃藥中加人參黄茋黒薑陳米白术黄泥澄水煎治之而愈一兒標㸃噦吐面色枯口唇焦胃氣已脫毒伏不出三日而死一痘六朝匀朗光澤外症順而胃氣損聞食則噦漿雖滿不能收拾而死吐蛔者更重一痘後喘嘔以長水揚百遍煎清上之藥服之而愈一痘後吐蛔因氣血弱無穀氣養蛔故也用二陳湯加生薑芍藥黄連連翹大黄治之而愈一痘後煩渇乳多則吐身熱喜涼此餘毒在胃也以竹葉石膏湯治之而愈一痘後噯腐有用香砂丸尅伐太過變泄㵼而死至寳飲桔梗前胡山查當歸連翹川芎木香茯神紅花青皮茱連散黄連五錢茱萸二錢同炒為末竹茹一團生薑同煎湯調服蘇發散蘇葉陳皮半夏蒼术厚朴甘草茯苓羌活枳殻神麯藿香正氣散藿香紫蘓陳皮腹皮桔梗甘草茯苓半夏厚朴白芷梔連二陳湯山梔黄連俱薑炒各五分茯苓一分半夏四分橘紅炙甘草各三分生薑一片水煎漸漸唧下參砂和胃散人參砂仁白术茯苓半夏藿香陳皮炙甘草煨薑二陳理中湯人參白术陳皮甘草茯苓煨薑二陳一連湯陳皮茯苓生薑半夏黄連竹茹加味鼠粘湯荆芥防風陳皮甘草牛蒡桔梗射干山豆根一方有乾葛連翹無牛蒡甘草控涎散孩兒茶柏末硼砂各五分辰砂雄黄各三分共為末吹入咽中不預治漸變失音嗆水而難救加味平胃散陳皮蒼术厚朴甘草藿香砂仁小茴香煨薑賽金散黄連用生薑汁拌入瓶中悶一晝夜令其發熱過取出即同薑渣炒乾去薑渣以黄連為末服無上飲人參黄茋陳皮桔梗貝母川芎當歸山藥竹葉石膏湯石膏知母麥冬甘草竹葉二陳湯陳皮茯苓甘草半夏頭面腫脹門諸陽之㑹在頭心之華在面痘為陽故必主之故痘瘡頭面稠宻者重頭面預腫者逆頭面痘瘡破爛腫臭者凶有應腫者痘漸起發頭面應期浮腫此毒氣發越聚于三陽之分欲作膿漿此應腫者也至漿足收歛毒化腫消目開者為吉若痘未熟而腫消目開者為凶有不應腫者痘稀毒輕熱㣲雖作漿而根不占據此不應腫者也有元氣衰弱痘頂凹陷不脹不灌面不腫目不閉者是毒不能發越於陽分也雖勉强灌膿于一時亦難保十二三朝之變用保元湯托裡快斑湯為主四五朝肉腫而痘不起者毒存于脾也十亡八九若腫而痘形髙起飲食如常者可治若痘不見如蛇皮者必凶用木通腹皮湯八九朝正當養漿灌膿時忽腫消皮脱目開乃元氣不足毒内陷而氣外泄也用參茋内托散目早開用木香散復腫閉者吉不腫閉者凶痘未齊而頭面預腫脹者風熱甚也經曰熱勝則腫治宜消解用葛根解毒湯加荆芥防風蟬退白芷或消毒化斑湯外用神應膏䕶目有兼疫毒致痘未發而面目先浮腫光亮者即大頭瘟也宜急解温氣消則吉不消則凶七日後變痒塌嗆水錯喉聲啞痰喘者不治或用羌活救苦湯救之有隂虚陽盛虚陽上浮毒氣妄行肉分三四朝痘未起壯面目忽然青腫光亮一有此症則毒不盡發七日後氣退毒陷矣有風寒閉皮膚毒流肌肉痘不易出目胞浮腫光亮壯熱煩躁者經曰毒乗于心則熱熾于外也急用升麻湯加荆芥連翹蟬脫踈解之痘透毒解目自開矣有因氣血虚弱不能拘攝毒氣成漿毒散肉分面腫痘不壯者此危症也宜大補氣血則痘自灌腫自消也用參歸大補湯有頭頂俱腫痘反平塌者難治用麻黄湯加山甲發汗後隨症施治起脹時頭面腫大湏細㸔形色何如若顆粒分明紅活綻突者吉若粘連通串糢糊成片又兼灰白青黄乾燥皮膚黒黯者凶紅活潤澤者用快斑湯合消毒飲或消毒快斑湯以解毒更用甘桔湯加牛蒡以利咽喉寛胸膈外用神應膏䕶目凡痘瘡腫脹正面忽然破痒則邪氣内傷正氣外泄崩沙之勢漸不可為矣服藥後得破者復灌消者復腫飲食如常二便調和變凶為吉也用十全大補湯合苦參丸治之若灌漿後應消不消者是毒未化盡也猶防餘毒損目解毒為亟不可緩也凡痘與皮肉一般腫而有根窠及半邉面腫形色順者俱無害凡痘灰白面如錫餅能食便調無化症者亦無害木通腹皮湯治四五朝毒伏于裡肉腫而痘不起殭蠶當歸茯苓木通甘草苡仁蟬退腹皮白芍路路通一個虚者加人參消毒化斑湯升麻柴胡桔梗甘草牛蒡連翹防風羌活蟬脫龍胆草宻䝉花淡竹葉仁端錄卷十
