body:
  text: 仁端録醫家類提要臣等謹案仁端録十六卷明徐謙撰其門人陳葵刪定謙字仲光嘉興人葵字藎夫嘉善人是書専論治痘諸法分别五臟及經絡傳變觀形察色條列方論末卷附治疹之法案痘瘡之症古所未詳往往以㿀疹統之自宋以來治小兒者莫如錢乙而藥證真訣亦略之蓋其氣之盛行在元以後故著為方論者至明而詳是編推原本始備載治驗平正通達實為痘科法門較之强分南北偏主攻補者殆不可以道里計矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0e94fe28c28bb3ff8b6dcab6b6e55298e2ebaff169aaf4c41427a498e7449c22
