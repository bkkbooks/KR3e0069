body:
  text: 仁端録卷六明徐謙撰陳葵刪定起脹賦三日四日痘當出齊點至足心勢方安静出欲盡而不留發欲透而齊長苗漸成顆兮氣之所响血漸化水兮血之所養疎則毒少兮頭面不腫而休怕密則毒多兮氣血不充而有憂時日既足兮自翹翹而雜起表裏無邪兮勿汲汲以作湯若有陸續不出之狀或隠隠于皮膚之内不起名為不快若非風寒鬱遏之因必是氣血不振之故是以四日已前痘毒方出身表宜凉則氣血和平痘色必然潤澤至于四日之後毒出已定身表宜温温則腠理開通其毒易以成漿故至此而身不㣲熱雖未必至于氷伏而痘瘡斷乎勿長四五日來血包已就候當肥大而粗頂宜發光而白故根紅而頂白者已具行漿之勢若還赤色過頭雖見嬌紅可愛延綿六日依然到頭空殻虚花氣虚之痘虚火上乘陽症故不分光不行漿皮薄而光亮如燈内含是水頭尖而脚根不紅行漿不實是以熱毒盛而未解則為紫為黑壅而不起為陷為塌滯而不榮為乾為枯為青為灰怯而不振為不快為停漿或有毒先腫脹而痘久不起者漿則滯而不行毒則遏而不出故身不熱而痘不起已成氷硬之形赤色還榮不變温之可興氣血弱而不振發遂成不快之狀紅潤依然如舊補之則起紫色乾枯且忌温中帶補只宜活血鬆肌毒之壅滯烈藥雖然可發透肌猶是良方溏泄惟宜温補㵼盛佐以升提頭面預腫兮三陽亢甚而必亡咽喉急痛兮火灼肺金宜早治起脹總論放標之後漸漸起脹痘瘡發出一分則毒發出一分胖盡則毒盡有不起者或因元氣本弱不能送毒或因雜症阻滯不能升發皆發熱放標之時失于調攝故也此時不治後難救矣痘之起發只以出勻為期不可拘定日數痘出以漸其發亦以漸謂之適中痘曰起脹是點出已定毒氣盡出時也氣血定位毒被制伏成膿矣若白不泛頂紅不斂窠氣血與毒混一不分是元氣弱也故必察形色審舌胎為主有痘起發嬌紅潤澤至四五日光潤如油珠每自搔破破處更見光澤遍身頭粒分明紅艶起發圓潔亦不為害有痘面上粗平起脹時無頓針之處猶如鏇蓋面上但髮際耳後腮後明潤至七日腫退八日復腫必成薄漿結靨而生婦人年長者多有之痘至四日起發太驟亦非吉兆蓋表虚毒重也七日後腫退倒靨皆因此而變遇此症須分虚實治之痘至五日即帶黄色假漿也當以神采辨之有神采者真漿也假漿必無神采或補或瀉惟舌是凖起脹時痘頂有小孔不黑不白曰蛀痘大泄元氣腠理不密故也大補氣血其孔自密諸痘自起用保元湯加丁香肉桂川芎當歸鹿茸或問毒滯痰停與風寒之阻塞有辨乎曰渾身壯熱焦紫乾枯塌陷腫脹或肉腫而痘不腫者毒滯肌肉也内外無症但板硬不起者痰滯經絡也板膩不起而復喘滿身熱者風寒阻塞也起脹順症報頭三日後先後大小雖不等而根窠紅澤面目漸腫無他症者順也或腮頥一二恱目鼻塞流涕口角流涎眼朦不欲開者亦順也起脹逆症四五日頂平脚塌赤色過頭紅如衃血根窠散漫五六日鼻不塞眼不合起脹時口出臭氣者肺胃敗也失聲者咽喉腫潰也體寒者陽脫也嘔泄者腸胃敗也利不止者臟氣絶于内也手足厥者腑氣絶于外也手足現而復隠起而復塌者枝葉萎也皆不治痘嬌嫩皮軟不碍手以燈照之如琉璃以手按之水漿就出内色不暗此假壯也十二三日決不能收功急假表以防内攻或似榴之紅而不痛核之硬而不動􅏴之腫而不潰皆血不榮也不出四五日必搔痒悶塌而死頭面不起脹雖遍身皆壯不治痘不起而根皮先腫亟用内托散加穿山甲痘紫而刺破如屋漏水者不治初起面上胸前只有三五處顆粒糢糊脚根腫硬至漿期一齊擁出先䟱而後頓密也危症五六日氣血不分焦紫陷伏頭面紅腫或舌白至唇處者曰内潰或雙目腫脹神氣無光或胸高喉腫及氣粗喘者皆死症也有面部無痘四肢反多背上乾塌焦紫或溺短澁或血妄行徧身痛至四五日身背起如蜂針隠隠若有若無皆凶候也餘俱詳見各卷起脹險症色裏外㣲紅者輕外黑裏赤者㣲重外白裏黑者至重瘡端裏黑點如針孔者勢劇也四五日不成血泡頂陷灰白或五六日頂陷脚斂或脚雖塌而血附是血旺氣弱也頂雖綻突而無紅暈是氣旺血虚也初時一片紅點斑疹雖分至起發時斑疹盡散惟見痘在此先似密而後實疎半輕半重有痘四圍高中心畧低者乃中氣不足發未透耳能食者至漿期自充滿而起若不能食宜扶中氣疎者用人參白术散密者用解毒化斑湯四圍起中心落陷此是死肉其形如錢者宜急攻之若變黑點不可治矣用四君子湯合四味順氣飲加燒人屎或紫草飲有四圍起頂皮不起脚根不擴猶是死肉之形不見新生之水此乃起發不透審虚實以治之如氣本實者必曾感風寒用桂枝葛根湯合奪命丹氣本虚者必不能食而吐利急補中氣而發表邪用人參白术散合奪命丹有痘六朝勻朗明潤但是頂陷乃不實不虚之症至期自然充灌若妄治以補劑反加煩熱便閉目疾􅏴腫凡年夀天庭印堂坎離不起者即用升天灌頂散未效再服數部若起不妨有痘四圍乾平不起中心突起或裏紅外黑者由平日受風寒皮膚堅以致毒鬱而不散也宜解表邪用桂枝葛根湯十宣散外浴水楊湯四圍乾枯中心㣲起含水者由毒蒸津竭也急以疔法治之有痘聨串皮腫肉浮者或四旁旋出小痘攢聚長胖漸成一片者此候最重用快斑湯合消毒飲加燒人屎更宜嚴守禁忌以防觸變有糊塗聨串痘色灰白面目浮腫如錫餅様能食便調别無他症者此不過痘出太多氣血難周耳往往綿延日久渾身脫皮而愈倘食少而渇却無吐瀉裏虚之症用保元湯加當歸芍藥防風桔梗牛蒡若有吐㵼用木香散温之有七八日後面瘡赤腫是血未嘗化水遽然成漿也後必潰爛而死托腮痘見點脚塌但正面光澤起發亦不至危若時日已多發猶不透急導心經熱毒用導赤散送下牛黄清心丸若毒藴譫狂此陽氣獨盛無隂以和之也用退火回陽丹大便不利用當歸丸㣲利之或膽導法甚則用防風通聖散若毒鬱藴蒸神不守舍或啼笑者用導赤散送下安神丸通關散起脹三日症治總之初治歸正永無外症故起脹三日内尚可挽回至灌漿期内則無及矣起脹第一日痘先出者當起頂高如粟米者為順不起頂者為逆方起頂半日一日即塌陷淡白者虚寒也宜温補之用人參黄茋川芎當歸丁香薑附子焦紫氣粗者實熱也宜清解之用蟬蛻湯下大無比散以退熱再加大成散烏金膏以退形大皮薄起縐紋者毒重氣虚也補兼解散焦紫者毒重血熱也宜清之滿頂紅者血滯也宜活之于此時痘既出之後當閉走泄之路庶無後來壞症起脹第二日痘當長大有腹痛叫呼膨脹身熱者毒未盡也用木香湯下大成散腹痛而身安者易治不過袪虚寒温中而已腹痛而身熱者邪毒内藴為難治以清解内托為主用翹查消毒飲下大成散最良起脹第三日此時宜行漿助胃勿輕用滑泄之藥如枳殻紫草之類身猶熱者毒未盡也止用内托散熱則去熱藥加紫草紅花寒則去防風白芷加肉桂木香廣皮喉痛者火盛薰蒸也用甘桔湯加元參少許調下大無比散身凉無他症而喉痛者毒氣鬱結也用大成散泄瀉者速止之以固元氣為本勿單用澁藥兼身熱者清解之中畧加固澁之劑身凉者以斬固丹為要藥胖期主方胖期四五日内以生津解毒為主加白芍川芎麥冬當歸黄連蓮子粘米之類自標痘至起脹六日内以玉液至寶丹為發藥之主方桔梗利咽喉載氣血上行為舟楫之劑前胡能托痘除内外痰熱山查初時多用最能生肌發痘木香少用以提腎毒二帖後不用茯神安神養心血紅花少用以活血多則逐血四五帖後不用青皮能清臓腑免後生痰三帖後換陳皮通草能通闗節三貼後換木通小便清不必換牛蒡子五分粘米一撮燈心七根煎服胖期熱症加減法胖期四五日内熱症未除以十神解毒湯加減當歸川芎白芍丹皮紅花連翹木通甘草桔梗竹葉腹皮燈心熱症已除不易長大治宜保養元氣活血行滯助痘成功以排膿解毒湯加減當歸白芍川芎人參陳皮甘草山查白芷桔梗木通黄豆二十五粒笋尖五六日後換粘米色尚煩紅焦紫用主方加紫草紅花滿天秋氣熱者連頂紫黑用黄芩紫草知母元參血熱者根窠焦枯用紅花生地犀角丹皮知母大抵頭頂屬氣分脚根屬血分初胖作痒風也用防風白芷蟬蛻殭蠶不甚興發用蟬蛻牛蒡起發不勻用防風頭面不起用川芎白芷不起服馬乳可起胎舌黑白用犀角黄連猪尾膏弄舌捲舌用犀角山梔黄連喉痛用桔梗牛蒡子元參山豆根有痰用膽星花粉痘枯者用貝母尋衣摸床譫語用六一散猪尾膏泄瀉用升麻澤㵼咳嗽用甜桔梗前胡五味子嘔用竹茹渇用五味子麥冬泡母用陳皮茯苓知母萆薢水泡用白术茯苓泡漫多用官桂腹皮破爛之五六日不起用獨聖散䕶心散六日内發喘必食毒物所致多加川芎桔梗枳殻以㵼火毒壯熱焦紫塌陷肉腫不起者毒滯肌肉也板硬不起腹脹身熱者風寒阻塞也加賽春雷此攻發壅遏不可缺賽春雷也只板硬不灌者痰滯經絡也加一丸春此托裏停漿不可缺一丸春也胖期虚症加減法胖期遇虚症仍用益元湯為主加減白术當歸陳皮川芎桔梗甘草升麻五六日不起皮薄易破色不紅活用人參黄茋加肉桂白芷人乳酒漿服血不歸根用紅花白芍四肢不起用桂枝防風頭面不起用川芎白芷咳嗽用麥冬前胡五味子水泡用白术加白芍防風白芷皮薄陷塌用黄茋白术天蟲痒甚大加温補重法用猪鬃箒拂之泄瀉用參茋白术散加猪苓澤㵼白扁豆苡仁蓮肉茯苓山藥甚者用肉菓訶子升麻木香附子肉桂生薑嘔吐用藿香丁香砂仁煨薑白荳蔻元氣下陷用保元湯六日尚不起壯服前藥後飯頓桑蟲酒漿服下或保元湯加穿山甲末起脹期内雜症腹痛腹脹不食便血便黑嘔嗽吐瀉痘痛痘痒賊痘蛀痘發泡水痘赤痘水晶痘發疹餘丹發斑大便閉小便赤少詳各症門起脹雜症治法表虚毒重一齊擁出表虚不能收攝以致皮肉虚腫毒氣奔潰一齊掀發必主痒塌或成潰爛急宜救表用十宣散調無價散活血散兼消毒散裏虚壅遏留伏不起將成血泡之際或出而不起起而不透尚有一半紅點者此裏虚毒未發盡留伏壅遏也必不能乳食急宜救裏用十全大補湯合勻氣散或參苓白术散合無價散大便如常宜半温裏半助養之劑若吐瀉口渇而不長發者用陳氏木香散主之芫荽酒噀之雞冠血和酒桑蟲漿酒漿發之或人參透肌散參苓内托散加升麻防風前胡柴胡甘草以發之毒為寒鬱不起痘為時令大寒所折不能起發者並宜温肌透表用桂枝葛根湯去石膏杏仁合服畧起再以十宣散發表托裏外用芫荽酒噀以助之風寒所侵鼻塞聲重咳嗽不起者用人參敗毒散若只為冷氣所侵肌膚粟起不發者用陳氏木香散加紫蘇桔梗附寒折痘案一痘五日形色少神腹脹喘急腸鳴肢冷或疑内傷或疑陷伏殊不知内傷者按必痛陷伏者必煩悶今便利安寧而虚鳴者乃隂陽二氣不和傷冷症也或服凉藥也經曰中氣不足則腹滿腸鳴以理中湯加木香陳皮官桂疏逐冷氣諸症悉平又以補中益氣湯調理而愈一因春夏久雨寒濕所侵不能起發以五苓散加蒼术防風多服平胃快斑湯而愈毒為熱蒸不起嬰兒純陽痘瘡未出之先或遇天氣炎熱當與疎利庶幾起發之時其熱稍輕疎者疏散其熱氣利者清利其九竅只用輕清之劑使無壅遏而已斷不可用猛烈之藥夏秋之間熱氣蒸灼痘色變赤掀發或糜爛不堅實者先用黄連解毒湯合五苓散合升麻葛根湯合人參白虎湯以解熱次以調元湯加麥冬五味子以補氣外用天水散調百花膏塗之炎蒸煩躁發渇痘不起者用五苓散加木通葛根或人參竹葉湯氣虚痘起發遲頂平色白者氣虚也用四君子湯加人參黄茋官桂色白頂陷用雄雞冠血入酒漿服或雞附湯伏雌湯鴿附湯若素食少脾弱用人參白术散去葛根加官桂十全大補湯去肉桂加木香因吐㵼以致氣弱者用四君子湯合益黄散瀉未止用荳􅛌甚者用陳氏木香散痘半起忽陷白者急用内托散或補中益氣湯白而嗽者急用保元湯加丁香川芎白术粘米虚寒症俱見用保元湯加肉桂傷食加香附山查嘔吐加藿香半夏腹痛加砂仁膨脹加山查厚朴胃寒嘔清水加丁香㵼不止加訶子肉菓或用補中益氣湯去當歸加桂枝蟬蛻或保元湯加川芎白术肉桂須令便實痘紅綻失此不治後難收功有痘粒通紅止成血泡而不能成漿嫩薄光亮平而不尖圓此氣虚血溢嬌紅晃痘也失治則氣愈虚而成血陷變痒塌矣宜大補氣血用參茋湯主之或四君子湯合勻氣藥加黄茋肉桂川芎丁香人乳酒漿和服但血陷雖紅淡而不紫也紫陷屬熱身熱氣粗血陷屬虚氣少身凉相似而大異不可不辨皮嫩色嬌淫淫而濕者此氣不勝血也用四君子湯加肉桂荆芥防風黄茋當歸芍藥根窠雖紅頂不圓滿或紅活粗肥而皮薄易破後必痒塌難收用保元湯或十全大補湯血虚痘起發而根盤不聚或淡白乾枯謂之不肥澤帶青紫黯色謂之不紅活此氣至而血不榮也活血中須加調氣氣調則血活也用四物湯加人參麥冬骨皮紫草紅花外浴水楊湯塗油胭脂間服無價散或補元湯奪命丹或當歸活血湯加山查木香各一二分脚地紅而血散用保元湯大加白芍當歸以斂之使血得附氣又能活血化漿此心法也有雖不陷頂而色不光潤或虚泡而漿只三四分或有漿而清薄二三日尚不充滿此皆血虚難收急用芎歸鹿茸湯以催足其漿氣血兩虚平陷灰白根血不聚必難灌漿成内攻喘脹聲啞而死用十全大補湯合無價散或人參歸茋湯或内托散送下保生散泄㵼加訶子有斑去肉桂加紫草黄芩痘空囊加蟬蛻麩皮中無水色者氣血俱虚也用十全大補湯去白术加防風牛蒡子燒人糞起發遲根脚不紅活用好酒下無價散或保元湯加丁香粘米山查人乳服後轉色有漿者生血熱有痘紅鮮反乾燥而不充肥者火盛而血不足也宜退火凉血用快斑湯乾不起用水楊湯浴四五日紅紫掀腫毒未化也用四物湯合消毒飲加紅花丹皮骨皮紅焦不起口渇用紫草飲加紅花連翹黄芩根頂赤艶者火勝也用解表散火湯紅紫黑陷熱甚者用保元湯加紫草生地木通川芎紅花或無價散内托散去肉桂加紫草紅花黄芩下四牙散有痰先用抱龍丸降痰後煎紫草湯加蟬蛻末調四牙散紫黑焦陷惟無比散至寶丹為聖藥毒重顆粒分明面上皮肉皆紅或間有小紅點如麻子大此風毒上攻也急用紅花燈心紫草湯紫草膏解退其毒慘暗不明用升麻湯加黄芩黄連紅花紫草丹皮四日稀疎紅綻惟正額平塌少神照之隠隠皮膚中密如蠶種乾紫不潤煩躁不寧乃氣虚而毒盛至六朝漸紫黑而平是火極反兼水化逆也急宜發之面上痘少内多紅點者不治面上痘好間有一二塊無縫者可治養漿賦六朝七日之期順候漿行半足人有虚實毒有重輕故漿有遲速虚瘡方見分光毒重而壅遏者乾枯退縮氣盛而掀發者飽滿光榮頭面行漿而四肢勿起切勿慌張腿臁發泡而額臉焦枯且休歡喜面頰最嫌破頂肩背尤怕焦囊飲食不多或致臟虚而内陷水漿頻進恐來泄㵼而成虚飲食減少而便溏本從虚治熱甚秘堅而煩渇還作實看紫黑乾枯急攻發而或活氣血塌陷重温補而全生發嗆愁其失聲喘急恐其腹脹語忽妄兮神亡腫忽消兮氣脫食榖則嘔兮胃爛飲水則嗆兮咽傷咬牙兮邪陷而腎敗寒戰兮陽弱而隂強膿反乾兮倒靨膿不成兮伏藏呌哭不止兮毒攻腸胃悶亂不寧兮火入膏肓火侮肺金痰涎喘嗽木乘脾土目劄無休肝絶則淚流不已胃敗則噦惡頻來漿清作痒皆由肺氣虚寒驚悸譫狂只為心經不足瘡或白而少神根雖紅而莫治皮不起而離窠脚雖赤而難生淡白而塌濶此内必無漿汁皮薄而嬌紅有漿亦是清稀犯此數端八九日必然發痒若還壯熱燎人不痒定行乾燥紫色乾枯不須着眼中凝血跡或可幸生漿既行而半足時則未宜收靨忽爾一齊紫黑自古名為倒靨請君莫認為結痂攻發若得其宜此症猶堪重活傍生血點再行漿危症又當再治若見氣亟而腹脹黄泉伊邇失音而聲啞陽數無幾俱係倒靨壞症灌漿總論膿者血所釀也有血則有膿無血則無膿有膿則毒化而生無膿則毒不化而死故必大小多寡起發充滿初出至七日為灌膿之期先出之痘當先起頂漸漸長大其形圓滿光澤而有膿窠者毒化成漿也色如綠水而漸變蒼蠟以手按之皮囊堅實飲食二便如常更無他症者吉苟失于調理毒不内清外症凶惡頂陷不能灌漿更以寒熱虚實分别施治看膿之法火照之内外光洞手按之皮薄軟陷者無膿也火照之而内暗手按之而如鼓者有膿也痘瘡初出一點血只成小小血泡起發則漸長大血化成水為水泡至水泡轉作膿泡始成實矣成實之時却要個個圓滿成膿肥澤飽滿脚根紅活色如蒼蠟則可以刻期而收斂若頭面先灌而身痘空虚猶可漸補若手足充灌而頭面空虚則是元氣虚不能領毒升發危症也急看膿窠血聚無他症則大補氣血必俟灌滿猶可回生若頂陷而兼灰白則氣血俱離無能為矣痘六七日隂中之陽盡發于外内則空虚如釜中之氣妙不可言陽起一分痘隂亦長一分故漿以漸而黄根下紅暈亦以漸而𦂳如線圍定不消散晝夜痛楚飲食倍常大便少身㣲熱者吉兆也反是者逆欲決死生惟視血暈聚散膿色真偽耳真膿實色燁燁手揑粘絲偽膿則土黄色聚則氣拘血而化毒散則氣拘血散而真氣将絶故血暈全無者多死六日以後耑看膿色若或有或無而根脚不紅或連肉灰紅痒作煩躁目合復開作㵼不食乾嘔少睡是氣虚不能拘血化毒也亟峻補之倘此時舌上尚有黑胎芒刺則生意已絶補之無益也根窠者血之暈膿者血之腐故六日之前耑看根窠無根窠必不灌膿六日之後耑看膿色無膿色必不收靨無形者依有形有形者依無形氣血之道也氣血交㑹後看根窠為慿凖粗𦂳紅活生意沛然若㣲細不現不斂色久黯淡則氣血離去必不能制毒矣是故内攻而根散者死内攻而根血猶附者非毒作楚必三因致之三因詳見二卷漿行七日腫要過頸漿要過胞腫者毒外出也言過頸胞者從上而下也至陽物亦要灌乃宗筋之㑹也兩脚不灌不妨兩臂亦要灌滿脾經所主故也不灌者收時必不食而生變痘至八九日或土黄色而硬者不可妄為正漿此是隂陽失其正漿阻于中板膩而黄硬也名板黄痘急須治之經曰珠不在大在乎體之明漿不在足在乎色之正八九日最忌漿清皮薄書曰漿以毒成毒從漿化不由此而徼倖收功者未之有也一歲半歲者即七日即蹭打不定揩破不痂萬無一救年大者亦止九日死蓋痘以七日為期界七日以前氣血外行七日以後氣血内入方外行時尚不可留毒況内入時乎故七日後躁亂者毒攻内也毒既内攻必死矣頂白根紅氣血分光也在四五日間不分則後必作痒頂充根附氣血交㑹也在六七日間不交則後必有變至是而根白地清起勢勃勃可不藥而愈若猶深紅壯熱則疔将作也四日用清六日用補乃治痘之常法若隨機應變是在靈心慧眼矣凡形色大惡氣血不變膿漿不成似乎必死矣若精神爽朗便食如常天庭上有一二恱目者猶可攻發或作臭爛而愈蓋以毒在外而不在内也一痘至十三朝壯熱乾紅勢甚危一醫至聞其聲音清亮飲食不減用攻發藥倍加山甲作臭而愈正審其在外不在内也毒停肌肉則發腫毒滯皮膚則作臭肌肉陽明主之屬土壅腫土之象皮膚太隂主之屬金腥臭金之象各從其類也滯比停覺流動些臭則腫之腐也皮膚比肌肉又自内而之外也然則肺比陽明又外之外乎即此可以知淺深又陽明多氣血易腫肺金主從革故變臭凡調膿期收功之時務要手足和煖過熱過寒者變也人事常要安静煩躁悶亂者變也六腑常要充實忽吐忽瀉者變也聲音常要清亮喑啞者變也飲食常要漸進忽作渇不食者變也或觸風寒禁忌或傷飲食湯藥皆當審而治之灌期順症六七日肥滿光澤八九日漿足漸厚如黄蠟色歛如螺靨此氣血歸内毒氣散外全功收矣灌期險症元氣已漏洩藥力不中病故皮破有用藥紙封之攻補得宜而生者擦破而瘡痕隠然有生意者穢觸也不當便作死症看皮薄漿清厚薄不均而作痒此元氣不足而虚痒也難治若痘色紅紫皮薄漿濃是血熱實痒也易治灌時膿已充滿口角轉黄上下身俱好只有數粒結靨忽然平伏膿反鋪開口臭惡心眼白𦂳小毒已歸内不治若眼睛清明喉音响亮飲食如常者不妨灌時聲啞氣急者不治如痘色好而氣急傷風所致也不妨灌時尚未起頂但脚漸濶至八九日乾枯瘡皮縐起誤認為結痂者多不可救急用補血解毒庶可囬生灌時吐利不止五竅出血乳食不化者死除二便不下血猶可用止㵼消食藥治之瀉不止者不治痘色虚明如水晶十一二朝防痒塌用内托散加乾薑丁香或木香散加粘米人乳酒灌期逆症灌時平塌不起淫濕不堅者至十二三朝尚有變灌時灰白慘黯皮薄擦破無膿血者死亦有有膿血而亦死者灌時忽然失氣者脾敗而榖氣下陷也腸鳴者胃敗而中氣下陷也皆死症也漿足後大便忽欲去不去者陽明血燥也不治帶熱便出紅色透頂而虚綻至八九日乾枯無膿者死灌時而瘡未盡成膿或鼻凖頭先乾如橘子色或眉心焦黑或耳輪先收或面頰兩邊先乾陷者此名倒靨非正收也諸痘纔灌而兩唇先黄破者死灌時先如瘧後渇血死而色黯不時努氣如欲大便口舌牙齦多白色難進乳飲食唶喉不已發大痒顛倒悶亂抓破不復灌腫即成坑窟面部痘如火燒湯澆之狀不待抓破而爛皆危症也痘脚青色背心無膿吐瀉蜖多膿不過膝痘多目閉灌漿三日症治行漿第一日乃標後第七日也前六日有熱者即解熱無熱者即調理脾胃至此自然充灌若此時無膿頂陷不起者由前失治故也用保元湯加川芎當歸粘米有熱症者去肉桂加乳酒調下五仙散或大成散空殻痘由元氣虚脫須固元氣此時膿露者用保元湯不應加還元湯合大成散行漿第二日灌膿宜漿滿若有他症不過外邪耳惟無膿而色白晦陷者雖飲食如常别無他證亦必死用調元湯加川芎當歸粘米救之腹痛用丁香咳嗽用桔梗貝母漿難充灌用保元湯合大成散此時猶身熱無膿者多死行漿第三日氣血形色已定灌膿宜滿形色宜不變即使膿雖不滿但潤澤光明猶可救也惟乾枯灰白遍身如湯泡火燒或腹脹氣粗手足皮縐不腫痛者皆死蓋痘有膿者必腫痛若不腫痛定無膿也漿期雜症主方治宜托裏化漿以保元湯無上飲為主然後辨氣血表裏之虚實寒熱加減治之漿期雜症加減法氣虚用催蟄丹震蟄丹保元湯白术散送下血熱用催蟄丹同退火散無比散凉血地黄湯四物湯送下初熱表閉用黄金散同蟬蛻紫草湯送下黑陷無漿用排膿散同老酒送下黑陷帶水不起用震蟄丹同人參老酒送下已上各方皆朱恒田三神散中方也以此而再變通之則善矣若毒未解尤宜凉血解毒用人參黄茋甘草加當歸川芎白芷桔梗殭蠶粘米六七日火不盡退胭脂紅而血不燥用乾菊黄芩銀柴胡乾紅枯燥用補元湯加紅花丹皮生地雞冠血血滯用黄芩山查紅花紫草滲脚紅無火者用白芍有火者用屋游血游用槐花紅花地骨皮毒盛色暗用連翹牛蒡犀角黄連紫草溺赤澁用燈心發痘用桑蟲漿同酒漿芫荽汁隔湯頓熱服煎藥過一時然後服燥後借托用猪尾膏虚寒症亦宜温補頭面不灌用川芎督脈未透用皂角刺背枯燥用知母膿清頂陷用人參黄茋下臉不灌用川芎當歸上下俱不灌用人參當歸鹿茸足不灌用歸尾牛膝足冷用桂枝牛膝根窠枯熱用紅花麥冬淡白用川芎當歸口渇用花粉麥冬生地紅花丹皮虚痒用白芷丁香首烏官桂火痒用黄芩骨皮托膿止痒用殭蠶桑蟲白芷抓破出血或破傷風用保元湯加山甲痛如刀割用黄芩白芍骨痛用銀柴胡壯熱不退用柴胡麥冬十日前後轉渇用花粉知母黄芩頭痛用川芎氣不順用木香寒嘔用乾薑附子丁香砂仁熱嘔用山梔黄連竹茹伏龍肝喉痛用甘桔元參牛蒡山豆根熱噫氣粗煩渇用山梔黄連竹茹手足厥冷用白荳􅛌丁香氣盛發泡用茯苓白术滲之四肢水泡用茯苓白术芍藥青皮苡仁發疔用生地元參紫草犀角紫花地丁痰盛帶水用油炒半夏枯燥結痰用貝母牛黄熱者用八寶丹半膿血少用丹皮紅花山查隂症用附子防風石菖蒲白术丁香丹皮紅花虚寒泄瀉用保元湯加訶子荳􅛌甚者用荳􅛌丸固本丸吐瀉少食用煨薑陳皮縮砂仁抓破出血用荆芥川芎防風白芷絲瓜舊囊燒灰敷之七日痘大㵼者急補澁之若精神徤漿色正飲食進根血𦂳乃陽症也雖瀉無妨看舌色用藥止之防手足有疔起挑破去其惡血用四聖散敷之熱瀉者痘色光明潤澤此餘毒入大腸自行自止泄一次痘長一次切不可用止澁藥痘色好便實能食者宜用四順大承氣湯之力宣通之使毒不留于大腸而生他變凡重痘十日内渾身壯熱飲食少進只要大便黄稠目見物色能知滋味不痒不嗆不渇舌尖紅潤手足心隂囊胸部俱得靨實皆有生意可以審而治之附金液無上飲方此補藥之主方自灌膿至結靨皆用之加減黄茋必生用補表托毒灌至手足方用蜜炙人參補中氣生津液通血脈陳皮量人參多寡用桔梗行漿至腹男換牛膝女換苡仁貝母消痰化毒川芎頭面漿足去之當歸按身尾用之桂圓五個薑皮二分山藥燈心粘米漿期應用藥方人牙散獨聖散二仙散催蟄丹震蟄丹猪尾膏大無比散小無比散參歸鹿茸湯參麥清補湯周天散宣毒膏倍金散硃砂散牛黄八寶丹奪命散木香散異攻散荳􅛌丸固本丸灌漿期内雜症寒戰咬牙倒靨發􅏴嘔噦欬逆嗆水吐食泄㵼發渇痒塌腫痛便秘溺赤俱詳各門灌漿雜症治法當灌不灌氣血流暢則毒化成膿若至八九日起發之後當灌不灌者與不起發而陷伏者分虚實治之凡痘無膿不拘寒熱症俱用丹皮生膿大凡氣血虚寒者不能運化成膿宜用温補過十二三朝必至喘渇瀉痢而死葢虚寒者必延久而後内攻也用參茋芎歸湯千金内托散十全大補湯異攻散木香散氣血實熱亦不能運化成漿初宜清氣凉血解毒利小便使無乾漿空倉之患五六日火盛者宜凉血活血解毒透毒托裏以免乾枯過六日即死葢實熱攻冲臓腑最速也妄用攻補必虚擡空殻以致于死用清毒活血湯紫草湯連翹湯大小無比散大靈丹以退熱大成散紫草膏以退紫如黄芩黄連犀角荆芥防風蟬蛻川芎當歸人參知母麥冬山查木通紅花地龍丹皮山豆根皆可選用大便閉用宣風散承氣湯紫姑奪命丹熱極毒熾恐復入心昏悶而死非虚寒陷伏之比急用龍腦猪尾膏以解之風寒感冐者當温散用桂枝葛根湯加黄茋防風白芷穢氣觸冐者當薰解用紫草飲及薰法初時起發膿期變壞症者必因脾胃虚不能食或自利也若出未勻發未透致毒陷者必誤認稀疎之過也水泡須以銀針挑看若有水無膿當温補以防作瀉用四君子湯兼無價散空殻無膿全屬氣分因產母弱不能䕃養兒所致用異攻散愈後再補之雖灌不滿痘至九日漿雖灌而不稠膿雖滿而不圓頂或平陷脚或濶塌者此氣弱不能領血也用保元湯合四物湯加肉桂十全大補湯加乾薑木香若無膿之陷逆症也亟用保元湯加川芎當歸芍藥肉桂木香粘米人乳酒漿膿不甚滿必飲食少痰涎多用養胃開痰湯服内托藥頂暫起不久又陷者膿未充足也用内托散倍加人參黄茋川芎當歸肉桂升麻乳酒或囘陽丹羅浮方若氣虚不能領血成漿乃于灌膿七八分之際忽然頂陷脚濶漿水鋪開痘顆既破元氣益泄決不成靨矣兒㓜者不治三四歲外者用無上飲加白术芍藥黄茋人參可救若塌與肉平者不治形色忽變灌膿忽變者當辨其色變紅紫黑陷者血熱盛也用當歸活血湯合解毒湯加升麻葛根漿雖滿而色太紅根脚散漫無一線紅繞者血熱盛而未解也九十朝必發痒用參茋内托散保元湯加蟬蛻木通荆芥芍藥山甲漿滿為寒冷所鬱忽變青紫黑色如葡萄者必驚恐所致也亟服肉桂即可轉色若灌膿既足必無再陷之患四五日頂漸平六七日脚愈濶頂愈陷色全白如荳􅛌者乃氣血大虚也八九朝兼寒戰者是為倒靨用參歸鹿茸湯加肉桂川芎白术或田單火牛湯灌漿大半之際元氣弱陽日消隂日長色灰白寒症悉具名反隂症宜開竅補精温藥救之用奪命丹或保元湯加二神散大補化毒湯固本化毒湯淫羊補漿湯或保元湯加川芎當歸丁香肉桂升麻鹿茸人乳酒漿服藥後必大渇索飲切勿與之俟索三四次方與之即刻頓成一身血漿葢此藥勇烈不及化水成漿故色不黄而紅乃血之正色也此後連服加味參茋白术散㵼不止兼用厚脾散荳􅛌丸或煉臍法無不愈者又當看其皮之厚薄薄者不過半漿厚者用保元湯加紅花紫草連翹桔梗當歸木通八九日漿似足眼忽開陷毒内攻也内攻者必悶亂煩躁根暈飛散若無此症而唇舌滋潤用内托散加肉桂附子唇舌燥赤者用黄芩黄連皮軟縐嫩痘雖起而皮嫩按之水漿就出内色不暗名假壯痘必不能成漿毒必内攻用保元湯加丁香川芎粘米以提其氣服後有膿者可救一二痘雖脹摸過即縐此血至而氣不相依也必難收靨亦險逆之症用參茋内托散加木香肉桂粘米或七珍湯加山甲粘米乳酒痘光澤如珠者嫩也臉必油紅或初標有痰碎小攤紅痘色不堅若兩顴畧見蒼老者亦有生意用保元湯加川芎當歸蒼术以徤脾膿時最防痒塌抓破悶亂口噤揺頭手足亂舞直視若精神清爽自誤抓破或痒不止要人按捺者亦不妨宜大補以防痒塌用保元湯加川芎當歸殭蠶白芷乾薑肉桂虚人似實血熱似虚有痘密毒盛氣血弱或煩渇或咽痛或鼻衂此元氣不勝毒氣稟弱者多有此症既忌寒凉又難温補十無一生宜用參麥清補湯救之根窠紅甚壯熱壅遏黑白相兼色暗而肌表不達形似虚寒宜凉血助痘使毒氣流暢手足不充灌時候已過尚未充灌終為不美若四肢已灌膝下流通亦無害矣若因脾胃弱而不灌者用越脾快斑湯縱得收功日後手足關節腕膝處必發􅏴毒若破爛成片而不灌者不治腰背肩臂破損數處久着床席烏得不損但破損定須腫灌若乾枯黧黑如火燒湯潑者必死附案一痘七朝紅綻勻朗能食便調有行漿之勢但臂胯腫痛如𤓰此手三陽虚而毒凝不散也補陽氣而腫自消矣用人參黄茋當歸芍藥羌活防風橘紅白芷山藥人中黄痘頂有孔膿未成忽頂有孔出水堆結在外囊空自乾黑者此漏瘡也必死膿熟後窠皮亦熟水沸出因而結痂頭額者有之此名堆屎收不與漏瘡同例葢漏瘡者膿未成也堆屎收者膿過熟也養漿先靨痘正養漿面上諸部眉心鼻凖耳輪口唇頰輔先乾黑者毒火内攻也宜攻補兼用服藥後乾者復灌未乾者充滿空地出小贈痘上也不作膿不補空或發􅏴毒者次也否則不治用人參黄茋當歸芍藥生地連翹銀花紅花子山甲得手足發􅏴後用十全大補湯加連翹金銀花若膿未熟兩頰先乾皮肉未硬兼煩哭者毒入肺肝魂魄不清也欲解毒則中氣反傷欲補中則邪氣正盛必死症也實熱變虚寒膿期有見實熱症而過用寒凉變出寒症如氷硬嘔㵼唇舌淡白漿清痒塌之類延綿不治則腹脹悶亂寒戰咬牙而死矣宜托裏湯為主加減附方黄茋人參甘草肉桂當歸白芍白芷木香陳皮山藥粘米酒漿人乳寒症重者木香散異攻散皆可選用泄㵼去當歸加升麻訶子肉􅛌嘔用煨薑腹痛用煨薑神麴咳嗽用麥冬五味子水泡用防風白术白芷抓爬爛用松花喬麥粉摻之益元湯為元氣虚者設也元氣素虚則火不易動故終始不移者若元氣素實過用寒凉以致變寒者是火由寒伏也若又過于温劑則藥下咽而無實之火炎炎起矣故立此托裏湯令醫者斟酌施治如漿足而不減參茋唇舌紅而不除桂附必有實實之禍失明肢廢夭扎者皆從此始也醫貴識病故六日前看唇舌六日後看舌胎此用藥之樞機也有舌胎者清之下之胎白者温之補之不胎不燥不淡白者平之調之當此毒盛之後概用温補焉能無悔乎虚寒變實熱膿期純虚症仍用益元湯為主人參黄茋白术甘草廣皮當歸川芎桔梗升麻九十朝加黄芩芍藥雖有加減皆是補氣血之藥十神湯切不可用虚症如寒戰泄瀉痒塌之類亟用木香散異攻散酌治之如膿色一定唇舌轉紅又須除去惟照益元湯加升麻桔梗白芍茯苓以助收斂不可偏執温補也若虚症而反見腹脹喘急便閉而渇用麥冬湯主之咽喉乾燥此是虚症變實非實症也用滋隂潤燥湯倘誤用疎利則方生之氣又轉而虚脫矣或問益元湯首尾不可易得毋太泥用補殊不知用藥有訣惟舌為凖能識唇舌而進退之多用少用均無不可何泥之有膿期治案一痘窠空無膿此氣虚伏陷也幸人事清寧飲食如常用補中益氣湯歸茸湯而愈一漿滿而根血淡紅痰涎湧盛日晡潮熱咸以虚治用保元湯加川芎當歸陳皮貝母不效不知此隂虚火盛生痰也用六味地黄丸加人參肉桂附子温之而痰絶熱退又用補中益氣湯而愈一漿滿痰盛食少便溏此脾胃弱不能運化精㣲使津液凝滯用六君子湯加炮姜而愈一漿足忽㵼身冷自汗此虚症也以保元湯附子理中湯加肉果而愈一漿足色不蒼蠟此脾弱也脾主結痂用保元湯加白术陳皮白芍蓮肉官桂收厚靨而好若痂薄如麩只以參苓白术散主之一九日無漿倒靨獨根窠歛束以保元湯加山甲官桂又以水楊湯浴洗頭面手足復起成膿而愈一九日正面無膿自口以下皆紅綻能食便溏乃氣弱不能升于面以保元湯加白术白芍官桂肉果升麻十一朝補出贈痘各部漿俱足又服小異攻散而愈一正面漿足四肢身體無漿能食便溏完榖不化此脾隂弱不充灌用參苓白术散加附子兎絲子肉果又用河車散而愈一八日空殻無漿此氣血弱不能發毒用補中益氣湯發疔四五而安一八日倒靨泄瀉煩渇寒戰咬牙此虚寒症用異攻散而愈一八朝頂陷漿滯焦紫此風寒鬱閉也宜升散用紫蘇飲水楊湯浴使藥藉湯浴上升毒隨煖氣而發而愈若小兒即浴頭面手足用補中益氣湯調理一漿期昏睡不醒便溏能食乃脾弱倦也用歸脾湯加白芍山藥苡仁蓮肉一漿不易充根血赤色煩渇溺澁舌燥便閉咸謂氣虚不足于津液用保元湯加麥冬愈不行漿不知此血熱未解温補反助火邪用犀角地黄湯又四順清凉飲利之漿足而愈一漿足忽一齊結痂乾紫能食調和此火迫而收之太急倒靨症也用補兼攻發之劑十四日四肢腫痛發􅏴膿成毒化而愈一痘九朝毒火悶瞀死棄之沙灘視其手足動掣色雖焦紫形尚綻突得水氣而火衰故復甦也治以犀角地黄湯而愈亦有得土氣而解者一七朝根窠赤痛便閉溺澁煩躁飲水用清解藥不效此熱毒内藴也用大黄當歸赤芍甘草及犀角地黄湯而愈一漿足紫黑熱盛便閉乃毒壅也以黄連解毒湯加連翹牛蒡而愈一漿期便血溺血多睡神昏此邪乘血虚而入心也用犀角地黄湯安神丸得毒盡外出以補中益氣湯加麥冬棗仁而愈一季春患痘妄言晝夜不眠七朝尚未寧其形色俱順此心膽二經火熾也以犀角地黄湯加龍膽柴胡而愈仁端録卷六
