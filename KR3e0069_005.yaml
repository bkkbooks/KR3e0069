body:
  text: 仁端錄卷五明徐謙撰陳葵刪定按期調治痘毒之發也全賴氣血以化之氣血之運行也又賴元氣以主之故痘之生長收藏猶夫四時之氣自有定期過與不及皆乖也雖其變局靡常不外表裏氣血虚實寒熱所貴明哲之醫調之適中耳不但藥餌不可輕投凡服食起居一切禁忌不可忽也發熱賦欲決重輕先觀發熱熱㣲毒少熱甚毒多大熱安静兮毒隨熱出小熱煩燥兮毒與熱留凶變莫測兮又熱又渇輕疎可許兮乍熱乍凉是故初熱悠悠身熱尤宜氣息和平二便如常面容不改兼之睡卧安寧便見痘來順候順症如或肌色青而㿠白精神少而倦怠再見便溏哯乳痘出決然不振此症斷作虚看只宜補益為要虚症若乃腹滿口張煩躁便秘肌膚燥而毛色焦口氣熱而身燔灼又加譫語妄言此症均為蓄熱熱症五竅不通須防失血點來隠隠出恐復顛吐乳更兼劄眼面青又見搖頭狂亂忽生發驚先兆逆症呵欠頓悶兮肝木之因咳嗽噴嚏兮肺經之象手足稍冷而昏睡兮脾土困於中央面目帶赤而驚悸兮心火炎於膈上惟腎無症耳尻則凉泄㵼者邪盛于下嘔吐者邪盛于上氣逆而腹疼隠隠毒盛而腰痛皇皇心熱甚而驚搐脾邪實而顛狂口燥咽乾肺受火邪而液竭便鞭溺澁腎因火旺而津亡五臟所現雜症是故熱甚者只宜清凉發散不宜峻用苦寒發散則毒得外出而熱自解苦寒則毒反氷伏而出愈難未萌先㵼有熱症莫作虚看無熱症便為虚論止熱㵼以清凉重加發散治虚溏以温補仍出開提清温雖異發㪚開提則同不過畧分輕重耳総要提發毒氣在外發熱辨病有似是而非似同而異者即如發熱一節須辨而治之手足指㣲冷面青而慘煩悶惡寒左額有青紋無汗頭痛脊强傷寒也手足指㣲温面赤而光鼻流清涕煩躁自汗惡風傷風也陽以煦之故有清涕風者陽也若傷寒則冷冽以燥之焉得有涕若熱驚熱丹等症又是火以燥之直是陽氣過分處故亦少涕又肺主皮毛風傷表故有涕若表邪傳内則當見膿涕矣眼胞腫而右額有青紋身熱而腹額最盛或夜熱晝凉面黄腹脹不食或吐或利腹痛傷食也身熱而倍能食唇紅面赤小便閉脇腋下汗皮膚赤色時時啼叫丹熱也面赤面青額中有青紋手掌心有汗心包絡也獨處不寧丁由外觸手脈絡㣲動此撩驚也如冬天欲發大風必有撩西風之候驚悸此驚熱也唇上下汗出唇中間起一白泡及耳隂冷者變蒸也目閉面赤者胎熱也目雖肝經乃五臟精華周身變革自欝抑先徴于目雜症之邪由外而入痘瘡之毒自内而出雜症只在一經痘則五臟之症俱見故面燥腮赤呵欠頓悶乍凉乍熱眼澀含淚睡中㣲驚咳𠻳噴嚏譫狂吐利紛然雜出止是耳骩冷尻冷中指冷耳後顴上俱有花紋赤縷乃為痘症耳熱有輕重有熱一二日即出者名鬼箭帶驚可救有熱五六日出者名愆期險症也有熱七八九日出者名逐盧此皆太過而正不勝邪愆期則氣凝血滯惟熱三四日痘一出身即凉為正候毒輕即或出齊後有再熱者亦不妨所謂蒸漿熱也故曰五榖不遇熱不結痘瘡不熱透不徹熱太過者真元燥熱不及者陽明竭發熱類熱宜早退痘毒與時氣相觸而動内傳百脈外注皮膚故熱者痘疹之常候也但熱甚毒甚熱㣲毒㣲㣲者勿藥有喜甚者必在初熱時調之宜早觀其毒重神昏即以清解之劑投之或發表或攻裏在所不避必使一晝夜表裏通和熱退為佳葢惟解毒則熱必退退則自然明朗稀少若不早為疎通表裏則毒無出路小毒釀成大毒迨至出齊則順逆險大勢已定無可挽回矣發表攻裏二大兵也先天藏毒非周身和暢氣血無阻者不能盡出故必大兵乃可取效于一時雖然熱又不可驟遏也痘非熱又不能鬱蒸而出但須輕解之毋令太甚耳用藥須審發熱㣲甚若初發熱渾身壯熱熇熇然不渇清便自調此邪在表拂鬱于肌膚之間宜用清揚之劑發之升麻葛根湯甚者羌活湯初發熱表不甚熱煩躁不安口渇小便赤澁熱在裡也宜清解之用紫草膏保嬰丹辰砂六一散犀角黄連黄芩山荳根之類初發熱熱烙手目赤鼻乾唇燥小便赤大便秘煩悶不安此表裏俱熱毒氣壅遏也宜發表通裏用雙解散惺惺散初發熱若有大熱當㣲利小便使心火下引而洩宜用導赤散為上加味連翹升麻湯如熱甚痘出紫黑者即于解散藥内化下保嬰丹一丸能令重者輕輕者愈或用敗毒散化下稀痘丹年紀大者亟服消毒化斑湯初發熱有小熱則不宜利小便以損真氣但當解毒用犀角地黄湯紫草湯消毒湯玳瑁湯如聖散汗後熱猶不退宜急服解毒退熱湯更研辰砂末水調塗眼可免眼患不宜用紫蘇麻黄薑葱汗後熱不退而煩躁譫語宜用敗毒和中散痘既出而熱猶甚者此毒未盡解難治之症只宜解毒利小便用加味升麻湯熱久痘不出蓋發熱三日見痘者常期也如經四五日痘猶不出熱勢不休者當分内外虚實以治之如風寒外鬱閉塞鬼門痘影焦紫毒鬱在内非用麻黄解毒湯㣲汗之則不解必要發出鼻汗發熱順症耳後紅筋色淡脈浮大而數身無大熱腰腹不痛神清氣爽身熱和緩飲食如常二便調適三日見點堅硬碍手肌膚温如潮潤唇舌滋潔無胎聲清亮睡中㣲驚發熱逆症耳後紅筋色紫脈沈細而遲一熱出齊惡寒戰慄煩躁喘渇吐瀉昏睡熱如烙手眼紅口唇紫黑破裂胸高而突目閉無魂初熱遲見紫斑吐瀉有蛔蟲初熱舌焦黑黑點聲啞噦噎神昏腹中大痛腰如被杖見點而痛不止若表過痛止可治表後痛甚者不治頭面一片紅如胭脂頭温足冷昏悶如癡渇飲不食下血吐血九竅流血掌紋出血齒綻出血頭紅唇白更加形色不善初熱腰痛而後見點點燈照心窩及周身皮肉有紅紫成塊此毒壅不出亟與解毒散血猶有可生之理面有大痘數點而痘不出復不除熱亟為挑破塗四聖膏遲則不救見點于眼角印堂髮際頂上復發大熱一齊湧出及出痘後熱一次又出一次者均不治之症也發熱三日症治發熱第一日初發熱症似傷寒但耳尖鼻尖中指尻骨俱冷為異耳須看熱之輕重以定毒之㣲甚也輕症初發熱乍進乍退或身熱而不思睡即睡而目不迷口不甚渇人静神安小便自利淡黄肌肉温平潮熱唇舌滋潔無胎聲音清亮睡中㣲驚便實如故是也其痘必稀不須用藥即用藥亦輕劑一服便止不可發盡其熱反致痘難出也重症熇熇發熱蒸蒸作渇昏睡睡即目迷口燥唇裂小便甚利尚未全鬱在内人半静神半安煩躁昏悶其痘必多急宜解毒發表主治如升葛柴苓荆防翹查通芎赤芍之屬或參蘇散去參重劑濃煎即以此方再煎消毒飲重劑一服留一盞調下小無比散如未效調大靈丹必驗危急痘一發熱面耳灼熱手不可近唇裂舌胎煩躁口渇發狂惡寒煩悶目内白睛紅兩顴頰皆紅二便閉澁是也治以通泄為權惡寒用蘇桔湯加元明粉或千里馬惡熱宜單下與前症俱以舌胎為增減不可拘初不當下之說此又百中一二又不可遂以為常法如唇舌滋潔無胎雖見惡症切不可妄下損人先服通聖散一劑渣勿再煎少定以消毒飲合參蘇飲煎頓服留一盞調大無比散或大靈丹看肥瘦加升麻葛根人弱者通聖散去大黄加紫草元明粉發熱第二日熱當漸減乃為順也若譫語驚狂尋衣摸床失聲叫呼渇欲飲水乃熱毒太盛也亟治之用參蘇飲合消毒飲加連翹山查煎調大無比散甚則大靈丹如不效再一服以人静神安為度須看形體黑白肥瘦加減解毒去痰之劑發熱第三日熱漸輕為順大抵發熱三日之中乃痘毒將出未出之際務令熱毒發出於外乃為先着闗鍵故雖有熱症猶當以痘為主若熱反加于前者是熱毒甚于内風寒抑于外而不能發出也二三歲兒宜烏金膏一丸加大成散一丸小無比散五分四五歲兒用參蘇消毒飲加葛根麻黄蟬蛻少許則風邪自散熱三日仍吐瀉腹痛驚狂膨脹等症此由以前起發未透毒氣内攻也宜辨身之冷熱以為調治之主此時有熱宜清解之以散外邪而諸痘自起初時勿零治雜症防害元氣也止以散托毒為主解毒以翹查消毒飲為第一托毒以大成散為第一如從前未有生發之機不可早用大成散此時無熱症而身凉者薑湯用大成散亦可最宜保治丸加五仙散三分熱三日氣粗喘滿便血下嘔及面上目中一片紅光見黑斑聲啞神昏此必死之症由已前失解故也若㣲粗㣲喘㣲啞㣲紅者十中救一發熱期内主方初發熱時渾身壯熱不渇溲便自調此邪在表宜以升麻葛根湯主之如發熱烙手目赤鼻乾脣燥小便赤大便閉此表裏俱熱宜雙觧散主之發熱實症加減法毋論是痘與否只以蘇梗湯為主加減救苦丹亦同此例前胡白芍換赤甘草紫蘇加防風桔梗換山藥紅花連翹生薑葱煎服煩躁狂熱必用升麻葛根發熱虚症加減法以益元湯為主然後加減前後皆不可易用甘草當歸白术陳皮升麻川芎桔梗加生薑煎服人參黄茋不宜早用恐補實腠理痘不易出有熱症者以沙參代人參發熱期内應用藥方發熱煩燥不安此熱在裏三黄丸利之腹中痛者急備丸主之咳嗽甚者參蘇飲主之發熱期内雜症腹痛腰痛作渇自汗頭痛嘔吐泄㵼驚搐發狂失血咽痛寒戰咬牙發熱雜症治法發熱四五日痘色焦紫毒猶在内鬱不出痘此必風寒外鬱閉塞鬼門也宜用驚蟄丸發汗則熱自退發熱吐瀉不可用止法唯吐瀉酸臭者是傷食也用消導散痘出熱不退痘出而熱即退者必順若熱未退而見標或標後而熱仍不退是毒未盡出也名火裏苗宜服清地退火湯秦芁湯解肌化斑湯連建升麻湯加荆芥防風青皮解毒防風湯加升麻但所感不同有寒氣外鬱有熱毒内攻均宜散之用十神解毒湯加救苦丹若熱仍不退痘漸加多者審舌與二便舌黄胎便閉用千里馬柴胡飲溺澁用連翹湯二便閉澁用八正散利用黄芩湯加白頭翁酒炒黄芩調下赤石脂末身熱壯盛漸變焦紫隠隠不出或肌膚腫亮宜再發之用酒調鷄血或賽春雷一發熱即齊湧出稠密乾枯紫黑者皆為氣滯血凝毒勢擁盛也惟輕發其表凉解其内為治稠密之上策用連翹升麻湯加酒炒黄芩紅花或解毒托裏散或紫草飲疎毒化斑湯以解毒潰熱疎通榮衛令氣勻血活也此等症解之則作㵼不解則内攻補之則助毒不補則不起亟與三元秘方救之既能解毒又可温脾也且活血也服後候其色淡紅熱勢已退然後可補則補之熱三四日不出用白术川歸散不起加麻黄面青無胎從虚治肺胃氣實痰喘壯熱煩渇痰鬱出不快用防風升麻湯或抱龍丸兼舌胎黄白乾燥用前胡只殻黄芩赤茯苓大黄甘草或千里馬下之熱至四日面頰唇口帶紅紫色痘不潤澤身熱不退盖火鬱故也用防風白芷紅花紫草蟬蛻木通煎成膏調小無比散驚狂譫語加大靈丹紅紫斑加紫草膏熱甚多磨犀角大熱不退煩渇飲水譫妄色紅紫此火毒内攻神不守舍純陽症也不亟治將成黑陷乾枯用退火回生丹或辰砂六一散身不熱而止乾焦此内熱也用導赤散倍木通身熱而痘紫焦黑成片此氣血分俱有毒宜導心火而熱自退用解毒疎痘湯去麻黄加紅花或四聖散導赤散犀角飲凉血解毒湯露桃花散調元化毒湯去人參黄茋加川芎身熱氣粗口渇二便閉澁此表裏俱毒盛也亟宜凉血解毒袪火用紫草燈心湯調下大成散譫狂用犀角汁調辰砂六一散根窠紅盛壯熱壅遏黑白相兼灰白色暗肌表不達形似虚寒宜凉血助痘使毒氣流暢若解毒後但根窠紅潤能食便溏吉若色轉淡白又當温補以助其漿虚症須辨表裏氣血痘初虚弱不可驟補須發出毒盡然後可補故補内須升發為主初色白身熱頂不紅口不渇恐後生疔疹水泡不能灌漿宜大補氣益血用八物湯加蟬蛻黄茋肉桂羌活出二三日熱不退用當歸活血湯加酒炒黄芩黄連痘苗未放身熱甚用參蘇飲消毒飲去人參黄茋加木通熱止報點第二日未凉痘苗不增連用四聖散下大成散一日連進三服痘必增痘出熱盛出齊熱尤重稠密紅紫乾枯用調元化毒湯去人參黄茋一熱便出此表虚毒盛也用羌活散加紫草牛蒡蟬蛻煎調紫草膏保嬰丹若熱不退用羌活散調退火丹庶可十救一二身熱壯盛腹滿膨脹喘急非麻黄不能開其壅痘初發熱宜散表標後發熱宜清解熱分大小大熱當利小便小熱只宜清解不宜利小便驟補痘前發熱熱㣲而妄汗之則表虚而痘不起熱甚而不汗則臟腑胎毒天時不正之氣無從而散葢一切雜症皆由毒氣不出之故一表散則毒盡退而他症自去故當解者急解當下者即下緩即生變但不熱則痘又不能出又不可驟遏也見標發熱㣲熱不須施治熱甚者防痘太密用清地退火湯加連翹升麻或代天宣化丸起脹發熱出後却熱甚往來煎熬氣血不能拘毒而出甚有泄氣失血之患宜亟治之用加味升麻湯如聖散柴胡麥冬湯和解湯熱而無漿用鼠粘子湯氣血虚者用補中益氣湯保元湯附柴胡麥冬湯方柴胡人參元參各二錢五分龍膽草一錢五分麥冬四錢為細末每服三錢附鼠粘湯方牛蒡炒研歸身甘草炙柴胡黄芩酒炒黄茋地骨皮養漿發熱痘已出完無餘毒乃又發熱者血少也用保元湯加川芎當歸白芍血少尚有餘毒者此蒸漿熱也用加味連翹飲二劑漿成毒重又發熱者此乾漿熱也不必施治如久不退用秦芁湯養漿時手足熱此毒鬱于中也必大小便秘脈沉滑數宜利之用三乙承氣湯去芒硝收靨發熱回漿之後燒盤之症名乾漿熱不必施治但恐内傷飲食外感風寒以致發熱耳内傷者用木香大安丸外傷者用桂枝葛根湯並用連翹湯将靨忽泄瀉口渇小便短少痘紅潤起壯此内熱也用五苓散加黄芩芍藥煎調益元散服若當靨不靨發熱譫語手足舞亂者此熱毒乘肺無陰以歛之也亟用清金導赤散或砂仁六一散小柴胡湯若煩躁大熱者此毒火内熾更防陷伏也用葛根解毒湯便秘者用紫草膏利之若餘毒不退及痘太密身壯熱者連翹為聖藥也痂後發熱須辨虚實如頭面手足俱熱二便閉者餘毒盛也亟宜解毒稍遲則痂落後必發癰毒用大連翹飲若只大便秘結熱極毒氣散漫者無隂以歛之也用當歸解毒湯宣風散三黄丸四順清凉飲或歸尾生地麻仁大黄酒製甘草如熱來緩頭熱面不熱手足心熱手足背不熱大小便調精神困倦者此虚熱也用補中益氣湯靨後寒熱往來實則用小柴胡湯虚則用補中益氣湯加黄芩或重感風寒頭目昏痛脈浮𦂳者先用柴葛桂枝湯去其新邪後用補中益氣湯倍加當歸白术廣皮或胸膈飽悶脈𦂳惡食者用補中益氣湯加山查麥芽消之如元氣弱脈遲喜睡者用調中湯參麥湯痂落一半忽遍身大熱者餘毒欲發癰也看身有一二處熱甚者即于此發出也用大連翹飲以退熱便秘加酒製大黄以須熱退身凉癰毒乃消痘後發熱痘毒一解隂陽俱虚火從虚發有餘毒也每兩臉赤色發於午後是其候也即有譫狂勿作熱治前後以保元湯加黄連為主甚則用大連翹飲最要調理否則牙疳目痛咽啞風搐筋牽睡露白睛皆從此起若初失解或過用熱藥致諸熱症並用消毒飲三荳湯自初至終熱不減非毒氣之餘必元氣之虚也㣲熱不必治甚者當辨虚實如二便秘尺脈數能食煩渇者心經實熱也用知母解毒湯疤赤用連翹飲三黄湯四順飲解其裏熱次用升麻葛根湯加骨皮解其表熱葢升麻葛根湯乃痘之要藥也壯熱用黄連解毒湯煩渇譫語用辰砂六一散脈數煩熱用牛蒡四兩甘草升麻射干各一兩每服二錢痘後兩月渾身壯熱用柴胡麥冬湯形怯脈遲虚熱也用調元湯加知母麥冬痘後若過用小柴胡湯竹葉湯黄連解毒湯而熱反甚者用保元湯加歸身黑薑熟附子自愈附治案一午餘潮熱臉赤譫狂乃火從虚發也用保元湯加川芎當歸黄連而愈一能食便閉身熱口渇乃胃有藴熱也用三黄湯清胃湯利之而愈一身熱減食面黄肌瘦雖係内傷而脾胃則虚宜先調理而次消之用六君子湯加山查骨皮而愈一夏令痞滿用巴豆下之稍解而腹滿痢下如爛魚腦強食即嘔噯不已足跗痛舌赤澁此暑傷元氣隂亡而陽獨存也一頭疼惡寒拘急腹脹内外俱傷也以參蘇飲香砂丸治之而愈一傷食過用尅伐致面黄少食午後潮熱此中氣不足用六君子湯補中益氣湯而愈一身熱煩躁唇赤驚掣由于衣被大煖或近火氣積溢成熱熱極生風治以犀角地黄湯合導赤散而愈一傷於風寒筋骨疼痛鼻流清涕用川歸散加羌活牛蒡而愈一大熱無汗乃時行疫症也用截瘟丹五運丹而愈報點賦痘初見點便看形色榮枮一來便見粗肥稀疏可必初出若還𤨏屑繁密堪知辨疎密頭為元首之尊最怕䝉頭項乃闗津之要偏嫌鎖項鼻枕初出兮淫毒犯于天根耳輪先見兮邪火侵于玉軸辨部位陸續出來雖密猶為可救一齊湧出即稀未必全生細細白頭如㾦乾枯必作内攻啾啾紅點如丹焦萎定成憔悴粗肥蓬項點子不紅終白陷頭尖皮薄茱茰紋起定空漿蚊跡蚤斑刻期而歸陰府蛇皮蠶蛻計日而赴泉鄉辨形象肌瘦則皮薄嬌紅黄瘦則痘成褐色至若黑頂皮粗瘡色必然慘黯是故嬰孩之肌色不同未可一例而斷也辨肌色只要綻突有神不喜煩紅乾燥色澤神安見點如珠如粟色焦皮燥敷瘡或紫或焦是雖帶熱齊出只恐密似針頭縱然陸續出來尤恐形如蠶種如麩如㾦如疹如疥根窠不立脚暈俱無犯此數端俱云莫救辨症候夾斑如同蚊咬惡裂酷似蛇傷乃或螺螄雲電此際差為可救辨斑痘將出而熱減兮藥勿妄投痘正出而熱劇兮醫宜早備解其大毒恐鬱遏以乾枯養其氣血欲流行而舒暢未熱先敷數點俗名報痘若還熱久不敷便作疔看先發塊而後發瘡塊名痂毒而必生宜預散之先發瘡而後發塊塊名鬼腫而難醫避痘避于隠僻眼胞唇脇必多凶悶痘悶于要處喉背舌胸皆不吉故曰順不增多逆嫌一點冷疔先見諸瘡誰敢彰形賊痘若形諸痘不能灌汁辨認若真亟宜挑破辨疔賊是以裡症未平痘雖出而毒猶在内透肌發散尤宜解毒為良人静便調身雖静而痘已發出兼補兼發仍以安表為主設使内外症平此候不須過治再看精神勇怯審詳表補何如標點逆症凶痘發於太陽寒水所過之經額上方廣而氣逆于太陰之地肺金無氣煩燥不食變為痒破喘急而死凶痘發于陽明燥金所過之經眉稜肩腰臍腹上下太陽脾肺失氣大熱不眠無汗大吐逆不安變為失音挫喉悶亂而死凶痘發于隂極之地腹中年夀脾土失令腹痛腸鳴嘔噦不食變為瀉喘寒戰咬牙腹脹色黑歸腎而死凶痘發于手心舌上氣逆于面眼如火驚厥煩躁不寧變為紫黑喘渇而死凶痘發于厥隂肝經之位肋脇腰腿次發左腮脾土受尅舌胎黑狂亂目直視乾嘔變為外剥而死凶痘發于少隂心經所過之位手内府面右頰肺金受尅喘咳鼻衂噴嚏昏妄變為空殻痒塌搔破而死初標死症腰痛腹痛煩躁口氣太臭紫色色白皮薄痘無根窠無血色或根帶一線三五日即大如菉豆後決不灌漿成一水泡擦破而死必欲治之宜大補氣血或者十救一二報點三日治症發熱以見點于面部之日為始此後三日生死判矣天庭印堂元神所歸也氣血又元神之所統也故此處先起先灌先靨痂密而痒慘而黯者逆候也毒從虚發信哉報點第一日身熱點紫不潤是毒内藴也用蟬蛻湯下無比散驚狂譫語用蟬蛻湯下大靈丹自汗是濕熱熏蒸也不妨氣弱不出于䟱表藥中兼調氣藥氣勻則出自快以出至足為齊不起發根窠不紅無他症者用保元湯加味四聖散調下大成散放點身凉淡白吐瀉宜温補用四神散腰痛加肉桂嘔吐加砂仁藿香半夏泄㵼用人參報點第二日痘苗斑紅乾紫摸不碍手身熱氣粗者熱壅于胃也宜用紫草湯下烏金膏咽痛加元參形怯難出用四聖散加人參白术山查橘紅以補助之身凉不渇及凉而渇此虚弱而内有熱毒也宜于清解中帶補元氣報點第三日痘苗當出齊矣若啼哭者腹必痛毒未發也用翹查消毒飲下大成散淡白者虚寒也用保元湯加酒下大成散吐瀉毒乘虚必内攻也身寒用保元湯身熱用淡姜湯下小無比散未效用木通調四芩氣粗面赤乾嘔作渇二便閉澁紫黑斑陷熱毒惡症也用連翹消毒飲下小無比散身温口冷二便清利淡白黑陷此虚寒惡症也用保元湯加酒下大成散點期主方總以疏風解毒湯為主虚實照後加減防風荆芥牛蒡連翹山查前胡甘草點期實症加減法用十神解毒湯合前疏風解毒湯加減當歸赤芍川芎丹皮紅花連翹木通甘草桔梗大腹皮竹葉燈心點期虚症加減法用益元湯加減為主人參黄茋甘草當歸白术陳皮升麻川芎桔梗點期内應用方藥礞石稀痘丹通利奪命丹天元丹八寶丹三神散退斑散化斑散代天宣化稀痘丹報點期内雜症夾斑夾疹咽痛身痒頭面腫唇燥裂口臭目赤直視牙闗𦂳急報點雜症治法風寒盛致紅紫斑影不起須令熱隨汗散痘出必稀化下紫草膏又用無比散脾虚食少吐㵼毒氣内陷不出用托裏十禎散一二紅活惡痘中有一二紅活則元氣尚存雖凶猶當詳治初起帶艶防日後痒塌早宜疎風固表消毒使氣血充實邪火漸退病後失于調理内虚不出用參茋内托散傷飲食陳莝菀于腸胃與毒合并不出用枳實導滯湯再不出者速用小雞破開入麝香一匙亟掩兒臍上候一時候方去雞看雞肚内黑色此毒得越也而痘亦出矣内服升麻湯加羌活防風紫蘇葛根川芎以發之或調生雞血頓熱服之臟腑鬱毒非㣲汗不解一發熱必用㣲汗藥驚發痘前此吉兆也驚者陽症陽被隂冲則壅遏之患息矣照加減法治之若誤服寒凉則氷其毒矣有一驚即死者必中惡也雜症用藥㺯舌用山梔黄連舌黄胎便秘用三黄石膏湯或用元參桔梗山荳根以防咽喉之病啼叫用燈心黄連薄荷銀花驚搐用燈心木通生地銀花鼻衂用山梔荆芥溺短澁用車前木通便閉用黄硝枳殻千里馬歸身煩渇用天花粉滿天秋便血用黄連桃仁失血乾嘔用黄連嘔吐不止用竹茹黄連輕者用橘皮譫狂用知母石膏山梔調滿天秋犀角喉痛用桔梗防風荆芥元參山荳根磨汁咳嗽用前胡杏仁頭痛用荆芥防風石膏腰痛用羌活防風知母黄栢腹痛用青皮枳殻元參前胡傷寒腹脹嘔酸用山查厚朴神麴麥芽疔毒如灸瘡高聳用賽春雷外貼四聖散夾疹有痘出數顆而遍身圓浄疎朗紅活現兩日而盡沒者是疹非痘也痘沒必悶亂煩躁疹沒則人安静且正痘依然以平劑治之初出大小不一有色如疿者曰夾疹用本方加救苦丹夾痧有𤨏碎紅點隠隠肉間曰夾痧夾丹與夾痧相似用凉膈散加當歸生地敗毒散加紫草紅花黄芩夾疹夾痧夾丹必正痘絶佳始為不妨不然皆正痘之毒盛也能無懼乎夾斑黑斑黑塊及斑紅如錦紋者不治桃花紅者可治用化毒湯加紅花黄芩蟬蛻紫草牛蒡或犀角地黄湯紅斑少紫斑多用通利化斑湯初出如血點帶紫將發斑也有膿及紫血者十救一二宜清解推利眼胞唇口上下一齊光腫者五日當發斑血泡失血而死發毒兼痘先發無名腫毒而後出痘者凶宜預散其毒如腫毒止作膿時纔報痘者不妨治逆痘并看痘色頭面未出足底先出逆痘也縱起脹灌漿至心窩内攻大呌昏迷而死早治可全三五用黄連解毒湯䕶其心俟其出齊至頭面即重用升提漸使其自上而下起脹灌膿收歛結痂如常法可愈也用保元湯加川芎升提之痘色若好不妨初出縵頂連肉紅八九日痒塌死或以化毒湯加黄芩連翹蘇木紅花蟬蛻調下紫草蟾酥二餅初出水泡後帶白漿不久即乾其餘不起此未至而至毒盛失序早發者必先萎癘氣使然非順候也必痒塌死初點未齊眼角額上先灌數點及痘稀密不同皆死症也初時天庭有白㾦及出痘之後㾦亦成痘此亦死症一齊湧出無縫便見尖頭黄色易起灌靨痂但怕乾枯紫黑若靨雖薄而色潤澤亦為不妨上拘下拘上下拘額上成一片為上拘地閣成一片為下拘兩拘成片為上下拘凡此内症必多初標面目光亮如𤓰口臭冲人必發斑失血死期至速形色圓澤腰脚無痘雖諸凶痘不妨痘勢不起根窠欠紅或隠或現盛出復没乃氣血俱虚不能出盡而熱也以内托散用前治法如後更加譫妄喘脹自利者不治痘出稠密只要磊落分明不粘連成片可用托裏解毒使其易起宜服快斑湯消毒散如出太盛用敗毒散合犀角地黄湯糢糊毒盛宜多服快斑湯消毒飲以防變症出太盛而面黄大便色黑煩躁喘渇腹脹裏有瘀血也痘時吐衂血毒彌甚此時不解其害尤速用犀角地黄湯抱龍丸至寶丹稠密成片隠隠在皮内似出不出毒鬱未出也服紫草透肌湯亟用纒豆藤製過辰砂末連進二三服或以薄荷湯調退火丹又以牛黄敷顖上以散熱毒疎痘治目又用地黄敷面頰額角退毒初出胸前稠密用消毒飲加酒炒黄芩山查紫草獨標數點于山根上或三五粒一簇乃毒重氣虚犯上皆凶兆也亟宜凉血解毒用凉血化毒飲初少後多此裏氣虚弱毒不即出補解兼用十救一二以十宣散加無價散肌膚厚腠理密毒難發越宜勻氣為主用荆芥防風桂枝薄荷以行其表氣用木香青皮厚朴以行其裏氣或用驅毒丹紫草飲芫荽酒元氣弱或勞力不能拘血運毒而遲用補中益氣湯面白少神疲倦飡泄用異攻散加升麻川芎蟬蛻木通陳米服後瀉止用補中益氣湯助之痘出不快先審虚實次審時令若吐瀉食少出遲加減理中湯虚寒自利不食而陷用丁香肉桂附子之屬或附子理中湯數劑得脾結實用補中益氣湯去當歸加肉果肉桂元水不足火熾毒盛留連于裏此獨陽不生也宜滋水不制火未齊色赤煩躁誤認血熱過用寒凉氷毒不出宜升解之用升麻葛根湯加紫草牛蒡桔梗紅花生薑風寒壅遏須用藥汗出而痘即起也以升麻葛根湯加酒蜜炒麻黄山查蟬蛻或加穿山甲四牙散或桑樹蛀蟲取漿同酒漿芫荽酒隔湯燉熱服前藥後一飯頃即與服之其效如神傷飲食喘脹煩躁便秘譫語内有實症胃氣不寧氣血凝滯遲出宜下之用加味四聖散加枳實黄芩及快斑散人參敗毒散合四順飲或以承氣湯利之諸症自平食停滯或腹痛大便臭穢用保和丸痘色紅乾燥口渇火盛血不足也用當歸生地四物湯痘見焦煩亟服土泉散痘出皮膚即乾枯難起壯用溪中白石子燒紅淬水置被中熏濕痘即潤澤起發痘初出帶焦紫或㣲黑宜凉血解毒不可過六日因毒在血分也用凉血地黄湯加黄芩黄連升麻葛根荆芥之類紅紫焦滯臉紅眼赤小便赤澁用加減犀角地黄湯加木通紫黑加紫草紅花内黑外白用解毒湯内白外黑升麻湯痘初色赤根皮下肉通紅此血熱氣不能管束也必起發驟皮嫩易破痒塌難救亟先解血分之毒待色少淡隨補氣分之不足如漿不破損者吉反增搔痒者凶解血熱用四物湯加升麻地骨皮紅花紫草或消毒飲四君子湯加黄茋木香仍用氣血藥相間而服痘初嫩紅如桃花此元弱皮薄毒在氣分補血散火為急用回陽散火湯加芩术去生地或保元湯少加羌活當歸芍藥痘黑二便秘澁喘急煩躁用山梔子湯宣毒湯蚊跡蚤斑外浴化斑湯内服無比散四聖散黑陷用獖猪尾血調氷片自利不食者難用雜症用藥氣滯用木香脾胃虚寒用陳皮厚朴木香山查腹痛用肉桂砂仁少許嘔吐用藿香泄瀉用猪苓澤瀉生薑瀉甚用理中湯保和丸出不快加酒調大成散二分二日後温補用保元湯葢温脾則有生物之功氣血甚則運毒而出可免陷伏痒塌矣便利反渇内虚熱也用四君子湯加肉果黄芩紫草不渇而便利内虚寒也用木香散理中湯氣血不足之人又為熱毒消爍陽㣲隂弱火毒無所發洩初出灰白根窠淡白治宜少用疎解少用温補色不紅活隠隠碎小稠密此逆症也脚根紅紫治宜和解用紫草木通六一散之類不可用肉桂稀痘與肉一色無紅暈氣血虚也用保元湯加當歸紅花初出不紅活血虚也用四物湯加減根窠不紅用活血散白嫩皮寛毒少而氣不充也用内托散倍糯米保元湯加肉桂木香痘皮嫩薄溶溶如濕氣虚也必自利食少用十全大補湯去生地加防風白芷益元散敷之當愛䕶勿令抓破痘雖光潤手摸易破血潤而氣不足因衣被大厚汗出太多表藥太過所致用參苓内托散保元湯加肉桂身冷灰白不食寒逆嘔吐腹脹清瀉肢冷此純隂症也用起死回生丹保元湯加川芎當歸生薑附子危急用異攻散出一二日眼閉漫紅色黯乃肝經受風邪之故也用栢子仁初時色滯用甘菊幽蘭丹參色紫爛加紅花點後二日尚便閉舌無胎是血燥非毒壅也亟用枳殻元明粉以清之否則灌期咽痛作瀉而不起本方倍用川芎當歸雜症用藥初出嬌亮濕勝也用防風大腹皮深血漸變乾紅血熱也用生地溺赤用木通黄連冬菊丹參煩悶用滿天秋初點焦紫血分熱熾也多由内熱審舌則當舌胎唇燥用滿天秋大熱見愁腰痛用𦍑活黄胎用千里馬身熱煩渇用葛根花粉麥冬滿天秋防作㵼傷食膨脹用厚朴山查麴蘖點不透腹痛磨沉香汁調蟬蛻末小腹痛用枳實青皮歸身加元胡散便黑用桃仁生地犀角黄連便黄用山梔黄芩便膿血輕者升柴重者犀連切不可止溺赤用木通車前子燈心地膚子溺血用山梔仁車前子衂血用黄連山梔荆芥黄芩血失乾嘔用犀角汁熱見愁嘔吐用猪苓薑汁炒黄連澤㵼鹽水炒陳皮胃火上冲作嘔用竹茹蘆根柿蒂伏龍肝蚘出多者不治少者用平胃散加烏梅泄瀉用猪苓山藥木香扁豆火㵼用黄連作痛用黄芩防風口渇用葛根花粉痘出齊用麥冬譫語用知母石膏便閉用千里馬虚症根窠淡用當歸川芎氣虚用四君子湯血虚用四物湯溺赤澁用茯苓腹皮嘔甚用丁香藿香嘔吐鹽炒陳皮甚者炒薑末寒者半夏生薑不思食倍白术加神麴風寒􅠲𠻳用蘇葉防風杏仁有痰加貝母橘紅便秘倍加酒炒當歸腹痛用肉桂砂仁泄瀉用猪苓澤瀉生薑㵼甚用理中湯化下保和丸不快用大成散二三分飲食少用山查泡少用知母萆薢茯苓多者用官桂腹皮破爛之初點風痰驚搐用天麻殭蠶力壯者用羌活防風牙皂取吐或用八寶丹以理痰涎睡中驚用膽星一錢㣲炒硃砂三分薄荷湯下甚者用鎮驚丸出不快䏎膚毛竪粟起去升麻加肉桂白芷足冷如氷者用肉桂牛膝亦有痰涎食積之不同若見點初足冷乃風木下行也不足慮初出舌尖動乃表虚也用補表藥舌不動乃裏虚也用補裏藥血熱斑紅口燥用黄芩黄連麥冬生地紅花紫草蘇木茜根赤芍犀角熱見愁逆血發斑腹痛用化斑湯去川芎當歸加丹參甚者紅花蘇木茜根山梔紫草之類大便秘用導利紫姑丹仁端録卷五
