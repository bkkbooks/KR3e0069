body:
  text: 仁端録卷七明徐謙撰陳葵刪定收靨賦痘出八九日來應結乾紅痂疕如或少有不順坐此方作膿窠漿成蒼蠟自宜次第收成身重發熱停漿不易結痂此則陽亢隂虛引以清涼收斂痘瘡焦落辨别隂陽人中上下先靨為良若是足腰先斂黑多凶少吉要提防兆自唇吻兮漿吐結如珠粒斷人唇中兮却分點以意量顴上平乾兮慮乎倒靨額間先收兮謂之不祥痂不著而壅腫兮因榮血之淖澤瘡盡裂而皺揭兮此衛氣之殘傷漿足氣促恐因痰壅而然忽爾發驚乃或小便閉結便閉未通裡氣熱而涼導便溏不食中氣虛而溫養熱傷皮毛兮肺金不收餘毒濕傷肌肉兮脾土不燥殘漿頭瘡膿灌不平兮孤陽不生足瘡包水不乾兮純隂不養頭為陽足為隂氣血難到飲食減少兮引日而斃煩熱增劇兮倐忽而忘如見氣虛而塌陷溫補可興若或倒靨而焦黑攻發則活泄㵼安寧虛而少毒能食便結實則無邪肺寒自然利膿溫補為上臟毒必定便血解利為先挫喉聲啞漿行飽滿亦無妨塌癢咬牙便實聲清猶可治靨來痂硬變症終無疕脫如麩須愁餘毒攻發或至太過潰爛難行收拾身熱若見燎人泡發燎漿可畏空遺痘殼不成痂只為漿清熱重腹脹喘呼而塌陷皆由毒入內攻出來不灌黃漿痂疕猶如血赤若曽于先此症斷之極美胃氣絶則口唇腫硬肝熱盛則目睛弔白喘㵼煩渴要辨虛實寒熱或㵼或溏好飲湯者虛寒也便實身熱好飲冷者實熱也喘急發于㵼後總是氣虛而斷便泄繼以渴飲豈為內熱而然泄㵼而煩渴不止理冝補益升提好飲而發渴愈甚尤當分别虛實內虛寒戰痘瘡無變只溫經漿足難收便實熱蒸須解利進清涼以助結痂叱補法而防過益調氣血以成功健脾胃而收拾靨期總論痘不問疏密但以出盡而無留伏為佳次第而出大小不等至漿靨之時于空隙之處出猶未已是為出盡無伏也一齊擁出後無補痘是謂出不盡有伏也發之透者細觀手足若充拓飽滿方謂之透蓋手足位逺若平塌不能成膿此毒不能旁達四肢必復陷而入也是為發之不透收之齊者不疾不徐自髙而下痂皮潔淨中無潰爛方謂之齊若收太急或不成痂此必有熖火逼之也是為之收不齊若此者皆有餘毒收靨不可以日數拘也輕者易出而易靨重者難出而難靨復辨其輕重標本形勢故人中為任督二脈交會之中自初以至收靨皆先決于此謂隂陽和暢也飲食如常循序漸收自人中以及兩顴腰背額上太陽手足無他症者吉漿足只服補脾利水和氣之藥故靨期胃弱者先補脾有餘毒者先解毒雖有雜症不可過用寒熱之劑致傷胃氣顔色慘黯初時冝于活氣血謂脾胃劑中兼解毒舉發否則必有餘毒瘟疤之患若未足收不速冝發餘毒或生怪症輕者殘廢重者夭亡若先收頭顱手足心者為邪氣攻心內臟先壞不可救也必不得已服五苓散正收元氣實者痂必循次而實結如口角與陽物先結正收也身漸輕快腫漸消解眼朦朦而欲開能食便調從上至下而收結厚色猶紅痘事畢矣遲收髮際以上陽中之陽也足膝以下隂中之隂也所以二處獨宜遲收若二處先收者一謂孤陽不生一謂寡隂不長皆凶候也若遍身收惟此二處不收往往勿藥自愈至若延綿日久又為隂陽不和用四物湯去地黃加牛膝升麻紅花荆芥鼻上先收言吉言凶其論不同總之未收時要看膿色既收時要看靨色有似靨非靨者須當辨明成膿之後鮮明肥澤飽滿堅實手抵之瘡頭微焦硬者此欲靨也痂殼圓湛無凹凸乾結如螺靨滿面膿囊結聚如珠子磊落可觀無有淫濕破濺者乃正靨也惟兩耳與身上同收謂之不合格若頭穿膿出堆積如雞屎者次也皮似膿出痂薄如紙者又次也爛不成痂膿汁腥臭者下也如已過期譬如瓜果熟久則爛此造化之常還作順看若未及期則為斑爛變倒靨而死凡危症氣血本虛必因多服補劑而有膿色當收靨時雖有熱症只可于補劑中少加涼藥若竟用涼藥或下利藥欲令速靨則虛者重虛毒反內攻而死矣關魆痘靨痘靨至關魆緊要處猝然而死如被鬼魆是也良由發毒太過逼盡元氣痘難灌充無力收功外囊似實內氣已脫亦有不謹外邪逼毒內攻不節飲食致傷中氣皆能回靨至各關轄而死如頸上喉突氣窩肺之關也餘可例推一臟氣絶則至其關而死水靨膿久過熟漿水淋漓竟不結痂能食者內以葡萄時時食之為其能收靨也外以枯螺滑石等末摻收之中靨根窠紅紫毒尚未盡靨後重復行漿結實如雞屎冝生血解毒祕要四種倒靨症弔喉症脾部之靨四邉殼起離肉中間釘住肉上不脫頂有血痕如繩吊之狀靨至喉嚨而死此毒復入脾也靨未至喉者可救用連翹桔梗薄荷前胡各八分射干枳實天花粉山豆根各一錢錐心症人中四圍靨起中心釘住不脫靨至心頭如錐入心痛極而死此毒復入心也靨未至心者可救用蓮肉一錢五分青皮陳皮各一錢香附石菖蒲荆芥通草各八分牛黃二分當歸金鐶水煎定星症滿面靨起四邊中心釘住不脫靨至左腕眼必直視不動未至左腕用陳皮茯苓逺志當歸白芍甘草蓮肉川芎攛白症前症靨至右腕眼白必上攛反視未至右腕用逺志茯神麥冬山梔石膏通草南星甘草朱砂水煎服已上通用蘇合油和生蜜潤之或腌雞油代之玉髓十六種倒靨魚鱗靨半邊嵌肉半邊脫肉惡痛身熱喘急半篷靨一邊脫一邊留喘急頭痛一字靨兩頭脫去中間留一帶惡嗽壯熱神針靨四圍脫起中心牢固痛極而吐熱極而詀盤蛇靨中心脫去四圍鑲嵌煩躁作喘睛竪手撒鎮心靨四圍捲去中心獨存面浮氣喘腹痛飽滿搦搐螺螄靨脫靨後中心出惡血惡痛浮腫即死榴皮靨脫靨凹白腹脹即死梅花靨痂去而色白宜補還魂靨遍身脫盡而頭頂三五靨不脫破損又感風邪必死命盆靨跌撲以損元氣或客外邪亦死公孫太白三五粒不脫者忌之望月靨眼部一粒牢嵌時時出血用當歸湯洗之關池靨氣喉底下一粒不脫去之喘促而死渠塘靨一月而痂不脫冝保脾胃若嘔吐泄㵼者死鈎鏤靨二月而痂不脫體虛焦熱眼腫吐血者死原闕靨三月而痂不脫此最凶之兆壯熱泄㵼者必死靨期斑爛等症起脹時當發散而不發散則毒氣閉塞以致喘促悶亂不當發散而發散則空虛邪入毒發于裡風應乎外風火相搏尚未成膿遍身潰爛此名斑爛與膿熟潰爛者不同其潰爛者火勝也熱勝內腐火生于空非虛不然乘之以風其熖益烈靨期潰爛須當看其有無成膿皮肉潤澤膿水浸淫方有生意若已成膿而潰爛是毒已化能食無他症者不妨但當和脾胃避風寒慎飲食自然平復倒靨以致潰爛此氣盛血虛無收斂也因前失于養血過于補氣所致宜用犀角地黃湯加川芎當歸悶亂詀妄陽極隂生重發毒瘡不能結痂遍身潰爛此氣血兩虛也宜用十全大補湯加麥冬山藥棗仁遍身潰爛和皮脫去亦名倒靨此中氣不足毒氣內陷也用保元湯加當歸川芎木香乾薑山甲以托之外用大黃龍骨赤石脂為末敷之若皮膚不知痛贈痘不補出名為內攻不救膿未成而潰爛者則衛氣暴泄津液不榮冝調脾進食安養榮衛生肌解毒用十全大補湯去肉桂加荆芥防風發表太過陽氣不守臟腑自利內虛斑爛急宜救理用木香散隂厥者用異攻散衣被過暖向火飲酒過熱以致潰爛不痂者急冝安置清涼托裡解毒以黃茋白芷排托青皮桔梗理氣防風蟬脫疏表甘草牛蒡解毒潰爛無皮膿水流粘用內托散去肉桂加荆芥防風外敷敗草散祕旨蘇葉方癢塌抓血而斑爛用內托散加首烏木香蟬脫牛蒡白芷潰爛而兼雜症如兼便閉用牛黃丹兼煩躁用山梔湯豬尾血調冰片敷之兼大便自利用豆蔲丸暑月熱甚而潰爛用水楊湯浴之卧芭蕉楊栁葉上過汗內虛或飲水多而潰爛用保元湯加防風白芷蒼术茯苓或除濕湯痛者用敗草散黃土散滑石末癢者用綿紙捲荆芥穗成條燃煤乘熱刺痘上或乾荷葉薰或茶葉歸茋煙薰若已成膿過期不靨潰爛淋漓膠粘疼痛非發之太過必補之失宜用敗草散滑石末惟成片枯黑如火燒湯潑者死攻發太過中氣不足潰爛脫皮者倒靨也用保元湯加連翹牛蒡薄荷桂枝木香或十全大補湯加牛蒡連翹因過補而不痂者用枳殼湯加防風牛蒡芍藥苡仁或五苓散因過服熱藥臭敗潰爛者用小柴胡湯合回漿散或天水飲豬尾膏小無比散或用蜜陀僧滑石白芷螺殼研末敷之或將絲瓜葉扁柏葉隂乾為末摻之或黃連輕粉為末調桐油敷之或豬肝汁研芒硝塗之或蛤粉敷之或服荆芥防風白芷升麻連翹牛蒡黃芩甘草坑爛不收口者用滅瘢救苦散合百花膏敷之或三黃末合綿繭散敷之或生肥散或當歸太乙膏貼之或用松香醋製研末拌燈窩油捲草紙內燃火滴油塗之或用白螺殼喬麥麵盛囊席上襯卧內自結實外浮空殼脫去名坐漿回又名從漿回不妨潰爛出血名陽瘡出血破腫作痛而不乾者名疳蝕瘡皆生陽分服大補湯敷綿繭散若生于肢節虛軟氣血少處血出色變腫痛漸開者不治若倒靨出血不止名回陽泉連用胭脂胚加血竭救之立止胭脂胚要火煆存性用若在胸脅不治凡遍身潰爛者為為症瘡止數處潰爛者為疳蝕瘡皆因氣虛血弱風寒相搏腠理津液澀滯而然也用後方治之使毒水流出治潰爛各方滑石散滑石白芍同煎一時去白芍又水飛過加珍珠末摻之敗草散羌活獨活前胡柴胡川芎茯苓只殼桔梗人參甘草摻藥方牛黃冰片輕粉雄黃黃丹白芷龍骨乳香沒藥川椒血竭等分為末摻之或油調塗之蒺藜散白蒺藜淡豆䜴等分醋水調塗青金散白蒺藜山梔青黛膩粉等分為末麻油調塗綿繭散繭子入白􅈨煆蜜陀僧白芷調塗韶粉散韶粉一兩乳香三錢輕粉一錢豬油調塗生肌散黃柏五倍子甘草地骨皮等分為末摻之又方象皮白占龍骨煆血竭輕粉地鱉蟲白石脂各一錢赤石脂四錢乳香沒藥各一錢冰片少許摻之又方滑石四兩寒水石白芷蜜陀僧各二兩枯􅈨螺螄殼牛矢各二兩又方絲瓜葉隂乾為末摻之又方菉豆粉炒至象牙色為末摻之又方象牙末白殭蠶孩兒茶油脂調敷又方苦參酒浸牛蒡荆芥蒺藜首烏荆芥穗酒糊為丸竹葉湯送下附潰爛痘案一痘手足腕膝之處瘡窠連串作一大塊膿化成水停蓄于中恰如囊袋皮不破水不出乃裡肉已好皮剩于外也用針決去其水乾落而愈一痘痂脫盡惟正額一粒潰而不斂四九日後作癢破出臭膿聲啞悶亂而死一惟頭上一粒不斂草八朝癢甚出蛆杯許聲啞悶亂而死溫疤畨瘢痘已從頭至足已脫痂矣忽然發熱舊疤內重復出痘灌膿作痛若調理失宜則破囊腹脹隂陽不分死在旦夕復灌頭面防腮頰穿如漏井眼沿穿如湧泉復灌腹背防遍身釣痛如蜂躉皮肉深爛如沉石復灌手足防直而不屈如筆或屈而不直如罄復灌陽毬防隂囊皮爛而脫已上各症皆因收痂太驟毒氣未盡或誤溫補多啖肥甘或見風太早所致若調理得法則邪毒外散決無此患用歸尾荆芥防風連翹牛蒡金銀花天花粉苦參甘草或荆芥敗毒散加人參外浴水楊湯若變痘疳瘡用苦參散初標失散餘毒故發于痂後重者遍身倒爛輕者一二處重發用四物湯加黃芩黃連苦參荆芥防風苡仁連翹銀花外用綿繭入白􅈨少許火煆溫疤方赤豆山豆根苦參麻油入竹筒內火煆取油調三黃末塗之又方苦參三錢檳榔一錢五分硫黃一錢明􅈨五分共為末摻之痘癩氣血虛弱外受邪氣內留餘熱風熱相摶搔癢潰敗名曰泄氣久而為癩宜大補氣血清熱解毒若至敗面墜鼻崩唇盲目肢體殘傷不死亦為廢人用十全大補湯合苦參丸外用滅瘢救苦散塗之收靨順症毒已出盡膿乾如蒼蠟色蓮肉色肥皂色葡萄色皆有神氣從口鼻兩旁面部收起至腰背胸腹而下然後額上與手足一齊收痂逐漸脫落內外無症身漸輕快飲食二便如常有大如菉豆易于漿行口唇收起頭面與身一齊靨如螺螄靨者吉有初點時尖頭即起頂上略見膿漿五六七日之間即收痂甚速者吉靨期逆症爛如塌餅臭不可近目無神光者難治急宜大補氣血托毒收斂用內托散加黃芩白术初點碎小起脹紅綻漿薄收速狀似魚鱗損于皮中必至四肢發毒須治之使再行漿則毒方盡用保元湯破損無痂狀似竹衣速宜內托健脾使復灌膿可生用保元湯加川芎當歸山甲角刺諸處未灌而唇口上下先收者毒攻脾也未靨而口唇白先爛及舌者胃爛也頭身未靨而腳先靨者隂勝陽也遍身發癢抓破無膿捲如豆殼皮薄如梅花瓣者假靨也玉髓云天府不充一陽不峻兩顴不起靨平皮貼靨帶飄蓬痂去皮白痂脫窩潭目無神氣鑲嵌乾枯偶軋皮脫三焦有破皆危候也收靨死症灰白癢塌寒戰咬牙吐㵼腹脹飲食不進爛咽唇白歪舌昏悶作坑尸臭手足動搖面瘡已破腫消目開未痂倒靨頂上有孔流水如天瘡或自出水而乾黑口渴煩躁不食不睡內有毒也不食而口唇常動如食狀額如堆屎鼻凖兩傍乾黑口唇焦迸皮揭嗆水失聲痰壅喘急兩腮乾破如石痂皮不脫目開咽爛腹痛目無神足冷至膝脈細無力靨至頂下胸前住定遍身皆靨內遺數粒不靨猶能殺人收太急者一時痂盡一痂即落也此因火毒煎熬津液氣燥血枯以致速乾正欲回漿先從手足靨起此必膿未足也若聲啞喘促煩悶不食死期近矣否則必為目疾為􅏴毒諸症疾甚至橫夭用五仙散治中散以救之亦幸而生耳凡痘不能回漿結痂以致危而或死者皆因膿期失治之故收靨四日症治收靨第一日此時痘漸回漿色暗如菉豆色若有吐㵼者是元氣內傷也亟用米飲加生薑汁化保活丸治之若因吐㵼以致陷伏者加大成散五苓散若形色俱正有不回漿者氣血不足也冝輕補之若向來不失調理膿漿完滿猶不回漿者不宜妄藥但從容以待之不可過補致生􅏴毒收靨第二日正當回漿結痂或因觸穢癢塌內陷而難結者用酒下大成散或五苓散仍薰香解之或因外感風寒用薑湯下治中湯或因飲食寒冷而吐㵼化下聖功丸遍身搔破尚有數個紅活者猶有可救用異攻散若手足冷而寒戰洞泄癢塌者是極隂無陽也將欲成就之際却色淡者治冝助血用川芎當歸芍藥紅花之類全白如菉豆殼者因初時飲水太多故靨不齊用小柴胡湯加枳殼或少用四順清涼飲小便澀者用大連翹湯甘露飲麥冬五苓散收靨第三日至此冝多結痂若乾紅無膿不結者死咎在失於調理痘瘡用藥自有權度大小二便不可不通祕則壅遏毒氣而變生若大便自利黃黑色乃毒氣已減不必用藥但少用化毒湯可也然必壯熱神躁不思飲食者可服化毒湯方金銀花二錢嫩紫茸升麻甘草各五分加粘米五十粒煎服收靨第四日自上而下者為順靨自下而上者為逆靨靨起手足而腹脹滿者重不可以其收痂已定而概謂之吉也用五仙散治中散靨期主方别無他症者用保嬰百補湯為主若有他症照膿期及後開雜症加減保嬰百補湯方人參白术茯苓甘草陳皮當歸白芍山藥熟地桔梗蓮肉大棗靨期雜症加減法有熱用主方加黃芩連翹木通有濕用主方加豬苓澤㵼防風蒼术不易靨加斂膿散氣虛加黃芪官桂十日九日用益元湯加黃芩芍藥腐爛不收用防風白芷白术口渴用五味子不成靨用蓮肉芍藥茯苓白术麥冬以斂之靨速用附子以補其氣後再加人參敗毒丹痂不燥用白术白芍五味子爬破痂爛目閉復開珠赤身熱用人參敗毒散牽搐用熟地薑汁炒羌活防風菖蒲獨活痰擁氣急用黃芩茯苓麻黃靨期應用藥方原闕靨期雜症發熱倒靨腹痛昏睡發臭泄㵼眼疾􅏴毒潰爛發出癮疹丹瘤口牙唇舌生瘡便下膿血積滯靨期雜症治法收靨太速熱而便實者宜微利之以徹其毒以當歸丸主之或用黑牛糞後尖燒灰每一兩加枯大黃三錢黑糖調如圓果大每服一丸微去穢毒以平為期觸硬成疔漿滿觸犯黑陷深爛中有硬肉者即同疔也若在胸腹深如田螺必穿臟腑遲則不救惟頭面手足可治冝先挑出其根嚼生黑豆頻罨之候至肉平用解毒膏生肌散斂之險非結痂漿未灌頂未滿忽然腫退目開痘腳散濶蓋因津液枯竭氣血虛少內毒未除症之極險者非結痂也連用四君子湯加荆芥連翹防風桔梗麥冬兩耳先收當辨耳之冷熱治之耳冷者用枸杞子破故紙知母當歸白芍山查陳皮白术乾薑耳熱者用黃連黃芩川芎厚朴甘草當歸白芍木通不及期而收斂太早防發餘毒身無大熱者用白术散解毒飲若身熱者只用解毒散加金銀花五錢收痂遲難收太遲而食少者中氣虛不能充就也用參歸解毒湯加蟬脫或保元湯敷敗草散以溫表調中不食用人參白术散去葛根加肉桂小異攻散加木香青皮當靨不靨非氣虛必血熱也從唇舌之紅白辨之氣虛用益元湯加人參黃芪丁香肉桂血熱用百補湯為主加黃芩黃連為佐泄㵼氣虛必手足厥冷寒戰無陽以斂之也用木香散異攻散參苓白术散加蟬脫外敷敗草散二十日後多肢厥用丁香肉桂表虛不脫表虛以致痂疕粘皮不脫者用保元湯加川芎當歸官桂裡虛不斂裡虛血盡以致濕潤不斂者用保元湯加黃芩白术或六君子湯氣血兩虛失補氣血痂皮不脫更加沉重者用十全大補湯加麥冬棗仁血虛靨不齊者用四物湯加蟬脫風寒遏抑以致難收者用薄荷肉桂赤芍牛蒡殭蠶防風川芎當歸蟬脫或五積散桂枝解毒湯或薑酒調下治中散寒戰咬牙者化下聖功丸用乳香燒煙薰衣被糊塗成疔若正靨痂起自脫或面上收足成片瘡頭雖焦中蓄膿漿者此是原痘太密糊塗成疔所以毒壅于裡不能起發作膿結痂也用滅瘢救苦散和百花膏塗之膿盡成痂矣炎暑熱蒸以致不靨陽盛隂虧也宜清涼解毒用甘露解毒湯人參白虎湯或用犀角豬苓澤㵼麥冬骨皮木通連翹甘草外敷清涼散天水散大便祕用宣風散𨗳之過補裡熱便閉裡熱或溫補太過以致不收者冝涼解微利之用三黃末或宣風散蜜導法毒盛不痂血泡脹起而不痂者用豬尾膏頸腰不痂毒盛而頸下腰下不結宜清之便閉用當歸解毒湯溺澀用四苓散加黃芩黃連木通滑石飲水淫濕因飲水淫濕不收者冝內滲其濕外燥其表用除濕湯五苓散或四君子湯加防風白芷桂枝外敷敗草散症危脈在精神已昏飲食俱廢僵卧如尸而不結者疹其脈猶洪實調勻急治以升麻散火湯加當歸黃茋木香青皮蓮皮連進三劑得壞症復起贈痘復出人事清爽飲食如常者吉不焦色好元氣不虧膿足毒解至靨期久不焦只看痘色好亦不妨宜補脾利水而痘自斂用蟬退散或回漿散象牙散或沸湯調黑沙糖飲二三盞結疤而愈但沙糖不可早與之恐引痘入目也外用紫草煎油塗之收痂發熱欲結不結欲落不落不可純用氣虛補藥靨期非微熱不能熯膿結疤若蒸蒸發熱口渴煩躁此雖似虛而毒亦未盡也宜解其毒退其熱而痘自收也用清表散毒湯或當歸芍藥人參柴胡秦芁骨皮淡竹葉脾倦用苡仁茯神痂黑用連翹銀花溺澀用澤㵼木通燈心痰嗽用桔梗花粉渴甚用麥冬烏梅五味子身熱渴者脾胃虛也宜用白术散木香六君子湯煩躁手足熱欲冷飲者脾胃蓄熱也用人參麥冬湯五心熱日晡潮熱面赤心煩者肝脾血虛也用四物湯加逍遙散歸脾湯便閉用四順飲解毒湯不靨作變虛弱痘九日至十二日不靨或變白變水泡與初點灌期不同切不可用保元湯中有黃茋恐助氣壅塞也急用補血散救之反蝕正氣而熏灼頂破膿出堆聚如乾飯如碎松香無痂者必口有熱氣腹滿悶亂掀衣若不清解邪毒攻心為害不淺用生犀汁調六一散或宣風散豬尾膏餘毒未盡用加味平胃散加味白术散餘熱未盡狂言弄舌癡醉之狀此先前失解有餘熱未盡也用宣風散過服熱藥初熱時過與熱藥發之見點後又以熱藥補之以致停漿不活或中隳而不包縱包必不結即結必不乾此症多于漿後見之用黃茋五味散過用涼劑以致寒濕侵脾滑泄氣短倦弱不靨急宜安脾可免癢塌倒靨用除濕湯以內滲其濕胃苓湯以和脾安胃虛寒頂陷灰白頂陷吐㵼寒戰咬牙用木香散內助丹作癢用當歸白芷蟬脫足冷氣促用附子水泡去其惡水而膿自乾倍用茯苓白术癢塌穢觸癢塌內陷者用酒調五仙散外燒袪穢丹熏被內外夾攻使其依舊發出者可救爬去皮遍身爬破仍存幾個根腳紅潤光活者猶有生意用治中湯救之皮去而猶有血水者可治用保元湯加川芎當歸忽然不食久不食而今思食自少漸多此胃氣復也方始能食而多食無節乃胃敗火盛邪火殺穀故也名曰除中猶燈將滅而暴明泄㵼九日十日結痂至半而作㵼者不必慮乃陽氣內回非灌膿時比也切忌止澀之劑若一誤用必不食而變痢用保嬰百補湯加茯苓白术唇舌紫黑收期而唇舌乾紫連結渣滓而頰紅色者將成肺􅏴也用解毒湯加麥冬知母百合甚則大連翹飲加桔梗知母棗仁收痂體痛此必發毒也諸痛為實外痛而內快也外快則內虛矣冝活血解毒不結復灌先因皮薄破損多用補藥雖能逐毒或膿重復腫灌然正氣終為邪奪至此仍衰不能遏毒成痂身復發熱也用參苓白术散大補湯復灌補痘能食便調補出贈痘更無他症者吉此正氣尚強發毒出外也否則漸成蝕瘡難治復灌不救如不食成餅焦裂崩塌諸壞症悉具者不治已靨作變痂乾圓滿忽又戰栗妄言煩躁發渴乾嘔者正氣不接濟也用生脈散加燈心收遲發厥十三日痂落者上也十七八日次也二十四五日者下也至此血虛氣虛每多四肢厥冷急宜溫其脾胃用木香散倍用丁香肉桂不可恃其上身既收而玩忽之也乾痂不落八九日目腫微退痂似乾而薄如紙或有內毒未除亟宜補血涼解失治則變凶也痘痂氣息痘至成痂時必有氣息但微有辨腥臭者佳尸臭者死全無氣息者必有餘毒也痘痂不脫乾硬嵌入肉內日久方脫遂成班痕用韶粉散真酥蜜水調之或乳汁蜜水調蜜陀僧末塗之或鷹尿白散馬齒莧散四白滅瘢散蒺藜散俱可選用或生蜜蘇合油調塗四邊無蘇合油以腌雞油代之妄治生變脫痂未盡內外無邪只宜慎飲食避風寒而已過治之反傷其正以生變妄補之反加煩渴身熱發瘡發斑發疹諸症蜂起矣脾虛不脫當防變症撏損肺主皮毛脾主肌肉其氣不足故難脫不可撏損復灌畨覆潰爛多成疥疾用調元固本湯或人參白术散加黃茋肉桂等藥發表太虛以致肌肉不密無力收斂粘肉不脫發癢者用人參固肌湯餘熱不脫因餘熱為患當脫不脫者用大連翹飲去紫草甘草加地骨皮或辰砂六一散紫苓湯外以蜜水調入滑石末塗之更妙血熱血虛以致不脫者宜保護勿令見風用人參一錢五分芍藥三錢炙甘草一錢麥冬五錢五味子六錢懷生地金銀花各四錢水煎熱留肌表過用辛熱熱留肌表痂雖乾好粘肉不脫者用升麻湯加荆芥防風蟬脫連翹以去肌表之熱即脫頭面不脫只有頭面不脫者毒流陽分也用大連翹飲去柴胡甘草加白芷外用羊嗣骨散塗之痂色分治十二三日色如火燒煙薰者生死易決音不清食不入破處乾枯煩亂不寧死症也聲音清口能食爬破淋漓睡卧安寧神清氣爽生症也宜分虛實治之唇舌潔淨宜溫補而兼清解唇燥舌胎冝解為上解後胎自然去繼以平和則攻與補兩得之矣十日補利痘至十日而補脾利水言其常也若險症至此方始作膿何可概用苦寒也苦寒滲濕乃膿足毒重用為後隊耳當灌膿時何可謬施乎痘限日期為初學計耳治法在心思巧妙當補則補當㵼則㵼勿泥死法始可為醫耳靨期治案一漿足靨疤忽然紫黑穢氣觸也用十全大補湯加木香治之而愈一痘痂厚而乾燥身熱咳嗽風寒客肺也用麻黃湯取微汗而愈一痘痂麩薄粘而不脫昏睡肉熱脾虛血少也用調脾養榮湯而愈一痘痂乾黑不脫身熱煩渴不寧誤以為不足之故大補之枯稿而卒一痘同前症以犀角地黃湯加連翹牛蒡火漸平而痂脫此毒火盛則水涸之故也一痂厚乾黑不脫身熱煩渴詀妄不寧火虛血熾也用四物湯合生脈散加棗仁而愈一漿清痂如麩此正氣不足不能化毒也以補中益氣湯加山藥兩曲池發􅏴毒而愈一痂白如麩便溏減食中氣不足也用參苓白术散加陳冬米肉果而愈一兒大痘順漿足恃其順而飲食不節以致腹脹漿停色滯用消導藥而漿不足如故此食雖消而正氣受傷當調脾益氣助漿收斂竟失于治至十四朝變內虛倒陷漿反化水方用補益遲而不效致喘脹而卒一痘十一日漿水痂膿未足此虛不能托毒也用木香散加黃茋蟬脫而愈一痘十二日上身已痂下身灰白不充頭溫足冷用木香散加附子黃茋而愈一十五日遍身結痂但足下未焦寒戰咬牙用十全大補湯加附子而愈一十六日膿滿不痂及寒戰咬牙此不足也用溫補而愈一痘同上而頂突根紅此陽火有餘胃熱也用白虎湯而愈仁端録卷七
