body:
  text: 仁端録卷四眀徐謙撰陳葵刪定治痘大綱論平常痘症蓋不偏於血熱不偏於氣虛又非毒重擁遏但比之順痘又不可廢醫以坐待須按常法治之始起之前宜開和解之門既出之後當塞走泄之路毒去已盡補益宜疏痂落以後清涼漸進凡用溫補必毒盡外解而氣血虛寒者可也凡用寒涼必毒盡外出而熱滯於內者可也凡用辛熱必毒盡出外而內挾虛寒者可也發熱時未可便斷吉凶宜托裏發散疏解令痘易出用參蘇飲初標時須用拔毒治血如氣弱不出當微補其氣氣和則出快也但不可早用黃茋以密其腠理如表實不易出者用升麻葛根湯和解湯如表虛又痘輕少者又不宜過表恐後成斑爛如乾紅紫色亟宜疏利恐後黑陷見點四五日又宜清血拔毒使漿行前後無痰壅喑啞水嗆等症用清解散拔毒飲凡四五日之內以痘至足下為齊苟未盡出於解毒之中用寒涼恐痘因寒涼滯而不出如已出齊自當起脹須看何經火盛治之宜以清涼解毒為主清涼則無血熱枯慘之患解毒則無壅滯黑陷之虞但不宜多服發毒藥使顆囊寬大漿難滿耳六日交會以前如氣血失正當補氣血兼之托毒更防痰㵼用大保元湯加減七八九日以灌膿為主當溫補氣血兼之托毒防痰防㵼若毒未盡解於溫補中兼解毒若偏用燥劑毒盛不能化漿也十一二日以收斂為主當大和氣血補脾利水則自然結痂矣若漿未滿足大補氣血略兼解餘毒以防發􅏴瘟疤之患收斂之後虛實不一寒熱靡定務宜詳慎若內外平復虛實適宜只要調攝中和慎勿犯以藥物其通變之妙在於隨時制宜也氣虛痘症初身發熱悠悠乍涼乍熱肌慢神倦面清㿠白飲食少進手足時冷時熱四肢困倦睡卧安寧哯乳便溏痘點初見隱隱不振或淡紅或嬌紅皮薄而嫩三四日陸續不齊不易長大五六日不易成漿少食氣餒傷食易泄七八日塌陷灰白不起自汗微渴或腹脹喘㵼癢塌悶亂寒戰咬牙頭溫足冷勢所必至其間雜症兼見要皆氣虛所致毋得誤投發散苦寒并蕩泄滑潤耗氣滲濕之劑宜實腠理而固肌表則無外剝之患慎飲食而保脾土則無內陷之虞更兼補氣則元氣自充痘易出而易化也凡治虛弱症若係氣虛自應補氣氣虛易寒又宜溫之不論已出未出並以保元湯為主而斟酌輕重方為妙用未見點前用參茋飲加輕劑發散如紫蘇防風白芷初見點後用補益中略佐以升提用前參茋飲加輕劑如川芎防風白芷殭蠶桔梗加參蘇飲人參敗毒散黃連解毒湯紫草三豆湯升麻葛根湯皆不可用若氣粗皮燥無潤色者補益中略佐以升提用四君子湯減人參少加紅花川芎酒潤大腹皮亦忌用參茋飲見點四五日後重用參茋飲隨症加減八九日間無他凶症用常法漿足後調養氣血而已用保嬰百補湯若末後塌陷黑靨者多用木香散異攻散收功若頂陷灰白不起漿清自汗發渴用大補湯加桂若塌陷灰白泄㵼腹脹用木香散若塌陷作癢腹脹悶亂喘促咳嗽渴㵼頭溫足冷寒戰咬牙用異攻散收功附氣虛痘案於後一兒初標於下頦腎部也痘形平陷氣不足也少神血不足也六脈沈弱五朝尚點色不起兩腿作痛便溏有氣凝血滯之象此乃氣虛脾弱之症治宜大補中氣以補中益氣湯加蟬脫內桂羌活二劑起脹繼以保元湯加肉桂陳皮調理八朝溏泄不已加木香訶子肉䓻治之而愈一痘起脹頂平而色淡白渴㵼肢冷喜熱飲經曰隂盛者飲沸湯而不知熱又曰大寒而盛熱之不熱是無火也治宜益火之源以消隂翳用陳氏異攻散又用八味丸治之而愈一痘五日紅紫而不光澤是氣弱而毒滯不化也用神攻散及保元湯而愈一痘分珠起脹綻突但根血少神氣虧血弱也用十全大補湯而愈一痘諸處皆起脹惟四肢不起乃脾虛也以五味異攻散加防風白芍而愈一痘六日不易脹頂陷而不能肥綻乃正氣有虧不能逐邪出外以攻毒湯獨參散及大保元湯治之而愈一痘六日稠密形平塌色黑滯有擬雲掩天庭鎖頂鎖胸者皆謂不治但形色雖逆而四肢紅活綻突唇口紅潤起止安和飲會如常二便清調雖毒盛而氣血不足幸脾胃尚強猶枝葉雖枯根本猶活宜補養氣血而兼固脾胃以補中益氣湯加紫草蟬蛻牛蒡之類其逆俱平漿破漏結痂發疔疤數處而愈氣虛症禁用寒涼蕩滌之劑恐其潤下傷脾元氣下陷內攻而死禁用滑潤發散之劑恐其發散太過表虛氣耗癢塌外剝而死蟬蛻能潤肌竅恐耗氣成表虛人牙性烈發表太激易動中氣牛蒡子鬆肌滑竅防外致表虛內傷中氣茯苓豬苓澤㵼能令水氣下行小便多防耗津液外不行漿內致發渴車前滑石性寒利水甚速易傷脾胃山梔降實火若虛症溺赤非實火也不宜用大黃枳殼生地紫草性寒潤下蕩滌腸胃耗散元氣虛症雖熱渴便實亦不宜用天花粉葛根性涼防內傷脾土外成表虛山查散血解聚多用則內虛烏梅酸收砂仁散氣半夏性裂而燥多用則耗津液而作渴升麻荆芥麻黃開竅發汗防致表虛虛症變實漿足之後重用參茋補益太過者亦有腹脹喘急之患用枳殼散過用木香五苓則有大便閉塞之患用寬中飲便實而渴用麥門冬湯過用丁香辛熱之劑則亦有咽喉腫痛煩躁悶渴之變用滋隂潤燥湯此皆虛症變實也宜加斟酌不可疏通恐方生之氣復虛脫而生變也虛症似實氣虛痘症或為飲食生冷調理失宜致傷脾胃遂成泄㵼津液暴竭虛火上盛必發渴元氣下陷虛陽上壅下氣不續必發喘夫喘渴實症也今發於泄㵼之後與實熱之渴氣壅之喘不同若到悶亂腹脹毒入內攻眼合自語已名失志治之何益治渴用參苓白术散木香散治渴泄㵼不止用異攻散治喘用人參定喘湯獨參杏仁湯治喘渴而㵼用木香散異攻散實熱之症根窠紅黑堅結而不散濶脾虛之痘也必淡白根窠雖紅猶如點火過路熖焰紅光無有定色乍作乍止根腳濶散而不堅有等痘症淡紅赤色儼似血熱此是脾虛不勝毒毒氣上沖滿臉紅赤狂言亂語致毒伏陷泄㵼腹滿症候多端矣用六君子湯加薑桂發之則脾強而毒自透實症似虛有初點色白儼似氣虛細察身背若有枯紅紫黑之色精神恍惚嘔吐無時人事倦怠乃毒伏於內壅遏不發血被火涸不能流通于脈絡運於肌表故不能正其色也此為實症似虛設使妄投補氣之藥愈助其毒則腹脹喘急之患生矣如膿期久吐少食泄㵼而見白色者始可溫補痘後有毒氣再發者亦然血熱痘症初發壯熱腮紅臉赤毛焦色枯痘發繁紅紫滯煩躁啼哭睡卧不寧渴欲飲水好睡冷處小便赤澀是也只宜升提發散使毒得以逹表而從外解引以滲泄使熱得以潤下而從內消佐以清涼消毒行血涼血之劑則痘雖稠密亦能消散自易漿而易化也不可誤用熱藥補藥澀藥亦不可過用涼藥蓋發散太過則肌表虛元氣耗矣涼血解毒太過則漿清癢塌虛寒等症有所不免血屬隂而性寒反能為熱者火鬱所致而然蓋既壅而不宣血亦因之而熱也如火陽也而生於隂冷風煽之則熾冷石擊之則出可以知其用熱而性寒矣血因火生亦性寒不待辨也但火非鬱不發非擊不發發則燎原之勢不可撲滅若用寒涼以折之如以杯水救車薪之火其可得乎故鬱者乃是火來之機也機不可遏發者火泄之機也機不容阻未出之前升發為主用升麻葛根湯升麻流氣飲總不若十神解毒湯為穩見點一二日間血熱毒盛者勢必亟一發熱便口渴面赤或紫氣喘狂躁詀語痘頂焦血分毒熾也用本方加滿天秋石膏唇燥舌胎者加熱見愁黃連黃胎起者加千里馬大黃蓋焦紫雖血熱未必不由內熱也審之以舌藥斯當矣血熱一見點即宜涼血解毒十中可治四五遲則難救用犀角地黃湯黃連解毒湯多磨犀角汁飲之此純用寒涼者何蓋血本溫也何由而熱熱於風熱於食熱於濕熱於暑原是外來暫客之邪容易擺脫遲則不能折散矣全要玩血熱一見點五字雖暫用涼血解毒藥不妨見點三四日後若熱症悉平血包已成氣血定位頭頂白光勢將行漿用紫草透肌湯加減即太乙保和湯八九日漿足之後用保嬰百補湯加減調治若此時尚有紫色乾枯及青乾黑陷便實溺赤澀者如奪命丹大造保童丸談笑博金丹或百祥丸牛李膏獨神散豬尾膏無比散皆可選用惟經泄㵼之後有黑陷乾枯者方用補托附血熱痘案於後一痘血熱毒盛初起即以犀角地黃湯未效改用白芍八錢一泄毒解徐補收功一發熱即詀語唇腫齒黑痘欲出不出以生地黃八錢白芍藥五錢黃連黃芩各二錢稍加發藥日三劑勢稍定痘漸次而出又減地黃芍藥之半復於助漿藥中兼用清涼九日十日漿始足卒傷一目靨後方大便此真血熱也若重用解毒輕用補助則目亦可以不眇矣一初血熱甚用生地黃二兩煎濃汁頻服其紫痘立轉紅色一兒年十六新婚兼酒食感痘諸醫以為不治至八日漿清寒戰咬牙詀語神氣恍惚諸醫欲進保元湯施季泉用犀角地黃湯得脫痂作血熱症治學者用心參究方得後忽嘔吐大便燥結奄至一月繆仲淳視其舌白多裂紋曰此必當時失解陽明之毒也以石膏一兩人參一兩麥門冬五錢枇杷葉橘紅竹瀝童便為佐一劑即安再劑膈間如冷物隔定只以參湯投之服兩許即索粥食晚得大便夙疾頓愈一火痘毒盛又遇火令用白花地丁汁和淡白酒少許服之立解一痘稠密綻突但色紫黯壯熱煩渴詀語目赤便閉乃毒火亢劇也以四順清涼飲加大黃六錢微利二度勢稍減再服一劑又利二次病去其半又以前方加人參三錢前症悉平色淡白神倦此邪雖去而正不足以保元湯加川芎當歸白术而愈一痘出夏月起脹而乾紅壯熱舌燥煩渴不寐溺赤此內外熱極也以黃連解毒湯合化斑湯治之而愈一痘夏月六朝痘痛煩躁氣急便閉乃心肺實熱也恣與涼水梨汁而愈血熱痘症與毒擁痘症大約相似故治法互宜參用血熱毒擁謂何血非熱不毒血非毒不熱不可視為二也有內外症者一齊見者有外症重而內症稍緩者有內症重而外症稍緩者又不可謂之二也惟在醫家於先後分合輕重處審而治之也治血熱毒擁五法一曰安表表熱盛則痘必乾枯表太涼則痘又氷伏安其表使無乾枯陷伏之患一曰和中裏熱盛則閉結裏太涼則泄㵼和其中使無便結泄㵼之患一曰勻氣氣擁盛則腹脹滿勻其氣使無壅盛喘滿之過一曰透肌熱毒抑鬱而不得伸越則腹脹狂亂透其肌則熱毒伸越而逹表也一曰解毒毒氣彌盛則表裏受傷者重而嬰童難任解其毒使內外有所分銷也誤藥致變誤投補劑則必喘脹詀狂咽痛口瘡邪得補而愈盛也誤投熱劑則必咽痛悶亂失血便閉氣得熱而愈亢也誤投澀劑則氣道阻塞腹脹喘急是欲其出而閉之門也血熱兼氣虛初發先宜涼血解毒則五六朝之後可以并力補氣助漿若初時不涼血則毒不解至六七朝勢必用參茋補助漿必不來而反滋毒火矣熱症似虛初熱放點神思昏亂足冷痘水如水窠惟有唇腫口渴可以解其火症若反以氣虛治之十無一生虛症以熱脾虛不能勝毒毒氣上蒸滿臉紅赤狂言亂語似熱非熱此虛症似熱也不可妄用寒涼以致脾寒作㵼陷伏作脹也用六君子湯加生薑發之則脾強而毒自透矣熱症變虛如或遽用寒涼滑㵼之劑毒為寒鬱必致內傷脾胃外氷肌肉脾胃傷則飲食減而溏㵼甚則洞㵼無度而遂致虛寒肌肉氷則熱蒸之氣不行腠理閉塞痘不肥大難發難漿而成陷伏此熱症變虛也於六七日後見之便從虛候人參黃茋肉桂丁香木香異攻散亦不忌毒壅痘症乃毒氣壯盛外為風寒所鬱或肌厚肉粗腠理堅閉肌竅不通經絡阻塞使清氣不得引毒達表循竅而出則熱毒壅遏於內矣故初症壯熱毛竪皮燥睡卧不寧腮紅睛赤氣粗煩渴腹脹便閉面浮眼張喘急詀狂驚搐多啼多怒是也治宜升提發散為主佐以透肌解毒則熱毒易透矣又須得平乃止不可過劑如或過用寒涼誤投溫補及澀劑其害與血熱無異見點之後諸症悉平勢將行漿用益元透肌散加減漿足之後用保嬰百補湯調理六七日外尚有紫色乾枯及青灰白陷者若無氷硬泄㵼之症皆熱毒內攻而然切勿誤用溫補只有奪命丹大造保童丸談笑博金丹一字金百祥丸豬尾膏牛李膏獨神散皆可選用附毒壅痘案於後一痘紫色而不起脹乃毒盛壅遏也以紫草紅花蟬蛻煎酒調獨聖散又以犀角地黃湯治之紅潤起脹而愈一痘血熱毒盛初時純與涼血解毒用犀角二兩石膏每服五錢服過五劑至十朝略用人參一分托漿十二日外漿清痂薄用助托藥加綿繭帶蛾者七枚糯米一錢渴時即以麥冬粘米蠶繭煎湯飲之又發水泡數個漿痂暗長灌爛遍身復用茯苓苡仁白芍黃連甘草生地地骨皮山藥蓮肉木通連翹牛蒡子荆芥金銀花地骨皮調理而愈又實症似虛如初見嘔吐則知其毒不得伸越諸逆沖攻皆屬於火是也或因寒冷所搏或因乳食不節或因冷暖相拒並以升陽發散為主少加下引之藥如豬苓澤㵼木通竹茹及薑汁炒黃連鹽水炒陳皮之類如初見泄㵼則知其毒鬱脾胃不得外達則毒從下陷尋竅而出所謂熱毒下注是也古云未出而泄者生既出而泄者死亦只以升提發散引毒達表則內泄自止若兼傷食而泄輕則加消化之劑重則從之可也如初見點不思飲食者則知毒氣在內不出二便閉澀腠理阻塞腹脹喘急自然不思飲食也亦只以升提發散引毒達表則熱氣有所伸越而臟腑和平飲食自進矣毒擁之痘若遇嘔吐泄㵼不食三症似虛非虛者若誤用丁香肉桂半夏生薑等藥是以熱攻熱而轉增煩劇也若誤用人參黃茋茯苓白术等補藥是邪得補而愈甚入口立死也他如龍骨豆䓻雖能止泄麯蘖砂仁雖助脾化食皆不當用於壅熱不食之症智者鑒之毋忽實症變虛毒擁之痘如發散太過必致肌表空虛元氣耗散內灌清漿或虛胎空殼或癢塌外剝或潰爛不收皆表虛之過也表既虛則元氣從此耗泄而內氣亦不能以自守易成泄㵼泄㵼不止遂成虛寒而氣脫毒入內攻煩渴悶亂寒戰咬牙無所不至矣故雖實熱之症於七八九日曽經泄㵼虛症既明者皆可從虛治蓋內虛者毒必陷伏以成內攻雖有腹脹煩渴喘急皆毒入內攻而然非實熱也人參黃茋丁香肉桂附子白术茯苓木香之屬亦所不忌熱症變寒如或寒涼太過及驟用寒涼必至氷伏泄㵼泄㵼之後熱氣自散其氣亦虛氣虛必寒又宜用溫補是初症為血熱為壅遏至於五六日後身反不熱肌膚氷冷痘瘡不起焉得不用溫和使內氣暖而外症始和也加生薑肉桂川芎等藥如無氷硬等寒症切勿誤投溫劑如無泄㵼之症切勿誤投木香異攻散蓋塌癢倒壓乾枯而無泄㵼氷硬之患者多因熱毒內攻而然也又宜用百祥丸豬尾膏凡邪氣壅盛隧道阻寒而猝然死者有之禁錮寒涼故也若根暈不散尚可望活宜置放患人於涼處以徹其熱亦能復蘇毋因其氣絶而遂舍之也治法遡源痘症大綱曰氣虛曰血熱曰毒擁是矣而不知不止氣虛也尚有血虛有氣血兩虛者矣不止血熱也尚有氣熱有氣血兩熱者不止毒壅也尚有風閉熱閉食閉元氣毒壅而閉血熱毒擁而閉者若遡其源而論之如氣虛一症即可該血虛在內蓋血無驟補之理而氣有生血之功氣虛用參茋芩术氣虛而寒則加薑附丁胎骨暈蛋血虛用芎歸地芍血虛而寒則加參歸薑桂鹿茸河車然使血藥而無參茋其何能令血以化漿乎故氣虛可該血虛也如血熱一症即可該氣熱在內蓋熱分氣血兩途而治惟涼解一法氣熱用黃芩石膏地骨皮天花粉元參知母麥冬山豆根然使氣藥而無潤劑其何能養隂以退陽乎故血熱可以該氣熱也如毒重壅遏一症雖病源不同而治則或疏或解或攻或利疏藥如麻黃元荽蘇葉桂枝升麻葛根羌活獨活荆芥防風角刺蟬蛻殭蠶蟾酥麝香之類解藥如黃芩黃連山梔黃柏石膏絲瓜犀角羚羊龍膽連翹牛蒡紫草青黛金銀花燒人屎攻藥如穿山甲天靈蓋雞鵝腦雞冠血蟬退殭蠶全蝎蜂房桑蟲暈蛋胎骨利藥如溺赤澀用益元散火府散車前子木通赤芍山梔蚯蚓人中白大便閉用芒硝大黃檳榔枳殼枳實瓜萎仁牛李子元眀粉桃仁麻仁郁李仁大戟毒重係表熱者夾疹斑眼紅唇裂痘凹不起遂攻倒靨後為潰爛為􅏴毒不解利則陽盛無隂以相濟而死矣毒重係裏實者煩渴大便祕結小便如血或有燥屎旁流清水詀語尋衣摸床神昏若不解利則毒反攻臟腑毒重係表裏俱熱者痘初出即焦黑乃血不能流行三焦喘急腹脹此危症也非大發大下之味不可救用消毒飲或當歸丸通關散千里馬三乙承氣湯看輕重後亟以解裏熱得利後用紫草飲加味四聖散調下無價散以解表熱用胭脂塗法得痘轉紅活漸起發者吉更乾黑者凶或用雙解散加芒硝或全料通聖散大劑服一劑而前症悉平痘子出現稠密者復用十全大補湯去肉桂加防風金銀花連翹桔梗調理火症痘須辨氣血表裏明辨表裏氣血虛實寒熱痘毒非火不發非血不榮非氣不充故痘之生長收藏全慿氣血而氣血之中各有虛實寒熱之異故包褁緊束於外者表也充拓運化於內者裏也為形為衛能突能圓能拘能領能含能逐能黃者氣也為色為榮能載能附能潤能漿能紅能活能收能斂者血也總計之有八症焉痘之形色有四曰毒壅曰血熱曰氣虛曰血虛痘之症候有四曰表實曰表虛曰裏實曰裏虛見點稠密形不尖竦痘色慘黯隱隱不出者毒擁也見點深紅漸變紫黑夾疹夾斑者血熱也淡白平塌頂陷皮寬者氣虛也色淡根散與肉無異者血虛也身熱微汗者表虛也壯熱無汗喘促而浮皮焦肌痛者表實也精神困倦唇舌淡白者裏虛也狂亂氣粗渴飲善食唇燥面赤舌胎黃白者裏實也以形色而分氣血之虛實以症候而分表裏之虛實似乎二也然毒壅與血熱同為表裏之實血虛與氣虛同為表裏之虛肺主皮毛脾主肌肉肺主表脾主裏似乎二也然虛者必寒脾肺虛寒則表裏虛寒矣實者必熱脾肺實熱則表裏實熱矣肺主氣腎納氣肺腎實則氣實肺腎虛則氣虛肝藏血心主血脾統血心肝脾實則血實心肝脾虛則血虛氣不可虧虧則陽會不及而圓暈之形不成血不可盛盛則隂乘陽位而倒靨之禍立至總之邪氣盈則實元氣衰則虛若邪氣本虛元氣本實則無病明此表裏氣血虛實寒熱八字思過半矣辨之既清治之宜早壅者疏之寒者溫之熱者涼之虛者補之實者泄之平者調之但痘子變遷無常色若一轉又當變通抑其太過引其不及然欲辨明表裏虛實氣血寒熱當以舌色為綱則萬無一誤矣表裏氣血中和稟受沖粹體健便調乳食如常六脈洪盛紅潤勻朗綻突漿滿此不必服藥者也表裏虛寒此逆痘也急用溫補脾肺氣血補氣則脾胃自壯後必無陷伏之憂補血則榮衛周流毒盡而無凝滯後必無癢塌之患用保元湯四君子湯四物湯加木香肉果丁香官桂附子或無上飲木香散異攻散以助膿收靨灰白痘兼泄㵼腹脹口渴氣促者此非熱渴乃血虛氣弱津液竭也用木香散㵼脹用酒調無價散表虛寒灰白昏暗陷頂倒伏微熱有汗作癢難靨表虛不補則成外剝險症也治宜實表補氣為主補血次之以保元湯為君佐以桂枝生薑防風凡用黃芪當在盡出之後用熱藥當在毒盡解之時裏虛寒精神困倦二便清利身體寒涼口氣俱冷飲食少進唇口淡白涕清吐㵼出遲作癢裏虛不補則成內攻之症也治宜益氣溫中補血兼補氣用白术散為主佐以人參陳皮厚朴丁香官桂附子表實熱稟厚毒重初點頂焦乾枯黑陷無汗作痛難出易靨二日或發斑疹疔毒四五日或發水泡紫黑焦枯七八日或發膿泡點頭綻突根腳紅紫表實過補則不結痂險症也宜清涼解毒為主分利次之以升麻湯為君佐以柴胡黃芩荆芥連翹蘇葉葛根麻黃裏實熱大便祕結小便赤澀身熱鼻乾口熱唇燥煩渴能食出快作痛裏實過補則發􅏴毒險症也宜解毒而兼清涼二三日前熱毒盛裏症急者少加大黃芒硝利之亦釡底抽薪之法也以解毒湯為主佐以知母黃柏麥冬車前滑石木通地龍火盛毒熾焦枯黑陷若有痰先用抱龍丸以降痰隨用紫草蟬蛻湯調無價散裏熱腹脹便祕者用皂蜜微導之表裏實熱稟重毒深險症也急宜涼血解毒涼血則不紅紫解毒則不黑陷若靨時潰爛狂言弄舌癡醉之狀此因先前失解而實熱有餘也須用錢氏涼解法以當歸化毒湯加紅花紫草丹皮黃芩辰砂益元散加蟬蛻黃連犀角生地荆芥牛蒡此症以和解湯為主脾虛初標焦枯紅紫黑陷煩渴妄言六脈有力是實熱也如根窠紫黑色黯枯燥腳塌不聚此脾虛不能運化以致毒滯肌表血散皮膚若作熱治誤投涼藥致傷脾胃毒陷內攻必口臭舌胎牙爛不救多矣表虛裏實大局發快收遲當于解利中加發藥表實裏虛大局伏陷倒靨當於補藥中加解毒藥氣虛自汗寒戰吐㵼咬牙咳嗽無痰其聲閉澀右頰屬肺上有微黑色黑為水色金之子子能令母虛也點期膿期痘色淡白根窠微紅頂不堅實平塌凹陷摸不礙手飲食少進倦怠無神毒易內攻陽衰而多寒宜溫補氣虛不補則成下陷始終以保元湯為主以四君子湯加木香川芎當歸為佐虛寒加丁香官桂乾薑附子泄㵼加訶子肉果痘初發熱氣虛用參蘇飲氣實咳嗽痰血不絶喘促鼻塞鼻燥煩燥二便閉澀左頰屬肝上有微黃色黃為土色金之母母能令子實也陽旺而多熱氣有餘便是火毒壅而氣益熱則又發泡矣險症也始宜清肺湯加人參前胡杏仁白芍元參地骨皮旋覆花氣熱加黃芩血虛色淡根散與肉無異鬱胃燥暗紅而散漫以手摸過即轉白痘上如寒毛竪起枯澀不活頂陷發癢唇口淡白面色青瘦指甲微白枯黯淡白尖頭不起雖見起發亦無光彩不圎滿而難漿易致外剝宜溫血補血用四物湯加荆芥防風連翹甘草後隨形色用藥如保元湯加川芎當歸白芍木香甘草鹿茸阿魏河車黑薑熟地涼血用芍藥紅花加山查以消參茋之滯加木香以行滯氣血自活也血虛多寒寒多傷血者目青筋縮嘔吐清水血凝不活宜加乾薑血實初點淡紅明亮四五日間頂若水白根窠紅活透頂綻凸作痛作漿此活血毒輕也治宜和平疏導用紫草荆芥白芍紅花山查生地丹皮連翹牛蒡升麻甘草若初點即深紅乾燥漸變紅黑是血過盛也血實者多熱陽火反為隂血所鬱熱傷血者火摶其血則發丹斑矣初點即面紅目赤泄利稠粘狂妄腹脹煩渴詀語不睡黑陷成疔險症也治宜涼血解毒用犀角黃連黃芩黃柏山梔石膏青黛生地紫草桃仁紅花桑皮地龍白芍荆芥連翹初時用十神解毒湯後用太乙保和湯加減虛痘亦有白陷不榮不得已而用補血之藥當歸白芍亦有痘點繁紅有似血熱不得已而用涼血活血之藥紅花生地紫草並用酒炒以抑其潤下之性酒力直達肌表則補血活血之中有升發之妙無腸泄之患矣血熱燥癢宜涼血活血用黃芩黃連紅花生地丹皮首烏元參蟬蛻痘色根窠成片近黑黑如黑烏羽而有沙眼摸過轉色者尚有活血之意如無雜症猶可救若黑如煤炭者此血死不治有脾虛不能勝毒毒氣上沖滿面紅赤狂亂似熱非熱淡紅赤色須細察之若真實熱根窠必紅黑堅結而不散濶塌不聚此則根窠雖紅猶如點火過路焰焰紅光乍見乍止色必淡白塌散而不堅乃脾虛熱也非血熱也此與脾虛不能化毒同義要兼內外症參看看法甚微全要穎悟若妄用涼血之藥則脾愈寒而毒陷伏泄㵼脹滿之症作矣果能認得的是脾虛急用扶脾之劑則脾強而毒自透矣用六君子湯加乾薑官桂氣盛血旺尖圓明潔起發堅硬人事強壯皮膚燥澀治宜涼血滋隂用滋隂潤燥湯氣血兩虛根窠淡紅起發虛軟大便微泄人事軟弱治宜溫補氣血用十全大補湯氣旺毒輕點小而髙根斂圓淨先出先長日見活動光潤鮮澤堅實礙指頭面疏朗飲食不減是也氣虛毒重點若蚊咬滯而不起雖起濶塌皮薄而軟斜視若無面唇先腫小者稠密大者平陷是也毒滯血凝頂若火刺紅而乾枯紫而昏暗夾斑帶疹白而枯澀色若鋪塵是也毒重壅遏為風寒所抑或肌肉粗厚腠理堅密不通經絡阻塞不達清陽之氣不得引毒出表以致熱毒壅遏於內初時壯熱毛直皮焦睡卧不寧腮紅睛赤氣粗煩渴腹脹便閉面浮眼張譫狂喘息驚搐多啼是也治宜升提發散為主而以透肌解毒為佐得平即止初用羌活散鬱湯後用益元透肌散腎虧發藥補藥宜滋補腎水用白雪湯甚妙倘有不成漿者用元羊丹五虛症身冷脈靜汗出二便利謂之五虛虛者正氣虛也屬隂屬寒雖發熱標痘時即宜溫補誤服寒涼痘即沈伏經曰五虛宜補是也五實痘身熱脈大無汗二便祕謂之五實實者邪氣實也屬陽屬熱故發熱標痘時即宜汗解誤服辛熱痘即潰爛經曰五實宜㵼是也乾瘡濕瘡乾瘡宜退火止用輕劑如荆芥防風升麻葛根元參蟬蛻連翹麥冬生地當歸芍藥甘草濕瘡宜健脾兼用風藥或利小便如防風白芷人參白术黃茋茯苓苡仁澤㵼心經症候心火盛弄舌或不能言急者名蛇舌用蓮子赤芍黃連舌捲舌裂用黃柏知母舌胎黃白倍加黃連舌胎黑白用生地黃連犀角汁舌黑用元參舌白用黃連舌心黑痘急撥破敷四聖散平復者可治突出者死肝經症候肝火盛目不能視或眶赤痛以柴胡為君佐以黃連生地龍膽草甚者用銀柴胡熱見愁護眼法肝肺風熱眼白紅腫用黃芩黃連磨犀角汁脾經症候脾火盛口不能開或唇腫厚魚口倍加葛根水孛花魚口甚者加梔膏胃火盛口氣太臭多加白芷石膏口痛用薄荷湯含嗽繳拭或為擦之唇口腫裂內服石膏黃連葛根知母黃柏外用銀針刺破點以雄黃硃砂密水調四聖散鵝毛蘸頻敷之唇燥舌胎用熱見愁便閉用千里馬肺經症候肺火盛鼻不聞香臭或鼻孔乾枯青黑用酒炒黃芩山梔咽喉腫痛痰喘以桔梗為君以杏仁枇杷葉前胡為佐甚者另服保元湯乳加薑汁咽痛用甘桔湯加升麻元參射乾山豆根汁吹龍硼丹六日內發喘必毒物所致多加川芎桔梗枳殼以㵼其毒咳嗽用杏仁桑皮三白草根馬兜鈴煩悶用前胡枳殼噴嚏加牛蒡子甚者生用聲音低小用杏仁腎經症候腎火盛耳不聞聲或耳輪枯燥青黑重則用黃柏知母輕則只用生地黃閉症肌熱用升麻葛根難標用羌活熱熾發不出用前胡紫草麻黃蟬蛻風寒閉塞喘脹欲出不出用紫蘇飲皮厚腠密難發用升麻葛根湯風寒痰鬱出不快用參蘇飲加蟬蛻紫草木通川芎麯糵香附青皮山查連翹牛蒡極熱風閉加升麻知母麻黃並退六經火壯熱皮急肉緊用葛根前胡地骨皮喘脹面浮目怒毛直枯燥加麻黃下救苦丹毒盛綿密用荆芥防風連翹牛蒡有斑疔用甘菊葉寒用辰砂百骨背痛加川芎柴胡羌活因跌銼勞力加活血藥因房勞加知母黃柏五心煩熱骨節筋疼加地骨皮痘疹成色論初出形色俱佳出透脹灌如期或一種佳痘稍見漿而即靨或一種竒痘不見漿而收功此十成痘也不必施治初出快利形小色淡氣血俱虛此七八成痘也急宜施治稍助其長微釀其膿但不可攻之太過至板黃而不救色暗形枯出不快透氣血與毒俱盛此五六成痘也必竭力使之透使之長使之灌否則不救初出快利顆粒甚密頂不尖員微紅而淡氣血兩虛年夀天庭之上有幾顆大而膿滿者此四五成痘也當稍助其長微釀其膿但不可太過至氣血雙脫而不治凶中有吉吉中有凶翕樞兩顴峻澄鮮鼻柱天庭一直妍兩陽七道桃紅綻陽睪額腮交灌起又有倉庫特充腴兩臉中間襯委紅囊破旁圈反見佳遍身黑痘內藏元時多聲啞驗喉中紫紋挑斷毒難攻衆痘不起注命生疔名生兩足掌剜除惡毒活分眀已上是凶中有吉兜含錐疹正中央腕前寸地如錢突一點紫梟形掌內谷道兩傍如石硬鼻凖忽然一針黑齒縫兩邊鉗硬緊背心正座如蚊蛟樞翕肚腹痛不休卵中腫痛鮮血流臍上尾尻焦紫腫天柱中心雖黑點頂會中心腫突起足指縫中蓮子硬頭眼腫痛尿黃色以上是吉中有凶斷生痘訣出來點點粒如珠不聫不併各安居色似桃花紅帶淡形如星斗朗然稀不灰不白非焦紫日月兩角分明起心部陽眀顆粒勻眉梢腮頰脾家許漸次添來不湧齊熱過三四日標施包束完固無破損蒼老結實豈㳳漓氣交血會兩分明粒粒可數礙人指方廣勿先臨垂珠無點起法令有龍蟠眼眶無虎踞動氣不栽蓮山林不揚幟一粒到唇軒稀朗應無比顴阜色光明太陽不阻滯眼角挂蟠桃全身少疔纍手軸不粘連虛泡何由起上腕不煤斑詀躁何由至伏枕不先馳埋軍豈鋒利門闌不僣截􅚣賊自潛避喉結少垂紅何愁食不貯淚堂無懸井喉爽不鳴鋸此是生痘訣勸君須熟記吉痘渾身壯熱忽時驚厥逆畨睛嘔吐增口渴舌乾顴臉赤頭疼汗氣自蒸蒸胸前燥悶誰驅遣靜中詀語故頻仍飲食如常脾得令此花端的是佳徵輕者三四出大小不等粒頭面稀少佳胸脅不為密兩顴不甚多根濶紅活色肥滿潤澤光眼中無者吉飲食如常二便調紅活結實形色髙身涼手足皆溫暖響亮聲音動靜饒斷死痘訣初出之點紅帶紫發斑之症五日死初出滿點連肉紅七八九日氣絶耳斑如錦文六日終斑青頃刻入冥中痘出如痱無縫者摸不礙手勿治也若如湯泡及火燒十日癢塌死不饒痘出腰痛腹痛起煩躁紫黑口臭死頭面一片如胭脂六日死去何必疑頭面腫浮痘不腫胸髙而突不治重頭白面光根不紅久後􅎲破死無膿無膿癢塌十二期有膿血者不死醫如麻無縫痘不好聲啞氣絶命皆危二症灌膿痘色光此乃傷風參蘇當若是哭泣喉嗽啞痘色光眀也不妨痘色不好聲又啞斷他必死無或假捲舌縮囊目無魂飲食挫喉必難存紫泡刺破出黑血便中腸垢不治論吐㵼若甚又不止蛔蟲出者死期至已出未出聲音變先痘後驚藥不驗三日根窠全不起紅腫如瓜君莫治頂陷有眼似針穿又加紫黑死決然根窠紫黑血乾燥又不起壯亦難療陷伏腹脹不飲食神昏氣弱命不測腰痛腹痛或不痛紫點不發藥可用悶亂不寧兼黑陷神氣昏憒魂已散灌漿之時純清水皮白而薄水泡似無知徒謂此好看三四日後抓破死灌膿乾枯無血水此名空倉痘乃萎泄㵼不止二便血乳食不化痘爛絶灌時二便全不通目閉聲啞症亦凶腹中脹滿肌肉黑若施醫治必無力當靨癢塌無膿血皮如血壳即乾絶寒戰咬牙禁口者手足戰掉勿治也目閉腹脹過膝冷煩躁痰喘救不醒痘子一片白無神不思飲食困沉沉賊痘灌膿切莫欣誰知邪毒內攻心灰白痘中疔決有遲穿筋骨難措手初形尖聳硬如針雖然稀少個個疔面部痘隱手先泡天庭未起捲簾生胸前紫黑司空黑鼻孔如煤聲啞澀飲食不進吐頻頻汗流不止便紅極腹脹㵼利眼不合摸衣直視怕人入哯舌搖頭天柱折痘方形起指甲黑此是死症君須記不治症小兒痘多小船重載抱鼻芝麻拖腮碎米白虎排牙吻內腫硬蟒蛇當道唇中翻疔紫密攢胸轉加煩渴頂陷可醫陷頂難治火虛可醫虛火難救棲霞落日面紅若電雲掩天庭毒多粧點壞病勿治發熱吐利并作者此毒火內攻令其上下得出也勿驟止之痘出而猶不止宜急止之恐其內虛而毒伏不出也自此以後吐利不止者壞病也發熱驚妄者內熱也急止之痘出之後反加詀妄者壞病也發熱腹痛者有毒也急攻之攻之不已乍見乍隱者壞病也痘出糢糊者毒甚也急攻之顆粒不成但加虛腫者壞病也痘出焦黑者毒深也急攻之痘潤不回反見乾沒者壞病也痘出帶水者肝病也急解之若生􅎲癢處致破損者壞病也痘癢破損者肺病也急治之破者不灌空中無病者壞病也痘破成􅏴者毒攻也急救之痂皮不結深潰出血者壞病也頭面預腫或疫痘也急解之其腫忽消解而不消者壞病也五經絶寒戰咬牙手足搐搦者為肝絶直視搖頭汗出如珠者為心絶嗆喘鼻煤聲啞悶亂者為肺絶溲便遺失不能自禁者為腎絶決死期久近沈虛明曰鬱而不出三日出而不齊六日不起脹九日不灌膿十二日內攻皆死于十二日不痂皆死於十五日此死之日期也毒陷於脾者泄而死毒壅於胃者乾枯紫黑而死鬱毒未解者喘促而死此死之症狀也若王莭齊則以虛寒實熱分日期其曰重症屬虛寒者毒多而氣血不足不能灌漿成就必九日後變症而死或延十數日方死屬實熱者不過六日而已蓋痘毒自內出外三日毒尚在內至六日則當盡發於表七八日成膿而結痂矣若毒盛不能盡出至六日反內攻臟腑而死矣又有三日而死者由毒盛不能發泄臟腑又傷故其死至速也惟斷以死不斷以日始為方家凶痘訣煩躁悶亂語恍惚嘔唍泄利不飲食乾焦黑陷或塌爛頭腫目閉唇燥裂食啘水嗆喉潰爛寒戰咬牙啞色暗腹脹喘促四肢冷七惡見一必當凶腹間一帶丹纒緊腋下一條如火絡重者一齊出如蠶身瘇密灰白色不明頭溫足冷石稠密渴增㵼身冷腹脹急兩耳後核腫舌根硬絶直顫中焦珠起兩手錐紫腫熱蒸日夜汗如雨青臉唇軒影黑憂詀語怕人常見鬼摸床尋衣自垂頭腰疼足冷腹絞痛便㵼咬牙囊腫浮竅中流血疹斑發惡渴狂煩七日愁嘔吐頻頻食不進更兼尿涸祟來仇熱時紅燥唇如裂舌白端知命不悠熱愈忽然遍身紅毒氣沖心滿體攻縱然三四間花蕊決是幽冥見主翁熱盡才瘀不見瘡忽然二眼腫難當饒君雖有微紅蕾前期七日定恓惶心窩宜少不宜多窩多必死見閻羅紫痧黑斑終朝死紅沙青斑三日難冷粥結面方歪爿片胖蠶形體死日立至灑珠點黑青黛顔色糍糕爿片通連貫串疙瘩無漿七死九殄油光黍粥胎源惡毒內有紅紫早辦棺木鬢邊紅點不發其盤人中平滿腿腫必危仁端録卷四
