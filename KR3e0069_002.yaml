body:
  text: 仁端録卷二明徐謙撰陳葵刪定十二經症治手少隂心足腎居手太隂肺足是脾手厥隂兮心包絡足乃肝經莫認非三隂屬臟所謂發於三隂者難治也手少陽膽足三焦手太陽兮小腸交足太陽是膀胱位陽明大腸足屬胃三陽屬腑所謂發於三陽者易治也太陽所至為腰痛太陽病則發熱腰痛脊強兀兀頭痛小便赤澀應在頭面身之後痘于此出不快用荆芥防風甘草羌活天麻足太陽膀胱經氣病則腰折腎痛血病則顚狂用麻黃桂枝澤㵼黃柏手太陽小腸經氣病則嗌痛頷腫血病則頰腫用生地赤茯苓手足二經通用寒淫於內治以甘熱佐以苦辛以醎㵼之以辛潤之以苦堅之寒淫所勝平以辛熱佐以苦甘以醎㵼之陽明所至為皺揭陽明病則身熱目赤作渴詀妄大便閉應在四肢身之前痘于此出不快用升麻葛根紫蘇芍藥甘草蓮鬚蔥白紫草足陽明胃經氣病則喜伸善欠驚狂詀語血病則唇疹喉痺用半夏白术蒼术防風手陽明大腸經氣病則頸腫血病則鼽衄喉痺用連翹秦芁麻仁手足二經通用升麻白芷石膏大黃燥淫于內治以苦溫佐以甘辛以苦下之燥淫所勝平以苦溫佐以酸辛以苦下之少陽所至為嚏嘔瘍瘡惡病暴死少陽病則乍寒乍熱胸腹痛乾嘔心煩應在胸鬲及身之側痘于此出不快用紫蘇柴胡黃芩木通蘇葉足少陽膽經氣病則口苦太息血病則腋下腫用半夏連翹龍膽手少陽三焦氣病則嗌腫喉痺血病則目鋭眥痛頰腫用川芎地黃附子細辛黃豆手足二經通用柴胡青皮半夏火淫于內治以醎寒佐以苦辛以酸收之以苦發之火淫所勝平以醎寒佐以苦辛以酸收之以苦發之太隂所至為中滿吐下太隂病則自利四肢逆冷應在四肢兩腋用附子理中湯異攻散木香豆蔲丸足太隂脾經氣病則舌強食嘔善噫血病則溏㵼用防風蒼术白术人參白芍吳茱萸當歸黃茋甘草縮砂仁手太隂肺經氣病則喘咳血病則煩心用升麻天門冬桔梗黃芩桑白皮杏仁白芷麻黃石膏門冬黑山梔手足二經通用前胡白术濕淫于內治以苦熱佐以酸淡以苦燥之以淡泄之濕淫所勝同上少隂所至為瘍疹少隂病則咽痛口舌乾燥痘黑陷應在頭額下部用四物湯加紫草紅花足少隂腎經氣病則善恐血病則舌乾咽腫嗜卧用附子丁香官桂黃茋手少隂心經氣病則嗌乾渴而欲飲血病則衄衊血汗用麻黃生地黃連細辛當歸手足二經通用獨活細辛熱淫于內治以醎寒佐以甘苦以酸收之以苦發之熱淫所勝同上厥隂所至為嘔㵼厥隂病則四肢厥冷時作搐搦舌捲卵縮應在兩脅用大功散加防風青皮足厥隂肝經氣病則腰痛咽乾血病則嘔逆餐泄遺溺癃閉用羌活當歸茱茰甘草膽草手厥隂心包絡氣病則臂肘攣急腋腫助痛血病則心煩掌中熱用地黃丹皮手足二經通用柴胡青皮風淫于內治以辛涼佐以甘苦以甘緩之以辛散之風淫所勝同上五臟治法心經宜汲水溢灌調脾潤肺苦心苦緩以酸收之五味子欲心欲軟以醎軟之芒硝補以醎補之炒鹽㵼以甘㵼之甘草宜用導赤散加黃連硃砂惺惺散加犀角黃連無比散豬尾膏肝經宜調養脾土滋補腎水苦肝苦急以甘緩之甘草欲肝欲散以辛散之川芎補以辛補之生薑㵼以酸㵼之白芍宜用羌活湯加青皮柴胡人參羌活散加羚羊角紫草黃芩連翹山查木通黃連川芎當歸生地紅花防風前胡桔梗甘草若春夏秋帶紫色加地骨皮寒月不起發虛嘔用藿香黃連不食用白豆仁陳皮麥芽腹痛用砂仁乳香木香血泡用四物湯加紫草丹皮寒月虛嘔肢冷用丁香官桂喉疼用元參射乾口渴熱不退用黃連膿少用黃茋白术不綻用殭蠶穿山甲升麻搔癢用防風白芷蒺藜泄㵼用白术煨山藥茯苓木香不靨用五味子白芍發疔用甘菊寒戰咬牙屬虛寒者用異攻散加薑汁脾經宜抑水之揚障木之蔽以固其土苦脾苦濕以苦燥之白术欲脾欲緩以甘緩之甘草補以甘補之人參㵼以苦㵼之黃連固脾宜用四君子湯保元湯如聖散白术散補中益氣湯調元湯加白芍防風連翹毒盛用升麻葛根湯發水泡用陳氏異攻散胃經宜抑水障木滋金養火治法用藥與脾經相同肺經宜抽薪去火培土清源清金補腎調脾益肝苦肺苦氣上逆以苦㵼之訶子黃芩欲肺欲收以酸收之白芍補以酸補之五味子㵼以辛㵼之桑白皮宜用㵼白散合甘桔湯加牛蒡子天花粉或參蘇飲灰白皮薄用保元湯加附子色紫欠潤用當歸川芎前胡連翹防風白芍廣皮木香紅花桔梗貝母腎經宜疏調脾土和遏心火提拔元陽苦腎苦燥以辛潤之知母黃柏欲腎欲堅以苦㵼之知母補以苦補之黃柏㵼以醎㵼之澤㵼若發熱痘尚未出腰痛腳疼者是火旺水衰之兆用神解散以汗出痛止為佳毒盛用酒炒黃柏知母亦不可多用腰疼黑陷若二便祕澀者是膀胱鬱毒之由用百祥丸牛李膏亦止活十之四五祕要云毒在腎經必黑陷倒靨用豬尾膏無比散腎經痘後必作㵼發癢急服加味人參丸人參知母黃茋當歸白术川芎升麻甘草陳皮獨活連翹杜仲木通沈香痘後若灰色頂陷發熱寒戰咬牙目無瞳神弄舌泄㵼或發水泡十不救一急服加減異攻散并豆䓻丸去附子加黃茋乾薑若紅潤者可救若紫黑搔癢者不救服川芎當歸生地黃連黃芩連翹青皮木通前胡山查桔梗甘草若熱退去黃芩青皮加白术茯苓腹痛用木香砂仁疔斑用菊花葉以硃砂一錢作二次服治痘四節次發清補滲謂之四節次治痘若一紊亂則氣血顚倒大毒乘虛肆虐而諸症蜂起矣當發不發則毒鬱三焦停滯氣道驚狂吐㵼腰疼腹痛或斑或疹肉腫痘塌水嗆錯喉當清不清則陽明內熱不泄焦紫枯黑渴燥發疔胃爛口臭當補不補則中氣虛白陷泄㵼癢塌倒靨外剝內攻當滲不滲則脾濕內淫或壯熱或泄㵼或生癰癤三因一外因六氣外襲為外因一內因驚熱內動為內因一不內外因調攝失宜為不內外因凡標離則異本合則同若令藥當其節變症自息如或不應四法必由三因乘之四法正也三因奇也奇正互用兩得之矣治痘有七法汗補吐毒解下小攻利便古云首尾不可汗下者恐表虛妄汗則成斑爛裡虛妄下則成陷伏也然遇當汗下之症則又不可拘又云非微汗則無以解其表非微下則無以解其裡言微汗當在表熱方熾斑點未見之先微下當在病之初終裡熱毒壅之時不得于正發之時妄施汗下也如氣血和暢榮衛流通表裡無邪稀朗紅綻內症和平出盡發透即溫補亦不可用况汗下乎蓋治痘之訣有汗下吐攻補解毒利小便之七法總令毒氣得解而已醫者當從發熱見標之初預為之地則多者可少重者可輕自無後來之變症矣痘子只要發得毒盡不使留伏于內故發表最先發表必解毒兩者相兼若過重熱者便當察其表裡表有外感非發汗即宜清解必使一書一夜汗出熱透為候蓋腠理既通則易出易壯遲則熱燒地盤腠理密緻毒無由出能免閉門留冦之禍乎縱然發出亦藴毒成斑日後灌漿亦必咳嗽聲啞嗆喉而成外剝矣裡有內傷實熱藴悶腹痛嘔吐宜急消之重者下之使無壅遏則熱退神清若內傷不下則毒留腸胃與穀氣相併熱甚煩渴詀語昏沈寧免養虎遺患之禍乎且至六七日後痘既外出腹中虛空內傷之物因而㵼利則不能灌膿而成內陷矣若熱甚毒重神昏足冷者即于前解散消內之中大加解毒利小便之藥故曰六日以前解毒為主六日以後補托為主過六日則大勢已定救無及矣是以貴乎勿失時也宜汗痘疹必身熱頭疼鼻塞咽壅痰涕咳嗽面目赤色皮緊脈數此皆極熱之故此時若得微汗以折其方昌之勢用升麻湯為主若初熱時頭疼目澀腰痛鼻塞症似傷寒痘尚未出毒裡壅遏治宜疏解用紫蘇湯惺惺散參蘇飲升麻湯若初起自汗濕熱鬱蒸稟厚能食面紅頰赤煩渴詀狂者當與疏散若灌膿未靨毒氣太盛能食便祕面赤引飲者亦當疏利之疏者疏散熱氣利者滑利肌竅使不壅遏如三豆飲升麻湯消毒飲導赤散之類但不可用峻藥若出不快清便自調知為在表不在裡用升麻葛根湯微發之痘已發後餘熱不散復有癰毒當用解表藥潔古云微下法中佐以風藥是兼發散之意亦愼之也痘有可汗者汗之當汗不汗後必原闕皮燥喘促面浮隱隱不出肉腫瘡不腫毒停不成漿因寒倒靨皆可汗也但兼解補有殊耳表實宜汗不宜汗若初發時不惡寒不拘急不頭痛不脈大此無外感也不可妄汗以成表虛斑點已出不可妄汗若稟怯自汗內無藴毒天氣和暖面頰不赤水火如常毒已出表茍妄汗則風邪乘虛而入變症百出矣有因服發散藥邪毒之氣隨汗散作白珠散作小紅瘰應手而解不可不知也若已出後血氣虧損潮熱惡寒頭疼肢酸者只宜大補氣血不可妄認為傷寒而用發表之劑或服表藥後愈增大熱不可妄認為邪氣未除而重加發散以致慢驚之病如惡寒寒熱往來面青眼白怠倦嗜卧自汗惡風身體厥冷痘色紅綻或白而起脈微而虛乃表裡之症發散且忌况於汗乎宜下水火者隂陽之徵熱則祕結而不流冷則滑泄而無度如腹脹便祕小便赤澀口熱咽乾舌燥嗆喉頰燥痰壅咳嗽喘促驚悸詀語狂亂渴飲痞滿不食上下失血痘色紫赤脈沈實而澀乃裡實症也冝下之若有熱症者當以去風藥微下之若脈數大痘隱隱於皮膚之中人壯實者此裡毒藴盛也非微下之漸至青干黑陷目閉聲啞矣用通幽湯下之若青干黑陷身不大熱大小便澀此熱在內也用大黃湯宣風散加檳榔陳皮各三錢黃芩甘草黑牛各一錢為末蜜水調下此方與前風藥微下同旨有雖是實火未至詀語發狂腹脹便閉止可用墜火飲兼用膽蜜導之如血分熱用大柴胡湯如氣分熱用宣風散初起已經吐㵼後見壅塞亢極之症再宜下之若結痂之際脈尚洪數能食便閉此表症不罷裡有熱毒也宜微下或膿汁不乾大便不通用牛黃丹若收靨之後茍有實熱之症乃可通利若不結痂疕能食而喘咳腹脹便祕者用承氣湯下之附大柴胡湯柴胡三錢香附二錢梔子甘草各一錢附墜火飲方石膏五兩水煎去渣加入後藥黃連黃芩蘆根各五錢山梔黃柏胡黃連各三錢銀柴胡二錢知母木通檳榔各一錢枳實大米一撮再煎服不宜下如二便清利吐㵼不渴食不化口鼻氣冷不食昏睡脈沈細而遲乃裡虛之症也寒涼且不可而况下乎身表大熱表症未罷不可利大便若無藴毒喘脹詀渴煩燥傷食等症不可妄下以成內虛既發在表縱有熱症只用和平清輕勻氣藥不可妄下若將靨之時毒盡在表必賴裡實以滋養之方能結痂茍妄利則脾胃虛氣血耗陷伏倒靨之禍立至矣痘症雖有宜下之症但不可用也巴豆等藥徒傷胃氣熱愈不除便膿癰毒生矣宜吐如滴水不入毒氣壅遏氣道食飲停痰形色生變陽氣鬱遏宜吐之用升麻曲蘖梔子豆豉煎服此方原非吐藥借探則吐不可忽過探字初出之際傷食痰塞欲吐不吐者煎二陳湯乘熱服之更用雞翎探吐則胸膈寬暢痘易起發矣氣虛多汗者忌吐汗下奇傳一切有餘之症俱從汗吐下三法治之惟痘疹之症不論虛實一見標點即不宜汗下論者以汗能虛表不能泄元其論甚當但有表實而不能發胖及不能行漿而死者有裡實焦黑而死者深為可憫余遇真人論及表實宜汗裡實宜下于是臨實熱之症用汗下之藥隨手應心發皆中的始知禁汗下之説乃不專門之議也宜攻若毒盛而正氣未衰者宜先攻後補若始熱而煩渴驚妄目赤唇燥便祕者當以發表攻邪為主誤補則悶亂昏憒毒伏不出矣若痘出太甚掀腫紅艷煩渴便祕當以清解之劑攻之誤補則毒愈熾矣若表裡俱實便調能食尖綻紫滯煩渴便閉者宜攻之誤補則脾實轉增潰爛而難收脾移熱于肝則為驚衄以四順飲攻之又清解之宜補若毒輕而正氣虛者宜補之若元氣素弱未出時用和解湯先補助其升發若既出而表裡俱虛平陷灰滯吐利不食宜補之若已出後氣血虧損潮熱惡寒或頭疼四肢酸痛只宜大補若不肻結痂者是內外鬱蒸無隂以斂之也恐毒氣復入宜補隂以養陽用參歸飲若痘後胃弱不思食脾弱不能運化毒氣不清身熱不退只宜健脾調胃敗毒扶元若認為傷食而尅伐之必反增嘔噦泄㵼而成慢驚矣宜解毒經云小熱當解毒者蓋以小熱不解大熱必至用玳瑁湯獨聖散紫草飲犀角飲或消毒飲加紫草若又利其小便恐損真氣若痘出太甚而不結痂者此毒氣內外貫注也若不速解則毒入攻心為害甚矣宜用豬尾膏宜利小便痘已出而內熱小便不利者宜利之經云大熱當利小便謂身熱脈實大小便祕津液燥渴氣滿胸中雖能食而不灌膿結痂當此之際懼生黑陷疔斑咽啞癢塌氣搐牙疳之症故利小便使心火有所導引雖不用涼藥而熱勢自減矣以導赤散主之若痘未出已曾利過今痘既出切不可再利即使果宜再利亦當小其劑若熱甚而渴面赤悶亂太吐便澀宜利小便用通關散以為之主治痘要略痘疹是先天淫火伏于命門遇歲火流行觸發起於心肝脾肺者為輕試言其常期則發熱三日見標三日起脹三日灌膿三日收靨三日共十五日為定期發熱至見標六日切莫輕忽痘之吉凶全係於此其大勢則身熱和緩神清氣爽者痘必輕煩燥悶亂昏睡吐㵼者痘必重如足脛熱兩腮紅大便祕小便澀上氣急渴不休脈洪數七者為三陽熱症不宜服熱藥也足脛寒腹虛脹糞色青面㿠白嘔乳食目睛靑脈沈微七者為三隂寒症不宜服涼藥也治痘之法表裡虛寒宜溫脾胃助氣血為主表裡實熱宜涼血解毒為主表熱者宜清涼解毒而分利之裡熱者宜解毒而兼清涼密則有毒疏則無毒涼血則免紅紫解毒則免黑陷表虛不補則成外剝裡虛不補則成內攻表實過補則不結痂裡實過補則發􅏴毒初點痘少不可過表以成斑爛如色乾紫疏則涼血以免黑陷按驗之法輕手按之即熱者其熱在表重手按之始熱者其熱在裡不輕不重按之而熱者其熱在表裡肌肉之間熱者清之寒者溫之虛者補之實者下之外重則治表為本內重則治裡為先表實裡虛則陷伏倒靨裡實表虛則發慢遲收有膿者生無膿者死諸痛為實諸癢為虛膿期皮膚痛者氣血運痘而疼乃佳兆也腸內疼痛而神昏此伏毒在內乃凶兆也調理之法則報點三日當托裡而解表使痘易出有氣虛而不能出者該微補其氣氣和則出自快也起壯四五六日以清涼解毒滋味為主使痘易長清涼則不血熱乾枯解毒則不黑陷也灌漿七八九日以調補氣血保元助膿為主使痘易灌也收靨十日十一日十二日以清利收斂補脾利水為主使痂正而易落也然此特論其常耳若他症又不可拘以日數有隨出隨長隨灌隨靨七八日而成功者此毒輕而氣血壯盛也有使之出使之長使之灌使之靨綿延至十八九日而成功者此毒輕而血氣虛弱也苟痘未出而用寒涼則毒凝滯熱毒未解而用溫補則毒藴蓄至于收痂之後亦當愼風寒節飲食調氣血解餘毒而熱痘發為表症如或妄汗則榮衛重開風邪乘虛作變者有之毒未盡出為裡症如或妄下則內虛引毒土不勝水變黑歸腎者有之非究心于平日精審于臨時者烏能無誤乎隂陽氣血論陽者心之元陽也隂者腎之真隂也隂陽互為其根發生聚散而彰于外者陽之德也灌溉滋潤而守于內者隂之德也血隂也氣陽也心配離而生血乃陽中有隂也故心中之血即腎中之真水也含蒸醖釀火之用也腎配坎而生氣乃陽中有隂也故腎間動氣即心之真火也詬噓鼓動火之用也坎離相生水火相濟隂陽相乘所以能變化而合天地四時生長收藏之道也血氣之分猶清濁之本乎上下也此指根紅頭白時言氣血之交猶隂陽之互為依附也此指起脹灌漿時言當分不分毒結之也如升陽散鬱何不分之有當交不交毒隔之也如清熱解毒何不交之有隂不足則陽不長枯萎之變生焉陽不足則隂不生伏陷之患出焉故痘之起脹現形責之氣行漿充灌責之血夫包血成圓者氣也氣能拘血制毒則痘窠必尖圓而周淨附氣成暈者血也血能附氣制毒則痘暈必光明而紅活故頂陷者氣之虛癢塌者氣之離暈枯者血之虛根散者血之離暈也圓也氣血之所為也而所以成圓成暈者氣血不得專主也乃元氣主之也氣衛于脈外充痘之形血榮于脈內華痘之色而元氣又為榮衛之主故元氣盛則血能載毒以附氣氣能拘血以化毒隂施陽化痘自應期而開合火毒斯解矣苟元氣一虧則氣血交會分皆不足氣在內而外不固則血載毒出為外剝氣在外而內不續則血載毒入為內攻所謂陽道虛隂往從之隂道虛陽往從之之義也諸症變作真元愈損毒愈不化矣故形色者末也衛氣者本也元氣者又本之本也故善治者必求本源諒其形體而後用藥小兒臟腑柔嫩易至虛弱實者用藥且不可太過况弱者乎凡痘極好至回謝日而變逆者蓋以形體素弱宜補益而反攻劫使元氣一驅而出外雖榮灌內實剝耗何以收成故諒形體者非玩其形而審其形中之神也古云不慮形惡慮無神不慮色惡慮無彩神綻而突彩潤而明惡痘中有一二紅綻可愛雖凶無損以元氣猶存也故色如豬肝如洗過舊紅絹者死何也元氣亡而神彩失也善治者詳審元氣而調養之夫元氣在心領意會而已脾胃者氣血之父心腎者氣血之母肺肝者氣血之舍也故脾納水穀其捍氣注于腎而為氣腎舍于肺而為衛衛氣所以充皮毛肥腠理開槖籥運樞機者也衛氣虛則神機息而痘不起發毒乘氣虛而入肺則為陷伏而歸腎矣脾之精氣注于心而為血心舍于肝而為榮以走九竅注六經朝百脈充溢臟腑灌溉肢體者也榮衛虛則化源絶而痘不光澤其毒乘血之虛而入肝則為痛癢而歸心矣故善治氣血者一以脾胃為本蓋血虛者多由胃氣虧損元氣不足所致而血虛必先補氣何也血者隂也隂者難成而易虧隂無驟補之理人知隂不可盛隂盛則陽消而不知陽不可衰陽衰則隂長也蓋氣有神而無形補之則易充可猝辨于斯須人參能回陽于無何有之鄉附子能追復既散之元陽是也血有質而有形補之難速效須預養化毒如水有風而舟行更利水必朝宗于東流隂必從陽也雖血能運毒然氣或少餒則血無慿藉何以運毒故魏氏補血虛不用歸地而反用參茋白术為君得東垣補其氣則血自榮內經陽生隂長之理也嘗觀治便血虛滑者産後去血過多發熱崩漏下血不止者血虛也而用參茋薑附為君佐以血藥而兼升提皆獲竒效豈非血虛先補氣乎然有陽盛而隂亦消者何也蓋痘瘡之火起于命門相火而統于心經君相火燔灼所恃者心腎皆少隂也心中有血腎中有水邪火不盛則用能有以制之奈何陽道常饒隂道常乏火毒易熾真水易耗津液易竭氣滯發燥不能潤于皮毛滋于腠理而痘中之血將化毒成膿者忽乾枯而變黑矣黑本水之色今血色本赤而變為黑者火極似水之象也謂之歸腎者邪毒併歸于腎則實也謂之腎虛者腎中之真隂虧也用百祥丸等藥以救之亦幸而免爾痘毒論毒盡歸于痘之根粒則不為害不盡歸于痘之顆粒則大能為害如發熱初出尖圓色紅與無痘處皮色逈異挨次出齊是毒盡歸於顆粒者也倘痘不尖圓與無痘處渾無界限不快不齊是毒不盡歸于顆粒者也無論所用何劑劑中必加山甲以透其竅而逐其毒如起脹行漿根紅頭白周圍環抱是毒盡歸于顆粒者也無論所用何劑劑中必加白芍以斂其血而收其毒此屢試屢驗者也預解毒法痘發于心心華在面宜預知解毒法如青筋現露目中泪出是毒發于肝也肝木能生心火從後來為實邪肝為水泡風火相煽必作癢且有目疾宜預解肝毒用羌活枳實柴胡若面赤如錦額上紅筋現露詀妄多驚咬牙煩哭是毒發于心也心火自旺為正邪須防陷伏宜預解心毒用導赤散加黃連辰砂若口乾唇黑面黃而燥是毒發于脾也心火生脾土從前來者為虛邪脾為斑心為疹恐夾斑疹及灰白癢塌吐利或肌肉潰爛宜預解心脾之毒用四君子湯調元湯加白芍連翹防風如面色㿠白鼻乾涕清鼻衄是毒發于肺也肺火刑金勝其所勝而為微邪必喘嗽煩渴手搯睂目面鼻宜微解肺毒用㵼白散合甘桔湯加花粉牛蒡若面色黑氣如煙目中見鬼頭熱足令是毒發于腎也腎水能克心火為賊邪宜預解腎毒若黑陷不治五臟伏毒毒伏于心初出一點隱血伏皮下不成粒其死至速毒伏于肝初出如水珠皮肉染丹者必搔癢而死毒伏于脾初出皮下肉先浮腫必潰爛嘔泄不食而死毒伏于肺初出如麩片皮枯不潤必喘悶而死毒伏于腎初出多血泡黑陷必血妄行而死五運六氣五運者金木水火土也也六氣者風寒暑濕燥火痘症之候或間數年而發或發連年不已何也經曰不知年之所加氣之盛衰虛實之所起不可以為工矣蓋司天者主行天之令上位也在泉者主地之化下位也歲會者主天地之間人物化生之氣中位也一歲之中有此上中下三氣各行化令氣偶符會而同者則通其化于人而病矣所以瘡疹必待其年而發也六十年天符十二年戊子己丑戊午己未戊寅戊申乙酉丙辰丁巳丁亥丙戌謂之天符者司天與運同者也太乙天符四年戊子己丑戊午己未謂之太乙天符者司天與運及辰之同也歲會八年丙子己丑丁卯甲辰己未甲戌戊午乙酉謂之歲會者歲與支同如丙子年丙辛合而化水支子亦是水餘例此同天符者六年甲辰甲戌庚子庚午壬寅壬申同歲會者六年癸卯癸酉癸巳癸亥辛丑辛未謂之同者歲會與在泉合其氣化陽年曰同天符隂年曰同歲會五者離而言之共三十六年合而言之止二十六年經曰天符為執法歲會為行令太乙天符為貴人邪之中人則執法者其病速而危行令者其病徐而待貴人者其病暴而死十干五運甲己年為土運宜暖不宜寒用溫藥乙庚年為金運宜清不宜燥用平劑丙辛年為水運宜暖不宜寒用熱藥丁壬年為木運宜平不宜燥用和藥戊癸年為火運宜寒不宜熱用涼藥十二支司天在泉司天主上半年司泉主下半年子午卯酉年少隂君火陽明燥金迭為司天在泉宜清之辰戌丑未年太隂濕土太陽寒水迭為司天在泉宜溫之寅申己亥年少陽相火厥隂風木迭為司天在泉宜涼之子午之歲少隂君火主之寅申之歲少陽相火主之凡此數年剛柔失宜升降抑窒舊者不退新者不遷所以連年發而不已也預占痘時凡冬溫來歲必發痘痘毒藏于寒水在右腎之下煎熬左腎足太陽膀胱左腎為水右腎為命門相火寒水夾脊逆流上頭下額手太陽小腸不得傳遍逆于面上發于太陽之經壬癸水尅丙子火也當寒水司令而反溫則其毒動矣驗出痘兩耳垂珠冷鼻尖尻尾寒中指與足指一樣似冰然或鼻梁黃而嘔吐或眼昏花而濛焉顴臉紅睡而閃縮頭垂作痛而眩眩睂促不開呵欠頻撮睡常銼聲夢常驚攝體時熱舌常唺睛轉白痘疹也口熱醋氣妳瓣不消項急腹疼傷寒也身熱無時肢節頭疼時疫也汗出涕清傷風也午後發熱右額有紋傷食也傷寒發熱則面紅手足微溫傷食發熱則面黃白手足壯熱痘疹發熱男則面黃體重女則面赤腮燥男左女右耳尖手足驗之痘疹與傷寒相似而治法與傷寒不同傷寒從表入裡止現一臟之症而遞傳痘則從裡出表而各臟之症並形有因傷風傷寒而發有因時氣傳染而發有因傷食嘔吐而發有因跌蹼驚恐而發症候多端須以兩眼朦朧羞澀耳垂冷骫骨冷鼻冷中指尖冷驗之蓋屬陽出則腎臟無症耳與骫足俱屬于腎部獨冷又須視其耳後有紅紋赤縷顴間有花紋為驗按方異治西北天不足于西北西北地勢髙燥風氣猛烈水涸而木梟故患痘多眼疾東南地不足于東南東南地勢卑濕風氣柔弱土虛而金梟故患痘多手足腫爛兩廣廣地淫熱而風梟啖腥而嗜辣故患痘多癬癩兩浙浙地浴陽而藴酷好油煎而嗜辛辣故患痘多疔黃石峰曰北人醫痘要清肝清肝不怕眼膜縵南人治痘要理脾理脾何愁腫爛肢廣人治痘要戒腥戒腥不怕癬來生浙人治痘要解毒解毒何愁疔似簇觀此則知治痘者當隨地以制宜矣陳氏錢氏立方昔陳氏適遇寒水司天時令又值嚴冬故立木香散異攻散二方以救肺腎之痘灰白沈匿者昔錢氏適遇君相火司天時令又值酷暑故立紫草湯四聖湯二方以救心肝之痘焦紫不起者後人不知立方之意一概用之誤人多矣此書開載氣運圖説使觸類而引伸之加減古方法用方必先量兒厚薄病之淺深預將主方撮起然後加減加不可過于本方減不可失去本方不然脫盡本方則不合製方伐病之本旨矣古方不可執用世多用陳仲文之方不分表裡虛實寒熱在初則用升麻葛根湯在後則用木香異攻散殊不知表實者用升麻葛根湯試為發散之劑若表虛用之益虛其表癢將隨作能無殺人表裡虛寒者暫用木香異攻散以治觸冒寒邪背陽反隂可也如或狂渴有痰二便祕結具諸火症者亦用之則內有附子肉桂半夏燥熱助火之味以火濟火能無殺人如保元湯世稱王道若用于熱實未解之前亦能助邪殺人若火毒既解而虛者用之方當審元稟強弱靜怯勇躁肥白瘦黑看痘于見點論血氣不若從發熱時先别其形氣以定虛實素壯實者用加味升麻葛根湯素怯弱者用加味升麻飲不可出汗太多恐表虛難起灌靜怯不驚者此元氣不足作虛寒治標必灰白宜補元散熱又有熱而怯靜者亦為虛此最難看最要細心勇躁不安者為邪熱壅閉作實熱治標必多而紅紫宜解毒退熱故曰痘瘡在形體上别勇怯也别肥白定氣血痰熱肥白之人多痰而氣虛痘每不起發而灰白宜于解毒藥中加理痰補氣之味如六君子湯二陳湯是也别瘦黑定氣血寒熱瘦黑之人多熱而血少痘每不紅潤而乾枯宜于解毒藥中加散熱補血之劑如荆蒡翹防四物湯是也能察其氣血痰熱之多少而預防之則後易為力矣治痘分别用藥虛脫者使其毒盡出然後可補補中宜兼升發形似虛寒者宜涼血助痘使毒氣流暢氣血不足又為熱毒銷爍陽微隂弱者雖當發泄火毒然亦不宜過于疏解色不紅活碎小稠密者雖宜溫補但濃煎可免滑腸膿期少食又吐色白者始宜溫補漿足之後無他症者不拘症候並用保嬰百補湯諸臟引經藥小腸膀胱屬太陽羌防藁本是其鄉膀共麻黃柏桂澤手兼赤茯地黃良陽明大腸并足胃升麻白芷葛根最加入石膏及大黃胃內還須蒼半防若問大腸何所共秦芃連翹麻仁當少陽經屬膽三焦青皮柴胡用不饒膽還膽草連半夏芎茋熟地附辛焦太隂經屬脾與肺升麻麻黃蔥白芷脾參芍术與歸防砂草吳茱茋與次肺加桔梗共天冬桑皮梔芩杏仁治少隂經屬腎與心獨活還須兼細辛桂茋丁附腎家勝歸地黃連桂向心厥隂肝與心包絡青皮柴胡亦用著羌甘龍膽共歸肝熟地丹皮還向絡寒熱藥暫用峻熱之藥初起用之能助邪火而為害峻寒之藥漿後用之能傷胃氣而作㵼然有大寒大熱之症亦當暫用經云痘要溫和疹寒涼惟適中而已用藥總訣凡藥過于熱必涸過于寒必凝過于潤必滑腸過于攻必損元過于補必助邪氣古云藥隨病轉機非在我醫者須以舌為樞紐蓋舌通五內視舌以用藥則縱橫自如臨難無疑矣用藥凡用藥須用甘潤清輕之味大忌酸燥重濁之品甘潤能潤肌膚清輕能走經絡燥味能燥肌膚濁味能滯經絡肌膚濕則痘易漿肌膚燥則痘易焦經絡通暢則血脈榮潤經絡凝滯則氣阻隔直待腐底靨爛不乾以致痘痂多日不落然後用燥斂之藥斯為宜耳如熟地蒼术厚朴多令痘沈不可擅用如五味子棗仁白芍酸斂大能為害如瓜蔞仁穿山甲牛蒡子雖不可無須防滑腸如赤茯苓大腹皮能燥皮膚即殭蠶砂仁亦能發癢其餘俱載氣虛痘症後凡用地黃宜薑製以防膩膈用芍藥宜酒炒以防酸寒伐胃用黃芩宜酒炒用藥須審天時凡發熱疑似之間一發便見方用發表之劑務察天時若遇寒冷不拘春冬腠理常密氣血凝滯痘出必遲遲則溫熱熱不得汗必成壅遏亟用辛熱之味以發之桂枝葛根湯或五積散去乾薑若遇暄熱則腠理疏通氣血淖濁發泄太過恐有潰爛之患必以辛涼之劑以發之升麻葛根湯若遇溫和之令用人參敗毒散雙解散最佳四季用藥治法春裡痘須看蟄前與蟄後治宜疏暢抑肝榮青皮紫草扶助脾元厚炙甘草白术大棗兼用肺藥花粉貝母取金以平之不致于傷大補榮血不宜投驚搐本常微吐衄因內冦須要防斑疔脅井血盆搆夏裡痘須看至前與至後治宜和解清心炎黃連黑梔木通燈心蕩滌陽明垢牛蒡子再兼滋腎人參地黃取水以養之不致于烈升陽酷熱毋妄投煩詀是時微指冷為迍咎須防鴆疔斑胸臉封蛇湊秋裡痘須看露前與露後治宜發散理太隂桔梗門冬桑皮滋腎天癸茂玄參製黃柏再兼肝藥當歸生地取木以扶之免致虛汗泄伐之劑不宜投吐嗽本常徵噎嗆刀兵鬬此時泡若形樞翕居惡紂冬裡痘須看至前與至後治宜暖活滋天元丁香人參黃茋振托陽明宙川芎牛蒡當歸兼以升峻升麻乾薑蟬脫取火以炎上不致伏匿寒涼墜下不宜投腹痛是時徵柱折為尸􅀈此時若發丹背俞莫馳驟嚴寒運遇寒水毒鬱肌膚起粟出不快痘必面青喘急精神昏冒寒熱交作四肢厥冷宜辛熱以發之毒得寒則凝得熱則行也用陳氏木香散加蘇梗或五積散桂枝葛根湯如兼詀語宜解肌發散而兼溫養用紫草蟬脫活血散酷暑遇君相火運毒為熱助隂水乾涸煩悶昏憒此水不制火陽獨治不能生長宜清暑益氣為主如滿天秋人參白虎湯或五苓散抱龍丸之類加木通葛根主之暴寒折毒壅膚如隱疹如黑痣或青或紫俗名鬼捏壯年肌厚腠密尤多此痘必壯熱煩燥鼻塞聲重嗽咳頭疼喜蓋覆倚偎懷中宜却寒溫肌如賽春雷透肌散牛蒡殭蠶散紫背荷葉散參蘇飲敗毒散看痘法先去小兒肚兜使其胸中毒氣易泄冬寒方令衣暖夏月房中宜置水缸恐痘為熱蒸腐爛看痘須緊閉門忩用草紙撚作條子蘸清菜油點火照之觀兩顴宜以條子照兩耳邉及鼻梁平照觀中庭宜以兩目角邉平照斜目注視皮中肉內影影躍躍是何色點自當歷歷明白若是麻疹則生于皮外若是痘瘡則根于肉內如笋根在土內設當頭直照反黯而不見天光日色下亦不見先以燈光照確然後再以日光覆看則痘色根腳無遺漏蓋燈之色易紅忩下之色易白必須合而觀之看痘要訣先看部位知屬何經氣血多少次看形色後看症候知毒氣淺深然後合勇怯肥瘦歲氣方宜調理護持而斟酌投劑方可為人之司命然形色只論神彩症候先觀靜躁看聫舌初標有三五粒相連近者後必密逐點單見稀逺者後必少毒之淺深決矣蓋痘先細後大加後倍後并片故預量其後之稀密可也看正面五嶽粗細起發粗綻者輕若碎小粘連且緩緩而發者勢必稠密見點日餘依然隱隱不發起者危好痘易發易起朝夕換眼看睂以上幾點形色神彩可愛既不瑣碎又不歪斜縱遍身稠密雜亂百出終無大咎看任督二經部位任脈自承漿以下至心際督脈自人中以上從頂而下脊至于尾閭光潤疏朗為吉枯燥稠密為凶看胸背宜疏不宜密若見面上多心胸臍腹俱有而先吐先㵼者毒氣上下分消而能食者亟與清涼解毒迹利可免困頓看頭眼頭面腫目開痘多有色澤毒氣已充可兼補益解毒亦不為害六七日眼不閉者凶看頭面四肢先後頭靣先標後及四肢者可治反是不治看舌上未見標點大熱蒸鬱難決其輕重看舌上有痘否常有舌上見標舌色無黑能乳食者調治之痘亦散出于外也用升麻湯加連翹牛蒡細辛看堅實頭面痘細碎堅實摸之礙手火毒有餘雖或煩燥不食或泄㵼亦無妨只取堅實為生意也急與四物湯加黃芩黃連犀角麥冬木通看根腳若暈起紅活雖頂陷而弦則髙者此生意也雖灰紫可治若根腳不起血死不活雖輕難治凡腳散者斷不可用升麻葛根湯看頭面并斑色頭面少色紅活雖遍身有斑疹但以頭面諸陽為主尚有生意用犀角湯次四物湯酒炒黃芩黃連解毒之品有黑斑者難治看痘次序未出看其兩目不腫皮肉不紅出後看其紅潤綻突膿黃漿老收靨看其痂落瘢紅不赤不黑無凸無凹反此則危前人謂初出為血泡以紙撚照之內裡紅色非水非膿是也至于起發化而為水泡以紙撚照之內理光瑩非血非膿是也至于承漿化而為膿泡以紙撚照之內裡純白是也仁端録卷二
