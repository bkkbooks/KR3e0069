body:
  text: 仁端録卷八明徐謙撰陳葵刪定痘後餘症賦痘成痂疤雖云生意已成餘毒變遷猶未可為全喜是故眼合腹脹猶蹈危機肢體虛弱尚罹凶咎痂或成而致失聲前疕恐為黑陷腫未消而眼先開眼開疑是內攻陽毒盛而狂呌喘呼腸胃傷而沉吟不息風冷入胃則利下膿粘熱滲膀胱則便難尿血身熱審其虛實音啞觀乎嘔嗆忽灑淅而肌熱兮知風寒之外感暴吐㵼而腹痛兮必飲食之內傷熱毒逗遛不化結疤而壯熱憎寒經絡各遺餘毒日晡而往來潮熱發在午前為實熱煩渴腮紅發于申後是隂症便調食減他如撮唇弄舌心經熱盛何疑掇肛抬胸肺胃毒沖有凖身熱燎人便祕恐成急暴驚風悠悠潮熱便溏久變慢驚風搐驗喪明于眼合羞明肝傷風熱徵口疳于唇焦齦黑胃藴火邪實熱下注大腸必有祕結之祻虛寒客留臟腑乃成泄㵼之疴咳嗽有標有本喘渴有實有虛痘若敗壞兮補空痘勿嫌翻次瘡如潰爛兮成潰瘡莫厭膿漿利多水液兮此蓄水之症也水去盡而自止便多膿血兮此倒靨之症也膿去盡而或良病有苦而眩運凶多吉少身無邪而昏瞀否極泰來聲音不出求諸肺腎之經斑疹復攻責在心脾之臟疳􅀈出血者難治洞泄完穀者莫醫欲觀痂落之餘再審斑痕之色桃花光澤榮衛俱安紫黑乾枯髙留風熱粉白為氣血之虛周嵗也應身逝走馬狀牙疳之烈月餘亦見亡軀遍體赤斑乃是失于解利渾身青紫多因客犯風寒餘毒未消不特為疽為癤見風太早尤防發瘡疥癩皮肉腐爛兮一面點瘢而似鬼􅏴毒流注兮四肢殘廢而如尫疥斑嫩而洗澡餘熱因添臟腑虛而肥甘內傷致損若感風寒多為咳嗽不時撏搯即灌蝕瘡痂後總論痘至脫痂固已吉矣然有應脫不脫或脫而不齊此時尤當辨明之蓋痘後氣血已損虛火易熾不可因循失治致生他變有過一月二月三月而死者不可以痂既脫而忽之也欲知餘毒之有無但察其身無熱口不渴二便調腹不痛精神漸旺飲食漸加此無餘毒也若身熱煩渴腹痛泄㵼小便赤澀大便堅閉精神昏憒四肢倦怠飲食減少坐卧不安此餘毒伏藏後必有災也痘痂如桃花色或粉紅色疤痕已突上有薄薄小靨如魚鱗一二層者名託靨是有苔也後必無症若無托靨無苔及疤痕凹而白色光潤者後必犯他症而死所云疤痕光滑又無苔周年雖過未消災亟用內托解毒之劑如十全大補湯三合湯之類服至疤突色紅為可救耳自食痘痂者因內無毒自覺痂香故飲食之雖有他症不死然亦不宜多食若多食輕則瘡癤重則變症亟冝服神異散一二劑則不食矣有出已盡發已透痂已齊而亦作餘毒者皆由過于溫補失于飲食傷于風寒所致故治痘後餘毒或溫補或發散或解利要分表裡分臟腑分虛實分部位而治之不可妄投也痘後當解利世俗通論也然必審其虛實如稟受素實榮衛充壯病後有熱者分别各症解利之若榮衛久虛坐立振搖大便不閉小便不赤飲食少進者宜調元和脾以扶持之侯其飲食如故起居稍勝榮衛既充然後漸漸解利若至虛之人不必解利矣若固執解利之説遂為寒中下利事敗于已成可勝惜哉餘毒各有所歸痘後餘毒錢氏止謂有三一曰疥二曰􅏴三曰目疾今試求之五經臟腑而備焉毒歸于心則為斑為驚悸為顛癎為痛癢為壯熱為汗為丹瘤為諸血症為咽乾而渴毒歸于肝則為悶亂為水泡為腰痛為目疾為乾嘔為外腫為吐蛔為手足拘攣為寒戰咬牙毒歸于脾則為吐㵼為腫脹為腹痛為不食為口臭為舌本強為手足病為唇瘡破裂為手足發􅏴毒歸于肺則為咳喘為衄血為瘡乾燥皺揭為肩臂痛甚為氣髙喘息掀胸抬肚毒歸于腎則為黑陷為多睡為骨病為猝失音為手足逆冷為咽喉乾痛為飢不欲食為耳骫尚熱為敗瘡倒靨毒歸于腸胃則為泄㵼為利膿血為腸鳴失聲為大便不通毒歸于膀胱則為小腹滿痛為溺血為遺尿為頭腫痛為目正視為隂囊腫亮毒歸于諸經則為眼合不開為壯熱不清為鬱鬱不樂為身腫不消已上諸症並為餘毒遺害詳雜症中痘後熱毒驚心動不寧火主于動故驚喜心有餘笑熱甚火之聲見也哭肺病金受制也恐心火甚而腎水衰也狂心熱乘脾故四肢狂越也虛妄虛妄見聞自為問答神志失常如見鬼物多言舌為心聲心熱則多言詀妄心熱不清則妄詀尋摸尋衣摸空肝熱風淫也王氏以為肺熱是肺為體肝為用也痂後醫藥大法毒太盛者至痂後尚有餘毒冝活血調脾解毒為主痘太多者收結還元之後藏氣發泄已多氣血耗散已甚毒未盡而元神極虛是以欲用涼藥解毒必須用酒炒其體弱者或加參茋芎歸之類以救氣血若驟用寒涼峻攻多有一投就死者痘後疤色真倒靨落痂後疤色身面俱黑暗者恐先前膿不透收靨太急冝察其表裡若壯熱大渴煩悶昏睡少食便祕或大便利此真倒靨也似倒靨身溫神爽食漸加二便調者雖疤色身面俱黑乃痂瘢本色勿慮也用滅瘢散臨睡水調抹之瑩白如舊更冝勿見風日為妙疤色淡白此肺氣虛而氣血盡也一月後主發喘而死急用補湯疤色紅紫此血熱毒壅而身熱煩渴也宜涼血解毒痘順赤色此必食辛辣藥物所致或乳母藴毒也用逍遙散加丹皮山梔木通子母宜並服痘痂紫色如過于補益痕紫又見發斑者用解化斑湯漿清疤白氣血不足又因漿清所致用保元湯合四物湯加白术陳皮紅花陳米有表熱合升麻湯有裡熱合解毒湯白兼癢塌痘疤色白兼作渴發癢便溏是氣血俱虛脾胃不足也若失治數日內防滯下之症當大補中氣使疤色紅潤二便清調可無虞也切勿忽視疤癢靨後疤紅作癢者必至再舉疤痛作痛而重手按之不疼者久必成虛用八物湯加減疤突此風熱毒未盡也用解毒防風外用蜆子水磨之疤突方殭蠶雄黃兔絲子白芷膏本鷹尿白白燕窠中草黃為末蜜和人乳塗之以滅其疤疤凹脾胃虛不能生長肌肉也用人參白术散加黃茋痂後吉症原闕痂後凶症目睛突出畨白無魂失神失智不省人事不治痂後發驚目閉無魂吐㵼腹冷面青唇白乃心氣不足神無所依也不治若不至于此者可救痘痂已脫初無所苦但目睛無神必逾月而亡痂後牙齦惡臭不可近者胃爛也不治痘後餘毒主方宜調元調脾活血解毒主治氣血不調尚有餘毒諸症將作用調元解毒湯為主調元解毒湯方白芍白术茯苓甘草桔梗連翹木通山藥生薑大棗痘後雜症加減法毒甚臭爛用木香下痢用檳榔泄㵼用豬苓澤㵼氣脫用升麻嘔吐用連翹橘紅熱不退用黃芩骨皮傷食用山查麥芽風寒發熱用桂枝柴胡葛根腫痛用木香下和中丸乍寒乍熱用人參黃茋柴胡官桂厥冷去連翹桔梗加人參黃茋肉桂神昏喜睡去連翹桔梗加人參茯苓麥冬溺短澀用車前木通自汗用人參黃茋肉桂驚搐用山梔木通生地喘嗽用杏仁五味子麥冬便難用杏仁枳殼骨節痛加羌活手足拘攣用桂枝黃茋腹痛用腹皮防風胃苓丸喘促用葶藶口渴用人參五味子麥冬吐血用黃連蒲黃眼目羞明如風捲簾切忌點洗赤腫而不能開者用清肝散痘後應用藥方原闕痘後雜症􅏴毒目疾痘疔腹痛嘔吐乾噦措喉嗆水咳嗽喘急驚搐音啞口渴減食倍食失血發熱厥逆瘧疾泄㵼下痢牙疳痂皮咽喉腫痛舌上生瘡唇口生瘡大小便祕丹瘤斑疹痘後雜症治法多睡痘後昏昏多睡者邪氣已退正氣未復脾虛也用調元清神湯或調元湯加麥冬合安神丸或用酸棗仁湯緩緩調理待氣血平復和暢而安痘後昏睡自語或醒時亦如醉人每多錯語者邪熱入心也用導赤散解毒湯安神丸痘後猝然喜睡狀如眩運身無熱口無言别無他症者乃邪退而喜睡否極泰來之兆也不須妄治不久自蘇只用抱龍丸調理痘後多睡案一痘後怠倦嗜卧煩熱喘滿溺赤便溏時值長夏脾胃不足之故用清暑益氣湯一痘後倦怠嗜卧便溏減食皆因胃虛不能主氣脾虛不能主血運令不行化工失職用六君子湯加棗仁木香一人嗜卧呼之不醒晝夜皆然此氣虛脾弱清氣不能上升也用五味異攻散加當歸芍藥及歸脾湯而愈一痘後炎暑怠倦嗜卧食少口燥悶亂肌膚枯癢乃脾胃虛元氣弱不能實四肢充肌膚而潤皮毛也况值長夏熱傷元氣乎以補中益氣湯合生脈散治之不睡虛煩不眠用竹葉石膏湯加棗仁驚悸不食寒熱不寐乃心脾不足膽氣實熱也用茯神逺志柏子仁防風枳殼生地淡竹葉等分丸服或歸脾湯間服日睡夜坐身熱汗出煩熱啼哭咳嗽潮熱用神效麥冬湯若胃實用㵼黃散胃虛用四君子湯加逺志酸棗仁桂圓歸脾湯便祕用承氣湯胃為六腑之海其氣不行陽明逢不得從其道故不睡也是以胃不和則卧不安詀語熱由于實必有餘毒故詀語心血不足故詀語昏昧不識人妄言如邪祟者熱入心胞絡也用導赤散合安神丸待醒後用調元湯加麥冬生地或四物湯加石菖蒲木通山梔間服之以抱龍丸調理而愈煩渴詀語用辰砂六一散挫喉詀語用獨活清神湯痂皮圓淨時或戰栗言語妄誕者乃正氣將復不能自持也須臾將自定若痂凹突多黑點者凶口噤痘後中風遍身青紫瘛瘲口噤痰響者乃節合氣交八分不正之氣乘血氣虛弱而入者也用消風散加蟬脫末一錢以薑汁薄荷汁入酒一盞調服得汗即愈或發癮疹或再出膚疹而愈或以抱龍丸調理或用小續命湯去肉桂附子加荆芥口噤僵直腹痛繞膝冷汗如雨痛定汗出而脈弦緊者因疤內受風寒也宜散風養血用鈎藤湯加紅花鈎藤湯方荆芥防風川芎紫草白术白芍人參當歸甘草官桂青皮黃連木香鈎藤腹痛腹痛因傷食者用和中丸腹痛因餘毒者用連翹飲腹痛而唇白者此元氣已竭也措喉嗆水乾噦措喉者食穀而噎出也嗆水者飲水而嗆出也乾噦者不能納榖時時張口似吐不吐也已上三症皆由熱毒壅塞胃口之上毒火上炎危慮之症也若見失聲則咽喉潰爛不可治矣咳嗽餘毒入肺咳嗽多痰聲啞脅痛者蓋左右兩脅為隂陽之道路餘毒在中故常咳嗽二氣不能升降故脅痛但宜解毒毒去則真氣自行所苦自平也用小柴胡湯加枳殼湯或五味子壯實人咳嗽者是肺氣閉塞風邪所傷也瘦弱人咳嗽者是氣血兩虛乃肺傷也若誤服辛熱而咳嗽者治宜清肺驚風痰熱甚小便澀或素有驚疾與痰者用安神丸鎮驚丸牛黃八寶丹目疾凡痘初出即與清肝護目必無目疾故毒藴于肝則目疾此確論也詳見目疾門及前雜症中口疳凡口疳皆由胃熱也滿口白糜紅點簇簇者輕也用金不換吹之唇舌腫硬牙齦黑爛成疳者重也或有爛入喉者均服甘露飲吹靈棗丹下痢痘後患痢不論赤白皆毒入大腸也用香連丸為主吐蛔下蛔痘後熱毒在胃則吐蛔用黃芩半夏湯加烏梅川椒或黃連湯痘後熱毒在大腸則下蛔用黃芩湯加桃仁艾葉聞食氣即吐下蛔者此胃虛寒蟲無所依為熱所迫故聞食氣即吐下食已即易飢也用理中丸加烏梅川椒黃連吐蛔下蛔若不早治則食臟食肝而為狐惑矣黃連止蛔湯方黃連黃芩白术人參烏梅羸瘦痘後雖能飲食而羸瘦者氣血兩虧故也治之當兼氣血偏陽則傷血偏隂則傷氣矣隂日服當歸養榮湯陽日服麥苓白术散羸瘦痘案一人煩熱口渴能食易化肌肉不長此氣血虛乏心火亢極而乘之也經曰火炎則土燥多食亦虛飢治宜氣血兼補單日服五味異攻散加黃連麥冬知母雙日服四物湯已上亦有治之不應毒火爍隂津液枯涸而死者一能食而肌肉不長精神憔悴脈來沉緩此脾胃不足胃伏火邪于氣分則能食脾虛則肌肉削弱治以補中益氣湯加黃連一能食易飢不長肌肉此胃陽有餘脾隂不足故善消二陽結謂之消二陽者胃與大腸也以小異攻散加黃連白芍以㵼二陽之熱一人面白唇赤肌肉瘦小皮毛枯稿潮熱往來能食易化乃疳癆之症由飲食不節脾胃過傷隂火乘其土位宜健脾兼清熱用歸芍六君子湯加石斛麥冬地骨皮銀柴胡之類六味地黃丸加人參白术當歸枸杞五味子間服異攻散一人面白無神氣冷少食瘦小乃胃氣虛寒治以六君子湯亦有症同而兼便溏腹滿者用六君子湯加炮薑木香亦有命門火衰不能生土者用八味地黃丸一人黃瘦面腫身熱肚大如吃泥米此飲食傷脾已甚脾疳之候也治宜養正則邪自除用肥兒丸腹脹若因食傷而腫脹者冝健脾利水用人參四苓散或四皮散若因傷食但脹而不腫者用木香大安丸或健脾藥加山查麥芽淡竹葉虛者加人參平胃散亦可腹脹如鼓或氣粗喘急者此裡有宿垢也其治在脾不論食積蓄水並宜先利之利後方議調補用揭氣丸或厚朴湯利後用胃苓湯去甘草加人參黃茋腹皮若中氣虛而作脹者不可妄攻用萊蔔丸揭氣丸方木香五錢檳榔二個黑牽牛半生半熟炒頭末一兩神曲和丸厚朴湯方蒼术厚朴陳皮腹皮茯苓皮豬苓木香隨症加減萊蔔丸方蘿葡子五錢胡椒二錢白术厚朴一兩水浸過去土炒共為丸腫痛面目虛浮一身皆腫者此表虛也見風太早風濕乘之其治在肺宜以五皮湯微汗之平胃散加羌活防風或五苓散去肉桂加赤芍或胃苓湯合五皮飲治之外以枳殼葫蘆煎湯浴之或松葉桑葉煎湯洗之痘後浴早面目一身盡腫者水氣也用四君子湯補脾去濕加黃茋實表加防風勝濕加麻黃逐皮間水腫消後用錢氏異攻散加豬苓澤㵼調理隂囊浮腫其大如鉢毒蓄皮膚也用連翹飲加腹皮茵陳有熱加枳殼柴胡必數服乃效隂囊腫如瓜乃膀胱熱甚毒流小腸也宜清利退火用紫草飲或用車前子滑石茯苓木通山梔瞿麥牛膝甘草燈心痘後卵腫肝病也用小柴胡湯加青皮木通五皮湯方羌活防風蒼术木通桂枝豬苓防己桑皮甘草燈心一方無桂枝羌活有腹皮厚朴痘後腫脹案一痂未盡脫黃腫壯熱腹飽溺赤乃素有濕熱兼餘毒未盡也宜消積滲濕解毒用五補散又用苡仁連翹山梔淡竹葉防風白术蒼术厚朴茯苓一人浮腫皮薄而光手按成窩喘嗽便澀乃飲食脾傷土不能制水滲入脾膚故也喘嗽者水氣上行侵肺溺澀者失其降下之令不能輸化也此為難治宜補中行濕清熱利小便以實脾飲五補散若干散治之一痘後遍身發腫餘毒攻沖也用滿天星草水楊根金銀花馬蘭草芫荽各搗汁和服一小便赤澀腰下腫痛土虛不能制水也當利小便用五苓散及小清虗散相間服或用六君子湯加澤㵼一遍身赤腫發為赤遊風乃餘毒不盡兼食煎炒辛熱之物熱與血摶而然也用犀角解毒湯一腮頰赤腫為遁毒風症乃風客皮膚而為頑核赤色也內服解毒湯外敷玉龍散一夏月收痂後溺赤短澀囊腫赤亮以八正散化毒湯治之􅏴毒痘後􅏴毒醫之過也當發不發則成􅏴不當補而補亦成􅏴􅏴者壅也元氣內實毒不能行故尋竅而出經曰榮氣不從逆于肉裡則生􅏴是也曲池委中三隂交會之地每多此症然有虛實之不同􅏴毒實者形體壯盛身熱能食痛呌不已是也用連翹飲􅏴毒虛者形體怯弱食少微熱腫處不痛是也用流氣飲並用必勝膏貼潰而出膿久不收口者內服大補湯外塗生肌膏不治之􅏴如􅏴多不食嘔㵼不休睛慢唇白膿出清水是也痧疹丹瘤痘後發痧疹丹瘤吉兆也不比平常治法用疏風之藥加牛蒡連翹一二味凡痘後諸疾不由痘中來者曰怪異必先詳審先服何藥進何飲食或感冒六經之邪知犯何逆即依所犯以法治之所謂藥不執方中病而已也芽兒百日出痘毒隨胎氣相激而出寒熱之藥俱不可用用蝎蟬丸蝎蟬丸方全蝎五個用蜜焙蟬退五個酒漿焙白芍一錢酒炒黑糖調如芡實大一丸乳化下未滿周嵗出痘氣血未足瘡不肥滿用參歸湯泄㵼加訶子有痰加白术陳皮小便不利加木香痘白盜汗加芍藥黃芩俱酒炒參歸湯方人參當歸各七錢白芍三錢酒炒生薑三片同煎乳母服童男破陽出痘虧天元矣稀朗猶可若稠密毒重難于起灌收功宜用天元接髓丹天元接髓丹方當歸生地人參黃茋各二兩橘紅蟬退各一兩附子官桂各五錢酒漿十碗入甕中煨熟去渣存火氣每服一錢入人乳三杯生薑三片重頓沸湯溫服經行出痘痘瘡全賴氣血為主一有不足變患立生但氣虛易補血難驟補故女子十四歲後出痘恐天癸之行痘疹難于施治若經水如期而止適遇發熱熱隨血解瘡毒自出不必施治經行常症用川芎生地或龍宫散外用芫荽湯洗淨將香褁置隂處經期落後用升麻經期雜症經水適斷詀妄用羌活紫草熱見愁肢冷用薑桂便閉用千里馬嘔吐去桔梗加煨薑丁香橘皮驚悸用天麻勾藤安神丸泄㵼去當歸加肉桂豆蔲或調溫中丸有汗去升麻桔梗加桂枝黃茋腹痛有停滯㵼臭者用山查神麯無停滯者用乾薑白芍神異散非期經至此毒火內熾擾亂血海迫血妄行亟冝涼血解毒方得經止如久不止則內虛血陷用元參地黃湯或四物湯合黃連解毒湯或犀角地黃湯加血見愁紫草蟬脫牛蒡連翹或栁花散附栁花散方紫草一兩二錢升麻九錢歸身七錢五分栁花七錢每服七錢葡萄酒調下經行聲啞血去則心虛心虛則少隂之脈不能上榮于舌故猝然失音先以當歸養心湯養心血利心竅待其能言以十全大補湯調之毒發沖任經向閉血海涸逢出痘毒發越于沖任之間二陽之症並作其熱必盛須調其心脾使毒得發泄庶可保全用歸脾湯逍遙散得脾胃和平飲食增進方可收功若攻擊之則血妄行不止而痘亦不出矣吉凶有異見點起脹時經行泄去熱毒則吉若灌膿收痂時則凶漿期行經如不倒陷根窠不散者猶有可救治宜重養其血而生矣起灌行經雖本身之血不為汚穢觸痘但恐血去內虛難于起灌平陷灰白多致不救急宜救裡解毒用大補湯龍宫救苦丹或八物湯去地黃加黃茋木香附子以調元氣或用芫荽酒噴之出贈痘者吉崩漏氣血兩俱虛素有崩漏氣血兩俱虛痘疹難任其毒冝大補氣血使氣血充足毒無留滯更能進食方保萬全用十全太補湯八珍湯加阿膠續斷木香黃茋官桂又補中益氣倘灰白平陷加熟附子一二斤經變再出方能挽痘不起發不光壯飽滿紅活頂陷色灰或青乾黑陷者此裡虛之候痘復陷入也用十全大補湯奪命丹如或瘡空中再出一畨此大吉兆若加腹脹喘促詀妄悶亂寒戰咬牙手足厥逆者用木香散異攻散三建湯勢迫者用艾灸午時起三更止灸得不膿不血自上收下方止經斷熱入皆急治發熱時經水適斷宜早服柴胡四物湯加桂枝以防血室空虛若已增寒熱神昏妄亂見鬼摸衣此邪熱乘虛而入于血室血室者沖脈是也肝主之肝藏血為血海宜用㵼肝散涼血地黃湯或四物湯合導赤散加人參麥冬或安神丸閉經停垢毒胞門經閉病在心脾心脾先病血室不行沖任之間則多積垢一旦痘疹之火鬱于命門胞户之中當出不出毒邪留伏致生乖戾故發熱之初即當滌除邪垢以桃仁承氣湯為主後以四物湯合勻氣散加紅花木通痘出經來防陷伏惟元氣素壯能食者不妨如氣虛食少未有不陷伏者用十全大補湯主之虛甚者加熟附子少許經水過期補審發熱時經水應期來應期止氣血循常度不須治也若過四五日下止此熱邪迫血妄行也冝先服小柴胡湯或生地黃湯以清血室之熱後用十全大補湯以補氣血之虛經婦點期三日症治以疏風解毒湯為主腰痛用羌活柴胡停食用山查枳實有痰用貝母生薑風噤用柴胡葛根薄荷寒熱用生地黃芩痰喘用天麻殭蠶便閉用芒硝大黃枳殼痰厥昏迷用牛蒡僵蠶皂角瓜蒂經婦胖期三日症治以生津解毒湯為主血滯用當歸川芎紅花紫蘇發遲用防風蟬脫痰嗽用川芎桔梗花粉舌黑用川芎黃連山梔犀角丹皮攤紅用川芎芍藥丹皮毒盛用川芎山梔黃芩黃連經婦膿期三日症治以保元湯合四物湯為主痰嗽用川芎桔梗貝母泄㵼用訶子豆蔲抓破用人參黃茋白芷薑蠶痘頂軟弱用本方加獨聖散生薑肉桂茅根以發托之黑陷枯燥用知母黃柏黃芩黃連或母雞湯豬尾膏淡白用酒漿人乳鹿茸頂陷不滿用人參川芎乳香血虛灰白用阿膠升麻虛寒灰白用附子四物湯外噀芫荽酒經婦收靨三日症治以參茋白术湯合四物湯為主小便澀加澤㵼木通疤黑用連翹銀花痰嗽用橘皮半夏熱迫血妄行用人參黃茋生地紫苑茯苓孕婦出痘孕痘相關最冝詳慎不論痘之輕重俱以清熱安胎為主切不可觸動其胎氣倘或胎落則血走氣敗不能成功孕婦出痘諸症發藥補藥悉有安胎清熱之妙宜用大安散加黃芩川芎如聖散加黃芩白术安胎散八珍湯初發熱用如聖散加升麻葛根連翹血虛用補血托毒之藥不起加肉桂白芍山查煩渴加麥冬痘出太多用參茋內托散加紫草當歸芍藥黃連連翹牛蒡山查痰多用半夏身熱但有表症用參蘇飲加白术芍藥如聖散血動用四物湯加黃芩黃連及罩胎散佐之若身熱足冷腹痛用八物湯加木香脾虛食少毒發不出用四君子湯加木香粘米紫草胎動不安用安胎散加砂仁發熱用防風枳殼甘草陳皮砂仁甚者用黃芩大便不實用山查白术或參蘇飲腰痛骨痛此風邪閉塞火毒內盛也用疏風安胎湯加羌活柴胡房勞腰痛治冝滋腎用知母黃柏麥冬挫閃腰痛用當歸紅花桃仁痘密火迫血不止腰痛大熱此凶症也用犀角地黃湯加芍藥連翹黃芩山梔荆芥防風以解毒光澤者可救懷孕四五月患痘宜用錮蒂散懷孕七八月患痘宜用回瀾散産後一二日患痘宜用震元奪命散及雄鴨法製羮産後十日半月出痘止以大補氣血為主用十全大補湯合八物湯或異攻散三建湯丁附湯加連翹牛蒡大便不實加肉豆蔲乳後出痘兩乳紅硬腫痛而適患痘亦須審其曽産與否用草靈丹孕婦點期三日症治以疏風安胎湯為主血虧用川芎當歸腰痛加杜仲續斷熱甚加犀角山梔黃連痘密宜引毒出表用保元湯四物湯及茯苓白术阿膠竹茹飽滿身痛口燥胎氣上升治宜行氣寬中用四物湯加蘇梗枳殼山查茯苓紫草稟弱脾虛宜大補安胎引毒出外以免胎動唇燥舌胎有實症若不下胎其可保乎變而通之亦可下胎用芒硝大黃或加減保元湯孕婦膿期三日症治以保元湯為主背上焦燥加知母麥冬血點攤紅加芍藥生地根窠淡白用川芎當歸寒戰作嘔用砂仁煨薑毒氣作嘔用伏龍肝竹茹孕婦靨期三日症治以參苓白术散四物湯為主臨産出痘原闕臨産起灌必有氣血俱虛之患冝補氣血固表裡用大補湯加附子少許痘期墮胎痘婦墮胎非血熱即氣虛也須要審其墮在何時初出時墮者猶或可救當補而升之起脹時墮者十救二三當補而清之灌膿時墮者血虛衰敗不能逐毒化漿多致不救當峻補之收靨時墮者不為大害當用補藥墮胎血不止者凶大熱者危總以根窠之散與不散為生死之驗墮胎不在失血之例切不可止其惡血宜大補氣血用人參黃芩當歸山查丹皮沒藥産後出痘諸症痘後治法亦同孕婦大抵以引血歸經為主官桂黑薑之屬所必需也其三日前用疏風活血湯之類其餘照常治法淤血未盡而小腹急痛宜略行之用黑神散內虛外作假熱而寒戰咬牙腹脹作渴足冷手熱用大補湯加熟附或四君子湯加黃茋歸身木香毒火內發淤血內凝而昏悶作痛者或升或降或作或止孕婦出痘應用諸方如聖散人參白术當歸枳殼黑豆腹皮砂仁甘草陳皮薜荔安胎散腹皮人參廣皮白芍紫蘇砂仁香附粘米錮蒂散人參柴胡香附陳皮黃芪生地芍藥荆芥木通川椒炒黑蓮房殼𢃄蒂一片葡桃著根者七粒水煎服回瀾散人參荆芥枳殼各三錢蚶子一對煅為末升麻二錢黃茋一兩橘紅五錢豬蹄一隻同煎服外用綿肚兜束胎罩胎散川芎當歸人參白术白芍茯苓柴胡黃芩荆芥防風白芷乾葛砂仁甘草紫草阿膠粘米疏風安胎湯荆芥防風連翹黃芩前胡甘草馬蘭花粉酒炒水煎服生津固胎湯知母麥冬黃芩甘草白芍連翹生地阿膠竹茹水煎服震元奪命湯紫草人參黃茋當歸茯苓陳皮桔梗砂仁蟬脫白芍雄鴨法製羮肥雄鴨一隻人參一兩肉桂五錢砂仁一錢五分童便酒漿煮熟徐徐食盡內托散人參黃茋川芎當歸甘草防風白芷桔梗芍藥厚朴木香官桂紫色者去之加紫草蟬蛻疏風醒毒湯荆芥防風連翹牛蒡前胡紅花紫草甘草生津解毒湯芍藥生地連翹知母麥冬蓮肉粘米草靈丹絲瓜子一合當歸生地荆芥木通山甲漏盧僵蠶蟬脫紅花燈心女用胭脂婦用肥皂夾仁大安散原闕痘案一孕婦正養漿時墮胎去血太多昏憒伏陷而死一孕婦養漿時墮胎以黃茋一兩五錢人參當歸各一兩阿膠五錢治之而愈一婦漿行正産用甘草黑薑各三錢附子一錢又以保元湯加川芎當歸荆芥山查益母草而愈一婦出痘勻朗灰白熱甚墮胎昏憒冷嘔此胃氣虛寒也用保元湯加炮薑官桂而愈一婦痘不易透疲倦血去不止此氣血兩虛也用川芎當歸人參生薑益母草升麻治之而血止痘起又以補中益氣湯而愈一婦出痘以安孕飲調理而愈一婦出痘而胎痛甚用炒黑砂仁酒下之而愈一婦痘漿不足灰白寒戰咬牙煩躁溏泄此脾胃氣虛也用異攻散治之而愈有去血不止藥不效者倒靨而死一孕婦痘後痰盛用清解之藥而愈甚者此隂虛不能制陽也以六味地黃丸加當歸麥冬而愈一婦痘甫愈強以房事變疤成勞而死仁端録卷八
