body:
  text: 仁端録卷十三明徐謙撰陳葵刪定痘瘡痛癢損破門諸痛為實諸癢為虛實者邪氣實也虛者正氣虛也痘瘡先痛後癢者常候也先以毒未化太盛鬱而痛後以毒從膿解火漸微散而癢大法宜活血開鬱若肉如刀割膚如錐刺此又脾傷肉敗痛之變也若爬搔破損皮脫肉坑者此又毒壅倒陷癢之變也初出而痛發未盡也和解之毒欲外出肌弸急而痛用九味順氣湯合活血散皮肉厚外寒相搏而痛用桂枝葛根湯既出稠密而痛者毒盛淤也用犀角消毒飲四物湯加連翹防風牛蒡荆芥丹皮起脹而痛者氣血充正欲化毒也用涼血芍藥湯養漿而痛者一曰氣滯用保元湯加木香山查一曰血熱用升麻湯加連翹牛蒡紅花麥冬痂疤痛以重手按之又不疼者虛也用八味湯加減胃氣自虛津液內竭血失其榮氣灼為燥所以發癢補其氣血和中托裏此其治也大抵初出形色紅焰起發而皮嫩水多者其後多致癢塌大法當補氣以燥其濕如蚊虱吮血而肉癢是血失其榮之一驗一種表裏皆虛而癢用白芍紅花白术肉果蟬退蒺藜一種血虛以致肝木易於生風而癢急以補血藥預防之七日而大癢抓破者九日死矣所以發癢而精神爽快欲人撫摩癢處而即止者縱抓破而自知其悮者吉若搔之愈癢悶亂不寧搖頭扭頸手足舞亂禁之不止挖肉成坑如湯泡灼如剝鮮魚毒氣倒陷正氣外脫毒壅不解禍不旋踵初見紅點遍身作癢者此毒氣欲出皮膚閉密火氣遊移往來故也與傷寒太陽症身癢者同論宜察之使邪氣得泄也用桂枝葛根湯加麻黃牛蒡或消風化毒湯根窠不紅用助陽湯加紫草起脹作癢能食便祕者此邪氣內實正氣外虛也用四聖解毒湯作癢㵼泄者此正氣內虛邪氣外實也用調元湯托裏湯服後癢止者吉不止者凶三四日紅黑焦枯氣血凝滯而作癢者宜疏風解毒凡痘始終忌癢漿期尤甚此表虛也須忌抓破正面泄氣他處無大害膿厚者可治無膿者不救多血而淋漓者却又無妨血盛而癢不止者用保元湯加蟬退白芍木香紅花首烏大力子發散太速肌肉空虛不勝其毒宜大補氣血則癢自止未破用奪癢法已破用敗草散能食壯實無他症而癢者用四聖化毒湯能食便堅抓破處復灌成漿無痘處添出贈痘雖盡癢破無妨用十全大補湯與苦參丸間服外塗百花膏合滅瘢救苦散吐㵼少食氣血虛弱而癢者用十全大補湯加首烏虛甚加鹿角膠或木香異攻散參歸化毒湯內托散去肉桂加白芷當歸木香外敷敗草散天水散梟癢用盒脾散震澤湯外浴癢法避癢法抓破無膿白乾如豆殼者凶氣血則為麻為癢為陷血虛則為乾為燥為痛痘色白者必至於灰慘平伏癢塌此皆氣虛而不起脹血虛而不榮華也補氣血藥中有熱者加清利解毒之品白可轉紅矣若單補氣而不補血則燥癢愈盛矣紅痘皮色嬌嫩失於早治膿期發癢用消風化毒湯外用茵陳薰法破者用白龍散泄瀉而癢乃脾虛也用參茯白术散加殭蠶白芷外用薰法精神虛弱小便利大便頻至夜癢甚者脾與氣血俱虛也用參苓內托散四君子湯加黃茋肉桂蟬脫白芷肉果或木香散不能啖食而癢用蟬脫膏頂平皮薄色淡搔癢損壞者乃脾胃弱肌肉虛欲變倒陷也用十全大補湯加荆芥防風外用茵陳薰法如得空處出贈痘破處復灌漿能食便調者可救否則不治一云漿滿而破損者可治未滿而破損者難治若瘡破復灌隨漿隨灌其痂青白緑色堆如雞尿者終必咬牙寒戰十五六朝發喘渴三七日外死矣黑陷不起在漿期最忌寒涼解毒以傷脾胃用內托散煎下無價散凡肝經痘初熱時兩手如掐物狀多水泡而作癢宜先平肝用瀉青丸去大黃加甘草青皮柴胡若失於早治後作癢用保元湯加防風白芷膿期血當化水水則成膿若未成膿則毒未化搔癢不寧此惡侯也與傷寒陽明症皮中如蟲行者同論乃虛風外搏邪氣內搖癢而不止為泄風是也須視乾濕紅白瘡狀風藥佐之通用十全大補湯加防風大力子卧房不密客冒風寒或一肢癢者用荆芥燒煙薰之痘乾而癢宜養血潤燥用四物湯合消風化毒湯及薰法痘濕而癢宜養血去濕用四君子合消風化毒湯奪命丹及薰法法色淡白而癢用內托四君子湯色紅紫而癢其症煩渴便祕挀破血流乃氣虛血熱毒盛也血之味醎熱則腌皮肉而癢也用四物湯加人參黃茋丹皮連翹蟬退白芷甘草及三味消毒飲加紫草連翹血流者用敗草散蕎麥麵炒黃土摻之乾則蜜水調滑石末以潤之能食便祕用加味四聖解毒湯外用槐栁浴法所云抓破有血可治者蓋指未灌漿時言也若成膿後安得有血故不可以血之有無定吉凶也八九日氣血虛而癢者用保元湯加川芎當歸蟬退白芷陽瘡出血用當歸活血湯將靨時其膿已成其痘將回邪氣解散正氣漸復榮衛和暢新血作癢順症也與癰疽將愈而癢者同論但勿令抓破痂後有如萬蟻所攢亦即一時而已須稍耐之不必治或用奪法凡痘當將靨已靨因癢抓破者名壞症如靨疼口渴便祕赤乃火症也靨厚者單解火毒靨薄者大補兼降火遍身抓破者不問前後皆服蟬化散外用敗荷葉茵陳薰之潰爛粘衣席者用十全大補湯奪命丹外用敗草散抓破於無關轄處或手足者猶可救若於顴臉氣窩正面為臟腑精華所聚之處者凶若於鼻面眉目抓破一處者此肺有熱也用甘桔湯加牛蒡癢即止者吉若滿面抓破而面上瘡痕隱然點點有起發之勢此猶可治急用內托散加蟬脫日子多餘毒未盡而癢者血滯也用四物湯加連翹牛蒡痂後疤紅而癢必致再發觸犯穢氣食毒物而變灰黑白色發癢者初標時用通氣飲漿痂時用正氣飲未破者用荆芥薰之已破者用內托散薰辟穢散敷敗草散食毒物而發中氣以致津液外行發為血泡水泡氣勢虛甚水遺肉分澀滯難行作癢不已抓損皮肉如湯火瘡者不治凡虛痘作癢元氣不充也行漿不滿之故若半漿癢者可救用人參附子黃茋芍藥升麻之屬如空囊而焦黑者不治治案一痘初起作癢風寒外滯也用升麻葛根湯􅀈以焙荆芥穗而愈一痘起脹淡白少神溏泄口渴而癢此脾胃虛弱也用補中益氣湯去當歸加肉桂附子占米而愈一痘成漿癢破是衛氣暴泄津液不榮幸能食便調用四君子湯加川芎芍藥橘紅復腫灌結痂而愈一痘九日漿清作癢大補氣血而愈一痘成漿癢破潰爛乃濕火并至也調脾滲濕而愈一痘見七日至十二日癢塌用木香散加丁香肉桂固表裏而愈一痘六七日痛不止此毒未化正鬱而作痛也非虛非實不須治之俟膿從毒化其痛自止助陽湯紫草木通枳殼黃茋桂枝大黃調元托裏湯人參黃茋荆芥防風訶子木香陳皮赤芍桂枝羌活奪癢法花椒滑石絹袋盛按摩癢處能奪其癢四聖化毒湯木通官桂赤芍防風四聖解毒湯紫草木通枳殼黃茋桂枝大黃苦參丸苦參白蒺藜牛蒡子首烏荆芥酒為丸滅瘢救苦散蜜陀僧滑石白芷共為末乾摻又可蜜水調敷參茋內托散人參黃茋當歸川芎防風厚朴桔梗白芷官桂木香粘米白龍散風露久乾牛屎煆取中心白者敷之參歸化毒湯人參當歸黃茋白术赤芍桂枝甘草盒脾散升麻芍藥蟬脫防風白术甘草生地荆芥腹皮陳皮殭蠶震澤湯黃茋芍藥防風荆芥生地治癢法經霜桑葉蘇葉升麻防風荆芥又方升麻蒼术槐花栁枝桑枝麻黃辟癢方鐵器燒紅淬好醋中使氣通房中能止癢消風化毒湯荆芥防風升麻葛根白芍牛蒡蟬脫紫草一方去葛根蟬脫用黃茋桂枝甘草薄荷薰法茵陳艾共撚薰之又方桔梗紫草染綿紙上捲桔梗外撚薰之瀉青丸羌活大黃川芎龍膽草當歸山梔防風蜜丸奪命丹麻黃蜜酒炒黑升麻人中黃山豆根紅花牛蒡連翹蟬脫紫草酒蜜為丸硃砂為衣薄荷湯下當歸活血湯治抓破出血當歸生地紅花地骨皮牛蒡連翹甘草人參黃柏通氣飲治梟癢元參當歸紅花連翹銀花蟬脫砂仁殭蠶地膚子正氣散治虛癢人參黃茋蟬脫當歸紅花廣皮寒症加白术肉桂附子刺癢法荆芥穗為末紙裹搓緊焙乾點火掐隱刺癢處即止摻方氣虛用白芨末松花末螺螄殼末敗草末血熱用六一散蛤蜊粉白龍散吐瀉並作及吐蛔瀉蛔門嘔吐暴瀉皆屬於熱三焦傳化失常火性迅急故也邪在上焦但吐而不利在下焦但利而不吐在中焦則吐利並作須分析寒熱及吐利所出之物又審病者精神衰旺而治初熱自汗自吐自瀉者未可亂治謂其毒從上下而出吐利中有疏通之義也但只可三日內便止或吐瀉後覺精神不減為吉不可多日致傷元氣若久而不止須審治之若中氣一虛毒不能出內攻之禍立至矣初熱自利青緑水或黃色臭穢口渴煩躁者用黃芩湯竹葉石膏湯兼吐酸利而有聲者用黃芩半夏湯或紫草湯加砂仁薑製黃連陳皮若兼手足心熱身熱溺赤液下有汗渴而喜乳吐乳如射喜冷飲者用四苓散加黃連木通淡竹葉或六一散若此等實熱吐瀉誤用補澀溫藥必反增內熱矣直屬火盛迫於上下而吐瀉者用連翹黃芩牛蒡山查枳殼若痘齊以至收痂未滿百日熱渴咽痛吐瀉者並用陳米湯若吐清水利下清白不臭口氣冷不渴飲食少身與手足俱冷脈沉細者虛寒也用和中湯益黃散甚則補中益氣湯加生薑肉桂或藿香正氣散合五苓散加砂仁或參苓白术散久瀉食不化者用豆蔲丸加山查神麯瀉止用調中湯若失治則胃虛毒愈陷矣身痛吐瀉者用四苓散加羌活柴胡藿香砂仁胸腹痛甚而吐瀉感寒停食也用升消平胃散痘見標吐瀉不止用人參調中湯和中湯七味豆蔲丸吐瀉少食為裏虛陷伏倒陷灰白為表虛俱見全者為表裏俱虛通用十二味異攻散表虛去豆蔲裏虛去肉桂吐瀉蛔蟲初吐二三條無害吐多則凶吐瀉喘渴蛔蟲已出目直視下利腸垢者死蛔生者可治蛔死者不救三日已前熱毒內攻腸胃不能容蛔而出痘色明潤宜安蛔疏邪用平胃散加烏梅史君子川連防風痘色焦紫稠密者危五六日後根窠微紅蛔出者多脾虛也用保元湯加肉桂或伏龍肝泡湯煎藥或沖烏梅生薑汁十三四日瀉出蛔多者凶吐出蛔多者死治案一痘不易出吐瀉不已此虛症也宜溫補兼升發用透肌散六君子湯加升麻蟬脫生薑肉桂大棗陳米而愈以其熱靜痘嬌也若執痘未齊而不補真元反致陷伏矣一痘後吐瀉似乎霍亂此外感兼內傷也用藿香正氣散藿香五苓散然而更宜詳者此症因兼暑食用加味二陳湯而愈一痘起脹吐蛔乃胃熱不能食蟲為熱迫但聞食氣則上湧出用安蛔湯而愈然多有不治者痘雖勻朗漿半足若久不食而眼劄不止者土虛而木乘之必至腫消目開倒陷而死一痘後吐蛔乃氣血虛無穀食以養蛔求食而出也用二陳湯加連翹芍藥生薑大棗而愈黃芩湯白芍六錢黃芩一錢五分炙甘草一錢加大棗黃芩半夏湯白芍二錢黃芩一錢五分炙甘草半夏各一錢生薑四苓散茯苓豬苓白术澤瀉和中湯人參甘草茯苓各五分白术七分半夏八分陳皮砂仁藿香各一錢理中湯人參白术乾薑甘草藿香正氣散藿香紫蘇腹皮陳皮桔梗甘草茯苓半夏厚朴白芷豆蔲丸木香砂仁龍骨訶子枯礬赤石脂肉果黃連止蛔湯人參白术黃芩黃連烏梅泄瀉及下痢膿血水穀泄屁門陽氣在下則生滲泄濕勝則濡泄諸病水液清冷皆屬於寒又曰瀉青白為寒瀉紅黃為熱瀉黑色者臟腑壞又曰初時瀉黑為熱漿痂時瀉黑是腎泄也凡六腑氣絶於外者手足寒五臟氣絶於內者則不止五奪之中此為最甚故痘瘡大忌內虛泄瀉也初出及收靨時偶泄不妨起脹灌漿時大忌泄瀉須急治之正氣內脫者淹延而死邪氣內陷者煩渴而死陳文秀曰痘疹泄多內耗精液氣血不榮痘雖起發亦不能靨若身溫腹脹咬牙喘渴者難治因水穀去多津液枯竭引飲不止蕩散真火也速與木香散異攻散薛理齋曰前症若兼手足冷面青白屬虛寒者急用木香散陽氣脫陷急用異攻散瀉下水穀或白或黃急用木香送一分七味豆蔲丸若唇青指冷睡而露睛口鼻氣冷瀉青白色腎氣虛寒也用六君子湯加骨脂豆蔲臟寒下利不渴用四君子湯加乾薑身涼渴虛也用理中湯加風藥升提瀉而渴不止者用黃芩芍藥湯甚則豆蔲丸脾氣虛弱用六君子湯血氣虛弱用八珍湯十全大補湯身熱頰赤睡不露睛瀉黃赤色脾經實熱也用瀉黃湯一云痘家瀉多因熱毒藴於腸胃故投以熱劑則瀉尤甚雖用燥濕健脾之藥亦不能止如二术二芩訶子之類比之夏月伏暑多瀉者溫熱補澀之藥不相宜也宜用茯苓黃連豬苓白术蒼术扁豆山藥苡仁滲濕健脾一服而止再用升提痘毒出外若竟以瀉藥治之恐毒不能生發必致倒塌已出未出俱不可溫塞遺害至七八日宜補而止錢氏云黑陷青紫者用百祥丸下之不黑者禁用其所下者膀胱之邪也又云下後身熱氣溫欲飲水者可治水穀不消或寒戰者為逆乃知脾土強者可以制腎水也朱丹溪以百祥丸太峻用宣風散代之瀉後溫脾用人參白术厚朴木香脾土既溫胃氣隨轉胃主肌肉能制已瀉之腎此錢氏祕旨也凡傷食泄瀉酸臭不化宜先去積用丁香脾積丸隨用補脾益黃散凡濕勝濡瀉者宜溫中滲水用理中丸兼五苓散痘未出而泄瀉腹中不痛原無內傷也此毒氣內動與外邪搏激傳化失常名曰陽泄陽氣在下則生滲泄也誤止必變重矣但用輕揚拔毒升發之劑其瀉自止黃芩湯或合升麻湯瀉下黃赤肛門如火熱小便赤澀身熱而渴脈洪數者用四苓散加木通或柴苓湯瀉至四五日不止者須見清水方可用止藥用至寶飲加訶子陽熱甚而泄瀉譫妄者用辰砂五苓散脾胃素弱餘食不化自利清白者用术苓調脾散四君子湯豆蔲理中湯初泄瀉黑水宜從火治用黃芩之類起脹泄瀉若能食者大便欲其常潤則臟腑流利氣血和平不可妄用溫補反增內熱若脾胃怯弱神倦少食其瀉為虛治宜溫養用益黃散若身熱中滿渴而能食者其瀉為實宜清利之用五苓散若手足冷滑利清白痘色白者其瀉為寒用參术散益黃散豆蔲丸理中湯七味豆蔲丸木香異攻散手足心熱渴而面赤利下黃臭小便赤澀痘紅掀發者其瀉為熱用黃芩五苓散或加減四苓散胃苓中和湯痘從見點起發以來元自忌瀉恐裏虛毒不得出反成陷也七日成漿尤大忌前此病淺而脾胃尚強至此病深而脾胃已弱若又泄瀉是僅存之元氣重竭於內而方張之邪毒難化於外脾虛不能運毒肺虛不能排膿必癢塌倒陷寒戰咬牙而死矣故泄瀉能食者可救不食者難保所謂漿粥進泄瀉止虛者可治也急宜助脾化漿而兼舉發用保元湯異攻散或豆蔲丸然須審别不可槩用止澀協熱而瀉者必腸垢宜清通之用香連化毒湯協寒而瀉者必騖溏宜溫澀之用理中化毒湯輕者用人參白术散去葛根加木香黃茋肉桂甚則木香異攻散肉豆蔲丸並進內傷生冷致渴而瀉用人參黃茋山查白术豆蔲訶子肉桂澤瀉內蓄水飲過多大渴而瀉清水者待其自愈水盡則止誤澀反凶漿靨期內瀉黑水者腎泄也用無上飲加蓽撥骨脂隂瀉者亦水瀉也下清水白沫完穀不化身涼不渴小便白此虛寒也用理中湯兼渴者加人參去乾薑或豆蔲丸止之身熱痘多元氣不勝其毒雖上攻扶其起灌至半氣竭必瀉色如松花乃土之正色中氣甚矣用無上飲加人參黃茋山藥訶子蓮肉虛而痘陷者用保元湯加訶子丁香痘自見點至收痂有瀉皆從虛治邪既併於外則裏自虛故作瀉用理中湯若又不止用木香散異攻散兼豆蔲丸澀之痘後泄瀉餘毒入大腸而瀉屬火急欲如厠者自行不止不必澀止惟元氣不足者補之食少不渴脈微細者裏氣虛不能禁錮水穀也用四君子湯加訶子豆蔲或理中丸加熟地附子或五苓散肉蔲丸止之水穀不分者為逆候亦用理中湯肉蔲丸四苓散能食熱渴脈盛而瀉亦熱入大腸熱邪不殺穀也用黃芩湯加黃連白虎湯合四苓散痘中泄屁此脾胃弱穀氣虛故頻頻撒屁最忌以泄其氣也用參苓內托散加升麻防風凡參茋肉果术苓木香輩但能止瀉補脾惟加砂仁一二粒能止撒屁腸鳴滑瀉騖溏俱宜補胃不可單用消導膩濕之藥惟痘陷者難治利下膿血未收靨以前者為倒靨收靨以後者為痘痢故起脹時其人臟氣自脫或過服寒涼致毒陷入大腸瀉如豆汁黑汁或膿血口臭唇焦目開脹消者死漿期而利膿血者因痘不收毒不得留乃從大便而出此倒靨也中氣充實者不妨泄盡自愈誤澀反害有倒靨雖黑陷而為順者以能食脾強而腎弱土足以制水故也若乳食不消下痢不化是脾虛為逆候痂後遺下膿血者熱毒遺於大腸也勿作倒靨及誤用劫塞藥此名痘痢又名滯下必腸鳴腹痛裏急後重如雜症痢疾之素有積熱因氣血衰不能運化而成積同論用四物湯加枳殼荆芥黃芩黃連或黃連解毒湯加生地膿血已盡用和中湯若大孔如筒垢如魚腸者不治大抵紅積屬熱白積屬寒治宜溫補轉白為紅用酒製黃連腹痛加檳榔餘毒加石蓮痘痢比雜症痢不同大忌下藥如巴豆大黃芒硝之類須提正氣以扶元使痘不下陷用保元湯加升麻丹溪云赤痢屬血自小腸來白痢屬氣自大腸來然皆濕熱鬱於大腸有傷氣血也但痘疹以氣血為主又不可令其受傷於熱毒也紅痢用四物湯加黃芩黃連木香炙甘草或黃芩芍藥湯白痢用四君子湯加黃連木香陳皮滑石或厚朴黃連湯紅白相兼並用香連丸黃連橘皮湯腹痛本方加當歸砂仁木香白芍厚朴後重本方加枳殼黃芩生白芍木香升麻炒滑石虛者用補中益氣湯久不愈紅痢加阿膠黑薑白术白痢加黃茋砂仁甘草夾食積者加山查麥芽過傷飲食熱毒乘虛入裏下膿血者名腸垢先用調胃承氣湯次用黃芩湯冷熱不和餘毒未解或傷食所致不問紅白並用和中湯或四君子湯再不止用豆蔲丸香連丸痘未滿月痂未盡落泄瀉而兼利下膿血者用香蔲丸灸臍上七壯膿血黃白者用薤白湯胃風湯小便赤澀煩渴者用犀角地黃湯導赤散挾外感者用小柴胡湯加蒼术川芎芍藥生薑水穀不分裏急後重者用四製术附散或陳皮甘草甘菊白芍木香山藥肉果赤痢加黃連生地地榆苡仁白痢加木通扁豆泄不止加人參訶子噤口用蓮肉散加川椒人乳錢氏曰痘瘡自內出外者曰正出自外而內者曰倒陷從外收曰正靨從內收曰倒靨倒陷者必死倒靨者十救二三故豆黑而忽自瀉或下膿血痂皮者為順此倒靨也痘黑本死症裏實者下之用百祥丸或宣風散加青皮若不急下轉增煩悶而死若忽自瀉火性急速故暴注而下然下之中火亦少泄矣便膿血者亦內潰其邪也瀉痂皮者內靨自出也此皆脾強腎弱土可制水故順泄瀉水穀不消為逆邪在臟腑不得從腸胃出今去者是腸胃之水穀其不消化非寒也乃邪熱不殺穀火迫之而遽出也此皆腎強脾弱土不能制水故逆蓋脾主運化腎主閉藏腎若受邪則不能閉藏而泛濫土亦不安其位安能制水故五虛以瀉為最重無不喪元氣者全在能食腎旺或可望生治案一兒甫半嵗身熱即見痘皆以樹心花多頂平腳塌根窠澆薄為十死一生之症擬以六朝多用人參附子施季泉曰此險症發癢必甚須看守嚴密竟用涼藥與前論大異七朝果發癢乳藥湯飲傾注而不變色季泉加炒黑黃連而瀉止十三朝復發癢口渴唇焦舌生白胎仍用炒黑黃連而胎渴愈十九朝季泉别而誡曰慎防發疔疳疔必發腦後頂骨間待自潰以收口膏貼禁用摻藥口疳只用人中白散又授餘毒一方詳痘毒門前後毫不用補何其識明而見確也一兒痘瀉投以升澀藥不效黃綺雲用酒炒白芍三兩煎服即止此脾虛有熱也一痘虛寒將行漿時作瀉用炒蓮肉一兩雲南真鴉片五分共為末米湯下三分至五分其瀉立止虛瘡煩瀉保元湯不可用一血熱兼氣虛痘先用解毒藥毒消忽瀉痘漸平塌繆仲淳以炒蓮肉五分真鴉片半分米湯下立止王宇泰復用人參二兩黃茋三兩鹿茸三錢煎服補其元氣漿頓足而愈蓋因先解毒盡故可補而無他症一痘後脾虛作瀉用蓮肉人參黃茋五味山萸肉扁豆白术棗肉為丸薑湯下此方移治老年腎氣衰弱而脾虛泄瀉者大效一女痘後泄瀉亦以蓮肉鴉片治之不止更以蓮內粘米煮粥服之而愈一痘密發透但八朝頭面胸背有漿惟手足止有青泡有用人參黃茋苡仁桔梗連翹而腸鳴不食身熱而嘔大便頻屁急用當歸芍藥山查陳皮砂仁麥冬防風白术茯苓石膏山豆根便製人參消解之藥而愈一痘起脹時忽瀉赤色而稠根窠堅突便祕六日矣此血熱毒壅宜瀉其毒只用清解主人恐耗元氣用豆蔲丸保元湯加肉桂肉果痂雖收而目腫赤四肢發􅏴乃用清解究竟損一目廢一肢有同此症用犀角地黃湯加木通桔梗川芎提之而愈一痘早起飲食不化此脾腎不足也用四君子湯加補骨脂肉果又朝服四神丸夜服四苓白术散而愈一痘隱隱不見面白神疲微熱滲泄此脾虛不能送毒也用異攻散加升麻川芎木通蟬脫陳米瀉止痘發用補中益氣湯調理而愈一痘六朝不起脹灰白昏睡用四牙散木香散發之而愈一痘泄瀉藥石不化此脾虛也用參苓白术散訶附丸而愈一痘後脾虛泄瀉不已用四君子湯加升麻防風肉果又肉豆蔲丸而愈一痘羸瘦枯稿溏泄不已咸謂脾弱用理中湯小異攻散六君子湯皆不效者因其母乳弱也易乳而安一痘後滲瀉此邪熱不殺穀也用六君子湯而愈一痘後溺赤溏瀉色黃如糜此腸中煎煿積熱也以五苓散加車前黃連神麯麥芽查肉而愈一痘後傷食傷暑而瀉用四苓散合香薷飲加神麴麥芽查肉而愈一痘後暑月泄瀉腹如雷鳴服調脾藥不效此腸風餐泄也用葛根湯加防風肉桂煨薑得微汗而愈一痘未發盡利下赤白此血熱痘有壅積也以葛根升麻湯加川芎當歸山查麥芽蟬退稍減而目赤溺數又用犀角地黃湯補中益氣湯而愈一冬月先瀉數日而後見標用升發之藥不效色淡白少神脈浮大無根大虛症也用附子理中湯日進二服痢減痘紅脈始有根然飲食不進用補中益氣湯加桂枝炮薑遂能食安寢但完穀不化痂不易結用小異攻散加芍藥木香散參苓白术散而愈一暑月六朝利下黃赤膿血壯熱煩渴此毒留大腸也用三黃丸兼補中益氣湯而愈一症同而不治日久倒陷而死一靨期而利水穀不分完穀不化用參苓白术散加豆蔲獨參湯而愈一痘後痢下蛔蟲此熱迫之也用人參半夏芍藥烏梅川椒生薑大棗而愈一痘後患痢裏急後重聞藥食而嘔此病邪雖實而胃氣受傷多矣當先補後攻用小異攻散加芍藥而嘔止食進次用木香檳榔丸去積又用調中丸而愈一痘後初秋痢下白積身熱腸痛嘔噦不食此濕熱淤積兼胃受寒邪也用理中湯加防風一服而嘔止又用平胃散加木香黃連葛根山查而愈一痘後痢下赤白能食而不化此胃熱而脾虛也恣食不節遂致不救一痘後暑痢用保和丸香薷飲間服而愈一痘後噤口痢用人參陳皮黃連石蓮肉桔梗胃風湯調理而愈一痘後痢久不止積未盡而中氣不足用人參白术白芍升麻甘草陳米大固中氣而愈陳氏木香散木香腹皮人參肉桂半夏青皮赤茯苓前胡訶子甘草丁香陳氏異攻散木香當歸茯苓各三錢五分人參陳皮丁香肉蔲白术厚朴附子各二錢五分初服不用附子理虛泄甚者加之七味豆蔲丸木香砂仁龍骨附子肉果各五錢赤石脂枯礬各七錢麵糊為丸如黍米大每嵗服二十丸米湯下一方加牡蠣理中湯甘草白术人參乾薑百祥丸紅牙大戟用漿水煮極軟去膏曬乾復入前汁收乾再焙為末丸如黍米大芝麻湯下每服三十丸宣風散檳榔廣皮各二錢甘草黑丑頭末各一錢丁香脾積丸三稜蓬术木香丁香各五錢烏梅皮牙皂灰各三錢巴豆四十九粒黃芩湯黃芩白芍甘草加味四苓散豬苓澤瀉木通茯苓車前牛蒡黃連术苓調脾散香附厚朴煨薑白术茯苓白芍神麴甘草砂仁扁豆人參益黃散廣皮訶子炙甘草丁香參术散人參白术茯苓砂仁甘草苡仁蓮肉山查肉果訶子橘紅木香米湯送下胃苓中和湯豬苓澤瀉木通白术茯苓廣皮甘草黃連訶子升麻木香藿香粳米香連化毒湯木香黃連豬苓白术甘草理中化毒湯人參白术茯苓甘草生薑七神丸治腎瀉肉果骨脂人參麥芽薑煮棗肉為丸每一錢參湯下奪命丹治寒瀉不止人參黃茋石菖蒲紅花當歸補骨脂川芎山藥茯苓附子防風官桂丁香茯神乾薑厚脾散赤石脂龍骨枯礬苡仁山藥扁豆加味參苓白术散人參茯苓白术山藥赤茯苓豬苓澤瀉苡仁炙黃茋堅腸湯黃茋白术肉果山查川芎陳皮升麻固本丸沒石子升麻臍帶米糊為丸保元湯下四製术附丸香附白术各四錢俱酒醋薑汁童便製為末米糊調下燒針丸枯礬黃丹用薑煮棗肉為丸臨用以針刺於燈上燒紅五苓湯送下香連丸黃連吳茱茰石蓮肉木香廣皮醋調神麴麵糊為丸祕要神應丸黃連三兩先用薑汁浸透後以陳壁泥先炒黑隔紙於泥上焙連焦乾如此炒浸七次以黑為度泔水浸炒蒼术二兩水飛滑石一兩麵炒檳榔一兩枳實兩半薑煮半夏兩半童便浸煮香附兩半薑汁炒厚朴一兩土炒茱茰一兩薑汁糊丸每服三錢至五錢加減神應丸薑製厚朴八分橘紅當歸製半夏各一錢製蒼术檳榔炒枳殼各七分薑製黃連一錢五分藿香砂仁甘草後重加酒炒芍藥童便製香附赤痢加酒炒黃芩白痢加桑皮紅白兼者加黃芩桑白白轉紅者加酒炒芍藥黃芩白术砂仁檳榔臭氣重者加連翹枳殼水煎服寒戰咬牙門寒戰咬牙有寒熱之異當審痘期前後痘色紅白二便祕利脈來遲數而後為熱為寒施治無誤大抵火則清之虛則補之感冒則發散之一症獨見可治並見不治發於七日前易治七日後難治寒症痘色青白皮薄頂陷身涼神靜二便清滑舌無胎口不渴脈沉遲者寒症也元氣虛胃氣寒則為咬牙肺虛寒則為寒戰法宜溫補用保元湯加川芎當歸生薑肉桂丁香附子或異攻散泄瀉加肉果見於養漿時者必虛寒也七八日前尚有屬熱者七八日後屬寒者多矣用催蟄丹滴滴金見於八九日內者必背陽而反入於隂宜大補之用建中湯寒戰用獨附湯養胃化毒湯咬牙用清神化毒湯熱症痘色紅紫焦黑齊湧掀發壯熱煩躁口渴二便祕澀脈洪數者皆火邪有餘熱症也胃熱則咬牙肺熱則寒戰總之隂不勝陽激之反為寒戰咬牙也法宜清解用四物湯合黃連解毒湯加升麻連翹石膏木通麥冬便祕加大黃見於初出時者缺見於痘後者屬虛無疑雖有小熱乃餘毒也宜清解兼補寒戰用缺咬牙用缺寒戰元氣虧侵邪毒內攻邪正相搏而戰動也須看日期辨之五日戰者死七日戰者變候八九日戰者危大抵熱極須解肌無熱須引表耳初熱時寒戰如瘧者因榮衛虛弱不能逼毒快出留滯經絡與五氣相爭振振搖動火之象也用紫葛桂枝湯痘出則定發熱時唇不紅脈不大析析惡寒之狀間作乾嘔此表氣素虛毒難出也慎勿解表以成虛弱之禍宜和之用參蘇飲痘出則定起脹後痘密番掀腫痛經絡動搖振寒者非寒戰也膿成痛去而自解灌漿時寒戰亦有虛寒虛熱之不同若痘色果係虛寒者用養胃化毒湯異攻散人牙散結痂時暫戰暫止口中不叫目不直竪手股戰動上不干頭中不犯身者可治若遍身戰動頭頸轉搖不歇眼白肩聳㺯舌者此五氣已絶不治之症三日前火毒太甚痘色紅紫熱極似寒而戰灌膿時經脈血耗不能榮養手足跳肉自動者名肉瞤筋惕亦非寒戰也宜養榮血用十全大補湯痘白寒戰用田單火牛湯脾虛作戰根顆明淨勻朗但因脾虛不能傳導以致所勝之水自侮作戰也用茯苓澤瀉荆芥防風黃苓連翹木通之類咬牙上齦屬胃亦屬於心靜而不易下齦屬大腸亦屬於脾動而不倚腎既主骨則牙齒亦主腎也痘伏於腎而發腎涸其源淫火上炎土失其養水不能制則咬牙矣咬於左兼治肝咬於右兼治肺咬於中而無聲宜理脾胃益三隂一二日咬牙非灌膿時可比三日以前咬牙心毒不發宜瀉心火解毒迹風用清神解毒湯如根顆紅紫毒氣內拒宜涼血解毒如久病面青色黃體弱根顆淡白者乃虛寒也四五日咬牙毒陷於內也七八日咬牙若根顆略有紅赤必乘其瘡勢舉發之單用保元湯加川芎當歸十一二日咬牙此時毒氣入內雖為常候亦須調脾解毒單見咬牙戛戛有聲者腎火也用知母黃柏咬牙兼呵欠者肝虛也陽引而上隂引而下故呵欠也陽極而上隂極而下則合而嚙齒咬牙也用十全大補湯咬牙兼上攛者心熱也心火上炎故攛視也火氣動搖故咬牙也用導赤散加連翹牛蒡咬牙兼煩悶呵欠者風熱所致也用羌活湯疤後咬牙兼弄舌妄言者用硃砂六一散用氷片少許夢中咬牙如鋸不絶如徹索者或睁目舌短咬牙者或咬牙一時即搖頭一時者或肚腹瑟瑟咬牙者皆不治之症痘出潰爛而咬牙者蓋熱勝則腐敗火旺則動搖心熱也法宜清之瘡本焦黑而寒戰咬牙者腎之變動相干也治宜溫之治案一痘六七日不起脹寒戰咬牙腹脹氣急用竒功散補中益氣湯而愈一痘未發時寒戰咬牙此邪正交爭欲出不出也用升麻葛根湯加人參防風桂枝及補中益氣湯而愈一痘未出齊而手足搖動以異攻散投之而更甚此假寒實熱木氣太過而兼火犯也宜平肝制火用升麻葛根湯加川芎柴胡防風而愈一痘發熱時咬牙攛目乃心熱甚也用升麻葛根湯合導赤散而愈一痘發熱時悶瞀咬牙乃肝經熱風也用羌活湯加葛根芍藥而愈催蟄丹虎牙人牙各酥炙人參丁香共為末滴滴金狗頭去肉酥炙為末酒煎獨附湯附子便製加燈心水煎養胃化毒湯人參黃茋清神化毒湯升麻生地木通甘草防風麥冬田單火牛湯人參黃茋附子蓼子穿山甲當歸橘紅仁端録卷十三
